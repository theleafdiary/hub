    const POT_SIZES = ['2"', '3"', '4"', '6"', '8"', '10"', '12"', "1 gal", "2 gal", "3 gal", "5 gal", "7 gal", "10 gal", "15 gal"];

    const uid = () => Math.random().toString(36).slice(2, 9);
    const supabaseUrl = 'https://yyklidmefiguzrbvrnmp.supabase.co';
    const supabaseKey = 'sb_publishable_8vyVQt8Ay3S8kJ4cI9U5YA_eB6l2CUu';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    const $ = n => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(+n || 0);

    function bytesToBase64(bytes) {
      let binary = "";
      const chunkSize = 0x8000;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        const chunk = bytes.subarray(i, i + chunkSize);
        binary += String.fromCharCode.apply(null, chunk);
      }
      return btoa(binary);
    }

    const fDate = d => { if (!d) return ""; const [y, m, day] = d.split("-"); return new Date(y, m - 1, day).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }); };
    const toTC = s => (s || "").replace(/\w\S*/g, t => t[0].toUpperCase() + t.slice(1).toLowerCase());
    const gOf = name => { const n = (name || "").toLowerCase(); for (const g of GENERA.slice(0, -1)) if (n.includes(g.toLowerCase())) return g; return "Other"; };
    const sprice = (cost, m = 0.62) => cost > 0 ? Math.ceil(cost / (1 - m) / 5) * 5 : 0;
    const marg = (cost, price) => price > 0 ? Math.round(((price - cost) / price) * 100) : 0;
    const pid = (code, n) => `${code}-${String(n).padStart(3, "0")}`;
    const getNextId = (plants, code) => {
      const nums = (plants || [])
        .filter(p => String(p.nurseryCode || "").toUpperCase() === String(code || "").toUpperCase())
        .map(p => {
          const m = String(p.plantId || p.plantCode || "").match(/-(\d+)$/);
          return m ? parseInt(m[1], 10) : 0;
        })
        .filter(n => Number.isFinite(n));
      return nums.length ? Math.max(...nums) : 0;
    };
    const dHeld = d => d ? Math.floor((Date.now() - new Date(d)) / (864e5)) : null;
    const fDays = d => d === null ? "—" : d === 0 ? "Today" : d === 1 ? "1 day" : `${d}d`;
    const platFee = (platform, price) => {
      if (platform === "Palmstreet") return +(price * PS_FEE).toFixed(2);
      if (platform === "Whatnot") return +(price * WN_FEE).toFixed(2);
      if (platform === "Shopify") return +(price * SH_FEE + SH_FLAT).toFixed(2);
      return 0;
    };
    const trueProfit = p => {
      const rev = +p.salePrice || +p.suggestedPrice || 0, cost = +p.cost || 0;
      return rev - cost - platFee(p.platform || "", rev) - (+p.shippingCost || 0);
    };
    const estIncomeTax = net => {
      if (net <= 0) return 0;
      let tax = 0, prev = 0;
      for (const [lo, hi, r] of FL_BRACKETS) { if (net > lo) { tax += (Math.min(net, hi) - prev) * r; prev = hi; } }
      return tax;
    };
    const CAN = {
      seeCost: r => r === "owner" || r === "manager",
      seeProfit: r => r === "owner",
      seeExpenses: r => r === "owner",
      seePayroll: r => r === "owner",
      seeTax: r => r === "owner",
      seeReports: r => r === "owner" || r === "manager",
      deleteRec: r => r === "owner",
      editSettings: r => r === "owner",

    /* ══════════════════════════════════════════════════════════
       SHARED UI COMPONENTS
    ══════════════════════════════════════════════════════════ */
    function Tag({ text, color = C.g600, sm, dot }) {
      return <span style={{ display: "inline-flex", alignItems: "center", gap: 4, background: color + "1A", color, border: `1px solid ${color}40`, borderRadius: 20, padding: sm ? "1px 8px" : "2px 11px", fontSize: sm ? 10 : 11, fontWeight: 700, fontFamily: F.mono, whiteSpace: "nowrap" }}>
        {dot && <span style={{ width: 5, height: 5, borderRadius: "50%", background: color, flexShrink: 0 }} />}{text}
      </span>;
    }
    function Btn({ children, onClick, v = "fill", sz = "md", full, disabled, style: s = {} }) {
      const pad = sz === "sm" ? "8px 14px" : sz === "lg" ? "15px 32px" : "12px 20px";
      const fs = sz === "sm" ? 12 : sz === "lg" ? 16 : 14;
      const VS = { fill: { background: C.g700, color: "#fff", border: `1px solid ${C.g700}` }, soft: { background: C.g100, color: C.g800, border: `1px solid ${C.g300}` }, outline: { background: "transparent", color: C.g700, border: `1.5px solid ${C.g700}` }, ghost: { background: "transparent", color: C.tx3, border: `1px solid ${C.bd}` }, danger: { background: C.red, color: "#fff", border: `1px solid ${C.red}` }, gold: { background: C.gold, color: "#fff", border: `1px solid ${C.gold}` } };
      return <button onClick={onClick} disabled={disabled} style={{ ...VS[v], padding: pad, fontSize: fs, fontWeight: 600, borderRadius: 8, cursor: disabled ? "not-allowed" : "pointer", fontFamily: F.body, display: "inline-flex", alignItems: "center", gap: 5, whiteSpace: "nowrap", opacity: disabled ? .5 : 1, width: full ? "100%" : undefined, justifyContent: full ? "center" : undefined, transition: "opacity .12s", ...s }}>{children}</button>;
    }
    const Card = ({ children, style: s = {}, onClick }) => <div onClick={onClick} style={{ background: C.card, border: `1px solid ${C.bd}`, borderRadius: 14, padding: "16px 20px", cursor: onClick ? "pointer" : undefined, ...s }}>{children}</div>;
    const Row = ({ children, gap = 10, wrap, center, between, end, style: s = {} }) => <div style={{ display: "flex", gap, flexWrap: wrap ? "wrap" : undefined, alignItems: center ? "center" : end ? "flex-end" : undefined, justifyContent: between ? "space-between" : undefined, ...s }}>{children}</div>;

    function KPI({ label, value, sub, color, onClick }) {
      return <div onClick={onClick} style={{ background: C.card, border: `1px solid ${C.bd}`, borderRadius: 14, padding: "14px 14px", flex: 1, minWidth: 100, borderTop: `3px solid ${color || C.g500}`, cursor: onClick ? "pointer" : undefined }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.tx3, letterSpacing: .5, textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
        <div style={{ fontSize: 24, fontWeight: 700, color: color || C.g800, fontFamily: F.display, lineHeight: 1.1 }}>{value}</div>
        {sub && <div style={{ fontSize: 12, color: C.tx3, marginTop: 4 }}>{sub}</div>}
      </div>;
    }
    function SHdr({ icon, title, sub, right }) {
      return <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
            {icon && <div style={{ width: 40, height: 40, borderRadius: 12, background: C.g100, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{icon}</div>}
            <h1 style={{ fontFamily: F.display, fontSize: 24, fontWeight: 700, color: C.g900, margin: 0 }}>{title}</h1>
          </div>
          {sub && <p style={{ fontSize: 13, color: C.tx3, margin: "4px 0 0", paddingLeft: 49 }}>{sub}</p>}
        </div>
        {right && <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>{right}</div>}
      </div>;
    }
    function Inp({ label, value, onChange, type = "text", placeholder, required, disabled, onKeyDown, style: s = {} }) {
      return <div style={{ display: "flex", flexDirection: "column", gap: 4, flex: 1, ...s }}>
        {label && <label style={{ fontSize: 13, fontWeight: 600, color: C.tx2, letterSpacing: .1 }}>{label}{required && <span style={{ color: C.red }}> *</span>}</label>}
        <input type={type} value={value || ""} onChange={e => onChange(e.target.value)} onKeyDown={onKeyDown} placeholder={placeholder} disabled={disabled}
          style={{ padding: "12px 13px", border: `1.5px solid ${C.bd}`, borderRadius: 10, fontSize: 15, color: C.tx1, fontFamily: F.body, background: disabled ? C.cardAlt : C.card, boxSizing: "border-box", outline: "none", width: "100%" }} />
      </div>;

    function Sel({ label, value, onChange, options, required }) {
      return <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {label && <label style={{ fontSize: 13, fontWeight: 600, color: C.tx2, letterSpacing: .1 }}>{label}{required && <span style={{ color: C.red }}> *</span>}</label>}

          {options.map(o => typeof o === "string" ? <option key={o} value={o}>{o}</option> : <option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
      </div>;
    }
    function Tbl({ cols, rows, empty = "No data yet." }) {
      return <div style={{ overflowX: "auto", border: `1px solid ${C.bd}`, borderRadius: 10 }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead style={{ background: C.cardAlt }}>
            <tr>{cols.map(c => <th key={c.k || c.l} style={{ padding: "8px 11px", textAlign: c.right ? "right" : "left", color: C.tx3, fontWeight: 700, fontSize: 10, letterSpacing: .5, textTransform: "uppercase", borderBottom: `1px solid ${C.bd}`, whiteSpace: "nowrap" }}>{c.l}</th>)}</tr>
          </thead>
          <tbody>
            {rows.length === 0 ? <tr><td colSpan={cols.length} style={{ padding: "40px", textAlign: "center", color: C.tx3 }}>{empty}</td></tr>
              : rows.map((r, i) => <tr key={i} style={{ borderBottom: `1px solid ${C.bdS}`, cursor: r._click ? "pointer" : undefined }}
                onMouseEnter={e => { if (r._click) e.currentTarget.style.background = C.g50; }}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                onClick={r._click}>
                {cols.map(c => <td key={c.k || c.l} style={{ padding: "9px 11px", textAlign: c.right ? "right" : "left" }}>{r[c.k || c.l]}</td>)}
              </tr>)}
          </tbody>
        </table>
      </div>;
    }
    function Modal({ title, children, onClose, wide }) {
      return <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.48)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
        <div style={{ background: C.card, borderRadius: 16, width: "100%", maxWidth: wide ? 860 : 560, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 24px 64px rgba(0,0,0,.22)" }}>

            <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: C.tx3, lineHeight: 1 }}>×</button>
          </div>
          <div style={{ padding: 20 }}>{children}</div>
        </div>
      </div>;
    }
    function MBadge({ m }) { const c = m >= 65 ? C.g600 : m >= 45 ? C.gold : C.red; return <Tag text={`${m}%`} color={c} sm />; }
    function SBadge({ s }) {
      const MAP = { "In Stock": C.g600, "Sold": C.gold, "Dead": C.red, "Damaged": C.red, "Returned": C.amber, "Giveaway": C.blue, "Personal": C.tx3, "Holding For Customer": C.purple, "Needs Label": C.amber, "Needs Photo": C.amber };
      return <Tag text={s} color={MAP[s] || C.tx3} dot sm />;
    }
    function BarLine({ data, lk, vk, fmtV, colorFn }) {
      const max = Math.max(...data.map(d => d[vk] || 0), 1);
      return <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {data.map((d, i) => {
          const val = d[vk] || 0, p = Math.round(val / max * 100), color = colorFn ? colorFn(d, i) : C.g500; return (
            <div key={i}><Row between style={{ marginBottom: 3 }}><span style={{ fontSize: 12, fontWeight: 600, color: C.tx1 }}>{d[lk]}</span><span style={{ fontSize: 12, fontWeight: 700, color }}>{fmtV ? fmtV(val) : val}</span></Row>
              <div style={{ height: 8, background: C.g100, borderRadius: 4, overflow: "hidden" }}><div style={{ width: `${p}%`, height: "100%", background: color, borderRadius: 4, transition: "width .4s" }} /></div></div>
          );
        })}
      </div>;
    }

    /* ══════════════════════════════════════════════════════════
       NAV
    ══════════════════════════════════════════════════════════ */
    function Nav({ page, setPage, user, onLogout, plantCount, billAlerts, onChangePassword }) {

        { id: "sellthru", icon: "📊", l: "Sell-Through" }, { id: "showimport", icon: "📦", l: "Post-Show" },
        { id: "customers", icon: "👥", l: "Customers" }, { id: "nursery", icon: "🏪", l: "Nurseries" },
        { id: "bills", icon: "📅", l: "Bills" }, { id: "expense", icon: "💳", l: "Expenses" },

        : [{ id: "dash", icon: "🏠", l: "Home" }, { id: "inv", icon: "🌿", l: "Plants" }, { id: "upload", icon: "📸", l: "Scan" }, { id: "sellthru", icon: "📊", l: "Insights" }, { id: "bills", icon: "📅", l: "Bills" }];
      return <>
        <div style={{ background: "#000000", position: "sticky", top: 0, zIndex: 300, padding: "10px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", boxShadow: "0 2px 12px rgba(0,0,0,.2)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <img src="https://theleafdiary.com/cdn/shop/files/leaf_diary_logo_png.png?v=1768865207&width=200" alt="Leaf Diary" style={{ height: 38, width: 38, objectFit: "contain", borderRadius: "50%", background: "#000", padding: 1, boxShadow: "0 0 0 1px rgba(255,255,255,.25)" }} onError={e => { e.currentTarget.src = "https://cdn.shopify.com/s/files/1/0836/8723/7665/files/leaf_diary_logo_png.png?v=1768865207&width=200"; }} />
            <span style={{ fontSize: 15, color: "#fff", fontWeight: 700, fontFamily: `'Playfair Display',Georgia,serif`, letterSpacing: .5 }}>LEAF DIARY</span>

    function AuthScreen() {
      const [isSignup, setIsSignup] = useState(false);
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [err, setErr] = useState("");
      const [msg, setMsg] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSubmit = async () => {
        if (!email || !password) { setErr("Enter email and password."); return; }
        setLoading(true); setErr(""); setMsg("");
        
        if (isSignup) {
          const { error } = await supabase.auth.signUp({ email, password });
          if (error) setErr(error.message);
          else { setMsg("Account created! Logging you in..."); setIsSignup(false); await supabase.auth.signInWithPassword({ email, password }); }
        } else {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) setErr(error.message);
        }
        setLoading(false);
      };

      const handleForgot = async () => {
        if (!email) { setErr("Enter your email address first."); return; }
        setLoading(true); setErr(""); setMsg("");
        const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
        if (error) setErr(error.message); else setMsg("Password reset email sent! Check your inbox.");
        setLoading(false);
      };

      return <div style={{ minHeight: "100vh", background: `linear-gradient(135deg,${C.g100} 0%,${C.g50} 100%)`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: F.body }}>
        <div style={{ width: 380, background: C.card, borderRadius: 18, padding: "40px 36px", boxShadow: "0 12px 48px rgba(0,0,0,.12)", border: `1px solid ${C.bd}` }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <img src="https://theleafdiary.com/cdn/shop/files/leaf_diary_logo_png.png?v=1768865207&width=200" alt="Leaf Diary" style={{ height: 46, objectFit: "contain", marginBottom: 12 }} onError={e => e.target.style.display = "none"} />
            <h2 style={{ fontFamily: F.display, fontSize: 22, color: C.g900, margin: 0 }}>Business Hub</h2>
            <p style={{ fontSize: 11, color: C.tx3, margin: "5px 0 0", letterSpacing: 1.2, textTransform: "uppercase" }}>Secure Access</p>
          </div>
          
          <div style={{ display: "flex", flexDirection: "column", gap: 14, marginBottom: 14 }}>
            <Inp label="Email" value={email} onChange={setEmail} type="email" placeholder="you@company.com" onKeyDown={e => e.key === "Enter" && handleSubmit()} />
            <Inp label="Password" value={password} onChange={setPassword} type="password" placeholder="••••••••" onKeyDown={e => e.key === "Enter" && handleSubmit()} />
          </div>
          
          {err && <div style={{ background: C.redBg, border: `1px solid ${C.red}40`, borderRadius: 8, padding: "8px 12px", color: C.red, fontSize: 12, margin: "10px 0" }}>{err}</div>}
          {msg && <div style={{ background: C.g50, border: `1px solid ${C.g200}`, borderRadius: 8, padding: "8px 12px", color: C.g800, fontSize: 12, margin: "10px 0" }}>{msg}</div>}
          
          <Btn full v="fill" sz="lg" onClick={handleSubmit} disabled={loading} style={{ marginTop: 14 }}>{loading ? "Please wait..." : isSignup ? "Create Account →" : "Sign In →"}</Btn>
          
          <div style={{ textAlign: "center", marginTop: 20, display: "flex", flexDirection: "column", gap: 8 }}>
            {!isSignup && <button onClick={handleForgot} style={{ background: "none", border: "none", color: C.g600, fontSize: 12, cursor: "pointer", textDecoration: "underline" }}>Forgot your password?</button>}
            <button onClick={() => { setIsSignup(!isSignup); setErr(""); setMsg(""); }} style={{ background: "none", border: "none", color: C.tx3, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
              {isSignup ? "Already have an account? Sign in" : "Need an account? Sign up"}
            </button>
          </div>
        </div>
      </div>;
    }

    /* ══════════════════════════════════════════════════════════
       OWNER DASHBOARD
    ══════════════════════════════════════════════════════════ */
    function getDashDateRange(preset, customStart, customEnd) {
      const now = new Date();
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);
      let start;
      if (preset === "today") start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      else if (preset === "week") {
        const day = now.getDay();
        const diff = day === 0 ? 6 : day - 1;
        start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diff);
      }
      else if (preset === "month") start = new Date(now.getFullYear(), now.getMonth(), 1);
      else if (preset === "quarter") start = new Date(now.getFullYear(), Math.floor(now.getMonth() / 3) * 3, 1);
      else if (preset === "year") start = new Date(now.getFullYear(), 0, 1);
      else if (preset === "custom") {
        start = customStart ? new Date(customStart + "T00:00:00") : new Date(0);
        const cEnd = customEnd ? new Date(customEnd + "T23:59:59") : end;
        return { start, end: cEnd, label: `${customStart || "Start"} → ${customEnd || "Today"}` };
      }
      else return { start: new Date(0), end: new Date(8640000000000000), label: "All Time" };
      return { start, end, label: start.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) + " → Today" };
    }
    function dashDateOf(obj, fields) {
      for (const f of fields) {
        if (obj && obj[f]) {
          const d = new Date(String(obj[f]).includes("T") ? obj[f] : obj[f] + "T12:00:00");
          if (!isNaN(d)) return d;
        }
      }
      return null;
    }
    function inDashRange(obj, range, fields) {
      const d = dashDateOf(obj, fields);
      if (!d) return false;
      return d >= range.start && d <= range.end;
    }
    function OwnerDash({ plants, expenses, timecards, bills, setPage }) {
      const [dashPreset, setDashPreset] = useState("month");
      const [customStart, setCustomStart] = useState(today());
      const [customEnd, setCustomEnd] = useState(today());
      const range = getDashDateRange(dashPreset, customStart, customEnd);
      const dateChip = dashPreset === "all" ? "All Time" : range.label;

      const soldAll = plants.filter(p => p.status === "Sold");
      const sold = dashPreset === "all" ? soldAll : soldAll.filter(p => inDashRange(p, range, ["saleDate", "soldDate", "dateSold", "soldAt", "updatedAt", "dateAdded"]));
      const expensesInRange = dashPreset === "all" ? expenses : expenses.filter(e => inDashRange(e, range, ["date", "expenseDate", "paidDate", "createdAt"]));
      const timecardsInRange = dashPreset === "all" ? timecards : timecards.filter(t => inDashRange(t, range, ["date", "createdAt"]));

      const inStock = plants.filter(p => p.status === "In Stock");
      const deadAll = plants.filter(p => ["Dead", "Damaged"].includes(p.status));
      const dead = dashPreset === "all" ? deadAll : deadAll.filter(p => inDashRange(p, range, ["deadDate", "damagedDate", "updatedAt", "dateAdded"]));
      const aging30 = inStock.filter(p => dHeld(p.dateAdded) >= 30);
      const aging60 = inStock.filter(p => dHeld(p.dateAdded) >= 60);
      const needsLabel = inStock.filter(p => !p.labelPrinted);
      const addedInRange = dashPreset === "all" ? plants : plants.filter(p => inDashRange(p, range, ["dateAdded", "createdAt", "invoiceDate"]));

      const soldRev = sold.reduce((s, p) => s + (+p.salePrice || +p.suggestedPrice || 0), 0);
      const soldFees = sold.reduce((s, p) => s + platFee(p.platform || "", +p.salePrice || +p.suggestedPrice || 0), 0);
      const soldCogs = sold.reduce((s, p) => s + (+p.cost || 0), 0);
      const trueGross = soldRev - soldCogs - soldFees;
      const totalExp = expensesInRange.reduce((s, e) => s + (+e.amount || 0), 0);
      const payrollCost = timecardsInRange.reduce((s, t) => s + (+t.totalPay || 0), 0);
      const netProfit = trueGross - totalExp;
      const stockVal = inStock.reduce((s, p) => s + (+p.suggestedPrice || 0), 0);
      const lostVal = dead.reduce((s, p) => s + (+p.cost || 0), 0);
      const avgOrder = sold.length ? soldRev / sold.length : 0;
      const avgProfit = sold.length ? trueGross / sold.length : 0;
      const sellThrough = addedInRange.length ? Math.round((sold.length / addedInRange.length) * 100) : 0;

      const upcoming = bills.filter(b => { const d = Math.ceil((new Date(b.dueDate) - Date.now()) / 864e5); return d <= 14 && d >= 0 && b.status === "Unpaid"; });
      const platData = PLATFORMS.map(pl => { const pp = sold.filter(p => p.platform === pl); return { pl, rev: pp.reduce((s, p) => s + (+p.salePrice || +p.suggestedPrice || 0), 0), cnt: pp.length }; }).filter(p => p.cnt > 0).sort((a, b) => b.rev - a.rev);
      const gMap = {};
      sold.forEach(p => { const g = gOf(p.name); if (!gMap[g]) gMap[g] = { rev: 0, cost: 0, cnt: 0 }; gMap[g].rev += (+p.salePrice || +p.suggestedPrice || 0); gMap[g].cost += (+p.cost || 0); gMap[g].cnt++; });
      const topGenus = Object.entries(gMap).map(([g, d]) => ({ g, profit: d.rev - d.cost, cnt: d.cnt })).sort((a, b) => b.profit - a.profit).slice(0, 4);

      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <SHdr icon="🏠" title="Business Dashboard" sub={`Showing ${dateChip}`}
          right={<Row gap={8}><Btn sz="sm" onClick={() => setPage("upload")}>📸 Upload Invoice</Btn><Btn sz="sm" v="soft" onClick={() => setPage("manual")}>✏️ Add Plant</Btn></Row>} />

        <Card style={{ marginBottom: 14, background: C.g50, border: `1px solid ${C.g200}` }}>
          <Row between wrap center gap={10}>
            <div>
              <div style={{ fontFamily: F.display, fontSize: 17, fontWeight: 700, color: C.g900 }}>📅 Dashboard Date Range</div>
              <div style={{ fontSize: 12, color: C.tx3, marginTop: 2 }}>Sales, fees, expenses, payroll, tax estimate, profit, and sold plant charts follow this range.</div>
            </div>
            <Row gap={8} wrap center>
              {[
                ["today", "Today"], ["week", "This Week"], ["month", "This Month"], ["quarter", "Quarter"], ["year", "YTD"], ["all", "All Time"], ["custom", "Custom"]
              ].map(([v, l]) => <button key={v} onClick={() => setDashPreset(v)} style={{ padding: "8px 11px", borderRadius: 8, border: `1.5px solid ${dashPreset === v ? C.g700 : C.bd}`, background: dashPreset === v ? C.g700 : C.card, color: dashPreset === v ? "#fff" : C.tx2, fontFamily: F.body, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{l}</button>)}
            </Row>
          </Row>
          {dashPreset === "custom" && <Row gap={10} wrap style={{ marginTop: 12 }}>
            <Inp label="Start Date" type="date" value={customStart} onChange={setCustomStart} />
            <Inp label="End Date" type="date" value={customEnd} onChange={setCustomEnd} />
          </Row>}
        </Card>

        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
          <div style={{ background: C.g800, borderRadius: 14, padding: "18px 22px", color: "#fff" }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", opacity: .7, marginBottom: 6 }}>Net Profit for Selected Range</div>
            <div style={{ fontSize: 32, fontWeight: 700, fontFamily: F.display, lineHeight: 1, marginBottom: 6 }}>{$(netProfit)}</div>
            <div style={{ fontSize: 12, opacity: .7 }}>{$(trueGross)} gross · {$(soldFees)} fees · {$(totalExp)} exp</div>
          </div>
          <KPI label="Revenue" value={$(soldRev)} sub={`${sold.length} plants sold`} color={C.gold} />
          <KPI label="Avg Sale" value={$(avgOrder)} sub={`Avg gross ${$(avgProfit)}`} color={C.blue} />
          <KPI label="Stock Value" value={$(stockVal)} sub={`${inStock.length} current in stock`} color={C.g600} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 22 }}>
          <KPI label="Platform Fees" value={$(soldFees)} color={C.red} />
          <KPI label="Expenses" value={$(totalExp)} color={C.red} />
          <KPI label="Payroll" value={$(payrollCost)} color={C.purple} />
          <KPI label="Sell-Through" value={`${sellThrough}%`} sub={`${sold.length} sold / ${addedInRange.length} added`} color={sellThrough >= 60 ? C.g600 : sellThrough >= 30 ? C.gold : C.amber} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 22 }}>
          <KPI label="Aging 30+ days" value={aging30.length} color={aging30.length > 0 ? C.amber : C.tx3} onClick={() => setPage("inv")} />
          <KPI label="Aging 60+ days" value={aging60.length} color={aging60.length > 0 ? C.red : C.tx3} onClick={() => setPage("inv")} />
          <KPI label="Needs Labels" value={needsLabel.length} color={needsLabel.length > 0 ? C.blue : C.tx3} onClick={() => setPage("labels")} />
          <KPI label="Dead/Damaged Loss" value={$(lostVal)} sub={dashPreset === "all" ? `${dead.length} all-time` : `${dead.length} in range`} color={dead.length > 0 ? C.red : C.tx3} />
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 14 }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Card>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 12 }}>💰 Revenue by Platform — {dateChip}</div>
              {platData.length === 0 ? <p style={{ color: C.tx3, fontSize: 12 }}>No sales in this date range.</p>
                : <BarLine data={platData} lk="pl" vk="rev" fmtV={$} colorFn={(_, i) => [C.g600, C.gold, C.blue, C.amber][i % 4]} />}
            </Card>
            <Card>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 12 }}>🏆 Top Genus by Profit — {dateChip}</div>
              {topGenus.length === 0 ? <p style={{ color: C.tx3, fontSize: 12 }}>No sold plants in this date range.</p>
                : topGenus.map(({ g, profit, cnt }) => <div key={g} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: `1px solid ${C.bdS}` }}>
                  <div><span style={{ fontWeight: 600, fontSize: 13 }}>{g}</span><span style={{ fontSize: 11, color: C.tx3, marginLeft: 8 }}>{cnt} sold</span></div>
                  <span style={{ fontWeight: 700, color: C.gold, fontSize: 13 }}>{$(profit)}</span>
                </div>)}
            </Card>
            <Card style={{ background: C.g50, border: `1px solid ${C.g200}` }}>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 13, marginBottom: 8 }}>🌴 Florida Tax Snapshot — {dateChip}</div>
              {[["Sales Tax Due (7%)", $(soldRev * FL_SALES_TAX)], ["Est. SE Tax (15.3%)", $(Math.max(0, netProfit) * FL_SE_TAX)], ["Est. Income Tax", $(estIncomeTax(Math.max(0, netProfit)))], ["Payroll Cost", $(payrollCost)]].map(([l, v]) => (
                <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0" }}>
                  <span style={{ fontSize: 11, color: C.tx3 }}>{l}</span>
                  <span style={{ fontWeight: 700, color: C.g800, fontSize: 11 }}>{v}</span>
                </div>
              ))}
              <button onClick={() => setPage("tax")} style={{ marginTop: 8, fontSize: 11, color: C.blue, background: "none", border: "none", cursor: "pointer", fontFamily: F.body, padding: 0 }}>Full Tax Center →</button>
            </Card>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {upcoming.length > 0 && <div style={{ background: C.redBg, border: `1px solid ${C.red}44`, borderRadius: 12, padding: "14px 16px" }}>
              <div style={{ fontWeight: 700, color: C.red, marginBottom: 8, fontSize: 13, fontFamily: F.display }}>📅 Bills Due Soon</div>
              {upcoming.map(b => {
                const d = Math.ceil((new Date(b.dueDate) - Date.now()) / 864e5); return (
                  <div key={b.id} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px solid ${C.red}22` }}>
                    <span style={{ fontSize: 12, fontWeight: 600 }}>{b.name}</span>
                    <Row gap={8}><span style={{ fontWeight: 700, color: C.red, fontSize: 12 }}>{$(b.amount)}</span><span style={{ fontSize: 11, color: C.tx3 }}>in {d}d</span></Row>
                  </div>);
              })}
              <Btn v="ghost" sz="sm" onClick={() => setPage("bills")} style={{ marginTop: 8 }}>View all bills →</Btn>
            </div>}
            {aging30.length > 0 && <div style={{ background: C.amberBg, border: `1px solid ${C.amber}44`, borderRadius: 12, padding: "14px 16px" }}>
              <div style={{ fontWeight: 700, color: C.amber, marginBottom: 6, fontSize: 13 }}>⏳ Aging Inventory</div>
              <div style={{ fontSize: 12, color: C.tx2 }}>{aging30.length} plants 30+ days old</div>
              {aging60.length > 0 && <div style={{ fontSize: 12, color: C.red, marginTop: 3 }}>{aging60.length} plants 60+ days — consider discounting</div>}
              <Btn v="ghost" sz="sm" onClick={() => setPage("inv")} style={{ marginTop: 8 }}>View inventory →</Btn>
            </div>}
            {needsLabel.length > 0 && <div style={{ background: C.blueBg, border: `1px solid ${C.blue}44`, borderRadius: 12, padding: "14px 16px" }}>
              <div style={{ fontWeight: 700, color: C.blue, marginBottom: 6, fontSize: 13 }}>🏷️ {needsLabel.length} Plants Need Labels</div>
              <Btn v="ghost" sz="sm" onClick={() => setPage("labels")}>Print labels →</Btn>
            </div>}
            <Card>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 12 }}>📋 True P&L — {dateChip}</div>
              {[["Gross Revenue", soldRev, C.gold, false], ["− Fees", -soldFees, C.red, false], ["− COGS", -soldCogs, C.red, false], ["= True Gross", trueGross, trueGross >= 0 ? C.g600 : C.red, true], ["− Expenses", -totalExp, C.red, false], ["= Net Profit", netProfit, netProfit >= 0 ? C.g800 : C.red, true]].map(([l, v, c, bold]) => (
                <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "5px 8px", background: bold ? C.g50 : "transparent", borderRadius: 5, marginBottom: 2 }}>
                  <span style={{ fontSize: 12, color: C.tx2, fontWeight: bold ? 700 : 400 }}>{l}</span>
                  <span style={{ fontSize: 12, fontWeight: 700, color: c }}>{v >= 0 ? $(v) : `(${$(-v)})`}</span>
                </div>
              ))}
            </Card>
          </div>
        </div>

        <style>{`@media(max-width:760px){
          div[style*="grid-template-columns: 2fr 1fr 1fr 1fr"],
          div[style*="grid-template-columns: repeat(4,1fr)"],
          div[style*="grid-template-columns: 1.4fr 1fr"]{grid-template-columns:1fr!important;}
        }`}</style>
      </div>;
    }

    /* ══════════════════════════════════════════════════════════
       EMPLOYEE DASHBOARD
    ══════════════════════════════════════════════════════════ */
    function EmpDash({ plants, user, timecards }) {
      const myTC = timecards.filter(t => t.userId === user.id);
      const inStock = plants.filter(p => p.status === "In Stock");
      const todayTC = myTC.find(t => t.date === today() && !t.out);
      const weekPay = myTC.filter(t => new Date(t.date) >= new Date(Date.now() - 7 * 864e5)).reduce((s, t) => s + (+t.totalPay || 0), 0);
      const weekHrs = myTC.filter(t => new Date(t.date) >= new Date(Date.now() - 7 * 864e5)).reduce((s, t) => s + (+t.hours || 0), 0);
      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <SHdr icon="🌿" title={`Hey, ${user.name}! 👋`} sub={new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })} />
        {todayTC && <div style={{ background: C.g50, border: `1px solid ${C.g300}`, borderRadius: 10, padding: "11px 16px", marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.g500, boxShadow: `0 0 6px ${C.g400}` }} /><span style={{ fontWeight: 700, color: C.g800 }}>Clocked in since {todayTC.in}</span>
        </div>}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
          <KPI label="In Stock" value={inStock.length} color={C.g600} />
          <KPI label="Needs Labels" value={inStock.filter(p => !p.labelPrinted).length} color={C.amber} />
          <KPI label="This Week Hrs" value={`${weekHrs.toFixed(1)}h`} color={C.blue} />
          <KPI label="This Week Pay" value={$(weekPay)} color={C.gold} />
        </div>
      </div>;
    }

    /* ══════════════════════════════════════════════════════════
       INVOICE UPLOAD
    ══════════════════════════════════════════════════════════ */
    function InvoiceUpload({ plants, setPlants, nurseries, addAudit, user }) {
      const [step, setStep] = useState("upload");
      const [img, setImg] = useState(null);
      const [parsed, setParsed] = useState(null);
      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState(null);
      const [selN, setSelN] = useState(null);
      const fRef = useRef(), cRef = useRef();
      useEffect(() => { if (nurseries.length && !selN) setSelN(nurseries[0]); }, [nurseries]);
      const load = async f => {
        if (!f) return;
        setErr(null);
        if (f.type === "application/pdf") {
          try {
            const r = new FileReader();
            r.onload = async function () {
              try {
                const typedarray = new Uint8Array(this.result);
                const pdfjsLib = window['pdfjs-dist/build/pdf'];
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                // Downscale if still too large
                const MAX_DIM = 1600;
                let w = canvas.width, h = canvas.height;
                if (w > MAX_DIM || h > MAX_DIM) {
                  const scale = Math.min(MAX_DIM / w, MAX_DIM / h);
                  const smallCanvas = document.createElement("canvas");
                  smallCanvas.width = w * scale;
                  smallCanvas.height = h * scale;
                  smallCanvas.getContext("2d").drawImage(canvas, 0, 0, smallCanvas.width, smallCanvas.height);
                  setImg(smallCanvas.toDataURL("image/jpeg", 0.8));
                } else {
                  setImg(canvas.toDataURL("image/jpeg", 0.8));
                }
                setStep("preview");
              } catch (err) {
                setErr("Failed to parse PDF: " + err.message);
              }
            };
            r.readAsArrayBuffer(f);
          } catch (err) {
            setErr("Error reading file.");
          }
        } else {
          const r = new FileReader();
          r.onload = e => {
            const imgObj = new Image();
            imgObj.onload = () => {
              const canvas = document.createElement("canvas");
              const MAX_DIM = 1600;
              let w = imgObj.width, h = imgObj.height;
              if (w > MAX_DIM || h > MAX_DIM) {
                if (w > h) { h *= MAX_DIM / w; w = MAX_DIM; }
                else { w *= MAX_DIM / h; h = MAX_DIM; }
              }
              canvas.width = w; canvas.height = h;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(imgObj, 0, 0, w, h);
              const resizedB64 = canvas.toDataURL("image/jpeg", 0.7);
              setImg(resizedB64);
              setStep("preview");
            };
            imgObj.src = e.target.result;
          };
          r.readAsDataURL(f);
        }
      };
      const scan = async () => {
        if (!selN) { setErr("Select a nursery first."); return; }
        setLoading(true); setErr(null); setStep("scanning");
        try {
          const b64 = img.split(",")[1];
          const { data, error } = await supabase.functions.invoke('process-invoice', {
            body: { imageBase64: b64 }
          });
          if (error) throw error;
          if (data && data._serverError) throw new Error(data._serverError);
          const result = data;
          setParsed(result);
          let ctr = getNextId(plants, selN.code);
          const mapped = (result.plants || []).flatMap((p, li) => Array.from({ length: Math.max(1, +p.quantity || 1) }, (_, qi) => {
            ctr++; const cost = +p.costPerPlant || 0, sp = sprice(cost);
            return { _k: `${li}-${qi}`, plantId: pid(selN.code, ctr), plantCode: pid(selN.code, ctr), barcodeValue: pid(selN.code, ctr), barcodeType: "CODE128", nurseryCode: selN.code, name: toTC(p.name || ""), botanicalName: p.botanicalName || "", potSize: p.potSize || "", cost, suggestedPrice: sp, salePrice: "", shippingCost: "", margin: marg(cost, sp), status: "In Stock", invoiceNumber: result.invoiceNumber || "", invoiceDate: result.invoiceDate || "", dateAdded: today(), platform: "", rack: "", shelf: "", notes: "", labelPrinted: false, addedBy: user.name };
          }));
          setRows(mapped); setStep("review");
        } catch (e) { setErr("Scan failed: " + e.message); setStep("preview"); }
        finally { setLoading(false); }
      };
      const updR = (k, f, v) => setRows(pr => pr.map(r => { if (r._k !== k) return r; const u = { ...r, [f]: v }; if (f === "cost" || f === "suggestedPrice") u.margin = marg(f === "cost" ? +v : +r.cost, f === "suggestedPrice" ? +v : +r.suggestedPrice); return u; }));
      const save = () => { setPlants(p => [...p, ...rows.map(({ _k, ...r }) => ({ ...r, id: uid() }))]); addAudit({ action: `Invoice uploaded — ${rows.length} plants from ${selN?.name}`, user: user.name, page: "Invoice Upload" }); setStep("done"); };
      const reset = () => { setStep("upload"); setImg(null); setParsed(null); setRows([]); setErr(null); };
      if (!nurseries.length) return <div style={{ padding: "60px", textAlign: "center", background: C.bg, minHeight: "100vh" }}><div style={{ fontSize: 40, marginBottom: 12 }}>🏪</div><h2 style={{ fontFamily: F.display, color: C.g900 }}>Add a nursery first</h2></div>;
      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <SHdr icon="📸" title="Upload Invoice" sub="AI reads every plant, cost, and detail automatically" />
        {step === "upload" && <div style={{ maxWidth: 640 }}>
          <Card style={{ marginBottom: 14 }}>
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, marginBottom: 10 }}>Select Nursery</div>
            <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>{nurseries.map(n => <button key={n.id} onClick={() => setSelN(n)} style={{ padding: "7px 13px", borderRadius: 8, cursor: "pointer", fontFamily: F.body, fontSize: 12, fontWeight: 600, background: selN?.id === n.id ? C.g700 : C.cardAlt, color: selN?.id === n.id ? "#fff" : C.tx1, border: `1.5px solid ${selN?.id === n.id ? C.g700 : C.bd}` }}>{n.code} · {n.name}</button>)}</div>
          </Card>
          <div style={{ border: `2px dashed ${C.g300}`, borderRadius: 14, padding: "52px 32px", textAlign: "center", background: C.card, cursor: "pointer" }} onClick={() => fRef.current.click()}>
            <div style={{ fontSize: 48, marginBottom: 10 }}>📄</div>
            <h2 style={{ fontFamily: F.display, fontSize: 18, color: C.g900, marginBottom: 6 }}>Drop invoice here or browse</h2>
            <p style={{ color: C.tx3, fontSize: 13, marginBottom: 18 }}>Phone photos, JPG, PNG — works great in the field</p>
            <Row gap={10} style={{ justifyContent: "center" }}>
              <Btn onClick={e => { e.stopPropagation(); fRef.current.click(); }}>Browse Files</Btn>
              <Btn v="outline" onClick={e => { e.stopPropagation(); cRef.current.click(); }}>📷 Camera</Btn>
            </Row>
          </div>
          <input ref={fRef} type="file" accept="image/*,.pdf" style={{ display: "none" }} onChange={e => load(e.target.files[0])} />
          <input ref={cRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={e => load(e.target.files[0])} />
        </div>}
        {step === "preview" && img && <div style={{ display: "flex", gap: 20, maxWidth: 860 }}>
          <div style={{ flex: 1 }}><img src={img} alt="Invoice" style={{ width: "100%", maxHeight: 480, objectFit: "contain", borderRadius: 10, border: `1px solid ${C.bd}` }} /></div>
          <div style={{ width: 240 }}>
            <Card style={{ marginBottom: 10 }}><div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, marginBottom: 5 }}>Ready to scan</div><p style={{ fontSize: 12, color: C.tx3 }}>Nursery: <b>{selN?.name}</b></p></Card>
            {err && <div style={{ background: C.redBg, borderRadius: 7, padding: 10, color: C.red, fontSize: 12, marginBottom: 10 }}>{err}</div>}
            <Btn full onClick={scan} style={{ marginBottom: 8 }}>🔍 Scan with AI</Btn>
            <Btn full v="ghost" onClick={reset}>Use Different File</Btn>
          </div>
        </div>}
        {step === "scanning" && <div style={{ textAlign: "center", padding: "80px", maxWidth: 380, margin: "0 auto" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🔍</div>
          <h2 style={{ fontFamily: F.display, color: C.g900, marginBottom: 8 }}>Reading invoice…</h2>
          <p style={{ color: C.tx3 }}>Extracting every plant and detail</p>
          <style>{`@keyframes ld{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1.2);opacity:1}}`}</style>
          <Row gap={6} style={{ justifyContent: "center", marginTop: 20 }}>{[0, 1, 2].map(i => <div key={i} style={{ width: 9, height: 9, borderRadius: "50%", background: C.g400, animation: `ld 1.2s ease-in-out ${i * .2}s infinite` }} />)}</Row>
        </div>}
        {step === "review" && parsed && <div>
          <Card style={{ marginBottom: 14, background: C.g50, border: `1px solid ${C.g200}` }}>
            <Row between wrap gap={10}>
              <div><div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15 }}>{parsed.nurseryName || selN?.name}</div><div style={{ fontSize: 12, color: C.tx3 }}>Invoice #{parsed.invoiceNumber || "—"} · {parsed.invoiceDate || "—"}</div></div>
              <Row gap={12} center>{[["Subtotal", $(parsed.subtotal)], ["Tax", $(parsed.tax)], ["Ship", $(parsed.shipping)], ["Total", $(parsed.total)]].map(([l, v]) => <div key={l} style={{ textAlign: "center" }}><div style={{ fontSize: 9, color: C.tx3, fontWeight: 700, textTransform: "uppercase" }}>{l}</div><div style={{ fontWeight: 700, color: C.g800, fontSize: 13 }}>{v}</div></div>)}<Tag text={`${rows.length} plants`} color={C.g700} /></Row>
            </Row>
          </Card>
          <div style={{ maxHeight: 420, overflowY: "auto", border: `1px solid ${C.bd}`, borderRadius: 9 }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead style={{ position: "sticky", top: 0, background: C.cardAlt, zIndex: 1 }}><tr>{["Plant & ID", "Pot", "Cost", "Price", "Margin", "Status", "Rack", "Shelf", ""].map(h => <th key={h} style={{ padding: "8px 9px", textAlign: "left", color: C.tx3, fontWeight: 700, fontSize: 10, letterSpacing: .4, textTransform: "uppercase", borderBottom: `1px solid ${C.bd}` }}>{h}</th>)}</tr></thead>
              <tbody>{rows.map(r => <tr key={r._k} style={{ borderBottom: `1px solid ${C.bdS}` }}>
                <td style={{ padding: "3px 9px" }}><div style={{ display: "flex", alignItems: "center", gap: 6 }}><input value={r.name} onChange={e => updR(r._k, "name", e.target.value)} style={{ width: 155, padding: "3px 6px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 12, fontFamily: F.body }} /><span style={{ fontFamily: F.mono, fontSize: 10, color: C.g500 }}>{r.plantId}</span></div></td>
                <td style={{ padding: "3px 9px" }}><select value={r.potSize} onChange={e => updR(r._k, "potSize", e.target.value)} style={{ padding: "3px 4px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 11 }}><option value="">—</option>{POT_SIZES.map(s => <option key={s}>{s}</option>)}</select></td>
                <td style={{ padding: "3px 9px" }}><input type="number" value={r.cost} onChange={e => updR(r._k, "cost", e.target.value)} style={{ width: 62, padding: "3px 6px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 12 }} /></td>
                <td style={{ padding: "3px 9px" }}><input type="number" value={r.suggestedPrice} onChange={e => updR(r._k, "suggestedPrice", e.target.value)} style={{ width: 72, padding: "3px 6px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 12, color: C.g600, fontWeight: 600 }} /></td>
                <td style={{ padding: "5px 9px" }}><MBadge m={r.margin} /></td>
                <td style={{ padding: "3px 9px" }}><select value={r.status} onChange={e => updR(r._k, "status", e.target.value)} style={{ padding: "3px 4px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 11 }}>{STATUSES.map(s => <option key={s}>{s}</option>)}</select></td>
                <td style={{ padding: "3px 9px" }}><input value={r.rack} onChange={e => updR(r._k, "rack", e.target.value)} placeholder="R1" style={{ width: 40, padding: "3px 5px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 11 }} /></td>
                <td style={{ padding: "3px 9px" }}><input value={r.shelf} onChange={e => updR(r._k, "shelf", e.target.value)} placeholder="S2" style={{ width: 40, padding: "3px 5px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 11 }} /></td>
                <td style={{ padding: "5px 9px" }}><button onClick={() => setRows(p => p.filter(x => x._k !== r._k))} style={{ background: "none", border: "none", cursor: "pointer", color: C.red, fontSize: 15 }}>✕</button></td>
              </tr>)}</tbody>
            </table>
          </div>
          <Row gap={8} style={{ marginTop: 14, justifyContent: "flex-end" }}><Btn v="ghost" onClick={reset}>Start Over</Btn><Btn onClick={save}>✅ Save {rows.length} Plants</Btn></Row>
        </div>}
        {step === "done" && <div style={{ textAlign: "center", padding: "80px", maxWidth: 420, margin: "0 auto" }}>
          <div style={{ fontSize: 56, marginBottom: 16 }}>🌱</div>
          <h2 style={{ fontFamily: F.display, color: C.g900, marginBottom: 8 }}>Plants Added!</h2>
          <p style={{ color: C.tx3, marginBottom: 22 }}>{rows.length} plants saved with unique IDs.</p>
          <Btn onClick={reset}>Upload Another Invoice</Btn>
        </div>}
      </div>;
    }

    /* ══════════════════════════════════════════════════════════
       MANUAL PLANT ENTRY
    ══════════════════════════════════════════════════════════ */
    function ManualEntry({ plants, setPlants, nurseries, addAudit, user }) {
      const blank = { name: "", botanicalName: "", potSize: "", cost: "", suggestedPrice: "", salePrice: "", shippingCost: "", status: "In Stock", nurseryCode: nurseries[0]?.code || "", platform: "", rack: "", shelf: "", dateAdded: today(), invoiceNumber: "", notes: "" };
      const [form, setForm] = useState(blank);
      const [qty, setQty] = useState(1);
      const [saved, setSaved] = useState([]);
      const upd = f => v => { setForm(p => { const u = { ...p, [f]: v }; if (f === "cost") { const sp = sprice(+v); u.suggestedPrice = sp; u.margin = marg(+v, sp); } if (f === "suggestedPrice") u.margin = marg(+p.cost, +v); return u; }); };
      const save = () => {
        if (!form.name.trim() || !form.nurseryCode) return;
        let ctr = getNextId(plants, form.nurseryCode);
        const newPlants = Array.from({ length: Math.max(1, +qty || 1) }, (_, i) => {
          ctr++;
          const idx = ctr, cost = +form.cost || 0, sp = +form.suggestedPrice || sprice(cost);
          return { id: uid(), plantId: pid(form.nurseryCode, idx), plantCode: pid(form.nurseryCode, idx), barcodeValue: pid(form.nurseryCode, idx), barcodeType: "CODE128", ...form, name: toTC(form.name), cost, suggestedPrice: sp, margin: marg(cost, sp), labelPrinted: false, addedBy: user.name };
        });
        setPlants(p => [...p, ...newPlants]);
        addAudit({ action: `Manually added ${newPlants.length}× ${form.name}`, user: user.name, page: "Manual Entry" });
        setSaved(p => [...p, ...newPlants]);
        setForm({ ...blank, nurseryCode: form.nurseryCode }); setQty(1);
      };
      const fee = platFee(form.platform || "", +form.suggestedPrice || 0);
      const mc = form.margin >= 65 ? C.g600 : form.margin >= 45 ? C.gold : C.red;
      const nursery = nurseries.find(n => n.code === form.nurseryCode);
      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <SHdr icon="✏️" title="Add Plants Manually" sub="Add existing inventory — enter your cost, where you bought it, and the date" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 20, maxWidth: 980 }}>
          <Card>
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 14 }}>Plant Details</div>
            {/* WHERE YOU BOUGHT IT */}
            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 11, fontWeight: 600, color: C.tx3, display: "block", marginBottom: 7 }}>Where You Bought It *</label>
              <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>{nurseries.map(n => <button key={n.id} onClick={() => upd("nurseryCode")(n.code)} style={{ padding: "7px 13px", borderRadius: 8, cursor: "pointer", fontFamily: F.body, fontSize: 12, fontWeight: 600, background: form.nurseryCode === n.code ? C.g700 : C.cardAlt, color: form.nurseryCode === n.code ? "#fff" : C.tx1, border: `1.5px solid ${form.nurseryCode === n.code ? C.g700 : C.bd}` }}>{n.code} · {n.name}</button>)}
                {!nurseries.length && <span style={{ fontSize: 12, color: C.red }}>Add a nursery first</span>}
              </div>
              {nursery && <div style={{ marginTop: 8, background: C.g50, borderRadius: 7, padding: "6px 11px", fontSize: 12, color: C.tx2 }}>📍 {nursery.address || "No address saved"} {nursery.contact && `· 👤 ${nursery.contact}`}</div>}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
              <Inp label="Plant Name *" value={form.name} onChange={upd("name")} placeholder="e.g. Philodendron Pink Princess" required />
              <Inp label="Botanical Name" value={form.botanicalName} onChange={upd("botanicalName")} placeholder="optional" />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
              <Sel label="Pot Size" value={form.potSize} onChange={upd("potSize")} options={["", ...POT_SIZES]} />
              <Inp label="Qty to Add" type="number" value={qty} onChange={setQty} placeholder="1" />
              <Inp label="Date Purchased" type="date" value={form.dateAdded} onChange={upd("dateAdded")} />
              <Inp label="Invoice / Ref #" value={form.invoiceNumber} onChange={upd("invoiceNumber")} placeholder="optional" />
            </div>
            {/* PRICING SECTION */}
            <div style={{ background: C.g50, border: `1px solid ${C.g200}`, borderRadius: 10, padding: "14px 16px", marginBottom: 12 }}>
              <div style={{ fontWeight: 700, color: C.g900, fontSize: 13, marginBottom: 10 }}>💰 Your Cost & Pricing</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                  <label style={{ fontSize: 11, fontWeight: 600, color: C.tx3 }}>Your Cost Per Plant *</label>
                  <input type="number" value={form.cost} onChange={e => upd("cost")(e.target.value)} placeholder="e.g. 12.50"
                    style={{ padding: "9px 11px", border: `1.5px solid ${C.bd}`, borderRadius: 8, fontSize: 13, fontFamily: F.body, background: C.card, boxSizing: "border-box" }} />
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                  <label style={{ fontSize: 11, fontWeight: 600, color: C.tx3 }}>Sell Price <span style={{ fontWeight: 400, color: C.tx4 }}>(auto at 62% margin)</span></label>
                  <input type="number" value={form.suggestedPrice} onChange={e => upd("suggestedPrice")(e.target.value)}
                    style={{ padding: "9px 11px", border: `1.5px solid ${C.bd}`, borderRadius: 8, fontSize: 13, color: C.g600, fontWeight: 700, fontFamily: F.body, background: C.card, boxSizing: "border-box" }} />
                  {+form.cost > 0 && <span style={{ fontSize: 10, color: C.tx3 }}>Min (2× cost): {$(+form.cost * 2)}</span>}
                </div>
                <Inp label="Actual Sale Price (if sold)" type="number" value={form.salePrice} onChange={upd("salePrice")} placeholder="0.00" />
              </div>
              {form.margin > 0 && <div style={{ marginTop: 8, display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{ fontSize: 12, color: C.tx3 }}>Margin:</span><span style={{ fontWeight: 700, color: mc, fontSize: 14 }}>{form.margin}%</span>
                {fee > 0 && form.platform && <span style={{ fontSize: 11, color: C.tx3 }}>{form.platform} fee: {$(fee)}</span>}
                {+form.suggestedPrice > 0 && +form.cost > 0 && +form.suggestedPrice < +form.cost * 2 && <Tag text="⚠️ Below 2× cost" color={C.red} sm />}
              </div>}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
              <Sel label="Status" value={form.status} onChange={upd("status")} options={STATUSES} />
              <Sel label="Platform (if sold)" value={form.platform} onChange={upd("platform")} options={["", ...PLATFORMS]} />
              <Inp label="Rack" value={form.rack} onChange={upd("rack")} placeholder="R1" />
              <Inp label="Shelf" value={form.shelf} onChange={upd("shelf")} placeholder="S2" />
            </div>
            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 11, fontWeight: 600, color: C.tx3, display: "block", marginBottom: 4 }}>Notes / Care Info</label>

                <div style={{ fontSize: 10, color: C.tx3, marginBottom: 6 }}>{form.potSize || "Pot size"}</div>

                <Row between><span style={{ fontSize: 10, color: C.tx3 }}>Cost {form.cost ? $(form.cost) : "$—"}</span><span style={{ fontWeight: 700, color: C.g900, fontSize: 15 }}>{form.suggestedPrice ? $(form.suggestedPrice) : "$—"}</span></Row>

              </div>)}
            </Card>}
          </div>
        </div>
      </div>;

    function PastInvoices({ plants, setPlants, nurseries, addAudit, user }) {
      const [show, setShow] = useState(false);
      const [selN, setSelN] = useState(null);
      const [inv, setInv] = useState({ number: "", date: "", payMethod: "Cash", total: "", notes: "" });
      const [rows, setRows] = useState([{ id: uid(), name: "", pot: "", qty: 1, cost: "", salePrice: "", status: "Sold", platform: "Palmstreet" }]);
      const [saved, setSaved] = useState([]);
      useEffect(() => { if (nurseries.length && !selN) setSelN(nurseries[0]); }, [nurseries]);
      const addRow = () => setRows(p => [...p, { id: uid(), name: "", pot: "", qty: 1, cost: "", salePrice: "", status: "Sold", platform: "Palmstreet" }]);
      const updR = (id, f, v) => setRows(p => p.map(r => r.id === id ? { ...r, [f]: v } : r));
      const save = () => {
        if (!selN || !rows.some(r => r.name.trim())) return;
        let ctr = getNextId(plants, selN.code);
        const newP = rows.filter(r => r.name.trim()).flatMap(r => Array.from({ length: Math.max(1, +r.qty || 1) }, () => { ctr++; const cost = +r.cost || 0, sp = +r.salePrice || sprice(cost); return { id: uid(), plantId: pid(selN.code, ctr), plantCode: pid(selN.code, ctr), barcodeValue: pid(selN.code, ctr), barcodeType: "CODE128", nurseryCode: selN.code, name: toTC(r.name), botanicalName: "", potSize: r.pot, cost, suggestedPrice: sp, salePrice: r.salePrice || "", shippingCost: "", margin: marg(cost, sp), status: r.status, invoiceNumber: inv.number, invoiceDate: inv.date, dateAdded: inv.date || today(), platform: r.platform, rack: "", shelf: "", notes: "", labelPrinted: false, historical: true, addedBy: user.name }; }));
        setPlants(p => [...p, ...newP]); addAudit({ action: `Logged ${newP.length} historical plants from ${selN.name}`, user: user.name, page: "Past Invoices" });
        setSaved(p => [...p, { ...inv, nursery: selN.name, count: newP.length, id: uid() }]);
        setShow(false); setInv({ number: "", date: "", payMethod: "Cash", total: "", notes: "" }); setRows([{ id: uid(), name: "", pot: "", qty: 1, cost: "", salePrice: "", status: "Sold", platform: "Palmstreet" }]);
      };
      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <SHdr icon="📋" title="Past Invoice Log" sub="Record historical purchases for profit history"
          right={<Btn onClick={() => setShow(p => !p)}>{show ? "Cancel" : "+ Log Past Invoice"}</Btn>} />
        {show && nurseries.length > 0 && <Card style={{ marginBottom: 20 }}>
          <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, marginBottom: 12 }}>Log Historical Invoice</div>
          <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 14 }}>{nurseries.map(n => <button key={n.id} onClick={() => setSelN(n)} style={{ padding: "6px 12px", borderRadius: 7, cursor: "pointer", fontFamily: F.body, fontSize: 12, fontWeight: 600, background: selN?.id === n.id ? C.g700 : C.cardAlt, color: selN?.id === n.id ? "#fff" : C.tx1, border: `1.5px solid ${selN?.id === n.id ? C.g700 : C.bd}` }}>{n.code} · {n.name}</button>)}</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))", gap: 10, marginBottom: 12 }}>
            <Inp label="Invoice #" value={inv.number} onChange={v => setInv(p => ({ ...p, number: v }))} />
            <Inp label="Date" type="date" value={inv.date} onChange={v => setInv(p => ({ ...p, date: v }))} />
            <Sel label="Payment" value={inv.payMethod} onChange={v => setInv(p => ({ ...p, payMethod: v }))} options={PAY_METHS} />
            <Inp label="Total Paid" type="number" value={inv.total} onChange={v => setInv(p => ({ ...p, total: v }))} />
          </div>
          <div style={{ overflowX: "auto", border: `1px solid ${C.bd}`, borderRadius: 8, marginBottom: 10 }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead style={{ background: C.cardAlt }}><tr>{["Plant Name", "Pot", "Qty", "Cost/Plant", "Sale Price", "Status", "Platform", ""].map(h => <th key={h} style={{ padding: "7px 8px", textAlign: "left", color: C.tx3, fontWeight: 600, fontSize: 10, textTransform: "uppercase" }}>{h}</th>)}</tr></thead>
              <tbody>{rows.map(r => <tr key={r.id} style={{ borderBottom: `1px solid ${C.bdS}` }}>
                <td style={{ padding: "4px 5px" }}><input value={r.name} onChange={e => updR(r.id, "name", e.target.value)} placeholder="Plant name" style={{ width: 170, padding: "4px 6px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 12, fontFamily: F.body }} /></td>
                <td style={{ padding: "4px 5px" }}><select value={r.pot} onChange={e => updR(r.id, "pot", e.target.value)} style={{ padding: "4px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 11 }}><option value="">—</option>{POT_SIZES.map(s => <option key={s}>{s}</option>)}</select></td>
                <td style={{ padding: "4px 5px" }}><input type="number" value={r.qty} onChange={e => updR(r.id, "qty", e.target.value)} style={{ width: 46, padding: "4px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 12 }} /></td>
                <td style={{ padding: "4px 5px" }}><input type="number" value={r.cost} onChange={e => updR(r.id, "cost", e.target.value)} style={{ width: 65, padding: "4px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 12 }} /></td>
                <td style={{ padding: "4px 5px" }}><input type="number" value={r.salePrice} onChange={e => updR(r.id, "salePrice", e.target.value)} style={{ width: 65, padding: "4px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 12, color: C.gold }} /></td>
                <td style={{ padding: "4px 5px" }}><select value={r.status} onChange={e => updR(r.id, "status", e.target.value)} style={{ padding: "4px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 11 }}>{STATUSES.map(s => <option key={s}>{s}</option>)}</select></td>
                <td style={{ padding: "4px 5px" }}><select value={r.platform} onChange={e => updR(r.id, "platform", e.target.value)} style={{ padding: "4px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 11 }}>{PLATFORMS.map(s => <option key={s}>{s}</option>)}</select></td>
                <td style={{ padding: "4px" }}><button onClick={() => setRows(p => p.filter(x => x.id !== r.id))} style={{ background: "none", border: "none", cursor: "pointer", color: C.red }}>✕</button></td>
              </tr>)}</tbody>
            </table>
          </div>
          <Row gap={8}><Btn v="ghost" sz="sm" onClick={addRow}>+ Row</Btn><Btn onClick={save}>Save Invoice</Btn></Row>
        </Card>}
        {saved.map(s => <Card key={s.id} style={{ marginBottom: 10, padding: "12px 16px" }}>
          <Row between center><div><div style={{ fontWeight: 600, fontSize: 13 }}>{s.nursery}</div><div style={{ fontSize: 11, color: C.tx3 }}>{s.date || "No date"} · #{s.number || "—"} · {s.payMethod}</div></div><Row gap={8} center><Tag text={`${s.count} plants`} color={C.g600} />{s.total && <span style={{ fontWeight: 700, color: C.gold, fontSize: 13 }}>{$(s.total)}</span>}</Row></Row>
        </Card>)}
        {!show && saved.length === 0 && <Card style={{ textAlign: "center", padding: "50px" }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>📋</div><h2 style={{ fontFamily: F.display, color: C.g900, marginBottom: 6, fontSize: 18 }}>No past invoices</h2>
          <Btn onClick={() => setShow(true)}>+ Log Past Invoice</Btn>
        </Card>}
      </div>;
    }

    /* ══════════════════════════════════════════════════════════
       PLANT EDIT DETAIL — Full edit form for any plant

    function PlantEditDetail({ plantId, plants, setPlants, user, addAudit, onBack }) {
      const p = plants.find(x => x.id === plantId);
      if (!p) { onBack(); return null; }

      const [edit, setEdit] = useState({ ...p });
      const updE = f => v => setEdit(prev => ({ ...prev, [f]: v }));
      const updCost = v => {
        const cost = +v || 0;
        const sp = sprice(cost);
        setEdit(prev => {
          const ep = prev.suggestedPrice;
          const np2 = (ep !== undefined && ep !== null && String(ep).trim() !== "") ? ep : sp;
          return { ...prev, cost: v, suggestedPrice: np2, margin: marg(cost, +np2 || 0) };
        });
      };
      const updPrice = v => setEdit(prev => ({ ...prev, suggestedPrice: v, margin: marg(+prev.cost || 0, +v || 0) }));
      const saveEdit = () => {
        const saved = { ...edit, margin: marg(+edit.cost || 0, +edit.suggestedPrice || 0) };
        setPlants(pp => pp.map(x => x.id === plantId ? saved : x));
        addAudit({ action: `Edited ${edit.name} — cost $${edit.cost}, price $${edit.suggestedPrice}, status: ${edit.status}`, user: user.name, page: "Inventory" });
        onBack();
      };

      const isOwner = CAN.seeCost(user.role);
      const tp = trueProfit(edit);
      const fee = platFee(edit.platform || "", +edit.salePrice || +edit.suggestedPrice || 0);
      const mc = edit.margin >= 65 ? C.g600 : edit.margin >= 45 ? C.gold : C.red;
      const priceLow = +edit.cost > 0 && +edit.suggestedPrice < +edit.cost * 2;
      const days = dHeld(edit.dateAdded);

      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18, flexWrap: "wrap", gap: 10 }}>

            <button onClick={onBack} style={{ background: "none", border: `1px solid ${C.bd}`, color: C.g700, cursor: "pointer", fontSize: 13, fontWeight: 600, fontFamily: F.body, borderRadius: 8, padding: "7px 13px" }}>{"← Back"}</button>
            <div>
              <div style={{ fontFamily: F.mono, fontSize: 11, color: C.g500 }}>{edit.plantId}</div>
              <h1 style={{ fontFamily: F.display, fontSize: 20, color: C.g900, margin: 0 }}>{edit.name}</h1>
            </div>
          </Row>
          <Row gap={8}>
            <Btn v="ghost" onClick={onBack}>Cancel</Btn>
            <Btn onClick={saveEdit}>{"💾 Save Changes"}</Btn>
          </Row>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1.4fr) minmax(0,1fr)", gap: 14, maxWidth: 960 }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

            <Card>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 12 }}>{"🌿 Plant Identity"}</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                <Inp label="Plant Name" value={edit.name} onChange={updE("name")} required />
                <Inp label="Botanical Name" value={edit.botanicalName || ""} onChange={updE("botanicalName")} placeholder="optional" />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                <Sel label="Pot Size" value={edit.potSize || ""} onChange={updE("potSize")} options={["", ...POT_SIZES]} />
                <Inp label="Date Added" type="date" value={edit.dateAdded || ""} onChange={updE("dateAdded")} />
                <Inp label="Invoice #" value={edit.invoiceNumber || ""} onChange={updE("invoiceNumber")} placeholder="optional" />
              </div>
            </Card>

            {isOwner && <Card style={{ background: C.g50, border: `1px solid ${C.g200}` }}>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 12 }}>{"💰 Cost & Pricing"}</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 12 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: C.tx2 }}>Your Cost</label>
                  <input type="number" value={edit.cost || ""} onChange={e => updCost(e.target.value)}
                    style={{ padding: "11px 12px", border: `1.5px solid ${C.bd}`, borderRadius: 9, fontSize: 15, fontFamily: F.body, background: C.card, outline: "none", boxSizing: "border-box", width: "100%" }} />
                  {+edit.cost > 0 && <span style={{ fontSize: 10, color: C.tx3 }}>{"Min sell: $" + (+edit.cost * 2).toFixed(2)}</span>}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: C.tx2 }}>Sell Price (suggested)</label>
                  <input type="number" value={edit.suggestedPrice || ""} onChange={e => updPrice(e.target.value)}
                    style={{ padding: "11px 12px", border: `1.5px solid ${priceLow ? C.red : C.bd}`, borderRadius: 9, fontSize: 15, color: C.g600, fontWeight: 700, fontFamily: F.body, background: C.card, outline: "none", boxSizing: "border-box", width: "100%" }} />
                  {priceLow && <span style={{ fontSize: 10, color: C.red }}>{"Below 2x cost — raise price"}</span>}
                </div>
                <Inp label="Actual Sale Price" type="number" value={edit.salePrice || ""} onChange={updE("salePrice")} placeholder="0.00" />

              {+edit.cost > 0 && +edit.suggestedPrice > 0 && <div style={{ background: C.card, border: `1px solid ${mc}33`, borderRadius: 9, padding: "10px 14px", marginBottom: 10 }}>

                  <span style={{ fontSize: 12, color: C.tx3 }}>Margin</span>
                  <span style={{ fontWeight: 700, color: mc, fontSize: 18, fontFamily: F.display }}>{edit.margin + "%"}</span>
                </Row>
                <div style={{ height: 8, background: C.g100, borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ width: `${Math.min(100, Math.max(0, +edit.margin || 0))}%`, height: "100%", background: mc, borderRadius: 4, transition: "width .3s" }} />
                </div>
                <Row gap={16} style={{ marginTop: 8, flexWrap: "wrap" }}>
                  {fee > 0 && edit.platform && <span style={{ fontSize: 11, color: C.tx3 }}>{edit.platform + " fee: "}<b style={{ color: C.red }}>{"$" + fee.toFixed(2)}</b></span>}
                  <span style={{ fontSize: 11, color: C.tx3 }}>{"True profit: "}<b style={{ color: tp > 0 ? C.g600 : C.red }}>{"$" + tp.toFixed(2)}</b></span>
                </Row>
              </div>}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <Inp label="Shipping Cost" type="number" value={edit.shippingCost || ""} onChange={updE("shippingCost")} placeholder="0.00" />
                <Sel label="Platform" value={edit.platform || ""} onChange={updE("platform")} options={["", ...PLATFORMS]} />
              </div>
            </Card>}

            <Card>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 8 }}>{"📝 Notes"}</div>
              <textarea value={edit.notes || ""} onChange={e => updE("notes")(e.target.value)}
                style={{ width: "100%", padding: "10px 12px", border: `1.5px solid ${C.bd}`, borderRadius: 9, fontSize: 13, fontFamily: F.body, minHeight: 90, boxSizing: "border-box", resize: "vertical" }}
                placeholder="Care notes, condition, source details..." />
            </Card>

          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

            <Card>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 12 }}>{"📍 Status & Location"}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <Sel label="Status" value={edit.status} onChange={updE("status")} options={STATUSES} />
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  <Inp label="Rack" value={edit.rack || ""} onChange={updE("rack")} placeholder="R1" />
                  <Inp label="Shelf" value={edit.shelf || ""} onChange={updE("shelf")} placeholder="S2" />
                </div>
                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13, padding: "6px 0" }}>
                  <input type="checkbox" checked={!!edit.labelPrinted} onChange={e => updE("labelPrinted")(e.target.checked)} style={{ width: 16, height: 16, accentColor: C.g700 }} />
                  <span style={{ fontWeight: 600 }}>Label Printed</span>
                </label>
              </div>
            </Card>

            <Card style={{ background: C.g50, border: `1px solid ${C.g200}` }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.tx3, letterSpacing: .5, textTransform: "uppercase", marginBottom: 10 }}>Label Preview</div>
              <div style={{ background: C.card, border: `1.5px solid ${C.g700}`, borderRadius: 9, padding: "13px 15px" }}>
                <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 13, lineHeight: 1.3, marginBottom: 2 }}>{toTC(edit.name) || "Plant Name"}</div>
                <div style={{ fontSize: 10, color: C.tx3, marginBottom: 5 }}>{edit.potSize || "—"}</div>
                <div style={{ fontFamily: F.mono, fontSize: 10, color: C.g500, borderTop: `1px solid ${C.g100}`, paddingTop: 5, marginBottom: 6 }}>{"🌿 " + edit.plantId}</div>
                <Row between>
                  {isOwner && <span style={{ fontSize: 10, color: C.tx3 }}>{"Cost $" + (+edit.cost || 0).toFixed(2)}</span>}
                  <span style={{ fontWeight: 700, color: C.g900, fontSize: 15 }}>{"$" + (+edit.suggestedPrice || 0).toFixed(2)}</span>
                </Row>
                <div style={{ fontSize: 8, color: C.g300, textAlign: "center", marginTop: 5, letterSpacing: 2, textTransform: "uppercase" }}>Leaf Diary</div>
              </div>
            </Card>

            <Card>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 10 }}>Plant Info</div>
              {[["Plant ID", edit.plantId || "—"], ["Nursery", edit.nurseryCode || "—"], ["Days Held", fDays(days)], ["Added By", edit.addedBy || "—"], ["Invoice #", edit.invoiceNumber || "—"]].map(([l, v]) => (

                  <span style={{ fontSize: 12, fontWeight: 600, color: C.tx1 }}>{v}</span>

            </Card>

            {CAN.deleteRec(user.role) && <Card style={{ background: C.redBg, border: `1px solid ${C.red}44` }}>
              <div style={{ fontWeight: 700, color: C.red, marginBottom: 4, fontSize: 13 }}>Danger Zone</div>
              <p style={{ fontSize: 12, color: C.tx3, marginBottom: 10 }}>Permanently removes this plant from inventory.</p>

            </Card>}

          </div>
        </div>

        <div style={{ marginTop: 16, display: "flex", justifyContent: "flex-end", gap: 10, maxWidth: 960 }}>
          <Btn v="ghost" onClick={onBack}>Cancel</Btn>
          <Btn sz="lg" onClick={saveEdit}>{"💾 Save Changes"}</Btn>
        </div>
      </div>;
