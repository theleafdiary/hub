          recipientName: sale.recipientName || sale.customerName || "",
          customerEmail: sale.customerEmail || "",
          customerPhone: sale.customerPhone || "",
          customerAddress1: sale.customerAddress1 || "",
          customerAddress2: sale.customerAddress2 || "",
          customerCity: sale.customerCity || "",
          customerState: sale.customerState || sale.buyerState || sale.state || "",
          customerCountry: sale.customerCountry || "",
          customerZip: sale.customerZip || "",
          orderNumber: sale.orderNo || sale.orderNum || "",
          saleImportKey: sale.saleImportKey || saleImportKey(sale),
          saleLegacyKey: sale.saleLegacyKey || saleLegacyKey(sale),
          sourceFileName: fileName || "",
          importedAt: new Date().toISOString(),
          paymentFee: sale.paymentFee || 0,
          palmstreetFee: sale.palmstreetFee || 0,
          taxAmount: sale.taxAmount || 0,
          sellerIncome: sale.sellerIncome || 0,
          refundAmount: sale.refundAmount || 0,
          historicalImport: true,
          matchStatus: "unmatched",
          rawProductVariant: sale.productVariant || sale.title || "",
          notes: "Imported from historical Palmstreet/Whatnot sales file. No inventory match found.",
          labelPrinted: true,
          addedBy: user.name,
          margin: 0
        };
      };

      const customerFieldsFromSale = sale => ({
        customerUsername: sale.customerUsername || sale.customer || "",
        customerName: sale.customerName || sale.recipientName || "",
        buyerName: sale.customerName || sale.recipientName || "",
        recipientName: sale.recipientName || sale.customerName || "",
        customerEmail: sale.customerEmail || "",
        customerPhone: sale.customerPhone || "",
        customerAddress1: sale.customerAddress1 || "",
        customerAddress2: sale.customerAddress2 || "",
        customerCity: sale.customerCity || "",
        customerState: sale.customerState || sale.buyerState || sale.state || "",
        customerCountry: sale.customerCountry || "",
        customerZip: sale.customerZip || "",
      });

      const keysForSale = sale => new Set([
        compactKey(sale.saleImportKey || saleImportKey(sale)),
        compactKey(sale.saleLegacyKey || saleLegacyKey(sale))
      ]);

      const existingPlantMatchesSale = (p, sale) => {
        const keys = keysForSale(sale);
        if (p.saleImportKey && keys.has(compactKey(p.saleImportKey))) return true;
        if (p.saleLegacyKey && keys.has(compactKey(p.saleLegacyKey))) return true;
        const built1 = [p.platform || platform, p.orderNumber || "NO_ORDER", p.rawProductVariant || p.name || "NO_PRODUCT", p.salePrice || 0, p.soldDate || "NO_DATE"].map(compactKey).join("|");
        const built2 = [p.orderNumber || "NO_ORDER", p.rawProductVariant || p.name || "NO_PRODUCT", p.salePrice || 0].map(compactKey).join("|");
        return keys.has(compactKey(built1)) || keys.has(compactKey(built2));
      };

      const applyImport = () => {
        setImportMsg("Preparing full import. Large Palmstreet files may take a moment to save to Supabase in batches...");
        const allSelected = matched.filter(r => r.apply);
        const existingKeys = existingImportedSaleKeys(plants);
        const newKeys = new Set();
        const selected = [];
        const duplicates = [];

        allSelected.forEach(sale => {
          const k1 = sale.saleImportKey || saleImportKey(sale);
          const k2 = sale.saleLegacyKey || saleLegacyKey(sale);
          const dup = existingKeys.has(compactKey(k1)) || existingKeys.has(compactKey(k2)) || newKeys.has(compactKey(k1)) || newKeys.has(compactKey(k2));
          if (dup) {
            duplicates.push(sale);
            return;
          }
          newKeys.add(compactKey(k1));
          newKeys.add(compactKey(k2));
          selected.push({ ...sale, saleImportKey: k1, saleLegacyKey: k2 });
        });

        const matchedSales = selected.filter(r => r.matched);
        const unmatchedSales = selected.filter(r => !r.matched);

        let soldInventory = plants.map(p => {
          const duplicateSale = duplicates.find(s => existingPlantMatchesSale(p, s));
          const sale = matchedSales.find(r => r.matched?.id === p.id);
          if (!sale && duplicateSale) {
            const cf = customerFieldsFromSale(duplicateSale);
            return {
              ...p,
              ...Object.fromEntries(Object.entries(cf).filter(([k, v]) => v && !p[k])),
              sourceFileName: p.sourceFileName || fileName || "",
              importedAt: p.importedAt || new Date().toISOString()
            };
          }
          if (!sale) return p;
          return {
            ...p,
            status: "Sold",
            salePrice: sale.price,
            platform,
            shippingCost: sale.shippingFee || sale.shipping || 0,
            customerUsername: sale.customerUsername || sale.customer || "",
            customerName: sale.customerName || sale.recipientName || "",
            buyerName: sale.customerName || sale.recipientName || "",
            recipientName: sale.recipientName || sale.customerName || "",
            customerEmail: sale.customerEmail || "",
            customerPhone: sale.customerPhone || "",
            customerAddress1: sale.customerAddress1 || "",
            customerAddress2: sale.customerAddress2 || "",
            customerCity: sale.customerCity || "",
            customerState: sale.customerState || sale.buyerState || sale.state || "",
            customerCountry: sale.customerCountry || "",
            customerZip: sale.customerZip || "",
            orderNumber: sale.orderNo || sale.orderNum || "",
            saleImportKey: sale.saleImportKey || saleImportKey(sale),
            saleLegacyKey: sale.saleLegacyKey || saleLegacyKey(sale),
            sourceFileName: fileName || "",
            importedAt: new Date().toISOString(),
            soldDate: sale.saleDate || sale.orderDate || today(),
            soldAt: sale.saleDateTime || sale.orderDateTime || sale.orderCreatedAt || "",
            saleDateTime: sale.saleDateTime || sale.orderDateTime || sale.orderCreatedAt || "",
            orderCreatedAt: sale.orderCreatedAt || sale.orderDateTime || sale.saleDateTime || "",
            paymentFee: sale.paymentFee || 0,
            palmstreetFee: sale.palmstreetFee || 0,
            taxAmount: sale.taxAmount || 0,
            sellerIncome: sale.sellerIncome || 0,
            historicalImport: false,
            matchStatus: "matched",
            rawProductVariant: sale.productVariant || sale.title || "",
            margin: marg(+p.cost, sale.price)
          };
        });

        const historicalRows = unmatchedSales.map((sale, idx) => makeHistoricalSalePlant(sale, idx));
        const result = {
          matchedAdded: matchedSales.length,
          historicalAdded: historicalRows.length,
          duplicateSkipped: duplicates.length,
          duplicateOrders: duplicates.slice(0, 25).map(d => d.orderNo || d.orderNum || d.productVariant || d.title || "Duplicate row")
        };

        setPlants([...soldInventory, ...historicalRows]);
        setLastImportResult(result);
        setDuplicateInfo(result.duplicateSkipped ? result : null);
        addAudit({ action: `Sales import: ${result.matchedAdded} matched inventory + ${result.historicalAdded} historical unmatched + ${result.duplicateSkipped} duplicates skipped from ${platform}`, user: user.name, page: "Show Import" });
        setImportMsg(`Saved ${result.matchedAdded + result.historicalAdded} new sales. ${result.duplicateSkipped} duplicates skipped. Syncing to Supabase in 500-row batches...`);
        setStep("done");

        /* ── AUTO-GENERATE SHIPMENT DOCUMENTS for CA/TX/LA shipments ── */
        (async () => {
          try {
            const allApplied = selected.map(s => ({
              ...s,
              customerState: s.customerState||s.buyerState||s.state||"",
              potSize: s.matched?.potSize||s.potSize||"",
            }));
            const shipments = buildCasdShipments(allApplied);
            if (!shipments.length) return;
            const today2 = new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"});
            const newCerts = [];
            for (const ship of shipments) {
              const certNumber = casdNextNum([...(window.__casdCertsSnapshot||[]), ...newCerts]);
              const pdfBytes = await fillCasdPdf({ certNumber, date: today2, consignee: ship.consignee, plants: ship.plants });
              const b64 = bytesToBase64(pdfBytes);
              const docLabel = CASD_DOC_LABELS[ship.state] || "Plant Shipment Document";
              const filename = `${ship.state}-Plant-Ship-Doc-No${certNumber}-${(ship.consignee.name||"Customer").replace(/\s+/g,"-")}-${today()}.pdf`;
              newCerts.push({
                id: uid(), certNumber, date: today2, destination: ship.state, documentType: docLabel, printRequired:true, printed:false, printAlert:`Print ${docLabel} #${certNumber} and put it inside ${ship.consignee.name||"customer"} shipment.`,
                consigneeName: ship.consignee.name,
                consigneeAddress: [ship.consignee.address1, ship.consignee.address2].filter(Boolean).join(", "),
                consigneePhone: ship.consignee.phone||"",
                plants: ship.plants, plantCount: ship.plants.length,
                pdfBase64: b64, pdfFilename: filename,
                createdAt: new Date().toISOString(), createdBy: user.name,
                autoGenerated: true, sourceFile: fileName||""
              });
              /* Auto-download each cert */
              const blob = new Blob([pdfBytes],{type:"application/pdf"});
              const url = URL.createObjectURL(blob);
              const a = Object.assign(document.createElement("a"),{href:url,download:filename});
              document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(url), 500);
            }
            if (newCerts.length) {
              setCasdCerts(prev => [...newCerts, ...(prev||[])]);
              addAudit({ action:`Auto-generated ${newCerts.length} plant shipment document(s) for CA/TX/LA shipments from ${platform} import`, user:user.name, page:"Show Import" });
              setImportMsg(prev => prev + ` | ✅ ${newCerts.length} CA/TX/LA shipment document(s) auto-generated, downloaded, and saved. 🚨 PRINT each one and put it with the matching shipment.`);
              alert(`🚨 ${newCerts.length} plant shipment document(s) were created and saved. Print each PDF and put it with the matching CA/TX/LA shipment.`);
            }
          } catch(e) {
            console.error("CASD auto-gen failed:", e);
          }
        })();
      };

      const totalRev = matched.filter(r => r.apply && !r.duplicate).reduce((s, r) => s + (+r.price || 0), 0);
      const matched_count = matched.filter(r => r.apply && !r.duplicate && r.matched).length;
      const unmatched_count = matched.filter(r => r.apply && !r.duplicate && !r.matched).length;
      const duplicate_count = matched.filter(r => r.duplicate).length;
      const applied_count = matched.filter(r => r.apply && !r.duplicate).length;

      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <SHdr icon="📦" title="Post-Show Import" sub="Upload Palmstreet/Whatnot sales. Old files can import as historical sales even without inventory matches." />

        {step === "paste" && <div>
          <Card style={{ marginBottom: 14 }}>
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 10 }}>Platform</div>
            <Row gap={8} style={{ marginBottom: 16 }}>
              {["Palmstreet", "Whatnot"].map(p => <button key={p} onClick={() => setPlatform(p)} style={{ padding: "10px 20px", borderRadius: 9, cursor: "pointer", fontFamily: F.body, fontSize: 14, fontWeight: 600, background: platform === p ? C.g700 : C.cardAlt, color: platform === p ? "#fff" : C.tx1, border: `1.5px solid ${platform === p ? C.g700 : C.bd}` }}>{p}</button>)}
            </Row>
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 8 }}>Import Mode</div>
            <Row gap={8} style={{ marginBottom: 16 }}>
              {[{ v: "historical", l: "Historical Import - Save Unmatched" }, { v: "exact", l: "Exact Inventory Match Only" }].map(o => <button key={o.v} onClick={() => setImportMode(o.v)} style={{ padding: "10px 14px", borderRadius: 9, cursor: "pointer", fontFamily: F.body, fontSize: 13, fontWeight: 600, background: importMode === o.v ? C.g700 : C.cardAlt, color: importMode === o.v ? "#fff" : C.tx1, border: `1.5px solid ${importMode === o.v ? C.g700 : C.bd}` }}>{o.l}</button>)}
            </Row>
            <div style={{ background: C.goldBg, border: `1px solid ${C.gold}55`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: C.tx2, marginBottom: 14, lineHeight: 1.6 }}>
              Use <b>Historical Import</b> for old Palmstreet analytics files that do not have Leaf Diary plant codes. It will still save the sales for analytics, pricing, customers, and revenue history.
            </div>
            {importMsg && <div style={{ background: C.redBg, border: `1px solid ${C.red}55`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: C.red, marginBottom: 12 }}>{importMsg}</div>}
            {duplicateInfo && <div style={{ background: C.amberBg, border: `1px solid ${C.amber}55`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: C.amber, marginBottom: 12 }}><b>{duplicateInfo.duplicateSkipped} duplicate rows skipped.</b> These orders/rows were already imported and were not added again.</div>}
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 8 }}>Upload Palmstreet Excel or CSV</div>
            <div style={{ fontSize: 13, color: C.tx3, marginBottom: 12 }}>
              Supports Palmstreet Analytics Excel files with an <b>Order Details</b> tab, or normal CSV order exports.
            </div>
            <div style={{ border: `2px dashed ${C.g300}`, borderRadius: 12, padding: "30px", textAlign: "center", background: C.card, marginBottom: 12, cursor: "pointer" }} onClick={() => fileRef.current.click()}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>📄</div>
              <div style={{ fontWeight: 700, color: C.g900, marginBottom: 6 }}>{fileName || "Upload XLSX or CSV file"}</div>
              <div style={{ fontSize: 12, color: C.tx3, marginBottom: 12 }}>Palmstreet analytics export or orders export</div>
              <Btn onClick={e => { e.stopPropagation(); fileRef.current.click(); }}>Choose File</Btn>
            </div>
            <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" style={{ display: "none" }} onChange={e => loadFile(e.target.files[0])} />
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 6 }}>Or paste CSV text directly</div>
            <textarea value={raw} onChange={e => setRaw(e.target.value)}
              style={{ width: "100%", padding: "10px 12px", border: `1.5px solid ${C.bd}`, borderRadius: 9, fontSize: 12, fontFamily: F.mono, minHeight: 100, boxSizing: "border-box", resize: "vertical" }}
              placeholder="Paste CSV data here…" />
            <Btn full onClick={runMatch} style={{ marginTop: 12 }} disabled={!raw.trim()}>Import / Match Sales →</Btn>
          </Card>
        </div>}

        {step === "review" && <div>
          <div style={{ background: C.g800, borderRadius: 14, padding: "16px", marginBottom: 14, color: "#fff" }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", opacity: .7, marginBottom: 4 }}>Import Summary</div>
            <div style={{ fontSize: 28, fontWeight: 700, fontFamily: F.display }}>{$(totalRev)}</div>
            <div style={{ fontSize: 13, opacity: .85, marginTop: 4 }}>{matched.length} plant sales found · {matched_count} matched to inventory · {unmatched_count} historical unmatched · {duplicate_count} duplicates already imported · {skipped.length} skipped non-plant/bad rows</div>
            {matched.length > 1000 && <div style={{ fontSize: 12, opacity: .9, marginTop: 6 }}>✅ Large file mode active: all {matched.length} rows will import/save. Preview only shows first 350 rows for speed.</div>}
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
            {matched.slice(0, 350).map(r => <Card key={r._id} style={{ padding: "12px 14px", border: `1px solid ${r.duplicate ? C.red : r.matched ? C.g200 : C.gold}55`, background: r.duplicate ? C.redBg : r.matched ? C.g50 : C.goldBg, opacity: r.duplicate ? .82 : 1 }}>
              <Row between center style={{ marginBottom: 6 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, color: C.g900 }}>{r.title}</div>
                  <div style={{ fontSize: 12, color: C.tx3 }}>Order {r.orderNo || "—"} · {r.state || "No state"} · {String(r.orderDate || "").slice(0, 10)}</div>
                  {r.extractedPlantCode && <div style={{ fontSize: 11, color: C.blue, marginTop: 2 }}>Code found: {r.extractedPlantCode}</div>}
                  {r.duplicate && <div style={{ fontSize: 11, color: C.red, marginTop: 2 }}>🚫 Duplicate detected — this order row was already imported and will be skipped.</div>}
                  {!r.duplicate && r.matched && <div style={{ fontSize: 11, color: C.g600, marginTop: 2 }}>✅ Matched → {r.matched.name} ({r.matched.plantId})</div>}
                  {!r.duplicate && !r.matched && <div style={{ fontSize: 11, color: C.amber, marginTop: 2 }}>⚠️ No inventory match — will import as historical sale unless you select a plant.</div>}
                </div>
                <Row gap={8} center>
                  <span style={{ fontWeight: 700, color: C.g700, fontSize: 16 }}>{$(r.price)}</span>
                  <label style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer" }}>
                    <input type="checkbox" checked={!!r.apply} disabled={!!r.duplicate} onChange={() => toggleApply(r._id)} style={{ width: 18, height: 18, accentColor: C.g700 }} />
                    <span style={{ fontSize: 11, color: r.duplicate ? C.red : C.tx3 }}>{r.duplicate ? "Skipped" : "Import"}</span>
                  </label>
                </Row>
              </Row>
              {!r.duplicate && !r.matched && <select onChange={e => setMatch(r._id, e.target.value)} style={{ width: "100%", padding: "8px 10px", border: `1px solid ${C.bd}`, borderRadius: 7, fontSize: 13, fontFamily: F.body, marginTop: 6 }}>
                <option value="">— Leave unmatched as historical sale —</option>
                {plants.filter(p => p.status === "In Stock").map(p => <option key={p.id} value={p.id}>{p.name} · {p.plantId} · {$(p.suggestedPrice)}</option>)}
              </select>}
            </Card>)}
            {matched.length > 350 && <div style={{ textAlign: "center", color: C.tx3, fontSize: 13, padding: 12 }}>Showing first 350 rows for speed. All {matched.length} rows will import if checked.</div>}
          </div>

          <Row gap={8} wrap>
            <Btn onClick={applyImport} disabled={applied_count === 0}>✅ Import {applied_count} Sales</Btn>
            <Btn v="outline" onClick={() => downloadCSVFile(`leaf-diary-import-preview-${today()}.csv`, ["Status","Order No","Plant Code","Product","Price","State","Date"].join(',') + '\n' + matched.map(r => [r.matched ? "matched" : "historical", r.orderNo || "", r.extractedPlantCode || "", r.title || "", r.price || 0, r.state || "", r.orderDate || ""].map(csvCell).join(',')).join('\n'))}>📥 Export Preview</Btn>
            <Btn v="ghost" onClick={() => setStep("paste")}>Back</Btn>
          </Row>
        </div>}

        {step === "done" && <div style={{ textAlign: "center", padding: "60px 20px" }}>
          <div style={{ fontSize: 56, marginBottom: 16 }}>🎉</div>
          <h2 style={{ fontFamily: F.display, color: C.g900, marginBottom: 8 }}>Sales Imported!</h2>
          <p style={{ color: C.tx3, marginBottom: 6 }}>{lastImportResult ? `${lastImportResult.matchedAdded} inventory plants marked sold · ${lastImportResult.historicalAdded} historical sales saved` : `${matched_count} inventory plants marked sold · ${unmatched_count} historical sales saved`}</p>
          {lastImportResult?.duplicateSkipped > 0 && <p style={{ color: C.red, marginBottom: 6, fontWeight: 700 }}>{lastImportResult.duplicateSkipped} duplicate rows skipped — already imported before.</p>}
          <p style={{ color: C.gold, fontWeight: 700, fontSize: 18, marginBottom: 22 }}>{$(totalRev)} in new selected sales reviewed</p>
          <Row gap={10} style={{ justifyContent: "center" }}>
            <Btn onClick={() => { setRaw(""); setMatched([]); setSkipped([]); setStep("paste"); }}>Import Another File</Btn>
          </Row>
        </div>}
      </div>;
    }


    /* ══════════════════════════════════════════════════════════
       CUSTOMERS — from Palmstreet sales data
    ══════════════════════════════════════════════════════════ */
    function Customers({ plants, setPlants, addAudit, user }) {
      const [tab, setTab] = useState("customers");
      const [detail, setDetail] = useState(null);
      const [draft, setDraft] = useState({ status: "green", notes: "" });
      const [customerPreset, setCustomerPreset] = useState("all");
      const [customerStart, setCustomerStart] = useState(today());
      const [customerEnd, setCustomerEnd] = useState(today());
      const customerRange = getDashDateRange(customerPreset, customerStart, customerEnd);
      const customerDateLabel = customerPreset === "all" ? "All Time" : customerRange.label;

      const customerStatusInfo = (status) => {
        const s = status || "green";
        if (s === "red") return { label: "Blocked", color: C.red, bg: C.redBg, icon: "⛔" };
        if (s === "yellow") return { label: "Issue", color: C.amber, bg: C.amberBg, icon: "⚠️" };
        return { label: "Good", color: C.g600, bg: C.g50, icon: "✅" };
      };

      const saleLike = p =>
        p?.status === "Sold" ||
        !!p?.historicalImport ||
        !!p?.saleImportKey ||
        !!p?.saleLegacyKey ||
        !!p?.orderNumber ||
        !!p?.orderNo ||
        String(p?.nurseryCode || "").toUpperCase() === "HIST";

      const cleanCustomerValue = v => String(v || "").replace(/^@+/, "").trim();
      const getCustomerKey = p => {
        const username = cleanCustomerValue(p?.customerUsername || p?.customer || p?.palmstreetUsername);
        const name = cleanCustomerValue(p?.customerName || p?.buyerName || p?.recipientName);
        const email = cleanCustomerValue(p?.customerEmail || p?.email);
        const phone = cleanCustomerValue(p?.customerPhone || p?.phone);
        const fallback = cleanCustomerValue(p?.orderNumber || p?.orderNo);
        return (username || email || phone || name || fallback || "unknown").toLowerCase();
      };

      const getCustomerDisplay = p => {
        const username = cleanCustomerValue(p?.customerUsername || p?.customer || p?.palmstreetUsername);
        const name = cleanCustomerValue(p?.customerName || p?.buyerName || p?.recipientName);
        const email = cleanCustomerValue(p?.customerEmail || p?.email);
        const order = cleanCustomerValue(p?.orderNumber || p?.orderNo);
        if (username) return username;
        if (name) return name;
        if (email) return email;
        if (order) return `Unknown Customer ${order}`;
        return "Unknown Customer";
      };

      const rawSaleRecords = (plants || []).filter(p => saleLike(p) && getCustomerKey(p));
      const saleRecords = customerPreset === "all"
        ? rawSaleRecords
        : rawSaleRecords.filter(p => inDashRange(p, customerRange, ["soldDate", "saleDate", "orderDate", "soldAt", "createdAt", "dateAdded"]));
      const custMap = {};

      saleRecords.forEach(p => {
        const key = getCustomerKey(p);
        if (!custMap[key]) {
          custMap[key] = {
            key,
            username: cleanCustomerValue(p.customerUsername || p.customer || p.palmstreetUsername || ""),
            displayName: getCustomerDisplay(p),
            name: cleanCustomerValue(p.customerName || p.buyerName || p.recipientName || ""),
            recipientName: cleanCustomerValue(p.recipientName || p.customerName || ""),
            email: cleanCustomerValue(p.customerEmail || p.email || ""),
            phone: cleanCustomerValue(p.customerPhone || p.phone || ""),
            address1: cleanCustomerValue(p.customerAddress1 || p.address1 || ""),
            address2: cleanCustomerValue(p.customerAddress2 || p.address2 || ""),
            city: cleanCustomerValue(p.customerCity || p.city || ""),
            state: cleanCustomerValue(p.customerState || p.buyerState || p.state || ""),
            zip: cleanCustomerValue(p.customerZip || p.zip || ""),
            orders: [],
            total: 0,
            plants: 0,
            uniqueOrders: new Set(),
            status: p.customerStatus || "green",
            notes: p.customerNotes || "",
            firstOrder: p.soldDate || p.saleDate || p.orderDate || p.dateAdded || "",
            lastOrder: p.soldDate || p.saleDate || p.orderDate || p.dateAdded || ""
          };
        }
        const c = custMap[key];
        c.orders.push(p);
        c.total += (+p.salePrice || +p.productAmount || +p.orderAmount || +p.sellerIncome || +p.suggestedPrice || 0);
        c.plants++;
        if (p.orderNumber || p.orderNo) c.uniqueOrders.add(p.orderNumber || p.orderNo);
        if (!c.notes && p.customerNotes) c.notes = p.customerNotes;
        if (p.customerStatus && p.customerStatus !== "green") c.status = p.customerStatus;
        const d = p.soldDate || p.saleDate || p.orderDate || p.dateAdded || "";
        if (d && (!c.firstOrder || new Date(d) < new Date(c.firstOrder))) c.firstOrder = d;
        if (d && (!c.lastOrder || new Date(d) > new Date(c.lastOrder))) c.lastOrder = d;
      });

      const customers = Object.values(custMap).map(c => ({ ...c, orderCount: c.uniqueOrders.size || c.orders.length })).sort((a, b) => {
        const priority = { red: 0, yellow: 1, green: 2 };
        const pa = priority[a.status || "green"] ?? 2;
        const pb = priority[b.status || "green"] ?? 2;
        if (pa !== pb) return pa - pb;
        return b.total - a.total;
      });

      const counts = {
        green: customers.filter(c => (c.status || "green") === "green").length,
        yellow: customers.filter(c => c.status === "yellow").length,
        red: customers.filter(c => c.status === "red").length,
      };

      const stateMap = {};
      saleRecords.filter(p => p.customerState || p.buyerState || p.state).forEach(p => {
        const s = p.customerState || p.buyerState || p.state;
        if (!stateMap[s]) stateMap[s] = { state: s, revenue: 0, orders: 0, customers: new Set() };
        stateMap[s].revenue += (+p.salePrice || +p.productAmount || +p.orderAmount || +p.sellerIncome || 0);
        stateMap[s].orders++;
        stateMap[s].customers.add(getCustomerKey(p) || "?");
      });
      const states = Object.values(stateMap).map(s => ({ ...s, customers: s.customers.size })).sort((a, b) => b.revenue - a.revenue);
      const maxRev = Math.max(...states.map(s => s.revenue), 1);

      const openCustomer = c => {
        setDetail(c);
        setDraft({ status: c.status || "green", notes: c.notes || "" });
      };

      const saveCustomerFlags = () => {
        if (!detail) return;
        const key = detail.key;
        setPlants(prev => (prev || []).map(p => getCustomerKey(p) === key ? { ...p, customerStatus: draft.status, customerNotes: draft.notes } : p));
        addAudit && addAudit({ action: `Updated customer status: ${detail.displayName} → ${customerStatusInfo(draft.status).label}`, user: user?.name || "Owner", page: "Customers" });
        setDetail({ ...detail, status: draft.status, notes: draft.notes });
        alert("Customer status and notes saved.");
      };

      const exportCustomers = () => {
        const rows = customers.map(c => ({
          status: customerStatusInfo(c.status).label,
          username: c.username || c.displayName,
          name: c.name,
          email: c.email,
          phone: c.phone,
          address1: c.address1,
          address2: c.address2,
          city: c.city,
          state: c.state,
          zip: c.zip,
          orders: c.orderCount,
          items: c.plants,
          total: c.total.toFixed(2),
          notes: c.notes || ""
        }));
        const headers = Object.keys(rows[0] || { status: "", username: "", name: "", total: "" });
        const csv = [headers.join(","), ...rows.map(r => headers.map(h => `"${String(r[h] ?? "").replace(/"/g, '""')}"`).join(","))].join("\n");
        const blob = new Blob([csv], { type: "text/csv" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `leaf-diary-customers-${customerPreset}-${today()}.csv`;
        a.click();
      };

      const TABS = [

        { id: "blocked", l: "⛔ Blocked / Issues" },

        <Card style={{ marginBottom: 14, background: C.g50, border: `1px solid ${C.g200}` }}>

              <Row between style={{ marginBottom: 6 }}>

    /* Auto-heal duplicate plant IDs at startup. Keeps the first occurrence, assigns
       new globally-unique IDs to any duplicates. */
    const deduplicatePlants = (arr) => {
      const seen = new Set();
      let globalMax = Math.max(999, ...(arr || []).map(p => { const m = (p.plantId || "").match(/-(\d+)$/); return m ? parseInt(m[1], 10) : 0; }));
      return (arr || []).map(p => {
        const key = (p.plantId || "").toUpperCase();
        if (!key || !seen.has(key)) { seen.add(key); return p; }
        // Duplicate found — assign next available global ID
        globalMax++;
        const newId = pid(p.nurseryCode || "XX", globalMax);
        seen.add(newId.toUpperCase());
        return { ...p, plantId: newId, plantCode: newId, barcodeValue: newId };
      });
    };

    const loadLS = () => { try { const d = localStorage.getItem(LS_KEY); return d ? JSON.parse(d) : null; } catch (e) { return null; } };
    const markLocalInventoryReset = () => { try { localStorage.setItem(RESET_KEY, new Date().toISOString()); } catch (e) {} };
    const localInventoryWasReset = () => { try { return !!localStorage.getItem(RESET_KEY); } catch (e) { return false; } };
    const forceLocalPlantsEmpty = () => {
      try {

    const CASD_REG  = "48035818";
    const CASD_NEM  = "04717449";
    const CASD_IFA  = "0206";
    const CASD_SHIP = { name:"Leaf Diary", addr1:"957 N Suncoast Blvd", addr2:"Crystal River, FL 34429", contact:"Malasia W.", phone:"727-377-6305" };
    const CASD_STATES = ["CA","TX","LA"];
    const CASD_DOC_LABELS = {
      CA: "California Florida Nursery Stock Certificate",
      TX: "Consolidation Declaration — Florida Nursery Stock Destined to Texas",
      LA: "Consolidation Declaration — Florida Nursery Stock Destined to Louisiana"
    };

    async function fillCasdPdf(certData) {
      if (!window.PDFLib || !window.PDFLib.PDFDocument) {
        throw new Error("PDF library did not load. Refresh the page and try again.");
      }
      const { PDFDocument } = window.PDFLib;
      const bytes = Uint8Array.from(atob(CASD_TEMPLATE_B64), c => c.charCodeAt(0));
      const pdfDoc = await PDFDocument.load(bytes);
      const form  = pdfDoc.getForm();
      const tf = (name, val) => { try { form.getTextField(name).setText(val||""); } catch(e){} };
      const { certNumber, date, consignee, plants: ps } = certData;
      const p2 = ps.slice(0,11), p3 = ps.slice(11,33);
      tf("No", String(certNumber));          tf("Date", date);
      tf("Stock Dealer Certification Number Registration", CASD_REG);
      tf("Name and Address of Shipper 1", CASD_SHIP.name);
      tf("Name and Address of Shipper 2", CASD_SHIP.addr1);
      tf("Name and Address of Shipper 3", CASD_SHIP.addr2);
      tf("Contact", CASD_SHIP.contact);     tf("Telephone Number", CASD_SHIP.phone);
      tf("Name and Address of Consignee 1", consignee.name);
      tf("Name and Address of Consignee 2", consignee.address1);
      tf("Name and Address of Consignee 3", consignee.address2||"");
      tf("Contact_2", consignee.name);      tf("Telephone Number_2", consignee.phone||"");
      p2.forEach((pl,i) => {
        const r=String(i+1);
        tf(`QuantityRow${r}`, pl.qty); tf(`Nursery Stock exactly as certifiedRow${r}`, pl.name);
        tf(`SizeRow${r}`, pl.size);    tf(`Nematode Row${r}`, CASD_NEM); tf(`IFARow${r}`, CASD_IFA);
      });
      tf("No_2", String(certNumber)); tf("Date_2", date);
      tf("Stock Dealer Certification Number Registration_2", CASD_REG);
      p3.forEach((pl,i) => {
        const r=String(i+1);
        tf(`QuantityRow${r}_2`, pl.qty); tf(`Nursery Stock exactly as certifiedRow${r}_2`, pl.name);
        tf(`SizeRow${r}_2`, pl.size);   tf(`Nematode Row${r}_2`, CASD_NEM); tf(`IFARow${r}_2`, CASD_IFA);
      });
      form.flatten();
      return await pdfDoc.save();
    }

    function casdNextNum(certs) {
      if (!certs||!certs.length) return 10;
      return Math.max(...certs.map(c=>+c.certNumber||0))+1;
    }

    /* Group sales by order then by state, merge plants per shipment */
    function buildCasdShipments(sales) {
      const byOrder = {};
      (sales||[]).forEach(sale => {
        const state = (sale.customerState||sale.buyerState||sale.state||"").toUpperCase().trim();
        if (!CASD_STATES.includes(state)) return;
        const key = (sale.orderNo||sale.orderNum||sale.orderNumber||"NO_ORDER") + "|" + state;
        if (!byOrder[key]) {
          byOrder[key] = {
            key, state,
            consignee: {
              name: sale.customerName||sale.recipientName||sale.customerUsername||sale.customer||"",
              address1: sale.customerAddress1||"",
              address2: [sale.customerCity, sale.customerState||state, sale.customerZip].filter(Boolean).join(", "),
              phone: sale.customerPhone||""
            },
            plants: []
          };
        }
        byOrder[key].plants.push({
          qty: String(sale.qty||1),
          name: (sale.productVariant||sale.title||sale.name||"Plant").trim(),
          size: sale.potSize||sale.size||""
        });
      });
      return Object.values(byOrder).filter(s => s.consignee.name && s.plants.length);
    }



    const cloudHeaders = (extra = {}) => {
      const headers = {
        apikey: SUPABASE_KEY,
        "Content-Type": "application/json",
        Accept: "application/json",
        ...extra
      };

      // IMPORTANT:
      // Supabase's new sb_publishable_ keys are NOT JWTs.
      // Do not send them as Authorization: Bearer tokens or Supabase can reject the request.
      // Only legacy anon keys that start with eyJ are JWTs and may be used as Bearer tokens.
      if (SUPABASE_KEY && SUPABASE_KEY.startsWith("eyJ")) {
        headers.Authorization = `Bearer ${SUPABASE_KEY}`;
      }
      return headers;
    };

    async function cloudRequest(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers: cloudHeaders(options.headers || {})
      });
      if (!res.ok) {
        const txt = await res.text().catch(() => "");
        throw new Error(`${res.status} ${res.statusText} ${txt}`);
      }
      if (res.status === 204) return null;
      const txt = await res.text();
      return txt ? JSON.parse(txt) : null;
    }

    async function cloudFetchRows(table) {
      /* Supabase/PostgREST only returns about 1000 rows by default.
         This paginates every table so Palmstreet lifetime imports with 5,000+ rows load fully. */
      const all = [];
      const pageSize = 1000;
      let from = 0;

      while (true) {
        const to = from + pageSize - 1;
        const rows = await cloudRequest(`${table}?select=id,data,updated_at&order=updated_at.desc`, {
          method: "GET",
          headers: { Range: `${from}-${to}`, Prefer: "count=exact" }
        });

        if (!rows || rows.length === 0) break;
        all.push(...rows);
        if (rows.length < pageSize) break;
        from += pageSize;
      }

      return all.map(r => ({ ...(r.data || {}), id: (r.data && r.data.id) ? r.data.id : r.id }));
    }

    async function cloudUpsertRows(table, rows) {
      /* Insert/update in batches so large Palmstreet files do not fail or silently stop. */
      if (!Array.isArray(rows) || rows.length === 0) return;
      const payload = rows
        .filter(r => r && r.id)
        .map(r => ({ id: String(r.id), data: r, updated_at: new Date().toISOString() }));
      if (!payload.length) return;

      const batchSize = 500;
      for (let i = 0; i < payload.length; i += batchSize) {
        const chunk = payload.slice(i, i + batchSize);
        await cloudRequest(`${table}?on_conflict=id`, {
          method: "POST",
          headers: { Prefer: "resolution=merge-duplicates" },
          body: JSON.stringify(chunk)
        });
      }
    }

    async function cloudDeleteRows(table, ids) {
      const clean = [...new Set((ids || []).filter(Boolean).map(String))];
      if (!clean.length) return;

      const batchSize = 300;
      for (let i = 0; i < clean.length; i += batchSize) {
        const batch = clean.slice(i, i + batchSize);
        const quoted = batch.map(id => `"${id.replace(/"/g, '\\"')}"`).join(",");
        await cloudRequest(`${table}?id=in.(${quoted})`, { method: "DELETE" });
      }
    }

    async function cloudFetchState(key) {
      const rows = await cloudRequest(`app_state?select=key,data,updated_at&key=eq.${encodeURIComponent(key)}&limit=1`, { method: "GET" });
      return rows && rows[0] ? rows[0].data : null;
    }

    async function cloudUpsertState(key, data) {
      return cloudRequest(`app_state?on_conflict=key`, {
        method: "POST",
        headers: { Prefer: "resolution=merge-duplicates" },
        body: JSON.stringify([{ key, data, updated_at: new Date().toISOString() }])
      });
    }

    function applyUpdater(updater, prev) {
      return typeof updater === "function" ? updater(prev) : updater;
    }
    function missingIds(prev = [], next = []) {
      const n = new Set((next || []).map(x => x && x.id).filter(Boolean).map(String));
      return (prev || []).map(x => x && x.id).filter(Boolean).map(String).filter(id => !n.has(id));
    }

    function ChangePasswordModal({ onClose, user }) {
      const [oldPassword, setOldPassword] = useState("");
      const [newPassword, setNewPassword] = useState("");
      const [msg, setMsg] = useState("");
      const [err, setErr] = useState("");
      const [loading, setLoading] = useState(false);
      const isOwner = user?.role === "owner";

      const handleUpdate = async () => {
        if (newPassword.length < 6) { setErr("New password must be at least 6 characters"); return; }
        if (!isOwner && !oldPassword) { setErr("You must enter your current password"); return; }
        
        setLoading(true); setErr(""); setMsg("");
        
        if (!isOwner) {
          const { data: { session } } = await supabase.auth.getSession();
          if (session) {
            const { error: signInError } = await supabase.auth.signInWithPassword({ email: session.user.email, password: oldPassword });
            if (signInError) {
              setErr("Incorrect current password.");
              setLoading(false);
              return;
            }
          }
        }
        
        const { error } = await supabase.auth.updateUser({ password: newPassword });
        if (error) setErr(error.message); else { setMsg("Password updated successfully!"); setTimeout(onClose, 1500); }
        setLoading(false);
      };
      
      return <div style={{ position: "fixed", inset: 0, zIndex: 999, background: "rgba(0,0,0,.6)", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ width: 340, background: C.card, borderRadius: 16, padding: "24px", boxShadow: "0 10px 40px rgba(0,0,0,.2)", fontFamily: F.body }}>
          <div style={{ fontFamily: F.display, fontWeight: 700, fontSize: 18, color: C.g900, marginBottom: 16 }}>Change Password</div>
          {!isOwner && <Inp label="Current Password" type="password" value={oldPassword} onChange={setOldPassword} placeholder="••••••••" />}
          <div style={{ marginTop: !isOwner ? 10 : 0 }}>
            <Inp label="New Password" type="password" value={newPassword} onChange={setNewPassword} placeholder="••••••••" onKeyDown={e => e.key === "Enter" && handleUpdate()} />
          </div>
          {err && <div style={{ color: C.red, fontSize: 12, marginTop: 8 }}>{err}</div>}
          {msg && <div style={{ color: C.g700, fontSize: 12, marginTop: 8 }}>{msg}</div>}
          <div style={{ display: "flex", gap: 10, marginTop: 18 }}>
            <Btn full v="fill" onClick={handleUpdate} disabled={loading}>{loading ? "Updating..." : "Update"}</Btn>
            <Btn full v="ghost" onClick={onClose} disabled={loading}>Cancel</Btn>
          </div>
        </div>
      </div>;
    }

    /* ══════════════════════════════════════════════════════════
       ROOT APP — Supabase cloud sync + localStorage backup
    ══════════════════════════════════════════════════════════ */
    function App() {
      const saved = loadLS();
      const [showPwdModal, setShowPwdModal] = useState(false);

      const [session, setSession] = useState(undefined);
      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => setSession(session || null));
        supabase.auth.onAuthStateChange((_e, s) => setSession(s || null));
      }, []);

      const [user, setUser] = useState(null);
      const [page, setPage] = useState("dash");
      const [plants, setPlantsRaw] = useState(saved?.plants || []);
      const [expenses, setExpensesRaw] = useState(saved?.expenses || []);
      const [timecards, setTimecardsRaw] = useState(saved?.timecards || []);
      const [auditLog, setAuditLogRaw] = useState(saved?.auditLog || []);
      const [bills, setBillsRaw] = useState(saved?.bills || DEFAULT_BILLS);
      const [nurseries, setNurseriesRaw] = useState(migrateNurseries(saved?.nurseries || DEFAULT_NURSERIES));
      const [users, setUsersRaw] = useState(saved?.users || DEFAULT_USERS);
      const [settings, setSettingsRaw] = useState(saved?.settings || DEFAULT_SETTINGS);
      const [casdCerts, setCasdCertsRaw] = useState(saved?.casdCerts || []);
      const [saveMsg, setSaveMsg] = useState("");
      const [cloudStatus, setCloudStatus] = useState("loading");
      const [cloudMsg, setCloudMsg] = useState("Connecting to Supabase cloud...");

      const cloudReadyRef = useRef(false);
      const suppressCloudSaveRef = useRef(false);
      const backupRef = useRef();

      const cloudCollectionSetter = useCallback((table, rawSetter) => (updater) => {
        rawSetter(prev => {
          const next = applyUpdater(updater, prev) || [];
          if (cloudReadyRef.current && !suppressCloudSaveRef.current) {
            const removed = missingIds(prev, next);
            setCloudStatus("syncing");
            setCloudMsg("Saving to Supabase cloud...");
            Promise.resolve()
              .then(async () => {
                if (removed.length) await cloudDeleteRows(table, removed);
                await cloudUpsertRows(table, next);
              })
              .then(() => { setCloudStatus("synced"); setCloudMsg("Supabase cloud synced"); })
              .catch(err => { console.error(`Supabase save failed for ${table}`, err); setCloudStatus("offline"); setCloudMsg("Cloud save failed — local backup still saved"); });
          }
          return next;
        });
      }, []);

      const cloudStateSetter = useCallback((key, rawSetter) => (updater) => {
        rawSetter(prev => {
          const next = applyUpdater(updater, prev);
          if (cloudReadyRef.current && !suppressCloudSaveRef.current) {
            setCloudStatus("syncing");
            setCloudMsg("Saving settings to Supabase...");
            cloudUpsertState(key, next)
              .then(() => { setCloudStatus("synced"); setCloudMsg("Supabase cloud synced"); })
              .catch(err => { console.error(`Supabase app_state save failed for ${key}`, err); setCloudStatus("offline"); setCloudMsg("Cloud save failed — local backup still saved"); });
          }
          return next;
        });
      }, []);

      const setPlants = cloudCollectionSetter("plants", setPlantsRaw);
      const setExpenses = cloudCollectionSetter("expenses", setExpensesRaw);
      const setTimecards = cloudCollectionSetter("timecards", setTimecardsRaw);
      const setBills = cloudCollectionSetter("bills", setBillsRaw);
      const setNurseries = cloudCollectionSetter("nurseries", setNurseriesRaw);
      const setCasdCerts = cloudCollectionSetter("casd_certs", setCasdCertsRaw);
      /* Expose casdCerts to window so ShowImport auto-gen can read current count */
      React.useEffect(() => { window.__casdCertsSnapshot = casdCerts; }, [casdCerts]);
      const setAuditLog = cloudStateSetter("auditLog", setAuditLogRaw);
      const setUsers = cloudStateSetter("users", setUsersRaw);
      const setSettings = cloudStateSetter("settings", setSettingsRaw);

      /* Migration: clean legacy LD- prefixes only. Never bump or recycle short nursery codes like CF-001. */
      useEffect(() => {
        const needsMigration = plants.some(p => p?.plantId && (String(p.plantId).startsWith("LD-") || String(p.plantId).includes("--")));
        if (needsMigration) {
          setPlants(prev => prev.map(p => {
            if (!p.plantId) return p;
            let newId = String(p.plantId).replace(/^LD-/, "").replace(/--/g, "-");
            return newId !== p.plantId ? { ...p, plantId: newId, plantCode: p.plantCode || newId, barcodeValue: p.barcodeValue || newId } : p;
          }));
        }
      }, [plants, setPlants]);

      /* Migration: clean nursery codes */
      useEffect(() => {
        const needsNurseryMigration = nurseries.some(n => typeof n === "string" || (n.code && (n.code.endsWith("001") || n.code.endsWith("-"))));
        if (needsNurseryMigration) {
          setNurseries(prev => prev.map(n => {
            if (typeof n === "string") return { id: "mig-" + n, code: n, name: n + " Nursery", phone: "", email: "", address: "", website: "", contact: "", paymentMethods: "", hasAccount: false, accountNotes: "", notes: "" };
            if (!n.code) return n;
            let c = n.code.replace(/001$/, "").replace(/-$/, "");
            return c !== n.code ? { ...n, code: c } : n;
          }));
        }
      }, [nurseries, setNurseries]);

      /* User mapping */
      useEffect(() => {
        if (session && session.user && session.user.email && cloudStatus !== "loading") {
          const email = session.user.email.toLowerCase();
          let u = users.find(x => x.email && x.email.toLowerCase() === email);
          if (!u) {
            u = { id: uid(), name: email.split("@")[0], role: "employee", email: email, permissions: { ...DEFAULT_PERMS } };
            setUsersRaw(p => [...p, u]);
            if (cloudStatus === "synced") cloudUpsertState("users", [...users, u]);
          }
          if (!user || user.id !== u.id) {
            setUser(u);
            setPage(u.role === "employee" ? "emp_dash" : "dash");
            addAudit({ action: "Logged in via Auth", user: u.name, page: "System" });
          }
        }
      }, [session, users, cloudStatus, user, addAudit, cloudCollectionSetter]);

      /* Inventory is never auto-deleted. Use logged-in Data Cleanup tools only. */

      /* Always keep a local backup on this device too */
      useEffect(() => {
        saveLS({ plants, expenses, timecards, auditLog, bills, nurseries, users, settings, casdCerts });
      }, [plants, expenses, timecards, auditLog, bills, nurseries, users, settings, casdCerts]);

      /* Load fonts */
      useEffect(() => {
        const l = document.createElement("link");
        l.rel = "stylesheet";
        l.href = "https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap";
        document.head.appendChild(l);
      }, []);

      const loadFromCloud = useCallback(async ({ silent = false } = {}) => {
        if (!silent) { setCloudStatus("loading"); setCloudMsg("Loading Supabase cloud data..."); }
        try {
          const [cloudPlants, cloudBills, cloudNurseries, cloudExpenses, cloudTimecards, cloudUsers, cloudSettings, cloudAudit, cloudInventoryReset, cloudCasdCerts] = await Promise.all([
            cloudFetchRows("plants"),
            cloudFetchRows("bills"),
            cloudFetchRows("nurseries"),
            cloudFetchRows("expenses"),
            cloudFetchRows("timecards"),
            cloudFetchState("users"),
            cloudFetchState("settings"),
            cloudFetchState("auditLog"),
            cloudFetchState("inventoryResetAt"),
            cloudFetchRows("casd_certs"),
          ]);

          suppressCloudSaveRef.current = true;
          /* If inventory was intentionally reset, an empty cloud table must stay empty. Do NOT repopulate from old localStorage. */
          const resetWasRequested = !!cloudInventoryReset || localInventoryWasReset();
          if (cloudPlants.length || resetWasRequested) setPlantsRaw(cloudPlants);
          if (cloudBills.length) setBillsRaw(cloudBills); else if (!saved?.bills) setBillsRaw(DEFAULT_BILLS);
          if (cloudNurseries.length) setNurseriesRaw(migrateNurseries(cloudNurseries)); else if (!saved?.nurseries) setNurseriesRaw(DEFAULT_NURSERIES);
          if (cloudExpenses.length) setExpensesRaw(cloudExpenses);
          if (cloudTimecards.length) setTimecardsRaw(cloudTimecards);
          if (cloudUsers) setUsersRaw(cloudUsers); else if (!saved?.users) setUsersRaw(DEFAULT_USERS);
          if (cloudSettings) setSettingsRaw(cloudSettings); else if (!saved?.settings) setSettingsRaw(DEFAULT_SETTINGS);
          if (cloudAudit) setAuditLogRaw(cloudAudit);
          if (cloudCasdCerts && cloudCasdCerts.length) setCasdCertsRaw(cloudCasdCerts);
          setTimeout(() => { suppressCloudSaveRef.current = false; }, 0);

          cloudReadyRef.current = true;
          setCloudStatus("synced");
          setCloudMsg("Supabase cloud synced");

          /* First-time migration: if Supabase is empty but this device has data, seed the cloud */
          if (!cloudPlants.length && saved?.plants?.length && !cloudInventoryReset && !localInventoryWasReset()) await cloudUpsertRows("plants", saved.plants);
          if (!cloudBills.length && saved?.bills?.length) await cloudUpsertRows("bills", saved.bills);
          if (!cloudNurseries.length && saved?.nurseries?.length) await cloudUpsertRows("nurseries", saved.nurseries);
          if (!cloudExpenses.length && saved?.expenses?.length) await cloudUpsertRows("expenses", saved.expenses);
          if (!cloudTimecards.length && saved?.timecards?.length) await cloudUpsertRows("timecards", saved.timecards);
          if (!cloudUsers && saved?.users) await cloudUpsertState("users", saved.users);
          if (!cloudSettings && saved?.settings) await cloudUpsertState("settings", saved.settings);
          if (!cloudAudit && saved?.auditLog) await cloudUpsertState("auditLog", saved.auditLog);
        } catch (err) {
          console.error("Supabase load failed", err);
          cloudReadyRef.current = false;
          const msg = err && err.message ? err.message : String(err);
          setCloudStatus("offline");
          setCloudMsg("Supabase error: " + msg);
        }
      }, []);

      useEffect(() => {
        if (!session) return;
        loadFromCloud();
        const timer = setInterval(() => loadFromCloud({ silent: true }), 20000);
        return () => clearInterval(timer);
      }, [loadFromCloud, session]);

      /* Manual backup — exports all data as JSON file */
      const exportBackup = () => {
        const data = { plants, expenses, timecards, bills, nurseries, users, settings, auditLog, exportDate: new Date().toISOString() };
        const a = Object.assign(document.createElement("a"), {
          href: URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: "application/json" })),
          download: `leafdiary-backup-${today()}.json`
        });
        a.click();
        setSaveMsg("✅ Backup downloaded!");
        setTimeout(() => setSaveMsg(""), 3000);
      };

      /* Restore from backup JSON file and push restored data to Supabase */
      const importBackup = (file) => {
        if (!file) return;
        const r = new FileReader();
        r.onload = async e => {
          try {
            const d = JSON.parse(e.target.result);
            suppressCloudSaveRef.current = true;
            if (d.plants) setPlantsRaw(d.plants);
            if (d.expenses) setExpensesRaw(d.expenses);
            if (d.timecards) setTimecardsRaw(d.timecards);
            if (d.bills) setBillsRaw(d.bills);
            if (d.nurseries) setNurseriesRaw(d.nurseries);
            if (d.users) setUsersRaw(d.users);
            if (d.settings) setSettingsRaw(d.settings);
            if (d.auditLog) setAuditLogRaw(d.auditLog);
            if (d.casdCerts) setCasdCertsRaw(d.casdCerts);
            setTimeout(() => { suppressCloudSaveRef.current = false; }, 0);
            setCloudStatus("syncing");
            setCloudMsg("Uploading restored backup to Supabase...");
            await Promise.all([
              d.plants ? cloudUpsertRows("plants", d.plants) : null,
              d.expenses ? cloudUpsertRows("expenses", d.expenses) : null,
              d.timecards ? cloudUpsertRows("timecards", d.timecards) : null,
              d.bills ? cloudUpsertRows("bills", d.bills) : null,
              d.nurseries ? cloudUpsertRows("nurseries", d.nurseries) : null,
              d.users ? cloudUpsertState("users", d.users) : null,
              d.settings ? cloudUpsertState("settings", d.settings) : null,
              d.auditLog ? cloudUpsertState("auditLog", d.auditLog) : null,
              d.casdCerts ? cloudUpsertRows("casd_certs", d.casdCerts) : null,
            ]);
            cloudReadyRef.current = true;
            setCloudStatus("synced");
            setCloudMsg("Backup restored and synced to Supabase");
            setSaveMsg("✅ Backup restored + cloud synced!");
            setTimeout(() => setSaveMsg(""), 3000);
          } catch (err) { console.error(err); setSaveMsg("❌ Invalid backup file or cloud upload failed"); setTimeout(() => setSaveMsg(""), 3000); }
        };
        r.readAsText(file);
      };

      const addAudit = useCallback(entry => { setAuditLog(p => [...p, { ...entry, timestamp: new Date().toLocaleString(), id: uid() }]); }, [setAuditLog]);
      const handleLogin = u => { setUser(u); setPage(u.role === "employee" ? "emp_dash" : "dash"); addAudit({ action: "Logged in", user: u.name, page: "Login" }); };
      const handleLogout = async () => { await supabase.auth.signOut(); addAudit({ action: "Logged out", user: user?.name || "Unknown", page: "System" }); setUser(null); setPage("dash"); };
      const billAlerts = bills.filter(b => { const d = Math.ceil((new Date(b.dueDate) - Date.now()) / 864e5); return d <= 7 && d >= 0 && b.status === "Unpaid"; }).length;

      if (session === undefined) return <div style={{ height: "100vh", background: C.bg }}></div>;
      if (!session) return <AuthScreen />;
      if (cloudStatus === "loading" || !user) return <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: F.body, color: C.tx3, flexDirection: "column", gap: 16 }}><div className="spin" style={{ width: 24, height: 24, border: `2px solid ${C.g200}`, borderTopColor: C.g600, borderRadius: "50%" }}></div>Connecting to Leaf Diary Cloud...</div>;

      const P = { plants, setPlants, nurseries, setNurseries, expenses, setExpenses, timecards, setTimecards, bills, setBills, user, addAudit };
      const cloudDot = cloudStatus === "synced" ? C.g400 : cloudStatus === "syncing" || cloudStatus === "loading" ? C.gold : C.amber;
      const cloudLabel = cloudStatus === "synced" ? "☁️ Supabase cloud synced" : cloudStatus === "syncing" ? "🔄 Saving to Supabase..." : cloudStatus === "loading" ? "🔄 Loading cloud..." : `⚠️ Cloud offline — ${cloudMsg || "local backup active"}`;

      return <div style={{ fontFamily: F.body, background: C.bg, minHeight: "100vh", color: C.tx1, paddingBottom: 80 }}>
        {showPwdModal && <ChangePasswordModal onClose={() => setShowPwdModal(false)} user={user} />}
        <Nav page={page} setPage={setPage} user={user} onLogout={handleLogout} plantCount={plants.length} billAlerts={billAlerts} onChangePassword={() => setShowPwdModal(true)} />

        {/* Cloud sync indicator strip */}
        <div style={{ background: C.g900, padding: "6px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <div title={cloudMsg} style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: cloudDot }} />
            <span style={{ fontSize: 11, color: "rgba(255,255,255,.72)", fontWeight: 600 }}>{cloudLabel}</span>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            {saveMsg && <span style={{ fontSize: 11, color: C.g400, fontWeight: 700 }}>{saveMsg}</span>}
            <button onClick={() => loadFromCloud()} style={{ background: "rgba(255,255,255,.12)", border: "none", borderRadius: 6, padding: "4px 10px", color: "rgba(255,255,255,.8)", fontSize: 11, cursor: "pointer", fontFamily: F.body, fontWeight: 600 }}>🔄 Sync Now</button>
            <button onClick={async () => { try { setCloudStatus("loading"); setCloudMsg("Testing Supabase connection..."); await cloudRequest("plants?select=id&limit=1", { method: "GET" }); setCloudStatus("synced"); setCloudMsg("Supabase test passed"); alert("Supabase test passed. Cloud connection is working."); } catch (err) { const msg = err && err.message ? err.message : String(err); setCloudStatus("offline"); setCloudMsg("Supabase test failed: " + msg); alert("Supabase test failed: " + msg); } }} style={{ background: "rgba(255,255,255,.12)", border: "none", borderRadius: 6, padding: "4px 10px", color: "rgba(255,255,255,.8)", fontSize: 11, cursor: "pointer", fontFamily: F.body, fontWeight: 600 }}>🧪 Test Cloud</button>
            <button onClick={exportBackup} style={{ background: "rgba(255,255,255,.12)", border: "none", borderRadius: 6, padding: "4px 10px", color: "rgba(255,255,255,.8)", fontSize: 11, cursor: "pointer", fontFamily: F.body, fontWeight: 600 }}>📥 Backup</button>
            <button onClick={() => backupRef.current.click()} style={{ background: "rgba(255,255,255,.12)", border: "none", borderRadius: 6, padding: "4px 10px", color: "rgba(255,255,255,.8)", fontSize: 11, cursor: "pointer", fontFamily: F.body, fontWeight: 600 }}>📤 Restore</button>
            <input ref={backupRef} type="file" accept=".json" style={{ display: "none" }} onChange={e => importBackup(e.target.files[0])} />
          </div>
        </div>

        <div>
          {page === "dash" && user.role !== "employee" && <OwnerDash plants={plants} expenses={expenses} timecards={timecards} bills={bills} setPage={setPage} />}
          {page === "emp_dash" && <EmpDash plants={plants} user={user} timecards={timecards} />}
          {page === "dash" && user.role === "employee" && <EmpDash plants={plants} user={user} timecards={timecards} />}
          {page === "upload" && <InvoiceUpload {...P} />}
          {page === "manual" && <ManualEntry {...P} />}
          {page === "history" && <PastInvoices {...P} />}
          {page === "inv" && <Inventory plants={plants} setPlants={setPlants} user={user} addAudit={addAudit} nurseries={nurseries} setPage={setPage} />}
          {page === "labels" && <Labels plants={plants} setPlants={setPlants} user={user} addAudit={addAudit} setPage={setPage} settings={settings} />}
          {page === "sellthru" && CAN.seeReports(user.role) && <SellThrough plants={plants} nurseries={nurseries} setPage={setPage} />}
          {page === "showbuilder" && <ShowBuilder plants={plants} setPlants={setPlants} addAudit={addAudit} user={user} />}
          {page === "showimport" && <ShowImport plants={plants} setPlants={setPlants} addAudit={addAudit} user={user} />}
          {page === "customers" && CAN.seeReports(user.role) && <Customers plants={plants} setPlants={setPlants} addAudit={addAudit} user={user} />}
          {page === "nursery" && <Nurseries nurseries={nurseries} setNurseries={setNurseries} plants={plants} user={user} />}
          {page === "bills" && <Bills bills={bills} setBills={setBills} />}
          {page === "expense" && CAN.seeExpenses(user.role) && <Expenses expenses={expenses} setExpenses={setExpenses} addAudit={addAudit} user={user} />}
          {page === "timecard" && <Timecard timecards={timecards} setTimecards={setTimecards} user={user} employees={users} />}
          {page === "payroll" && CAN.seePayroll(user.role) && <Payroll timecards={timecards} employees={users} />}
          {page === "intel" && CAN.seeReports(user.role) && <BuyIntel plants={plants} settings={settings} />}
          {page === "reports" && CAN.seeReports(user.role) && <Reports plants={plants} expenses={expenses} timecards={timecards} nurseries={nurseries} />}
          {page === "tax" && CAN.seeTax(user.role) && <TaxCenter plants={plants} expenses={expenses} timecards={timecards} />}
          {page === "audit" && CAN.seeAudit(user.role) && <AuditLog auditLog={auditLog} />}
          {page === "admin" && CAN.editSettings(user.role) && <AdminPanel users={users} setUsers={setUsers} settings={settings} setSettings={setSettings} plants={plants} setPlants={setPlants} addAudit={addAudit} user={user} />}
          {page === "cleanup" && user.role === "owner" && <DataCleanup plants={plants} setPlants={setPlants} addAudit={addAudit} user={user} setPage={setPage} />}
          {page === "casd" && user.role === "owner" && <CasdCertificates casdCerts={casdCerts} setCasdCerts={setCasdCerts} plants={plants} user={user} addAudit={addAudit} />}
        </div>
      </div>;
    }
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>

</html>
