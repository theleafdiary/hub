  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    /* ═══════════════════════════════════════════════════════════
       LEAF DIARY BUSINESS HUB v6 — Complete Edition
       Fresh modern palette · Bills tracker · True profit engine
       Admin panel · QR labels · Buy intelligence · Florida tax
    ═══════════════════════════════════════════════════════════ */

    /* ── COLOR SYSTEM ────────────────────────────────────────── */
    const C = {
      bg: "#EFF4F1", card: "#FFFFFF", cardAlt: "#F6FAF7", raised: "#FFFFFF",
      g900: "#0D2B1A", g800: "#174D2F", g700: "#236B42", g600: "#2E8A55",
      g500: "#3FAD6A", g400: "#6EC98E", g300: "#9DDEB4", g200: "#C5EFD5",
      g100: "#E3F7EB", g50: "#F0FBF4",
      tx1: "#0E1F15", tx2: "#304D3A", tx3: "#6A8C76", tx4: "#A4C2AE",
      bd: "#CDE0D5", bdS: "#E5F0E9",
      gold: "#B07D10", goldBg: "#FEF8E8",
      red: "#BE3535", redBg: "#FEF0EF",
      blue: "#1A5F9A", blueBg: "#EDF3FC",
      amber: "#C0570A", amberBg: "#FEF3E8",
      purple: "#6841A0", purpleBg: "#F2EEF9",
      teal: "#0A7E88", tealBg: "#E9F5F6",
    };
    const F = {
      display: `'Playfair Display',Georgia,serif`,
      body: `'DM Sans',system-ui,sans-serif`,
      mono: `'DM Mono','Courier New',monospace`,
    };

    /* ── CONSTANTS ───────────────────────────────────────────── */
    const FL_SALES_TAX = 0.07;
    const FL_SE_TAX = 0.153;
    const FL_BRACKETS = [[0, 11600, .10], [11600, 47150, .12], [47150, 100525, .22], [100525, 191950, .24]];
    const PS_FEE = 0.10, WN_FEE = 0.08, SH_FEE = 0.029, SH_FLAT = 0.30;

    const STATUSES = ["In Stock", "Sold", "Dead", "Damaged", "Returned", "Giveaway", "Personal", "Holding For Customer", "Needs Label", "Needs Photo"];
    const PLATFORMS = ["Palmstreet", "Whatnot", "Shopify", "Cash", "Local Pickup", "Trade", "Other"];
    const PAY_METHS = ["Cash", "Credit Card", "Debit Card", "Check", "PayPal", "Venmo", "Zelle", "Wise", "Other"];
    const EXP_CATS = ["Plant Inventory", "Soil & Amendments", "Pots & Containers", "Packaging", "Labels & Printers", "Heat/Cold Packs", "Shipping Supplies", "Palmstreet Fees", "Whatnot Fees", "Shopify Fees", "Gas & Mileage", "Software & Website", "Advertising", "Payroll", "Rent & Utilities", "Equipment", "Bank Fees", "Taxes", "Other"];
    const POT_SIZES = ['2"', '3"', '4"', '6"', '8"', '10"', '12"', "1 gal", "2 gal", "3 gal", "5 gal", "7 gal", "10 gal", "15 gal"];
    const GENERA = ["Aglaonema", "Alocasia", "Anthurium", "Begonia", "Caladium", "Epipremnum", "Hoya", "Monstera", "Peperomia", "Philodendron", "Scindapsus", "Syngonium", "Tillandsia", "Other"];
    const BILL_CATS = ["Platform Fee", "Software", "Rent", "Utilities", "Internet", "Phone", "Insurance", "Loan", "Supplier", "Payroll", "Taxes", "Other"];
    const BILL_FREQ = ["One-Time", "Weekly", "Monthly", "Quarterly", "Annually"];
    const PERM_LABELS = {
      canUploadInvoice: "Upload invoice photos", canAddPlants: "Add plants manually",
      canPrintLabels: "Print & export labels", canMarkSold: "Mark plants as sold",
      canMarkDamaged: "Mark as damaged/dead", canViewInventory: "View inventory list",
      canEditLocation: "Edit rack/shelf", canAddNotes: "Add plant notes",
      canClockInOut: "Clock in & out", canSeeSuggestedPrice: "See suggested price",
      canSeeCost: "See plant cost", canSeeProfit: "See profit & margin",
      canSeeExpenses: "See expenses", canDeletePlants: "Delete plants",
      canChangePrices: "Edit prices", canExportReports: "Export reports",
      canViewNurseryFinancials: "See nursery financials",
    };
    const PERM_GROUPS = [
      { group: "Daily Work", keys: ["canUploadInvoice", "canAddPlants", "canPrintLabels", "canMarkSold", "canMarkDamaged", "canEditLocation", "canAddNotes", "canClockInOut"] },
      { group: "What They See", keys: ["canViewInventory", "canSeeSuggestedPrice", "canSeeCost", "canSeeProfit", "canSeeExpenses", "canViewNurseryFinancials"] },

    const DEFAULT_PERMS = {
      canUploadInvoice: true, canAddPlants: true, canPrintLabels: true, canMarkSold: true,
      canMarkDamaged: true, canViewInventory: true, canEditLocation: true, canAddNotes: true,
      canClockInOut: true, canSeeSuggestedPrice: true, canSeeCost: false, canSeeProfit: false,
      canSeeExpenses: false, canDeletePlants: false, canChangePrices: false,
      canExportReports: false, canViewNurseryFinancials: false,
    };

    const uid = () => Math.random().toString(36).slice(2, 9);
    const supabaseUrl = 'https://yyklidmefiguzrbvrnmp.supabase.co';
    const supabaseKey = 'sb_publishable_8vyVQt8Ay3S8kJ4cI9U5YA_eB6l2CUu';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    const $ = n => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(+n || 0);
    const today = () => new Date().toISOString().split("T")[0];
    const fDate = d => { if (!d) return ""; const [y, m, day] = d.split("-"); return new Date(y, m - 1, day).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }); };
    const toTC = s => (s || "").replace(/\w\S*/g, t => t[0].toUpperCase() + t.slice(1).toLowerCase());
    const gOf = name => { const n = (name || "").toLowerCase(); for (const g of GENERA.slice(0, -1)) if (n.includes(g.toLowerCase())) return g; return "Other"; };
    const sprice = (cost, m = 0.62) => cost > 0 ? Math.ceil(cost / (1 - m) / 5) * 5 : 0;
    const marg = (cost, price) => price > 0 ? Math.round(((price - cost) / price) * 100) : 0;
    const pid = (code, n) => `${code}-${String(n).padStart(3, "0")}`;
    const getNextId = (plants, code) => {
      const nums = (plants || [])
        .filter(p => String(p.nurseryCode || "").toUpperCase() === String(code || "").toUpperCase())
        .map(p => {
          const m = String(p.plantId || p.plantCode || "").match(/-(\d+)$/);
          return m ? parseInt(m[1], 10) : 0;
        })
        .filter(n => Number.isFinite(n));
      return nums.length ? Math.max(...nums) : 0;
    };
    const dHeld = d => d ? Math.floor((Date.now() - new Date(d)) / (864e5)) : null;
    const fDays = d => d === null ? "—" : d === 0 ? "Today" : d === 1 ? "1 day" : `${d}d`;
    const platFee = (platform, price) => {
      if (platform === "Palmstreet") return +(price * PS_FEE).toFixed(2);
      if (platform === "Whatnot") return +(price * WN_FEE).toFixed(2);
      if (platform === "Shopify") return +(price * SH_FEE + SH_FLAT).toFixed(2);
      return 0;
    };
    const trueProfit = p => {
      const rev = +p.salePrice || +p.suggestedPrice || 0, cost = +p.cost || 0;
      return rev - cost - platFee(p.platform || "", rev) - (+p.shippingCost || 0);
    };
    const estIncomeTax = net => {
      if (net <= 0) return 0;
      let tax = 0, prev = 0;
      for (const [lo, hi, r] of FL_BRACKETS) { if (net > lo) { tax += (Math.min(net, hi) - prev) * r; prev = hi; } }
      return tax;
    };
    const CAN = {
      seeCost: r => r === "owner" || r === "manager",
      seeProfit: r => r === "owner",
      seeExpenses: r => r === "owner",
      seePayroll: r => r === "owner",
      seeTax: r => r === "owner",
      seeReports: r => r === "owner" || r === "manager",
      deleteRec: r => r === "owner",
      editSettings: r => r === "owner",
      seeAudit: r => r === "owner" || r === "manager",
    };

    /* ══════════════════════════════════════════════════════════
       SHARED UI COMPONENTS
    ══════════════════════════════════════════════════════════ */
    function Tag({ text, color = C.g600, sm, dot }) {
      return <span style={{ display: "inline-flex", alignItems: "center", gap: 4, background: color + "1A", color, border: `1px solid ${color}40`, borderRadius: 20, padding: sm ? "1px 8px" : "2px 11px", fontSize: sm ? 10 : 11, fontWeight: 700, fontFamily: F.mono, whiteSpace: "nowrap" }}>
        {dot && <span style={{ width: 5, height: 5, borderRadius: "50%", background: color, flexShrink: 0 }} />}{text}
      </span>;
    }
    function Btn({ children, onClick, v = "fill", sz = "md", full, disabled, style: s = {} }) {
      const pad = sz === "sm" ? "8px 14px" : sz === "lg" ? "15px 32px" : "12px 20px";
      const fs = sz === "sm" ? 12 : sz === "lg" ? 16 : 14;
      const VS = { fill: { background: C.g700, color: "#fff", border: `1px solid ${C.g700}` }, soft: { background: C.g100, color: C.g800, border: `1px solid ${C.g300}` }, outline: { background: "transparent", color: C.g700, border: `1.5px solid ${C.g700}` }, ghost: { background: "transparent", color: C.tx3, border: `1px solid ${C.bd}` }, danger: { background: C.red, color: "#fff", border: `1px solid ${C.red}` }, gold: { background: C.gold, color: "#fff", border: `1px solid ${C.gold}` } };
      return <button onClick={onClick} disabled={disabled} style={{ ...VS[v], padding: pad, fontSize: fs, fontWeight: 600, borderRadius: 8, cursor: disabled ? "not-allowed" : "pointer", fontFamily: F.body, display: "inline-flex", alignItems: "center", gap: 5, whiteSpace: "nowrap", opacity: disabled ? .5 : 1, width: full ? "100%" : undefined, justifyContent: full ? "center" : undefined, transition: "opacity .12s", ...s }}>{children}</button>;
    }
    const Card = ({ children, style: s = {}, onClick }) => <div onClick={onClick} style={{ background: C.card, border: `1px solid ${C.bd}`, borderRadius: 14, padding: "16px 20px", cursor: onClick ? "pointer" : undefined, ...s }}>{children}</div>;
    const Row = ({ children, gap = 10, wrap, center, between, end, style: s = {} }) => <div style={{ display: "flex", gap, flexWrap: wrap ? "wrap" : undefined, alignItems: center ? "center" : end ? "flex-end" : undefined, justifyContent: between ? "space-between" : undefined, ...s }}>{children}</div>;

    function KPI({ label, value, sub, color, onClick }) {
      return <div onClick={onClick} style={{ background: C.card, border: `1px solid ${C.bd}`, borderRadius: 14, padding: "14px 14px", flex: 1, minWidth: 100, borderTop: `3px solid ${color || C.g500}`, cursor: onClick ? "pointer" : undefined }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.tx3, letterSpacing: .5, textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
        <div style={{ fontSize: 24, fontWeight: 700, color: color || C.g800, fontFamily: F.display, lineHeight: 1.1 }}>{value}</div>
        {sub && <div style={{ fontSize: 12, color: C.tx3, marginTop: 4 }}>{sub}</div>}
      </div>;
    }
    function SHdr({ icon, title, sub, right }) {
      return <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
            {icon && <div style={{ width: 40, height: 40, borderRadius: 12, background: C.g100, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{icon}</div>}
            <h1 style={{ fontFamily: F.display, fontSize: 24, fontWeight: 700, color: C.g900, margin: 0 }}>{title}</h1>
          </div>
          {sub && <p style={{ fontSize: 13, color: C.tx3, margin: "4px 0 0", paddingLeft: 49 }}>{sub}</p>}
        </div>
        {right && <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>{right}</div>}
      </div>;
    }
    function Inp({ label, value, onChange, type = "text", placeholder, required, disabled, onKeyDown, style: s = {} }) {
      return <div style={{ display: "flex", flexDirection: "column", gap: 4, flex: 1, ...s }}>
        {label && <label style={{ fontSize: 13, fontWeight: 600, color: C.tx2, letterSpacing: .1 }}>{label}{required && <span style={{ color: C.red }}> *</span>}</label>}
        <input type={type} value={value || ""} onChange={e => onChange(e.target.value)} onKeyDown={onKeyDown} placeholder={placeholder} disabled={disabled}
          style={{ padding: "12px 13px", border: `1.5px solid ${C.bd}`, borderRadius: 10, fontSize: 15, color: C.tx1, fontFamily: F.body, background: disabled ? C.cardAlt : C.card, boxSizing: "border-box", outline: "none", width: "100%" }} />
      </div>;
    }
    function Sel({ label, value, onChange, options, required }) {
      return <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {label && <label style={{ fontSize: 13, fontWeight: 600, color: C.tx2, letterSpacing: .1 }}>{label}{required && <span style={{ color: C.red }}> *</span>}</label>}
        <select value={value || ""} onChange={e => onChange(e.target.value)} style={{ padding: "12px 13px", border: `1.5px solid ${C.bd}`, borderRadius: 10, fontSize: 15, color: C.tx1, fontFamily: F.body, background: C.card, outline: "none" }}>
          {options.map(o => typeof o === "string" ? <option key={o} value={o}>{o}</option> : <option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
      </div>;
    }
    function Tbl({ cols, rows, empty = "No data yet." }) {
      return <div style={{ overflowX: "auto", border: `1px solid ${C.bd}`, borderRadius: 10 }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead style={{ background: C.cardAlt }}>
            <tr>{cols.map(c => <th key={c.k || c.l} style={{ padding: "8px 11px", textAlign: c.right ? "right" : "left", color: C.tx3, fontWeight: 700, fontSize: 10, letterSpacing: .5, textTransform: "uppercase", borderBottom: `1px solid ${C.bd}`, whiteSpace: "nowrap" }}>{c.l}</th>)}</tr>
          </thead>
          <tbody>
            {rows.length === 0 ? <tr><td colSpan={cols.length} style={{ padding: "40px", textAlign: "center", color: C.tx3 }}>{empty}</td></tr>
              : rows.map((r, i) => <tr key={i} style={{ borderBottom: `1px solid ${C.bdS}`, cursor: r._click ? "pointer" : undefined }}
                onMouseEnter={e => { if (r._click) e.currentTarget.style.background = C.g50; }}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                onClick={r._click}>
                {cols.map(c => <td key={c.k || c.l} style={{ padding: "9px 11px", textAlign: c.right ? "right" : "left" }}>{r[c.k || c.l]}</td>)}
              </tr>)}
          </tbody>
        </table>
      </div>;
    }
    function Modal({ title, children, onClose, wide }) {
      return <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.48)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
        <div style={{ background: C.card, borderRadius: 16, width: "100%", maxWidth: wide ? 860 : 560, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 24px 64px rgba(0,0,0,.22)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 20px", borderBottom: `1px solid ${C.bd}` }}>
            <h2 style={{ fontFamily: F.display, fontSize: 18, color: C.g900, margin: 0 }}>{title}</h2>
            <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: C.tx3, lineHeight: 1 }}>×</button>
          </div>
          <div style={{ padding: 20 }}>{children}</div>
        </div>
      </div>;
    }
    function MBadge({ m }) { const c = m >= 65 ? C.g600 : m >= 45 ? C.gold : C.red; return <Tag text={`${m}%`} color={c} sm />; }
    function SBadge({ s }) {
      const MAP = { "In Stock": C.g600, "Sold": C.gold, "Dead": C.red, "Damaged": C.red, "Returned": C.amber, "Giveaway": C.blue, "Personal": C.tx3, "Holding For Customer": C.purple, "Needs Label": C.amber, "Needs Photo": C.amber };
      return <Tag text={s} color={MAP[s] || C.tx3} dot sm />;
    }
    function BarLine({ data, lk, vk, fmtV, colorFn }) {
      const max = Math.max(...data.map(d => d[vk] || 0), 1);
      return <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {data.map((d, i) => {
          const val = d[vk] || 0, p = Math.round(val / max * 100), color = colorFn ? colorFn(d, i) : C.g500; return (
            <div key={i}><Row between style={{ marginBottom: 3 }}><span style={{ fontSize: 12, fontWeight: 600, color: C.tx1 }}>{d[lk]}</span><span style={{ fontSize: 12, fontWeight: 700, color }}>{fmtV ? fmtV(val) : val}</span></Row>
              <div style={{ height: 8, background: C.g100, borderRadius: 4, overflow: "hidden" }}><div style={{ width: `${p}%`, height: "100%", background: color, borderRadius: 4, transition: "width .4s" }} /></div></div>
          );
        })}
      </div>;
    }

    /* ══════════════════════════════════════════════════════════
       NAV
    ══════════════════════════════════════════════════════════ */
    function Nav({ page, setPage, user, onLogout, plantCount, billAlerts, onChangePassword }) {
      const ownerTabs = [
        { id: "dash", icon: "🏠", l: "Dashboard" }, { id: "upload", icon: "📸", l: "Upload Invoice" },
        { id: "manual", icon: "✏️", l: "Add Plants" }, { id: "history", icon: "📋", l: "Past Invoices" },
        { id: "inv", icon: "🌿", l: "Inventory" }, { id: "labels", icon: "🏷️", l: "Labels" }, { id: "showbuilder", icon: "🎪", l: "Show Builder" },
        { id: "sellthru", icon: "📊", l: "Sell-Through" }, { id: "showimport", icon: "📦", l: "Post-Show" },
        { id: "customers", icon: "👥", l: "Customers" }, { id: "nursery", icon: "🏪", l: "Nurseries" },
        { id: "bills", icon: "📅", l: "Bills" }, { id: "expense", icon: "💳", l: "Expenses" },
        { id: "timecard", icon: "⏱️", l: "Timecard" }, { id: "payroll", icon: "👥", l: "Payroll" },
        { id: "intel", icon: "💡", l: "Buy Intel" }, { id: "reports", icon: "📈", l: "Reports" },
        { id: "tax", icon: "🧾", l: "Tax Center" }, { id: "audit", icon: "🔍", l: "Audit Log" },
        { id: "admin", icon: "⚙️", l: "Admin" },
        { id: "cleanup", icon: "🧹", l: "Data Cleanup" },
      ];
      const mgrTabs = ownerTabs.filter(t => !["payroll", "tax", "audit", "admin", "bills"].includes(t.id));
      const empTabs = [{ id: "emp_dash", icon: "🏠", l: "My Dashboard" }, { id: "upload", icon: "📸", l: "Upload Invoice" }, { id: "manual", icon: "✏️", l: "Add Plants" }, { id: "inv", icon: "🌿", l: "Inventory" }, { id: "labels", icon: "🏷️", l: "Labels" }, { id: "timecard", icon: "⏱️", l: "My Timecard" }];
      const tabs = user.role === "owner" ? ownerTabs : user.role === "manager" ? mgrTabs : empTabs;
      const [menuOpen, setMenuOpen] = useState(false);
      const bottomTabs = user.role === "employee"
        ? [{ id: "emp_dash", icon: "🏠", l: "Home" }, { id: "inv", icon: "🌿", l: "Plants" }, { id: "upload", icon: "📸", l: "Scan" }, { id: "manual", icon: "✏️", l: "Add" }, { id: "timecard", icon: "⏱️", l: "Time" }]
        : [{ id: "dash", icon: "🏠", l: "Home" }, { id: "inv", icon: "🌿", l: "Plants" }, { id: "upload", icon: "📸", l: "Scan" }, { id: "sellthru", icon: "📊", l: "Insights" }, { id: "bills", icon: "📅", l: "Bills" }];
      return <>
        <div style={{ background: C.g800, position: "sticky", top: 0, zIndex: 300, padding: "10px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", boxShadow: "0 2px 12px rgba(0,0,0,.2)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <img src="https://theleafdiary.com/cdn/shop/files/leaf_diary_logo_png.png?v=1768865207&width=200" alt="Leaf Diary" style={{ height: 32, objectFit: "contain", filter: "brightness(0) invert(1)" }} onError={e => e.target.style.display = "none"} />
            <span style={{ fontSize: 15, color: "#fff", fontWeight: 700, fontFamily: `'Playfair Display',Georgia,serif`, letterSpacing: .5 }}>LEAF DIARY</span>
          </div>
          <Row gap={8} center>
            {billAlerts > 0 && <div onClick={() => { setPage("bills"); setMenuOpen(false); }} style={{ background: C.red, borderRadius: 20, padding: "4px 10px", fontSize: 12, color: "#fff", fontWeight: 700, cursor: "pointer" }}>📅 {billAlerts}</div>}
            <div style={{ background: "rgba(255,255,255,.15)", borderRadius: 20, padding: "4px 12px", fontSize: 12, color: "#fff", fontWeight: 600 }}>{user.name}</div>
            <button onClick={() => setMenuOpen(p => !p)} style={{ background: "rgba(255,255,255,.2)", border: "none", borderRadius: 8, padding: "7px 12px", cursor: "pointer", color: "#fff", fontSize: 16, fontWeight: 700, fontFamily: F.body }}>☰</button>
          </Row>

    /* ══════════════════════════════════════════════════════════
       INVOICE UPLOAD
    ══════════════════════════════════════════════════════════ */
    function InvoiceUpload({ plants, setPlants, nurseries, addAudit, user }) {
      const [step, setStep] = useState("upload");
      const [img, setImg] = useState(null);
      const [parsed, setParsed] = useState(null);
      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState(null);
      const [selN, setSelN] = useState(null);
      const fRef = useRef(), cRef = useRef();
      useEffect(() => { if (nurseries.length && !selN) setSelN(nurseries[0]); }, [nurseries]);
      const load = async f => {
        if (!f) return;
        setErr(null);
        if (f.type === "application/pdf") {
          try {
            const r = new FileReader();
            r.onload = async function () {
              try {
                const typedarray = new Uint8Array(this.result);
                const pdfjsLib = window['pdfjs-dist/build/pdf'];
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                // Downscale if still too large
                const MAX_DIM = 1600;
                let w = canvas.width, h = canvas.height;
                if (w > MAX_DIM || h > MAX_DIM) {
                  const scale = Math.min(MAX_DIM / w, MAX_DIM / h);
                  const smallCanvas = document.createElement("canvas");
                  smallCanvas.width = w * scale;
                  smallCanvas.height = h * scale;
                  smallCanvas.getContext("2d").drawImage(canvas, 0, 0, smallCanvas.width, smallCanvas.height);
                  setImg(smallCanvas.toDataURL("image/jpeg", 0.8));
                } else {
                  setImg(canvas.toDataURL("image/jpeg", 0.8));
                }
                setStep("preview");
              } catch (err) {
                setErr("Failed to parse PDF: " + err.message);
              }
            };
            r.readAsArrayBuffer(f);
          } catch (err) {
            setErr("Error reading file.");
          }
        } else {
          const r = new FileReader();
          r.onload = e => {
            const imgObj = new Image();
            imgObj.onload = () => {
              const canvas = document.createElement("canvas");
              const MAX_DIM = 1600;
              let w = imgObj.width, h = imgObj.height;
              if (w > MAX_DIM || h > MAX_DIM) {
                if (w > h) { h *= MAX_DIM / w; w = MAX_DIM; }
                else { w *= MAX_DIM / h; h = MAX_DIM; }
              }
              canvas.width = w; canvas.height = h;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(imgObj, 0, 0, w, h);
              const resizedB64 = canvas.toDataURL("image/jpeg", 0.7);
              setImg(resizedB64);
              setStep("preview");
            };
            imgObj.src = e.target.result;
          };
          r.readAsDataURL(f);
        }
      };
      const scan = async () => {
        if (!selN) { setErr("Select a nursery first."); return; }
        setLoading(true); setErr(null); setStep("scanning");
        try {
          const b64 = img.split(",")[1];
          const { data, error } = await supabase.functions.invoke('process-invoice', {
            body: { imageBase64: b64 }
          });
          if (error) throw error;
          if (data && data._serverError) throw new Error(data._serverError);
          const result = data;
          setParsed(result);
          let ctr = getNextId(plants, selN.code);
          const mapped = (result.plants || []).flatMap((p, li) => Array.from({ length: Math.max(1, +p.quantity || 1) }, (_, qi) => {
            ctr++; const cost = +p.costPerPlant || 0, sp = sprice(cost);
            return { _k: `${li}-${qi}`, plantId: pid(selN.code, ctr), plantCode: pid(selN.code, ctr), barcodeValue: pid(selN.code, ctr), barcodeType: "CODE128", nurseryCode: selN.code, name: toTC(p.name || ""), botanicalName: p.botanicalName || "", potSize: p.potSize || "", cost, suggestedPrice: sp, salePrice: "", shippingCost: "", margin: marg(cost, sp), status: "In Stock", invoiceNumber: result.invoiceNumber || "", invoiceDate: result.invoiceDate || "", dateAdded: today(), platform: "", rack: "", shelf: "", notes: "", labelPrinted: false, addedBy: user.name };
          }));
          setRows(mapped); setStep("review");
        } catch (e) { setErr("Scan failed: " + e.message); setStep("preview"); }
        finally { setLoading(false); }
      };
      const updR = (k, f, v) => setRows(pr => pr.map(r => { if (r._k !== k) return r; const u = { ...r, [f]: v }; if (f === "cost" || f === "suggestedPrice") u.margin = marg(f === "cost" ? +v : +r.cost, f === "suggestedPrice" ? +v : +r.suggestedPrice); return u; }));
      const save = () => { setPlants(p => [...p, ...rows.map(({ _k, ...r }) => ({ ...r, id: uid() }))]); addAudit({ action: `Invoice uploaded — ${rows.length} plants from ${selN?.name}`, user: user.name, page: "Invoice Upload" }); setStep("done"); };
      const reset = () => { setStep("upload"); setImg(null); setParsed(null); setRows([]); setErr(null); };

            <div style={{ fontSize: 48, marginBottom: 10 }}>📄</div>
            <h2 style={{ fontFamily: F.display, fontSize: 18, color: C.g900, marginBottom: 6 }}>Drop invoice here or browse</h2>
            <p style={{ color: C.tx3, fontSize: 13, marginBottom: 18 }}>Phone photos, JPG, PNG — works great in the field</p>
            <Row gap={10} style={{ justifyContent: "center" }}>

        </div>}
        {step === "preview" && img && <div style={{ display: "flex", gap: 20, maxWidth: 860 }}>
          <div style={{ flex: 1 }}><img src={img} alt="Invoice" style={{ width: "100%", maxHeight: 480, objectFit: "contain", borderRadius: 10, border: `1px solid ${C.bd}` }} /></div>
          <div style={{ width: 240 }}>
            <Card style={{ marginBottom: 10 }}><div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, marginBottom: 5 }}>Ready to scan</div><p style={{ fontSize: 12, color: C.tx3 }}>Nursery: <b>{selN?.name}</b></p></Card>
            {err && <div style={{ background: C.redBg, borderRadius: 7, padding: 10, color: C.red, fontSize: 12, marginBottom: 10 }}>{err}</div>}
            <Btn full onClick={scan} style={{ marginBottom: 8 }}>🔍 Scan with AI</Btn>
            <Btn full v="ghost" onClick={reset}>Use Different File</Btn>
          </div>
        </div>}
        {step === "scanning" && <div style={{ textAlign: "center", padding: "80px", maxWidth: 380, margin: "0 auto" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🔍</div>
          <h2 style={{ fontFamily: F.display, color: C.g900, marginBottom: 8 }}>Reading invoice…</h2>
          <p style={{ color: C.tx3 }}>Extracting every plant and detail</p>
          <style>{`@keyframes ld{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1.2);opacity:1}}`}</style>
          <Row gap={6} style={{ justifyContent: "center", marginTop: 20 }}>{[0, 1, 2].map(i => <div key={i} style={{ width: 9, height: 9, borderRadius: "50%", background: C.g400, animation: `ld 1.2s ease-in-out ${i * .2}s infinite` }} />)}</Row>
        </div>}
        {step === "review" && parsed && <div>
          <Card style={{ marginBottom: 14, background: C.g50, border: `1px solid ${C.g200}` }}>
            <Row between wrap gap={10}>
              <div><div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15 }}>{parsed.nurseryName || selN?.name}</div><div style={{ fontSize: 12, color: C.tx3 }}>Invoice #{parsed.invoiceNumber || "—"} · {parsed.invoiceDate || "—"}</div></div>
              <Row gap={12} center>{[["Subtotal", $(parsed.subtotal)], ["Tax", $(parsed.tax)], ["Ship", $(parsed.shipping)], ["Total", $(parsed.total)]].map(([l, v]) => <div key={l} style={{ textAlign: "center" }}><div style={{ fontSize: 9, color: C.tx3, fontWeight: 700, textTransform: "uppercase" }}>{l}</div><div style={{ fontWeight: 700, color: C.g800, fontSize: 13 }}>{v}</div></div>)}<Tag text={`${rows.length} plants`} color={C.g700} /></Row>

              <tbody>{rows.map(r => <tr key={r._k} style={{ borderBottom: `1px solid ${C.bdS}` }}>

                <td style={{ padding: "5px 9px" }}><MBadge m={r.margin} /></td>
                <td style={{ padding: "3px 9px" }}><select value={r.status} onChange={e => updR(r._k, "status", e.target.value)} style={{ padding: "3px 4px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 11 }}>{STATUSES.map(s => <option key={s}>{s}</option>)}</select></td>
                <td style={{ padding: "3px 9px" }}><input value={r.rack} onChange={e => updR(r._k, "rack", e.target.value)} placeholder="R1" style={{ width: 40, padding: "3px 5px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 11 }} /></td>
                <td style={{ padding: "3px 9px" }}><input value={r.shelf} onChange={e => updR(r._k, "shelf", e.target.value)} placeholder="S2" style={{ width: 40, padding: "3px 5px", border: `1px solid ${C.bd}`, borderRadius: 5, fontSize: 11 }} /></td>
                <td style={{ padding: "5px 9px" }}><button onClick={() => setRows(p => p.filter(x => x._k !== r._k))} style={{ background: "none", border: "none", cursor: "pointer", color: C.red, fontSize: 15 }}>✕</button></td>
              </tr>)}</tbody>
            </table>
          </div>
          <Row gap={8} style={{ marginTop: 14, justifyContent: "flex-end" }}><Btn v="ghost" onClick={reset}>Start Over</Btn><Btn onClick={save}>✅ Save {rows.length} Plants</Btn></Row>
        </div>}
        {step === "done" && <div style={{ textAlign: "center", padding: "80px", maxWidth: 420, margin: "0 auto" }}>
          <div style={{ fontSize: 56, marginBottom: 16 }}>🌱</div>
          <h2 style={{ fontFamily: F.display, color: C.g900, marginBottom: 8 }}>Plants Added!</h2>
          <p style={{ color: C.tx3, marginBottom: 22 }}>{rows.length} plants saved with unique IDs.</p>
          <Btn onClick={reset}>Upload Another Invoice</Btn>
        </div>}
      </div>;
    }

    /* ══════════════════════════════════════════════════════════
       MANUAL PLANT ENTRY
    ══════════════════════════════════════════════════════════ */
    function ManualEntry({ plants, setPlants, nurseries, addAudit, user }) {
      const blank = { name: "", botanicalName: "", potSize: "", cost: "", suggestedPrice: "", salePrice: "", shippingCost: "", status: "In Stock", nurseryCode: nurseries[0]?.code || "", platform: "", rack: "", shelf: "", dateAdded: today(), invoiceNumber: "", notes: "" };
      const [form, setForm] = useState(blank);
      const [qty, setQty] = useState(1);
      const [saved, setSaved] = useState([]);
      const upd = f => v => { setForm(p => { const u = { ...p, [f]: v }; if (f === "cost") { const sp = sprice(+v); u.suggestedPrice = sp; u.margin = marg(+v, sp); } if (f === "suggestedPrice") u.margin = marg(+p.cost, +v); return u; }); };
      const save = () => {
        if (!form.name.trim() || !form.nurseryCode) return;
        let ctr = getNextId(plants, form.nurseryCode);
        const newPlants = Array.from({ length: Math.max(1, +qty || 1) }, (_, i) => {
          ctr++;
          const idx = ctr, cost = +form.cost || 0, sp = +form.suggestedPrice || sprice(cost);
          return { id: uid(), plantId: pid(form.nurseryCode, idx), plantCode: pid(form.nurseryCode, idx), barcodeValue: pid(form.nurseryCode, idx), barcodeType: "CODE128", ...form, name: toTC(form.name), cost, suggestedPrice: sp, margin: marg(cost, sp), labelPrinted: false, addedBy: user.name };
        });
        setPlants(p => [...p, ...newPlants]);
        addAudit({ action: `Manually added ${newPlants.length}× ${form.name}`, user: user.name, page: "Manual Entry" });
        setSaved(p => [...p, ...newPlants]);
        setForm({ ...blank, nurseryCode: form.nurseryCode }); setQty(1);
      };
      const fee = platFee(form.platform || "", +form.suggestedPrice || 0);
      const mc = form.margin >= 65 ? C.g600 : form.margin >= 45 ? C.gold : C.red;
      const nursery = nurseries.find(n => n.code === form.nurseryCode);
      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <SHdr icon="✏️" title="Add Plants Manually" sub="Add existing inventory — enter your cost, where you bought it, and the date" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 20, maxWidth: 980 }}>
          <Card>
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 14 }}>Plant Details</div>
            {/* WHERE YOU BOUGHT IT */}
            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 11, fontWeight: 600, color: C.tx3, display: "block", marginBottom: 7 }}>Where You Bought It *</label>
              <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>{nurseries.map(n => <button key={n.id} onClick={() => upd("nurseryCode")(n.code)} style={{ padding: "7px 13px", borderRadius: 8, cursor: "pointer", fontFamily: F.body, fontSize: 12, fontWeight: 600, background: form.nurseryCode === n.code ? C.g700 : C.cardAlt, color: form.nurseryCode === n.code ? "#fff" : C.tx1, border: `1.5px solid ${form.nurseryCode === n.code ? C.g700 : C.bd}` }}>{n.code} · {n.name}</button>)}
                {!nurseries.length && <span style={{ fontSize: 12, color: C.red }}>Add a nursery first</span>}
              </div>
              {nursery && <div style={{ marginTop: 8, background: C.g50, borderRadius: 7, padding: "6px 11px", fontSize: 12, color: C.tx2 }}>📍 {nursery.address || "No address saved"} {nursery.contact && `· 👤 ${nursery.contact}`}</div>}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
              <Inp label="Plant Name *" value={form.name} onChange={upd("name")} placeholder="e.g. Philodendron Pink Princess" required />
              <Inp label="Botanical Name" value={form.botanicalName} onChange={upd("botanicalName")} placeholder="optional" />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
              <Sel label="Pot Size" value={form.potSize} onChange={upd("potSize")} options={["", ...POT_SIZES]} />
              <Inp label="Qty to Add" type="number" value={qty} onChange={setQty} placeholder="1" />
              <Inp label="Date Purchased" type="date" value={form.dateAdded} onChange={upd("dateAdded")} />
              <Inp label="Invoice / Ref #" value={form.invoiceNumber} onChange={upd("invoiceNumber")} placeholder="optional" />
            </div>
            {/* PRICING SECTION */}
            <div style={{ background: C.g50, border: `1px solid ${C.g200}`, borderRadius: 10, padding: "14px 16px", marginBottom: 12 }}>
              <div style={{ fontWeight: 700, color: C.g900, fontSize: 13, marginBottom: 10 }}>💰 Your Cost & Pricing</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                  <label style={{ fontSize: 11, fontWeight: 600, color: C.tx3 }}>Your Cost Per Plant *</label>
                  <input type="number" value={form.cost} onChange={e => upd("cost")(e.target.value)} placeholder="e.g. 12.50"
                    style={{ padding: "9px 11px", border: `1.5px solid ${C.bd}`, borderRadius: 8, fontSize: 13, fontFamily: F.body, background: C.card, boxSizing: "border-box" }} />
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                  <label style={{ fontSize: 11, fontWeight: 600, color: C.tx3 }}>Sell Price <span style={{ fontWeight: 400, color: C.tx4 }}>(auto at 62% margin)</span></label>
                  <input type="number" value={form.suggestedPrice} onChange={e => upd("suggestedPrice")(e.target.value)}
                    style={{ padding: "9px 11px", border: `1.5px solid ${C.bd}`, borderRadius: 8, fontSize: 13, color: C.g600, fontWeight: 700, fontFamily: F.body, background: C.card, boxSizing: "border-box" }} />
                  {+form.cost > 0 && <span style={{ fontSize: 10, color: C.tx3 }}>Min (2× cost): {$(+form.cost * 2)}</span>}
                </div>
                <Inp label="Actual Sale Price (if sold)" type="number" value={form.salePrice} onChange={upd("salePrice")} placeholder="0.00" />

                {fee > 0 && form.platform && <span style={{ fontSize: 11, color: C.tx3 }}>{form.platform} fee: {$(fee)}</span>}
                {+form.suggestedPrice > 0 && +form.cost > 0 && +form.suggestedPrice < +form.cost * 2 && <Tag text="⚠️ Below 2× cost" color={C.red} sm />}
              </div>}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
              <Sel label="Status" value={form.status} onChange={upd("status")} options={STATUSES} />
              <Sel label="Platform (if sold)" value={form.platform} onChange={upd("platform")} options={["", ...PLATFORMS]} />
              <Inp label="Rack" value={form.rack} onChange={upd("rack")} placeholder="R1" />
              <Inp label="Shelf" value={form.shelf} onChange={upd("shelf")} placeholder="S2" />
            </div>
            <div style={{ marginBottom: 14 }}>
              <label style={{ fontSize: 11, fontWeight: 600, color: C.tx3, display: "block", marginBottom: 4 }}>Notes / Care Info</label>
              <textarea value={form.notes} onChange={e => upd("notes")(e.target.value)} style={{ width: "100%", padding: "9px 11px", border: `1.5px solid ${C.bd}`, borderRadius: 8, fontSize: 12, fontFamily: F.body, minHeight: 60, boxSizing: "border-box", resize: "vertical" }} placeholder="Care notes, source details…" />
            </div>
            <Row gap={8}><Btn onClick={save} disabled={!form.name.trim() || !form.nurseryCode}>✅ Add {+qty > 1 ? `${qty} Plants` : "Plant"}</Btn><Btn v="ghost" onClick={() => { setForm({ ...blank, nurseryCode: form.nurseryCode }); setQty(1); }}>Clear</Btn></Row>
          </Card>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {form.name && <Card style={{ background: C.g50, border: `1px solid ${C.g200}` }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.tx3, letterSpacing: .5, textTransform: "uppercase", marginBottom: 8 }}>Label Preview</div>
              <div style={{ background: C.card, border: `1.5px solid ${C.g700}`, borderRadius: 9, padding: "13px 15px" }}>
                <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, lineHeight: 1.3, marginBottom: 2 }}>{toTC(form.name) || "Plant Name"}</div>
                <div style={{ fontSize: 10, color: C.tx3, marginBottom: 6 }}>{form.potSize || "Pot size"}</div>
                <div style={{ fontFamily: F.mono, fontSize: 10, color: C.g500, borderTop: `1px solid ${C.g100}`, paddingTop: 6, marginBottom: 7 }}>🌿 {form.nurseryCode || "?????"}-####</div>
                <Row between><span style={{ fontSize: 10, color: C.tx3 }}>Cost {form.cost ? $(form.cost) : "$—"}</span><span style={{ fontWeight: 700, color: C.g900, fontSize: 15 }}>{form.suggestedPrice ? $(form.suggestedPrice) : "$—"}</span></Row>
                <div style={{ fontSize: 8, color: C.g300, textAlign: "center", marginTop: 6, letterSpacing: 2, textTransform: "uppercase" }}>Leaf Diary</div>
              </div>
            </Card>}
            {saved.length > 0 && <Card>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, marginBottom: 10, fontSize: 14 }}>Just Added ({saved.length})</div>
              {saved.slice(-5).reverse().map(p => <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: `1px solid ${C.bdS}` }}>
                <div><div style={{ fontWeight: 600, fontSize: 12 }}>{p.name}</div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.g500 }}>{p.plantId}</div><div style={{ fontSize: 10, color: C.tx3 }}>From {p.nurseryCode} · {p.dateAdded}</div></div>
                <div style={{ textAlign: "right" }}><div style={{ fontWeight: 700, color: C.g700, fontSize: 12 }}>{$(p.suggestedPrice)}</div><div style={{ fontSize: 10, color: C.tx3 }}>cost {$(p.cost)}</div></div>
              </div>)}
            </Card>}
          </div>
        </div>
      </div>;
    }

    /* ══════════════════════════════════════════════════════════
       PAST INVOICES
    ══════════════════════════════════════════════════════════ */
    function PastInvoices({ plants, setPlants, nurseries, addAudit, user }) {
      const [show, setShow] = useState(false);
      const [selN, setSelN] = useState(null);
      const [inv, setInv] = useState({ number: "", date: "", payMethod: "Cash", total: "", notes: "" });
      const [rows, setRows] = useState([{ id: uid(), name: "", pot: "", qty: 1, cost: "", salePrice: "", status: "Sold", platform: "Palmstreet" }]);
      const [saved, setSaved] = useState([]);
      useEffect(() => { if (nurseries.length && !selN) setSelN(nurseries[0]); }, [nurseries]);
      const addRow = () => setRows(p => [...p, { id: uid(), name: "", pot: "", qty: 1, cost: "", salePrice: "", status: "Sold", platform: "Palmstreet" }]);
      const updR = (id, f, v) => setRows(p => p.map(r => r.id === id ? { ...r, [f]: v } : r));
      const save = () => {
        if (!selN || !rows.some(r => r.name.trim())) return;
        let ctr = getNextId(plants, selN.code);
        const newP = rows.filter(r => r.name.trim()).flatMap(r => Array.from({ length: Math.max(1, +r.qty || 1) }, () => { ctr++; const cost = +r.cost || 0, sp = +r.salePrice || sprice(cost); return { id: uid(), plantId: pid(selN.code, ctr), plantCode: pid(selN.code, ctr), barcodeValue: pid(selN.code, ctr), barcodeType: "CODE128", nurseryCode: selN.code, name: toTC(r.name), botanicalName: "", potSize: r.pot, cost, suggestedPrice: sp, salePrice: r.salePrice || "", shippingCost: "", margin: marg(cost, sp), status: r.status, invoiceNumber: inv.number, invoiceDate: inv.date, dateAdded: inv.date || today(), platform: r.platform, rack: "", shelf: "", notes: "", labelPrinted: false, historical: true, addedBy: user.name }; }));
        setPlants(p => [...p, ...newP]); addAudit({ action: `Logged ${newP.length} historical plants from ${selN.name}`, user: user.name, page: "Past Invoices" });
        setSaved(p => [...p, { ...inv, nursery: selN.name, count: newP.length, id: uid() }]);
        setShow(false); setInv({ number: "", date: "", payMethod: "Cash", total: "", notes: "" }); setRows([{ id: uid(), name: "", pot: "", qty: 1, cost: "", salePrice: "", status: "Sold", platform: "Palmstreet" }]);
      };
      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <SHdr icon="📋" title="Past Invoice Log" sub="Record historical purchases for profit history"
          right={<Btn onClick={() => setShow(p => !p)}>{show ? "Cancel" : "+ Log Past Invoice"}</Btn>} />
        {show && nurseries.length > 0 && <Card style={{ marginBottom: 20 }}>

                  <span style={{ fontSize: 11, color: C.tx3 }}>{"True profit: "}<b style={{ color: tp > 0 ? C.g600 : C.red }}>{"$" + tp.toFixed(2)}</b></span>

                <Sel label="Platform" value={edit.platform || ""} onChange={updE("platform")} options={["", ...PLATFORMS]} />

              <textarea value={edit.notes || ""} onChange={e => updE("notes")(e.target.value)}
                style={{ width: "100%", padding: "10px 12px", border: `1.5px solid ${C.bd}`, borderRadius: 9, fontSize: 13, fontFamily: F.body, minHeight: 90, boxSizing: "border-box", resize: "vertical" }}

    function Inventory({ plants, setPlants, user, addAudit, nurseries, setPage }) {
      const [search, setSearch] = useState("");
      const [fs, setFs] = useState("All");
      const [fn, setFn] = useState("All");
      const [fg, setFg] = useState("All");
      const [fAge, setFAge] = useState("All");
      const [detail, setDetail] = useState(null);
      const [sortF, setSortF] = useState("dateAdded");
      const [sortD, setSortD] = useState("desc");
      const [showDupes, setShowDupes] = useState(false);
      const isOwner = CAN.seeCost(user.role);
      const filterNurseries = [...new Set(plants.map(p => p.nurseryCode))];
      const genera = [...new Set(plants.map(p => gOf(p.name)))].sort();
      // Detect duplicate plantIds
      const dupeGroups = Object.values(plants.reduce((acc, p) => {
        const key = (p.plantId || '').toUpperCase(); if (!key) return acc;
        if (!acc[key]) acc[key] = []; acc[key].push(p); return acc;
      }, {})).filter(g => g.length > 1);
      const resolveDelete = (internalId, plantIdStr) => {
        setPlants(prev => prev.filter(x => x.id !== internalId));
        addAudit && addAudit({ action: `Deleted duplicate plant entry ${plantIdStr}`, user: user.name, page: 'Inventory' });
      };
      const resolveNewId = (plant) => {
        const nextSeq = getNextId(plants, plant.nurseryCode) + 1;
        const newPlantId = pid(plant.nurseryCode || 'XX', nextSeq);
        setPlants(prev => prev.map(x => x.id === plant.id ? { ...x, plantId: newPlantId, plantCode: newPlantId, barcodeValue: newPlantId } : x));
        addAudit && addAudit({ action: `Reassigned duplicate: ${plant.plantId} → ${newPlantId}`, user: user.name, page: 'Inventory' });
      };
      const resolveDeleteAll = () => {
        const totalDupes = dupeGroups.reduce((s, g) => s + g.length - 1, 0);
        if (!window.confirm(`Delete ${totalDupes} duplicate entr${totalDupes === 1 ? 'y' : 'ies'}? The first entry of each ID will be kept. This cannot be undone.`)) return;
        const idsToDelete = new Set(dupeGroups.flatMap(g => g.slice(1).map(p => p.id)));
        setPlants(prev => prev.filter(x => !idsToDelete.has(x.id)));
        addAudit && addAudit({ action: `Bulk deleted ${idsToDelete.size} duplicate plant entr${idsToDelete.size === 1 ? 'y' : 'ies'}`, user: user.name, page: 'Inventory' });
        setShowDupes(false);
      };
      const list = plants.filter(p => {
        const q = search.toLowerCase(), days = dHeld(p.dateAdded);
        const ageOk = fAge === "All" || (fAge === "30+" && days >= 30) || (fAge === "60+" && days >= 60) || (fAge === "fresh" && days < 30);
        return (!q || p.name.toLowerCase().includes(q) || (p.plantId || "").toLowerCase().includes(q)) && (fs === "All" || p.status === fs) && (fn === "All" || p.nurseryCode === fn) && (fg === "All" || gOf(p.name) === fg) && ageOk;
      }).sort((a, b) => { let av = a[sortF] || 0, bv = b[sortF] || 0; if (typeof av === "string") { av = av.toLowerCase(); bv = bv.toLowerCase(); } return sortD === "asc" ? av > bv ? 1 : -1 : av < bv ? 1 : -1; });
      const upd = (id, f, v) => { setPlants(p => p.map(x => x.id === id ? { ...x, [f]: v } : x)); addAudit({ action: `Updated ${f}`, user: user.name, page: "Inventory" }); };
      const tog = f => { if (sortF === f) setSortD(d => d === "asc" ? "desc" : "asc"); else { setSortF(f); setSortD("asc"); } };
      const TH = ({ f, l }) => <th onClick={() => tog(f)} style={{ padding: "8px 10px", textAlign: "left", color: C.tx3, fontWeight: 700, fontSize: 10, letterSpacing: .4, textTransform: "uppercase", borderBottom: `1px solid ${C.bd}`, cursor: "pointer", whiteSpace: "nowrap" }}>{l}{sortF === f ? (sortD === "asc" ? " ↑" : " ↓") : ""}</th>;
      if (detail) {
        return <PlantEditDetail
          plantId={detail}
          plants={plants}
          setPlants={setPlants}
          user={user}
          addAudit={addAudit}
          onBack={() => setDetail(null)}
        />;
      }
      const exportMasterInventory = () => {
        const headers = ['Plant Code', 'Barcode Value', 'Barcode Type', 'Nursery Code', 'Nursery Name', 'Plant Name', 'Pot Size', 'Cost', 'Suggested Price', 'Status', 'Rack', 'Shelf', 'Date Added'];
        const rows = list.map(p => {
          const nur = (nurseries || []).find(n => n.code === p.nurseryCode)?.name || p.nurseryCode;
          return [p.plantCode || safePlantId(p), p.barcodeValue || safePlantId(p), p.barcodeType || 'CODE128', p.nurseryCode || '', nur || '', toTC(p.name), p.potSize || '', p.cost || '', p.suggestedPrice || '', p.status || '', p.rack || '', p.shelf || '', p.dateAdded || ''].map(csvCell).join(',');
        });
        downloadCSVFile(`master-inventory-${today()}.csv`, headers.map(csvCell).join(',') + '\n' + rows.join('\n'));
        addAudit && addAudit({ action: `Exported Master Inventory CSV — ${list.length} plants`, user: user.name, page: 'Inventory' });
      };
      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <SHdr icon="🌿" title="Plant Inventory" sub={`${list.length} of ${plants.length} plants`} right={<Row gap={8}><Btn v="soft" sz="sm" onClick={() => setPage("manual")}>+ Add Plant</Btn><Btn v="outline" onClick={exportMasterInventory}>📥 Export CSV</Btn></Row>} />
        {dupeGroups.length > 0 && <div style={{ background: '#FEF3C7', border: '1.5px solid #F59E0B', borderRadius: 10, padding: '12px 16px', marginBottom: 14 }}>
          <Row between center>
            <Row gap={8} center>
              <span style={{ fontSize: 18 }}>⚠️</span>
              <div>
                <div style={{ fontFamily: F.display, fontWeight: 700, color: '#92400E', fontSize: 13 }}>{dupeGroups.length} duplicate plant ID{dupeGroups.length > 1 ? 's' : ''} detected</div>
                <div style={{ fontSize: 11, color: '#B45309' }}>Review each one — is it the same plant entered twice, or two different plants?</div>
              </div>
            </Row>
            <Row gap={6}>
              <Btn sz="sm" v="danger" onClick={resolveDeleteAll}>🗑 Delete All Duplicates</Btn>
              <Btn sz="sm" onClick={() => setShowDupes(p => !p)} style={{ background: '#F59E0B', color: '#fff', border: 'none' }}>{showDupes ? 'Hide' : 'Review →'}</Btn>
            </Row>
          </Row>
          {showDupes && dupeGroups.map(group => (

                    <div style={{ fontSize: 10, fontWeight: 700, color: i === 0 ? C.g600 : C.amber, marginBottom: 6, textTransform: 'uppercase', letterSpacing: .5 }}>{i === 0 ? '✓ First Entry — kept' : `⚠️ Entry ${i + 1} — resolve below`}</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.g900, fontFamily: F.display, marginBottom: 4 }}>{toTC(p.name)}</div>
                    <div style={{ fontSize: 11, color: C.tx3, marginBottom: 2 }}>📅 Added: {p.dateAdded || 'Unknown date'}</div>
                    <div style={{ fontSize: 11, color: C.tx3, marginBottom: 2 }}>📦 {p.potSize || '—'} pot · {p.nurseryCode || '—'}</div>
                    {isOwner && <div style={{ fontSize: 11, color: C.tx3, marginBottom: 2 }}>💰 Cost: {$(+p.cost || 0)} · Price: {$(+p.suggestedPrice || 0)}</div>}
                    <div style={{ fontSize: 11, color: C.tx3, marginBottom: 10 }}>🔖 Status: {p.status || 'Unknown'}</div>
                    {i === 0
                      ? <div style={{ fontSize: 11, color: C.tx3, fontStyle: 'italic' }}>This entry stays unchanged.</div>
                      : <Row gap={6} wrap>
                          <Btn sz="sm" v="danger" onClick={() => resolveDelete(p.id, p.plantId)}>🗑 Delete — same plant</Btn>
                          <Btn sz="sm" v="soft" onClick={() => resolveNewId(p)}>🔢 New ID — different plant</Btn>
                        </Row>

            </div>
          ))}
        </div>}
        <Row gap={8} wrap style={{ marginBottom: 14 }}>
          <div style={{ flex: 1, minWidth: 200 }}><input placeholder="Search name, ID…" value={search} onChange={e => setSearch(e.target.value)} style={{ width: "100%", padding: "9px 12px", border: `1.5px solid ${C.bd}`, borderRadius: 9, fontSize: 13, fontFamily: F.body, boxSizing: "border-box", outline: "none" }} /></div>
          {[["Status", fs, setFs, ["All", ...STATUSES]], ["Nursery", fn, setFn, ["All", ...filterNurseries]], ["Genus", fg, setFg, ["All", ...genera]], ["Age", fAge, setFAge, ["All", "fresh", "30+", "60+"]]].map(([l, v, set, opts]) => (
            <select key={l} value={v} onChange={e => set(e.target.value)} style={{ padding: "9px 11px", border: `1.5px solid ${C.bd}`, borderRadius: 9, fontSize: 13, fontFamily: F.body, background: C.card, outline: "none" }}><option value="All">All {l}s</option>{opts.filter(o => o !== "All").map(o => <option key={o}>{o}</option>)}</select>

        {list.length === 0 ? <Card style={{ textAlign: "center", padding: "50px" }}><div style={{ fontSize: 36, marginBottom: 10 }}>🌿</div><h2 style={{ fontFamily: F.display, color: C.g900, fontSize: 18 }}>No plants match</h2></Card> : (
          <div style={{ overflowX: "auto", border: `1px solid ${C.bd}`, borderRadius: 10 }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead style={{ background: C.cardAlt }}><tr>
                <TH f="name" l="Plant & ID" /><TH f="potSize" l="Pot" />
                {isOwner && <><TH f="cost" l="Cost" /><TH f="suggestedPrice" l="Price" /><TH f="margin" l="Margin" /></>}
                <TH f="status" l="Status" /><TH f="rack" l="Rack" /><TH f="nurseryCode" l="Nursery" /><TH f="dateAdded" l="Added" />
                <th style={{ padding: "8px 10px", borderBottom: `1px solid ${C.bd}`, color: C.tx3, fontWeight: 700, fontSize: 10, textTransform: "uppercase" }}>Age</th>
                <th style={{ padding: "8px 10px", borderBottom: `1px solid ${C.bd}` }}></th>
              </tr></thead>
              <tbody>{list.map(p => {
                const days = dHeld(p.dateAdded);
                const alert60 = days >= 60 && p.status === "In Stock", warn30 = days >= 30 && days < 60 && p.status === "In Stock";
                return <tr key={p.id} style={{ borderBottom: `1px solid ${C.bdS}`, cursor: "pointer", background: alert60 ? C.redBg + "60" : warn30 ? C.amberBg + "60" : "transparent" }}
                  onClick={() => setDetail(p.id)} onMouseEnter={e => e.currentTarget.style.background = C.g50} onMouseLeave={e => e.currentTarget.style.background = alert60 ? C.redBg + "60" : warn30 ? C.amberBg + "60" : "transparent"}>
                  <td style={{ padding: "8px 10px", fontWeight: 600, maxWidth: 220 }}><div style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{toTC(p.name)} <span style={{ fontFamily: F.mono, fontSize: 10, color: C.g500, fontWeight: 400, marginLeft: 6 }}>{p.plantId}</span></div></td>
                  <td style={{ padding: "8px 10px", color: C.tx3 }}>{p.potSize || "—"}</td>
                  {isOwner && <><td style={{ padding: "8px 10px" }}>{$(p.cost)}</td><td style={{ padding: "8px 10px", fontWeight: 600, color: C.g600 }}>{$(p.suggestedPrice)}</td><td style={{ padding: "8px 10px" }}><MBadge m={p.margin} /></td></>}
                  <td style={{ padding: "8px 10px" }}><SBadge s={p.status} /></td>
                  <td style={{ padding: "8px 10px", fontFamily: F.mono, fontSize: 11, color: C.tx3 }}>{p.rack || "—"}</td>
                  <td style={{ padding: "8px 10px", fontFamily: F.mono, fontSize: 10, color: C.tx3 }}>{p.nurseryCode}</td>
                  <td style={{ padding: "8px 10px", color: C.tx3, fontSize: 11 }}>{p.dateAdded}</td>
                  <td style={{ padding: "8px 10px" }}><span style={{ fontSize: 11, fontWeight: alert60 || warn30 ? 700 : 400, color: alert60 ? C.red : warn30 ? C.amber : C.tx3 }}>{fDays(days)}</span></td>
                  <td style={{ padding: "8px 10px" }}><Btn sz="sm" v="ghost" onClick={e => { e.stopPropagation(); setDetail(p.id); }}>View</Btn></td>
