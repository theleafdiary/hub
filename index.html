    /* ══════════════════════════════════════════════════════════
       POST-SHOW IMPORT — paste Palmstreet/Whatnot CSV
    ══════════════════════════════════════════════════════════ */
    function ShowImport({ plants, setPlants, addAudit, user }) {
      const [raw, setRaw] = useState("");
      const [parsed, setParsed] = useState([]);
      const [matched, setMatched] = useState([]);
      const [skipped, setSkipped] = useState([]);
      const [step, setStep] = useState("paste");
      const [platform, setPlatform] = useState("Palmstreet");
      const [importMode, setImportMode] = useState("historical");
      const [fileName, setFileName] = useState("");
      const [importMsg, setImportMsg] = useState("");
      const [duplicateInfo, setDuplicateInfo] = useState(null);
      const [lastImportResult, setLastImportResult] = useState(null);
      const fileRef = useRef();

      const money = v => {
        if (v === null || v === undefined || v === "") return 0;
        if (typeof v === "number") return v;
        const cleaned = String(v).replace(/[$,]/g, "").trim();
        const n = parseFloat(cleaned);
        return Number.isFinite(n) ? n : 0;
      };
      const cleanText = v => String(v ?? "").replace(/\s+/g, " ").trim();
      const normKey = k => String(k || "").toLowerCase().replace(/[^a-z0-9]/g, "");
      const rowVal = (row, names) => {
        const map = {};
        Object.keys(row || {}).forEach(k => map[normKey(k)] = row[k]);
        for (const n of names) {
          const v = map[normKey(n)];
          if (v !== undefined && v !== null && String(v).trim() !== "") return v;
        }
        return "";
      };
      const parseDateValue = v => {
        if (!v) return "";
        if (v instanceof Date && !isNaN(v)) return v.toISOString().slice(0, 10);
        const s = String(v).trim();
        if (/^\d{4}[-/]\d{1,2}[-/]\d{1,2}/.test(s)) return s.replace(/\//g, "-").slice(0, 10);
        const d = new Date(s);
        return isNaN(d) ? s : d.toISOString().slice(0, 10);
      };
      const isNonPlantVariant = text => {
        const t = String(text || "").toLowerCase();
        return !t ||
          t.includes("processing fee") ||
          t.includes("payment fee") ||
          t.includes("stripe") ||
          t.includes("bnpl") ||
          t.includes("1day") ||
          t.includes("2day") ||
          t.includes("heat pack") ||
          t.includes("insulation") ||
          t.includes("shipping") ||
          t.includes("ship") ||
          t.includes("label") ||
          t.includes("bundle protection");
      };
      const extractPlantCode = text => {
        if (!text) return null;
        const cleaned = String(text).toUpperCase().replace(/[_#]/g, " ");
        const match = cleaned.match(/\b([A-Z]{1,4})\s*-?\s*(\d{1,4})\b/);
        if (!match) return null;
        return `${match[1]}-${String(parseInt(match[2], 10)).padStart(3, "0")}`;
      };
      const compactKey = v => String(v ?? "").toLowerCase().replace(/\s+/g, " ").trim();
      const saleImportKey = sale => [
        platform,
        sale.orderNo || sale.orderNum || "NO_ORDER",
        sale.productVariant || sale.title || "NO_PRODUCT",
        sale.price || sale.productAmount || sale.orderAmount || sale.sellerIncome || 0,
        sale.saleDate || sale.orderDate || "NO_DATE"
      ].map(compactKey).join("|");
      const saleLegacyKey = sale => [
        sale.orderNo || sale.orderNum || "NO_ORDER",
        sale.productVariant || sale.title || "NO_PRODUCT",
        sale.price || sale.productAmount || sale.orderAmount || sale.sellerIncome || 0
      ].map(compactKey).join("|");
      const existingImportedSaleKeys = (inventory = plants) => {
        const keys = new Set();
        (inventory || []).forEach(p => {
          if (!p) return;
          if (p.saleImportKey) keys.add(compactKey(p.saleImportKey));
          if (p.saleLegacyKey) keys.add(compactKey(p.saleLegacyKey));
          if (p.orderNumber || p.rawProductVariant || p.salePrice) {
            keys.add([p.platform || platform, p.orderNumber || "NO_ORDER", p.rawProductVariant || p.name || "NO_PRODUCT", p.salePrice || 0, p.soldDate || "NO_DATE"].map(compactKey).join("|"));
            keys.add([p.orderNumber || "NO_ORDER", p.rawProductVariant || p.name || "NO_PRODUCT", p.salePrice || 0].map(compactKey).join("|"));
          }
        });
        return keys;
      };
      const isDuplicateSale = sale => {
        const keys = existingImportedSaleKeys(plants);
        return keys.has(saleImportKey(sale)) || keys.has(saleLegacyKey(sale));
      };
      const safeLower = v => String(v || "").toLowerCase();
      const findInventoryMatch = sale => {
        const code = sale.extractedPlantCode;
        if (code) {
          const byCode = plants.find(p =>
            safeLower(p.plantId) === safeLower(code) ||
            safeLower(p.plantCode) === safeLower(code) ||
            safeLower(p.barcodeValue) === safeLower(code)
          );
          if (byCode) return byCode;
        }
        const title = safeLower(sale.productVariant);
        if (!title || importMode === "historical") return null;
        return plants.find(p => p.status === "In Stock" && (
          title.includes(safeLower(p.plantId)) ||
          title.includes(safeLower(p.plantCode)) ||
          title.includes(safeLower(p.barcodeValue)) ||
          (p.name && (safeLower(p.name).includes(title.slice(0, 8)) || title.includes(safeLower(p.name).slice(0, 8))))
        )) || null;
      };
      const parseCSVRows = text => {
        const rows = [];
        let row = [], val = "", quoted = false;
        const pushVal = () => { row.push(val); val = ""; };
        const pushRow = () => { rows.push(row); row = []; };
        for (let i = 0; i < text.length; i++) {
          const ch = text[i], next = text[i + 1];
          if (ch === '"' && quoted && next === '"') { val += '"'; i++; }
          else if (ch === '"') quoted = !quoted;
          else if (ch === ',' && !quoted) pushVal();
          else if ((ch === '\n' || ch === '\r') && !quoted) {
            if (ch === '\r' && next === '\n') i++;
            pushVal(); pushRow();
          } else val += ch;
        }
        if (val || row.length) { pushVal(); pushRow(); }
        const nonEmpty = rows.filter(r => r.some(c => String(c || "").trim() !== ""));
        const headerIndex = nonEmpty.findIndex(r => r.some(c => /order|item|product|variant/i.test(String(c || ""))));
        const headers = (nonEmpty[headerIndex >= 0 ? headerIndex : 0] || []).map(h => cleanText(h));
        return nonEmpty.slice((headerIndex >= 0 ? headerIndex : 0) + 1).map(r => {
          const obj = {};
          headers.forEach((h, i) => { if (h) obj[h] = cleanText(r[i]); });
          return obj;
        });
      };
      const normalizeSalesRows = rows => {
        const good = [], bad = [];
        (rows || []).forEach((r, idx) => {
          const productVariant = cleanText(rowVal(r, ["Product Variants", "Product Variant", "Item Title", "Item", "Title", "Product", "Listing Title", "Name"]));
          if (isNonPlantVariant(productVariant)) { bad.push({ row: idx + 1, productVariant, reason: "non-plant row" }); return; }
          const orderNo = cleanText(rowVal(r, ["Order No", "Order number", "Order Number", "Order ID", "Order"]));
          const saleDate = parseDateValue(rowVal(r, ["Order Created Time(EST)", "Order Date(PDT)", "Order Date", "Date", "Created Time"]));
          const productAmount = money(rowVal(r, ["Product Amount", "Product ", "Item Price", "Price", "Subtotal"]));
          const orderAmount = money(rowVal(r, ["Order Amount", "Order Total", "Total"]));
          const sellerIncome = money(rowVal(r, ["Seller Income", "Payout", "Net"]));
          const price = productAmount || orderAmount || sellerIncome;
          if (!productVariant || !price) { bad.push({ row: idx + 1, productVariant, reason: "missing product or price" }); return; }
          const extractedPlantCode = extractPlantCode(productVariant);
          const sale = {
            _id: uid(),
            orderNo,
            orderStatus: cleanText(rowVal(r, ["Order Status", "Status"])),
            saleDate,
            buyerState: cleanText(rowVal(r, ["Buyer State", "State"])),
            orderAmount,
            productAmount,
            shippingFee: money(rowVal(r, ["Shipping Fee Amount", "Shipping Fee", "Shipping"])),
            paymentFee: money(rowVal(r, ["Payment Fee", "Stripe and BNPL Fee", "Stripe Fee"])),
            palmstreetFee: money(rowVal(r, ["Palmstreet Selling Fee", "PlantStory Selling Fee", "Selling Fee"])),
            sellingFeeDeductions: money(rowVal(r, ["Selling Fee Deductions"])),
            taxAmount: money(rowVal(r, ["Tax Amount", "Sales Tax Collected", "Tax"])),
            sellerIncome,
            refundAmount: money(rowVal(r, ["Refund Amount", "Refund"])),
            productVariant,
            extractedPlantCode,
            customer: cleanText(rowVal(r, ["Palmstreet UserName", "Username", "Buyer", "Buyer Username", "Customer"])),
            recipientName: cleanText(rowVal(r, ["Recipient Name", "Customer Name", "Name"])),
            raw: r,
          };
          const enrichedSale = { ...sale, title: productVariant, price, state: sale.buyerState, orderNum: orderNo, orderDate: saleDate, shipping: sale.shippingFee };
          const duplicate = isDuplicateSale(enrichedSale);
          const match = findInventoryMatch(enrichedSale);
          good.push({
            ...enrichedSale,
            matched: match,
            matchStatus: duplicate ? "duplicate" : match ? "matched" : "unmatched",
            duplicate,
            duplicateReason: duplicate ? "Already imported from a previous Palmstreet/Whatnot upload" : "",
            saleImportKey: saleImportKey(enrichedSale),
            saleLegacyKey: saleLegacyKey(enrichedSale),
            apply: !duplicate,
            historicalImport: !match
          });
        });
        return { good, bad };
      };

      const parseCSV = text => normalizeSalesRows(parseCSVRows(text));

      const loadFile = f => {
        if (!f) return;
        setFileName(f.name || ""); setImportMsg(""); setDuplicateInfo(null); setLastImportResult(null);
        const isXlsx = /\.xlsx?$/i.test(f.name || "");
        const r = new FileReader();
        r.onload = e => {
          try {
            if (isXlsx) {
              if (!window.XLSX) throw new Error("Excel parser did not load. Refresh the page and try again.");
              const wb = window.XLSX.read(new Uint8Array(e.target.result), { type: "array", cellDates: true });
              const sheetName = wb.SheetNames.includes("Order Details") ? "Order Details" : wb.SheetNames[0];
              const rows = window.XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: "", raw: false });
              const { good, bad } = normalizeSalesRows(rows);
              setParsed(rows); setMatched(good); setSkipped(bad); setStep("review");
            } else {
              const text = e.target.result;
              setRaw(text);
              const { good, bad } = parseCSV(text);
              setParsed(good); setMatched(good); setSkipped(bad); setStep("review");
            }
          } catch (err) {
            setImportMsg("Import failed: " + (err.message || String(err)));
          }
        };
        if (isXlsx) r.readAsArrayBuffer(f); else r.readAsText(f);
      };

      const runMatch = () => {
        if (!raw.trim()) return;
        setDuplicateInfo(null); setLastImportResult(null);
        const { good, bad } = parseCSV(raw);
        setMatched(good);
        setParsed(good);
        setSkipped(bad);
        setStep("review");
      };

      const toggleApply = id => setMatched(p => p.map(r => r._id === id ? { ...r, apply: !r.apply } : r));
      const setMatch = (id, plantId) => setMatched(p => p.map(r => {
        if (r._id !== id) return r;
        const plant = plants.find(p => p.id === plantId);
        return { ...r, matched: plant || null, apply: true, matchStatus: plant ? "matched" : "unmatched", historicalImport: !plant };
      }));
      const makeHistoricalSalePlant = (sale, idx) => {
        const fallbackId = `HIST-${String(idx + 1).padStart(4, "0")}`;
        const code = sale.extractedPlantCode || `${fallbackId}-${uid().toUpperCase()}`;
        return {
          id: uid(),
          plantId: code,
          plantCode: code,
          barcodeValue: code,
          barcodeType: "CODE128",
          nurseryCode: "HIST",
          name: toTC(sale.productVariant || sale.title || "Historical Palmstreet Sale"),
          botanicalName: "",
          potSize: "",
          cost: 0,
          costSource: "unknown historical import",
          verifiedCost: false,
          suggestedPrice: sale.price,
          salePrice: sale.price,
          shippingCost: sale.shippingFee || sale.shipping || 0,
          platform,
          status: "Sold",
          soldDate: sale.saleDate || sale.orderDate || today(),
          dateAdded: sale.saleDate || sale.orderDate || today(),
          customerUsername: sale.customer || "",
          customerName: sale.recipientName || "",
          customerState: sale.buyerState || sale.state || "",
          orderNumber: sale.orderNo || sale.orderNum || "",
          saleImportKey: sale.saleImportKey || saleImportKey(sale),
          saleLegacyKey: sale.saleLegacyKey || saleLegacyKey(sale),
          sourceFileName: fileName || "",
          importedAt: new Date().toISOString(),
          paymentFee: sale.paymentFee || 0,
          palmstreetFee: sale.palmstreetFee || 0,
          taxAmount: sale.taxAmount || 0,
          sellerIncome: sale.sellerIncome || 0,
          refundAmount: sale.refundAmount || 0,
          historicalImport: true,
          matchStatus: "unmatched",
          rawProductVariant: sale.productVariant || sale.title || "",
          notes: "Imported from historical Palmstreet/Whatnot sales file. No inventory match found.",
          labelPrinted: true,
          addedBy: user.name,
          margin: 0
        };
      };

      const applyImport = () => {
        const allSelected = matched.filter(r => r.apply);
        const existingKeys = existingImportedSaleKeys(plants);
        const newKeys = new Set();
        const selected = [];
        const duplicates = [];

        allSelected.forEach(sale => {
          const k1 = sale.saleImportKey || saleImportKey(sale);
          const k2 = sale.saleLegacyKey || saleLegacyKey(sale);
          const dup = existingKeys.has(compactKey(k1)) || existingKeys.has(compactKey(k2)) || newKeys.has(compactKey(k1)) || newKeys.has(compactKey(k2));
          if (dup) {
            duplicates.push(sale);
            return;
          }
          newKeys.add(compactKey(k1));
          newKeys.add(compactKey(k2));
          selected.push({ ...sale, saleImportKey: k1, saleLegacyKey: k2 });
        });

        const matchedSales = selected.filter(r => r.matched);
        const unmatchedSales = selected.filter(r => !r.matched);

        const soldInventory = plants.map(p => {
          const sale = matchedSales.find(r => r.matched?.id === p.id);
          if (!sale) return p;
          return {
            ...p,
            status: "Sold",
            salePrice: sale.price,
            platform,
            shippingCost: sale.shippingFee || sale.shipping || 0,
            customerUsername: sale.customer || "",
            customerName: sale.recipientName || "",
            customerState: sale.buyerState || sale.state || "",
            orderNumber: sale.orderNo || sale.orderNum || "",
            saleImportKey: sale.saleImportKey || saleImportKey(sale),
            saleLegacyKey: sale.saleLegacyKey || saleLegacyKey(sale),
            sourceFileName: fileName || "",
            importedAt: new Date().toISOString(),
            soldDate: sale.saleDate || sale.orderDate || today(),
            paymentFee: sale.paymentFee || 0,
            palmstreetFee: sale.palmstreetFee || 0,
            taxAmount: sale.taxAmount || 0,
            sellerIncome: sale.sellerIncome || 0,
            historicalImport: false,
            matchStatus: "matched",
            rawProductVariant: sale.productVariant || sale.title || "",
            margin: marg(+p.cost, sale.price)
          };
        });

        const historicalRows = unmatchedSales.map((sale, idx) => makeHistoricalSalePlant(sale, idx));
        const result = {
          matchedAdded: matchedSales.length,
          historicalAdded: historicalRows.length,
          duplicateSkipped: duplicates.length,
          duplicateOrders: duplicates.slice(0, 25).map(d => d.orderNo || d.orderNum || d.productVariant || d.title || "Duplicate row")
        };

        setPlants([...soldInventory, ...historicalRows]);
        setLastImportResult(result);
        setDuplicateInfo(result.duplicateSkipped ? result : null);
        addAudit({ action: `Sales import: ${result.matchedAdded} matched inventory + ${result.historicalAdded} historical unmatched + ${result.duplicateSkipped} duplicates skipped from ${platform}`, user: user.name, page: "Show Import" });
        setStep("done");
      };

      const totalRev = matched.filter(r => r.apply && !r.duplicate).reduce((s, r) => s + (+r.price || 0), 0);
      const matched_count = matched.filter(r => r.apply && !r.duplicate && r.matched).length;
      const unmatched_count = matched.filter(r => r.apply && !r.duplicate && !r.matched).length;
      const duplicate_count = matched.filter(r => r.duplicate).length;
      const applied_count = matched.filter(r => r.apply && !r.duplicate).length;

      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <SHdr icon="📦" title="Post-Show Import" sub="Upload Palmstreet/Whatnot sales. Old files can import as historical sales even without inventory matches." />

        {step === "paste" && <div>
          <Card style={{ marginBottom: 14 }}>
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 10 }}>Platform</div>
            <Row gap={8} style={{ marginBottom: 16 }}>
              {["Palmstreet", "Whatnot"].map(p => <button key={p} onClick={() => setPlatform(p)} style={{ padding: "10px 20px", borderRadius: 9, cursor: "pointer", fontFamily: F.body, fontSize: 14, fontWeight: 600, background: platform === p ? C.g700 : C.cardAlt, color: platform === p ? "#fff" : C.tx1, border: `1.5px solid ${platform === p ? C.g700 : C.bd}` }}>{p}</button>)}
            </Row>
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 8 }}>Import Mode</div>
            <Row gap={8} style={{ marginBottom: 16 }}>
              {[{ v: "historical", l: "Historical Import - Save Unmatched" }, { v: "exact", l: "Exact Inventory Match Only" }].map(o => <button key={o.v} onClick={() => setImportMode(o.v)} style={{ padding: "10px 14px", borderRadius: 9, cursor: "pointer", fontFamily: F.body, fontSize: 13, fontWeight: 600, background: importMode === o.v ? C.g700 : C.cardAlt, color: importMode === o.v ? "#fff" : C.tx1, border: `1.5px solid ${importMode === o.v ? C.g700 : C.bd}` }}>{o.l}</button>)}
            </Row>
            <div style={{ background: C.goldBg, border: `1px solid ${C.gold}55`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: C.tx2, marginBottom: 14, lineHeight: 1.6 }}>
              Use <b>Historical Import</b> for old Palmstreet analytics files that do not have Leaf Diary plant codes. It will still save the sales for analytics, pricing, customers, and revenue history.
            </div>
            {importMsg && <div style={{ background: C.redBg, border: `1px solid ${C.red}55`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: C.red, marginBottom: 12 }}>{importMsg}</div>}
            {duplicateInfo && <div style={{ background: C.amberBg, border: `1px solid ${C.amber}55`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: C.amber, marginBottom: 12 }}><b>{duplicateInfo.duplicateSkipped} duplicate rows skipped.</b> These orders/rows were already imported and were not added again.</div>}
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 8 }}>Upload Palmstreet Excel or CSV</div>
            <div style={{ fontSize: 13, color: C.tx3, marginBottom: 12 }}>
              Supports Palmstreet Analytics Excel files with an <b>Order Details</b> tab, or normal CSV order exports.
            </div>
            <div style={{ border: `2px dashed ${C.g300}`, borderRadius: 12, padding: "30px", textAlign: "center", background: C.card, marginBottom: 12, cursor: "pointer" }} onClick={() => fileRef.current.click()}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>📄</div>
              <div style={{ fontWeight: 700, color: C.g900, marginBottom: 6 }}>{fileName || "Upload XLSX or CSV file"}</div>
              <div style={{ fontSize: 12, color: C.tx3, marginBottom: 12 }}>Palmstreet analytics export or orders export</div>
              <Btn onClick={e => { e.stopPropagation(); fileRef.current.click(); }}>Choose File</Btn>
            </div>
            <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" style={{ display: "none" }} onChange={e => loadFile(e.target.files[0])} />
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 6 }}>Or paste CSV text directly</div>
            <textarea value={raw} onChange={e => setRaw(e.target.value)}
              style={{ width: "100%", padding: "10px 12px", border: `1.5px solid ${C.bd}`, borderRadius: 9, fontSize: 12, fontFamily: F.mono, minHeight: 100, boxSizing: "border-box", resize: "vertical" }}
              placeholder="Paste CSV data here…" />
            <Btn full onClick={runMatch} style={{ marginTop: 12 }} disabled={!raw.trim()}>Import / Match Sales →</Btn>
          </Card>
        </div>}

        {step === "review" && <div>
          <div style={{ background: C.g800, borderRadius: 14, padding: "16px", marginBottom: 14, color: "#fff" }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", opacity: .7, marginBottom: 4 }}>Import Summary</div>
            <div style={{ fontSize: 28, fontWeight: 700, fontFamily: F.display }}>{$(totalRev)}</div>
            <div style={{ fontSize: 13, opacity: .85, marginTop: 4 }}>{matched.length} plant sales found · {matched_count} matched to inventory · {unmatched_count} historical unmatched · {duplicate_count} duplicates already imported · {skipped.length} skipped non-plant/bad rows</div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
            {matched.slice(0, 350).map(r => <Card key={r._id} style={{ padding: "12px 14px", border: `1px solid ${r.duplicate ? C.red : r.matched ? C.g200 : C.gold}55`, background: r.duplicate ? C.redBg : r.matched ? C.g50 : C.goldBg, opacity: r.duplicate ? .82 : 1 }}>
              <Row between center style={{ marginBottom: 6 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, color: C.g900 }}>{r.title}</div>
                  <div style={{ fontSize: 12, color: C.tx3 }}>Order {r.orderNo || "—"} · {r.state || "No state"} · {String(r.orderDate || "").slice(0, 10)}</div>
                  {r.extractedPlantCode && <div style={{ fontSize: 11, color: C.blue, marginTop: 2 }}>Code found: {r.extractedPlantCode}</div>}
                  {r.duplicate && <div style={{ fontSize: 11, color: C.red, marginTop: 2 }}>🚫 Duplicate detected — this order row was already imported and will be skipped.</div>}
                  {!r.duplicate && r.matched && <div style={{ fontSize: 11, color: C.g600, marginTop: 2 }}>✅ Matched → {r.matched.name} ({r.matched.plantId})</div>}
                  {!r.duplicate && !r.matched && <div style={{ fontSize: 11, color: C.amber, marginTop: 2 }}>⚠️ No inventory match — will import as historical sale unless you select a plant.</div>}
                </div>
                <Row gap={8} center>
                  <span style={{ fontWeight: 700, color: C.g700, fontSize: 16 }}>{$(r.price)}</span>
                  <label style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer" }}>
                    <input type="checkbox" checked={!!r.apply} disabled={!!r.duplicate} onChange={() => toggleApply(r._id)} style={{ width: 18, height: 18, accentColor: C.g700 }} />
                    <span style={{ fontSize: 11, color: r.duplicate ? C.red : C.tx3 }}>{r.duplicate ? "Skipped" : "Import"}</span>
                  </label>
                </Row>
              </Row>
              {!r.duplicate && !r.matched && <select onChange={e => setMatch(r._id, e.target.value)} style={{ width: "100%", padding: "8px 10px", border: `1px solid ${C.bd}`, borderRadius: 7, fontSize: 13, fontFamily: F.body, marginTop: 6 }}>
                <option value="">— Leave unmatched as historical sale —</option>
                {plants.filter(p => p.status === "In Stock").map(p => <option key={p.id} value={p.id}>{p.name} · {p.plantId} · {$(p.suggestedPrice)}</option>)}
              </select>}
            </Card>)}
            {matched.length > 350 && <div style={{ textAlign: "center", color: C.tx3, fontSize: 13, padding: 12 }}>Showing first 350 rows for speed. All {matched.length} rows will import if checked.</div>}
          </div>

          <Row gap={8} wrap>
            <Btn onClick={applyImport} disabled={applied_count === 0}>✅ Import {applied_count} Sales</Btn>
            <Btn v="outline" onClick={() => downloadCSVFile(`leaf-diary-import-preview-${today()}.csv`, ["Status","Order No","Plant Code","Product","Price","State","Date"].join(',') + '\n' + matched.map(r => [r.matched ? "matched" : "historical", r.orderNo || "", r.extractedPlantCode || "", r.title || "", r.price || 0, r.state || "", r.orderDate || ""].map(csvCell).join(',')).join('\n'))}>📥 Export Preview</Btn>
            <Btn v="ghost" onClick={() => setStep("paste")}>Back</Btn>
          </Row>
        </div>}

        {step === "done" && <div style={{ textAlign: "center", padding: "60px 20px" }}>
          <div style={{ fontSize: 56, marginBottom: 16 }}>🎉</div>
          <h2 style={{ fontFamily: F.display, color: C.g900, marginBottom: 8 }}>Sales Imported!</h2>
          <p style={{ color: C.tx3, marginBottom: 6 }}>{lastImportResult ? `${lastImportResult.matchedAdded} inventory plants marked sold · ${lastImportResult.historicalAdded} historical sales saved` : `${matched_count} inventory plants marked sold · ${unmatched_count} historical sales saved`}</p>
          {lastImportResult?.duplicateSkipped > 0 && <p style={{ color: C.red, marginBottom: 6, fontWeight: 700 }}>{lastImportResult.duplicateSkipped} duplicate rows skipped — already imported before.</p>}
          <p style={{ color: C.gold, fontWeight: 700, fontSize: 18, marginBottom: 22 }}>{$(totalRev)} in new selected sales reviewed</p>
          <Row gap={10} style={{ justifyContent: "center" }}>
            <Btn onClick={() => { setRaw(""); setMatched([]); setSkipped([]); setStep("paste"); }}>Import Another File</Btn>
          </Row>
        </div>}
      </div>;
    }


    /* ══════════════════════════════════════════════════════════
       CUSTOMERS — from Palmstreet sales data
    ══════════════════════════════════════════════════════════ */
    function Customers({ plants }) {

        custMap[u].orders.push(p);
        custMap[u].total += (+p.salePrice || 0);
        custMap[u].plants++;
      });
      const customers = Object.values(custMap).sort((a, b) => b.total - a.total);

      // State breakdown from all sold plants with state info
      const stateMap = {};
      plants.filter(p => p.status === "Sold" && p.customerState).forEach(p => {
        const s = p.customerState;
        if (!stateMap[s]) stateMap[s] = { state: s, revenue: 0, orders: 0, customers: new Set() };
        stateMap[s].revenue += (+p.salePrice || 0);
        stateMap[s].orders++;
        stateMap[s].customers.add(p.customerUsername || "?");
      });

        { username: "DobbyTheGreenhouseElf", name: "", state: "", total: 1088.26, plants: 28 },
        { username: "Goldens", name: "", state: "", total: 870.60, plants: 24 },
        { username: "ToledoBend318", name: "", state: "", total: 844.32, plants: 22 },

      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>

              <Row between style={{ marginBottom: 6 }}>

    /* Auto-heal duplicate plant IDs at startup. Keeps the first occurrence, assigns
       new globally-unique IDs to any duplicates. */
    const deduplicatePlants = (arr) => {
      const seen = new Set();
      let globalMax = Math.max(999, ...(arr || []).map(p => { const m = (p.plantId || "").match(/-(\d+)$/); return m ? parseInt(m[1], 10) : 0; }));
      return (arr || []).map(p => {
        const key = (p.plantId || "").toUpperCase();
        if (!key || !seen.has(key)) { seen.add(key); return p; }
        // Duplicate found — assign next available global ID
        globalMax++;
        const newId = pid(p.nurseryCode || "XX", globalMax);
        seen.add(newId.toUpperCase());
        return { ...p, plantId: newId, plantCode: newId, barcodeValue: newId };
      });
    };

    const SUPABASE_URL = "https://yyklidmefiguzrbvrnmp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_8vyVQt8Ay3S8kJ4cI9U5YA_eB6l2CUu";
    const CLOUD_TABLES = ["plants", "bills", "nurseries", "expenses", "timecards"];

    const cloudHeaders = (extra = {}) => {
      const headers = {
        apikey: SUPABASE_KEY,
        "Content-Type": "application/json",
        Accept: "application/json",
        ...extra
      };

      // IMPORTANT:
      // Supabase's new sb_publishable_ keys are NOT JWTs.
      // Do not send them as Authorization: Bearer tokens or Supabase can reject the request.
      // Only legacy anon keys that start with eyJ are JWTs and may be used as Bearer tokens.
      if (SUPABASE_KEY && SUPABASE_KEY.startsWith("eyJ")) {
        headers.Authorization = `Bearer ${SUPABASE_KEY}`;
      }
      return headers;
    };

    async function cloudRequest(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers: cloudHeaders(options.headers || {})
      });
      if (!res.ok) {
        const txt = await res.text().catch(() => "");
        throw new Error(`${res.status} ${res.statusText} ${txt}`);
      }
      if (res.status === 204) return null;
      const txt = await res.text();
      return txt ? JSON.parse(txt) : null;
    }

    async function cloudFetchRows(table) {
      const rows = await cloudRequest(`${table}?select=id,data,updated_at&order=updated_at.desc`, { method: "GET" });
      return (rows || []).map(r => ({ ...(r.data || {}), id: (r.data && r.data.id) ? r.data.id : r.id }));
    }

    async function cloudUpsertRows(table, rows) {
      if (!Array.isArray(rows) || rows.length === 0) return;
      const payload = rows
        .filter(r => r && r.id)
        .map(r => ({ id: String(r.id), data: r, updated_at: new Date().toISOString() }));
      if (!payload.length) return;
      return cloudRequest(`${table}?on_conflict=id`, {
        method: "POST",
        headers: { Prefer: "resolution=merge-duplicates" },
        body: JSON.stringify(payload)
      });
    }

    async function cloudDeleteRows(table, ids) {
      const clean = [...new Set((ids || []).filter(Boolean).map(String))];
      if (!clean.length) return;
      const quoted = clean.map(id => `"${id.replace(/"/g, '\\"')}"`).join(",");
      return cloudRequest(`${table}?id=in.(${quoted})`, { method: "DELETE" });
    }

    async function cloudFetchState(key) {
      const rows = await cloudRequest(`app_state?select=key,data,updated_at&key=eq.${encodeURIComponent(key)}&limit=1`, { method: "GET" });
      return rows && rows[0] ? rows[0].data : null;
    }

    async function cloudUpsertState(key, data) {
      return cloudRequest(`app_state?on_conflict=key`, {
        method: "POST",
        headers: { Prefer: "resolution=merge-duplicates" },
        body: JSON.stringify([{ key, data, updated_at: new Date().toISOString() }])
      });
    }

    function applyUpdater(updater, prev) {
      return typeof updater === "function" ? updater(prev) : updater;
    }
    function missingIds(prev = [], next = []) {
      const n = new Set((next || []).map(x => x && x.id).filter(Boolean).map(String));
      return (prev || []).map(x => x && x.id).filter(Boolean).map(String).filter(id => !n.has(id));
    }

      const P = { plants, setPlants, nurseries, setNurseries, expenses, setExpenses, timecards, setTimecards, bills, setBills, user, addAudit };
      const cloudDot = cloudStatus === "synced" ? C.g400 : cloudStatus === "syncing" || cloudStatus === "loading" ? C.gold : C.amber;
      const cloudLabel = cloudStatus === "synced" ? "☁️ Supabase cloud synced" : cloudStatus === "syncing" ? "🔄 Saving to Supabase..." : cloudStatus === "loading" ? "🔄 Loading cloud..." : `⚠️ Cloud offline — ${cloudMsg || "local backup active"}`;

      return <div style={{ fontFamily: F.body, background: C.bg, minHeight: "100vh", color: C.tx1, paddingBottom: 80 }}>
        {showPwdModal && <ChangePasswordModal onClose={() => setShowPwdModal(false)} user={user} />}
        <Nav page={page} setPage={setPage} user={user} onLogout={handleLogout} plantCount={plants.length} billAlerts={billAlerts} onChangePassword={() => setShowPwdModal(true)} />

        {/* Cloud sync indicator strip */}
        <div style={{ background: C.g900, padding: "6px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <div title={cloudMsg} style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: cloudDot }} />
            <span style={{ fontSize: 11, color: "rgba(255,255,255,.72)", fontWeight: 600 }}>{cloudLabel}</span>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            {saveMsg && <span style={{ fontSize: 11, color: C.g400, fontWeight: 700 }}>{saveMsg}</span>}
            <button onClick={() => loadFromCloud()} style={{ background: "rgba(255,255,255,.12)", border: "none", borderRadius: 6, padding: "4px 10px", color: "rgba(255,255,255,.8)", fontSize: 11, cursor: "pointer", fontFamily: F.body, fontWeight: 600 }}>🔄 Sync Now</button>
            <button onClick={async () => { try { setCloudStatus("loading"); setCloudMsg("Testing Supabase connection..."); await cloudRequest("plants?select=id&limit=1", { method: "GET" }); setCloudStatus("synced"); setCloudMsg("Supabase test passed"); alert("Supabase test passed. Cloud connection is working."); } catch (err) { const msg = err && err.message ? err.message : String(err); setCloudStatus("offline"); setCloudMsg("Supabase test failed: " + msg); alert("Supabase test failed: " + msg); } }} style={{ background: "rgba(255,255,255,.12)", border: "none", borderRadius: 6, padding: "4px 10px", color: "rgba(255,255,255,.8)", fontSize: 11, cursor: "pointer", fontFamily: F.body, fontWeight: 600 }}>🧪 Test Cloud</button>
            <button onClick={exportBackup} style={{ background: "rgba(255,255,255,.12)", border: "none", borderRadius: 6, padding: "4px 10px", color: "rgba(255,255,255,.8)", fontSize: 11, cursor: "pointer", fontFamily: F.body, fontWeight: 600 }}>📥 Backup</button>
            <button onClick={() => backupRef.current.click()} style={{ background: "rgba(255,255,255,.12)", border: "none", borderRadius: 6, padding: "4px 10px", color: "rgba(255,255,255,.8)", fontSize: 11, cursor: "pointer", fontFamily: F.body, fontWeight: 600 }}>📤 Restore</button>
            <input ref={backupRef} type="file" accept=".json" style={{ display: "none" }} onChange={e => importBackup(e.target.files[0])} />
          </div>
        </div>

        <div>
          {page === "dash" && user.role !== "employee" && <OwnerDash plants={plants} expenses={expenses} timecards={timecards} bills={bills} setPage={setPage} />}
          {page === "emp_dash" && <EmpDash plants={plants} user={user} timecards={timecards} />}
          {page === "dash" && user.role === "employee" && <EmpDash plants={plants} user={user} timecards={timecards} />}
          {page === "upload" && <InvoiceUpload {...P} />}
          {page === "manual" && <ManualEntry {...P} />}
          {page === "history" && <PastInvoices {...P} />}
          {page === "inv" && <Inventory plants={plants} setPlants={setPlants} user={user} addAudit={addAudit} nurseries={nurseries} setPage={setPage} />}
          {page === "labels" && <Labels plants={plants} setPlants={setPlants} user={user} addAudit={addAudit} setPage={setPage} settings={settings} />}
          {page === "sellthru" && CAN.seeReports(user.role) && <SellThrough plants={plants} nurseries={nurseries} setPage={setPage} />}
          {page === "showbuilder" && <ShowBuilder plants={plants} setPlants={setPlants} addAudit={addAudit} user={user} />}
          {page === "showimport" && <ShowImport plants={plants} setPlants={setPlants} addAudit={addAudit} user={user} />}
          {page === "customers" && CAN.seeReports(user.role) && <Customers plants={plants} />}
          {page === "nursery" && <Nurseries nurseries={nurseries} setNurseries={setNurseries} plants={plants} user={user} />}
          {page === "bills" && <Bills bills={bills} setBills={setBills} />}
          {page === "expense" && CAN.seeExpenses(user.role) && <Expenses expenses={expenses} setExpenses={setExpenses} addAudit={addAudit} user={user} />}
          {page === "timecard" && <Timecard timecards={timecards} setTimecards={setTimecards} user={user} employees={users} />}
          {page === "payroll" && CAN.seePayroll(user.role) && <Payroll timecards={timecards} employees={users} />}
          {page === "intel" && CAN.seeReports(user.role) && <BuyIntel plants={plants} settings={settings} />}
          {page === "reports" && CAN.seeReports(user.role) && <Reports plants={plants} expenses={expenses} timecards={timecards} nurseries={nurseries} />}
          {page === "tax" && CAN.seeTax(user.role) && <TaxCenter plants={plants} expenses={expenses} timecards={timecards} />}
          {page === "audit" && CAN.seeAudit(user.role) && <AuditLog auditLog={auditLog} />}
          {page === "admin" && CAN.editSettings(user.role) && <AdminPanel users={users} setUsers={setUsers} settings={settings} setSettings={setSettings} plants={plants} setPlants={setPlants} addAudit={addAudit} user={user} />}
          {page === "cleanup" && user.role === "owner" && <DataCleanup plants={plants} setPlants={setPlants} addAudit={addAudit} user={user} setPage={setPage} />}
        </div>
      </div>;
    }
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>

</html>
