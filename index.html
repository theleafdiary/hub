    /* ══════════════════════════════════════════════════════════
       ADMIN PANEL
    ══════════════════════════════════════════════════════════ */
    function AdminPanel({ users, setUsers, settings, setSettings, plants, setPlants, addAudit, user }) {
      const [tab, setTab] = useState("users");
      const [editId, setEditId] = useState(null);
      const [showAdd, setShowAdd] = useState(false);
      const [confirmText, setConfirmText] = useState("");
      const [actionMsg, setActionMsg] = useState("");
      const blank = { id: "", name: "", role: "employee", email: "", permissions: { ...DEFAULT_PERMS } };
      const [form, setForm] = useState({ ...blank });
      const certRef = useRef();
      const startEdit = u => { setEditId(u.id); setForm({ ...u, permissions: { ...DEFAULT_PERMS, ...(u.permissions || {}) } }); setShowAdd(false); };
      const saveEdit = async () => { setUsers(pr => pr.map(u => u.id === editId ? { ...form } : u)); setEditId(null); };
      const saveNew = async () => { if (!form.name.trim() || !form.email.trim()) return; setUsers(pr => [...pr, { ...form, id: uid() }]); setForm({ ...blank }); setShowAdd(false); };
      const updF = f => v => setForm(p => ({ ...p, [f]: v }));
      const updP = f => v => setForm(p => ({ ...p, permissions: { ...p.permissions, [f]: v } }));
      const updS = f => v => setSettings(p => ({ ...p, [f]: v }));
      const save = () => { /* save settings */ };
      const loadCert = file => { if (!file) return; const r = new FileReader(); r.onload = e => setSettings(p => ({ ...p, resellerCertData: e.target.result, resellerCertName: file.name })); r.readAsDataURL(file); };

      const isSaleRecord = p =>
        p?.status === "Sold" ||
        !!p?.saleImportKey ||
        !!p?.saleLegacyKey ||
        !!p?.orderNumber ||
        !!p?.soldDate ||
        !!p?.historicalImport ||
        String(p?.nurseryCode || "").toUpperCase() === "HIST";

      const isHistoricalSale = p =>
        !!p?.historicalImport ||
        String(p?.nurseryCode || "").toUpperCase() === "HIST" ||
        String(p?.plantId || "").toUpperCase().startsWith("HIST-");

      const customerKey = p =>
        (p?.customerUsername || p?.customerName || p?.buyerName || p?.recipientName || p?.customerState || p?.orderNumber || "").trim().toLowerCase();

      const customerCount = new Set((plants || []).filter(isSaleRecord).map(customerKey).filter(Boolean)).size;
      const saleCount = (plants || []).filter(isSaleRecord).length;
      const historicalCount = (plants || []).filter(isHistoricalSale).length;
      const matchedSaleCount = Math.max(0, saleCount - historicalCount);

      const clearSaleFields = p => ({
        ...p,
        status: p.status === "Sold" ? "In Stock" : p.status,
        salePrice: "",
        soldDate: "",
        platform: "",
        shippingCost: "",
        customerUsername: "",
        customerName: "",
        customerState: "",
        buyerName: "",
        recipientName: "",
        orderNumber: "",
        orderNo: "",
        saleImportKey: "",
        saleLegacyKey: "",
        sourceFileName: "",
        importedAt: "",
        paymentFee: 0,
        palmstreetFee: 0,
        taxAmount: 0,
        sellerIncome: 0,
        refundAmount: 0,
        historicalImport: false,
        matchStatus: "",
        rawProductVariant: ""
      });

      const clearCustomerFields = p => ({
        ...p,
        customerUsername: "",
        customerName: "",
        customerState: "",
        buyerName: "",
        recipientName: ""
      });

      const requireDeleteConfirm = () => {
        if (confirmText !== "DELETE") {
          setActionMsg("Type DELETE exactly before using bulk delete tools.");
          return false;
        }
        return true;
      };

      const runBulkDelete = (kind) => {
        if (!requireDeleteConfirm()) return;
        const labelMap = {
          customers: "delete all customer names/info from sales",
          sales: "delete all sales/history while keeping real inventory",
          historical: "delete historical imported Palmstreet/Whatnot sales only",
          all: "delete all customers and sales/history while keeping real inventory"
        };
        if (!confirm(`Are you sure you want to ${labelMap[kind]}? This will sync to Supabase. Make a backup first.`)) return;

        let nextPlants = [...(plants || [])];
        let message = "";

        if (kind === "customers") {
          nextPlants = nextPlants.map(clearCustomerFields);
          message = `Deleted customer info from ${saleCount} sale records.`;
        }

        if (kind === "historical") {
          nextPlants = nextPlants.filter(p => !isHistoricalSale(p));
          message = `Deleted ${historicalCount} historical imported sale records.`;
        }

        if (kind === "sales") {
          nextPlants = nextPlants
            .filter(p => !isHistoricalSale(p))
            .map(p => isSaleRecord(p) ? clearSaleFields(p) : p);
          message = `Deleted ${saleCount} sales records. Kept inventory and reset ${matchedSaleCount} sold inventory plants back to In Stock.`;
        }

        if (kind === "all") {
          nextPlants = nextPlants
            .filter(p => !isHistoricalSale(p))
            .map(p => isSaleRecord(p) ? clearCustomerFields(clearSaleFields(p)) : clearCustomerFields(p));
          message = `Deleted ${saleCount} sales records and cleared customer info. Inventory was kept.`;
        }

        setPlants(nextPlants);
        addAudit && addAudit({ action: `Admin bulk cleanup: ${message}`, user: user?.name || "Owner", page: "Admin Data Tools" });
        setActionMsg("✅ " + message);
        setConfirmText("");
      };

      const UForm = ({ isNew }) => <Card style={{ marginBottom: 16, border: `1.5px solid ${C.g200}` }}>
        <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 14 }}>{isNew ? "Add New Employee" : "Edit User"}</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 10, marginBottom: 14 }}>
          <Inp label="Full Name *" value={form.name} onChange={updF("name")} required />
          <Inp label="Email *" value={form.email} onChange={updF("email")} placeholder="emp@email.com" required={isNew} type="email" />
          <Sel label="Role" value={form.role} onChange={updF("role")} options={["employee", "manager", "owner"]} />
        </div>
        {form.role !== "owner" && <div>
          <div style={{ fontWeight: 700, color: C.g900, fontSize: 13, marginBottom: 10 }}>Permissions for {form.name || "this employee"}</div>
          {PERM_GROUPS.map(({ group, keys }) => <div key={group} style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.tx3, letterSpacing: .5, textTransform: "uppercase", marginBottom: 6 }}>{group}</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5 }}>
              {keys.map(k => <label key={k} style={{ display: "flex", alignItems: "center", gap: 7, cursor: "pointer", fontSize: 12, padding: "5px 9px", background: form.permissions?.[k] ? C.g50 : C.cardAlt, borderRadius: 6, border: `1px solid ${form.permissions?.[k] ? C.g200 : C.bd}` }}>
                <input type="checkbox" checked={!!form.permissions?.[k]} onChange={e => updP(k)(e.target.checked)} style={{ width: 14, height: 14, accentColor: C.g700 }} />{PERM_LABELS[k]}
              </label>)}
            </div>
          </div>)}
        </div>}
        {form.role === "owner" && <div style={{ background: C.g50, borderRadius: 8, padding: "10px 14px", fontSize: 12, color: C.tx2, marginBottom: 14 }}>Owners have full access to everything — no restrictions.</div>}
        <Row gap={8}><Btn onClick={isNew ? saveNew : saveEdit}>{isNew ? "Add Employee" : "Save Changes"}</Btn><Btn v="ghost" onClick={() => { isNew ? setShowAdd(false) : setEditId(null); setForm({ ...blank }); }}>Cancel</Btn></Row>

      const TABS = [{ id: "users", l: "👥 Users & Permissions" }, { id: "settings", l: "⚙️ Pricing Settings" }, { id: "cert", l: "📄 Reseller Certificate" }, { id: "data", l: "🧹 Bulk Delete / Reset" }];
      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>

        <div style={{ display: "flex", gap: 0, marginBottom: 22, borderBottom: `1px solid ${C.bd}`, flexWrap: "wrap" }}>

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {users.map(u => <Card key={u.id} style={{ padding: "14px 18px" }}>
              <Row between center>
                <div style={{ flex: 1 }}>
                  <Row gap={10} center style={{ marginBottom: 4 }}><div style={{ fontWeight: 700, color: C.tx1, fontSize: 14 }}>{u.name}</div><Tag text={u.role.toUpperCase()} color={u.role === "owner" ? C.g800 : u.role === "manager" ? C.gold : C.g500} sm /></Row>

                  {u.role !== "owner" && u.permissions && <div style={{ marginTop: 6, display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {Object.entries(u.permissions).filter(([, v]) => v).map(([k]) => <span key={k} style={{ fontSize: 9, background: C.g50, color: C.g700, borderRadius: 20, padding: "1px 7px", fontWeight: 600, border: `1px solid ${C.g200}` }}>{PERM_LABELS[k]}</span>)}
                  </div>}
                </div>
                <Row gap={6}><Btn sz="sm" v="outline" onClick={() => startEdit(u)}>Edit</Btn>{u.role !== "owner" && <Btn sz="sm" v="ghost" onClick={() => setUsers(p => p.filter(x => x.id !== u.id))}>Remove</Btn>}</Row>
              </Row>
            </Card>)}
          </div>
        </div>}
        {tab === "settings" && <Card style={{ maxWidth: 480 }}>
          <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 14 }}>Pricing Rules</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Inp label="Default Margin Target (%)" type="number" value={settings.marginTarget || 62} onChange={v => setSettings(p => ({ ...p, marginTarget: +v }))} />
            <Inp label="Minimum Profit Per Plant ($)" type="number" value={settings.minProfit || 10} onChange={v => setSettings(p => ({ ...p, minProfit: +v }))} />
            <div><label style={{ fontSize: 11, fontWeight: 600, color: C.tx3, display: "block", marginBottom: 6 }}>Round Prices To</label>
              <select value={settings.roundTo || 5} onChange={e => setSettings(p => ({ ...p, roundTo: +e.target.value }))} style={{ padding: "9px 11px", border: `1.5px solid ${C.bd}`, borderRadius: 8, fontSize: 13, fontFamily: F.body, background: C.card, outline: "none" }}>
                {[1, 5, 10].map(v => <option key={v} value={v}>Nearest ${v}</option>)}
              </select>
            </div>
            {[["Show cost on employee labels", "showCostOnLabels"], ["Employees can see suggested price", "empCanSeeSuggestedPrice"]].map(([l, k]) => (
              <label key={k} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13 }}><input type="checkbox" checked={!!settings[k]} onChange={e => setSettings(p => ({ ...p, [k]: e.target.checked }))} style={{ width: 15, height: 15, accentColor: C.g700 }} />{l}</label>
            ))}
          </div>
          <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 14, marginBottom: 8, marginTop: 20 }}>🌴 Florida Info</div>
          <div style={{ background: C.g50, borderRadius: 8, padding: "10px 14px", fontSize: 12, color: C.tx2, lineHeight: 1.7 }}>
            <b>State:</b> Florida · <b>Sales Tax:</b> 7% (6%+1% surtax) · <b>No state income tax</b><br />
            <b>Quarterly:</b> Jan 20, Apr 20, Jul 20, Oct 20 · floridarevenue.com
          </div>
        </Card>}
        {tab === "cert" && <div style={{ maxWidth: 640 }}>
          <Card>
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 6 }}>📄 Reseller Tax Certificate (FL DR-13)</div>
            <p style={{ fontSize: 13, color: C.tx3, marginBottom: 16 }}>Upload your Florida resale certificate to email to nurseries when setting up tax-exempt accounts.</p>
            {settings.resellerCertData ? <div>
              <div style={{ background: C.g50, border: `1px solid ${C.g200}`, borderRadius: 9, padding: "12px 16px", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div><div style={{ fontWeight: 700, color: C.g900, fontSize: 13 }}>✅ {settings.resellerCertName || "Certificate uploaded"}</div><div style={{ fontSize: 11, color: C.tx3 }}>Ready to download and email</div></div>
                <Row gap={8}><a href={settings.resellerCertData} download={settings.resellerCertName || "reseller-cert"} style={{ textDecoration: "none" }}><Btn sz="sm" v="outline">📥 Download</Btn></a><Btn sz="sm" v="ghost" onClick={() => setSettings(p => ({ ...p, resellerCertData: null, resellerCertName: "" }))}>Remove</Btn></Row>
              </div>
              <div style={{ background: C.cardAlt, borderRadius: 8, padding: "12px 14px", fontSize: 12, color: C.tx2, lineHeight: 1.7 }}>
                <b>To email to a nursery:</b><br />1. Download the certificate above<br />2. Email with subject: "Leaf Diary — Florida Resale Certificate DR-13"<br />3. Body: "Please find our reseller tax certificate attached. We'd like to set up a wholesale/tax-exempt account."
              </div>
            </div> : <div>
              <div style={{ border: `2px dashed ${C.g300}`, borderRadius: 10, padding: "36px", textAlign: "center", cursor: "pointer", background: C.card }} onClick={() => certRef.current.click()}>
                <div style={{ fontSize: 36, marginBottom: 10 }}>📄</div>
                <div style={{ fontWeight: 700, color: C.g900, fontFamily: F.display, marginBottom: 6 }}>Upload your Florida DR-13 resale certificate</div>
                <div style={{ fontSize: 12, color: C.tx3, marginBottom: 16 }}>PDF, JPG, or PNG</div>
                <Btn onClick={e => { e.stopPropagation(); certRef.current.click(); }}>Browse Files</Btn>
              </div>
              <input ref={certRef} type="file" accept=".pdf,image/*" style={{ display: "none" }} onChange={e => loadCert(e.target.files[0])} />
            </div>}
          </Card>
        </div>}
        {tab === "data" && <div style={{ maxWidth: 920 }}>
          <Card style={{ marginBottom: 14, border: `1.5px solid ${C.red}33` }}>
            <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 17, marginBottom: 8 }}>🧹 Bulk Delete / Reset Tools</div>
            <p style={{ fontSize: 13, color: C.tx3, lineHeight: 1.6, margin: "0 0 14px" }}>
              Use this when you imported test data, duplicate Palmstreet files, or want to start customers/sales over. This keeps your real inventory unless you choose otherwise.
            </p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 10, marginBottom: 14 }}>
              <KPI label="Total Sale Records" value={saleCount} color={C.gold} />
              <KPI label="Historical Imports" value={historicalCount} color={C.purple} />
              <KPI label="Matched Inventory Sales" value={matchedSaleCount} color={C.blue} />
              <KPI label="Customers Found" value={customerCount} color={C.g600} />
            </div>
            <div style={{ background: C.redBg, border: `1px solid ${C.red}44`, borderRadius: 10, padding: "12px 14px", fontSize: 13, color: C.tx2, lineHeight: 1.65, marginBottom: 14 }}>
              <b style={{ color: C.red }}>Important:</b> Click <b>Backup</b> in the top cloud bar before running these. Bulk delete syncs to Supabase and affects every device.
            </div>
            <Inp label="Type DELETE to unlock bulk delete buttons" value={confirmText} onChange={setConfirmText} placeholder="DELETE" />
            {actionMsg && <div style={{ marginTop: 10, background: actionMsg.startsWith("✅") ? C.g50 : C.goldBg, border: `1px solid ${actionMsg.startsWith("✅") ? C.g200 : C.gold}55`, borderRadius: 8, padding: "10px 12px", fontSize: 13, color: C.tx2 }}>{actionMsg}</div>}
          </Card>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 12 }}>
            <Card>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 8 }}>Delete Customers Only</div>
              <p style={{ fontSize: 12, color: C.tx3, lineHeight: 1.6, marginBottom: 12 }}>Clears customer names, usernames, and states from sale records. It does not delete sales totals or inventory.</p>
              <Btn v="danger" full disabled={confirmText !== "DELETE"} onClick={() => runBulkDelete("customers")}>Delete All Customers</Btn>
            </Card>

            <Card>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 8 }}>Delete Sales, Keep Inventory</div>
              <p style={{ fontSize: 12, color: C.tx3, lineHeight: 1.6, marginBottom: 12 }}>Removes historical imported sales and resets matched sold inventory back to In Stock with sale fields cleared.</p>
              <Btn v="danger" full disabled={confirmText !== "DELETE"} onClick={() => runBulkDelete("sales")}>Delete All Sales</Btn>
            </Card>

            <Card>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 8 }}>Delete Historical Imports Only</div>

              <Btn v="danger" full disabled={confirmText !== "DELETE"} onClick={() => runBulkDelete("historical")}>Delete Historical Imports</Btn>
            </Card>

            <Card style={{ border: `1.5px solid ${C.red}66` }}>
              <div style={{ fontFamily: F.display, fontWeight: 700, color: C.red, fontSize: 15, marginBottom: 8 }}>Start Customers & Sales Over</div>
              <p style={{ fontSize: 12, color: C.tx3, lineHeight: 1.6, marginBottom: 12 }}>Best option if you want to re-import Palmstreet clean. Keeps inventory, deletes sales history, clears customers, and resets sold inventory.</p>
              <Btn v="danger" full disabled={confirmText !== "DELETE"} onClick={() => runBulkDelete("all")}>Reset Customers + Sales</Btn>

    /* ══════════════════════════════════════════════════════════
       OWNER DATA CLEANUP / BULK DELETE
    ══════════════════════════════════════════════════════════ */
    function DataCleanup({ plants, setPlants, addAudit, user, setPage }) {
      const [confirmText, setConfirmText] = useState("");
      const [msg, setMsg] = useState("");
      const [busy, setBusy] = useState(false);

      const isSaleRecord = p =>
        p?.status === "Sold" ||
        !!p?.saleImportKey ||
        !!p?.saleLegacyKey ||
        !!p?.orderNumber ||
        !!p?.orderNo ||
        !!p?.soldDate ||
        !!p?.historicalImport ||
        String(p?.nurseryCode || "").toUpperCase() === "HIST";

      const isHistoricalSale = p =>
        !!p?.historicalImport ||
        String(p?.nurseryCode || "").toUpperCase() === "HIST" ||
        String(p?.plantId || "").toUpperCase().startsWith("HIST-");

      const hasCustomerInfo = p =>
        !!(p?.customerUsername || p?.customerName || p?.buyerName || p?.recipientName || p?.customerState);

      const customerKey = p =>
        (p?.customerUsername || p?.customerName || p?.buyerName || p?.recipientName || p?.customerState || p?.orderNumber || "").trim().toLowerCase();

      const saleRecords = (plants || []).filter(isSaleRecord);
      const historicalRecords = (plants || []).filter(isHistoricalSale);
      const matchedSales = saleRecords.filter(p => !isHistoricalSale(p));
      const customerCount = new Set((plants || []).filter(hasCustomerInfo).map(customerKey).filter(Boolean)).size;

      const clearCustomerFields = p => ({
        ...p,
        customerUsername: "",
        customerName: "",
        customerState: "",
        buyerName: "",
        recipientName: ""
      });

      const clearSaleFields = p => ({
        ...p,
        status: p.status === "Sold" ? "In Stock" : p.status,
        salePrice: "",
        soldDate: "",
        platform: "",
        shippingCost: "",
        customerUsername: "",
        customerName: "",
        customerState: "",
        buyerName: "",
        recipientName: "",
        orderNumber: "",
        orderNo: "",
        saleImportKey: "",
        saleLegacyKey: "",
        sourceFileName: "",
        importedAt: "",
        paymentFee: 0,
        palmstreetFee: 0,
        taxAmount: 0,
        sellerIncome: 0,
        refundAmount: 0,
        historicalImport: false,
        matchStatus: "",
        rawProductVariant: ""
      });

      const unlocked = confirmText.trim().toUpperCase() === "DELETE";

      const runCleanup = async (kind) => {
        if (user?.role !== "owner") {
          setMsg("Only the owner account can run bulk delete tools.");
          return;
        }
        if (!unlocked) {
          setMsg("Type DELETE first to unlock the cleanup buttons.");
          return;
        }
        const labels = {
          customers: "delete all customer information",
          sales: "delete all sales while keeping inventory",
          historical: "delete historical imported sales only",
          inventory: "delete ALL inventory plants and all sales rows stored with inventory",
          all: "reset customers and sales while keeping inventory",
          full: "delete ALL inventory, customers, sales, and historical imports"
        };
        if (!confirm(`Are you sure you want to ${labels[kind]}? This cannot be undone unless you restore a backup.`)) return;
        if (!confirm("Last warning: make sure you downloaded a backup first. Continue?")) return;

        setBusy(true);
        let nextPlants = [...(plants || [])];
        let summary = "";

        if (kind === "customers") {
          nextPlants = nextPlants.map(clearCustomerFields);
          summary = `Customer info cleared from ${customerCount} customer groups.`;
        }
        if (kind === "historical") {
          nextPlants = nextPlants.filter(p => !isHistoricalSale(p));
          summary = `${historicalRecords.length} historical imported sale rows deleted.`;
        }
        if (kind === "sales") {
          nextPlants = nextPlants
            .filter(p => !isHistoricalSale(p))
            .map(p => isSaleRecord(p) ? clearSaleFields(p) : p);
          summary = `${saleRecords.length} sale records deleted. ${matchedSales.length} matched sold inventory plants reset to In Stock.`;
        }
        if (kind === "all") {
          nextPlants = nextPlants
            .filter(p => !isHistoricalSale(p))
            .map(p => isSaleRecord(p) ? clearCustomerFields(clearSaleFields(p)) : clearCustomerFields(p));
          summary = `${saleRecords.length} sale records deleted and customer info cleared. Inventory kept.`;
        }
        if (kind === "inventory") {
          const totalDeleted = nextPlants.length;
          const plantIdsToDelete = nextPlants.map(p => p && p.id).filter(Boolean);
          try {
            if (plantIdsToDelete.length) await cloudDeleteRows("plants", plantIdsToDelete);
            await cloudUpsertState("inventoryResetAt", { at: new Date().toISOString(), by: user?.name || "Owner", rowsDeleted: totalDeleted });
          } catch (err) {
            console.error("Inventory cloud delete failed", err);
            setMsg("Cloud delete failed: " + (err?.message || err));
            setBusy(false);
            return;
          }
          nextPlants = [];
          forceLocalPlantsEmpty();
          summary = `${totalDeleted} inventory/sales rows deleted. Nurseries, employees, expenses, bills, settings, and timecards were kept.`;
        }
        if (kind === "full") {
          const totalDeleted = nextPlants.length;
          const plantIdsToDelete = nextPlants.map(p => p && p.id).filter(Boolean);
          try {
            if (plantIdsToDelete.length) await cloudDeleteRows("plants", plantIdsToDelete);
            await cloudUpsertState("inventoryResetAt", { at: new Date().toISOString(), by: user?.name || "Owner", rowsDeleted: totalDeleted });
          } catch (err) {
            console.error("Full plant reset cloud delete failed", err);
            setMsg("Cloud delete failed: " + (err?.message || err));
            setBusy(false);
            return;
          }
          nextPlants = [];
          forceLocalPlantsEmpty();
          summary = `Full plant data reset complete. ${totalDeleted} inventory, customer, sales, and historical rows deleted. Nurseries, employees, expenses, bills, settings, and timecards were kept.`;
        }

        setPlants(nextPlants);
        addAudit && addAudit({ action: `Owner Data Cleanup: ${summary}`, user: user?.name || "Owner", page: "Data Cleanup" });
        setMsg("✅ " + summary + " Cloud + local backup were both cleared. Hard refresh and the inventory should stay empty.");
        setConfirmText("");
        setBusy(false);
      };

      const dangerCard = (title, body, label, kind) => <Card style={{ border: ["all","inventory","full"].includes(kind) ? `2px solid ${C.red}` : `1.5px solid ${C.red}44` }}>
        <div style={{ fontFamily: F.display, fontWeight: 700, color: ["all","inventory","full"].includes(kind) ? C.red : C.g900, fontSize: 16, marginBottom: 8 }}>{title}</div>
        <p style={{ fontSize: 13, color: C.tx3, lineHeight: 1.6, margin: "0 0 14px" }}>{body}</p>
        <Btn v="danger" full disabled={!unlocked || busy} onClick={() => runCleanup(kind)}>{busy ? "Working..." : label}</Btn>
      </Card>;

      return <div style={{ padding: "14px 14px 90px", background: C.bg, minHeight: "100vh" }}>
        <SHdr icon="🧹" title="Data Cleanup" sub="Owner-only tools to delete customers, sales, historical imports, or all inventory when you need to start over"
          right={<Row gap={8}><Btn v="outline" onClick={() => setPage("showimport")}>Import Sales</Btn><Btn v="soft" onClick={() => setPage("customers")}>View Customers</Btn></Row>} />

        <Card style={{ marginBottom: 14, background: C.goldBg, border: `1.5px solid ${C.gold}66` }}>
          <div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 18, marginBottom: 8 }}>Backup First</div>
          <p style={{ fontSize: 13, color: C.tx2, lineHeight: 1.65, margin: 0 }}>
            These buttons are for real cleanup while you are logged in as owner. They update the app state and sync to Supabase. Download a backup from the cloud bar before deleting anything.
          </p>
        </Card>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 10, marginBottom: 14 }}>
          <KPI label="Total Inventory Rows" value={(plants || []).length} color={C.red} />
          <KPI label="Sale Records" value={saleRecords.length} color={C.gold} />
          <KPI label="Historical Imports" value={historicalRecords.length} color={C.purple} />
          <KPI label="Matched Sales" value={matchedSales.length} color={C.blue} />
          <KPI label="Customer Groups" value={customerCount} color={C.g600} />
        </div>

        <Card style={{ marginBottom: 14, border: `1.5px solid ${C.red}55` }}>
          <Inp label="Type DELETE to unlock" value={confirmText} onChange={setConfirmText} placeholder="DELETE" />
          {msg && <div style={{ marginTop: 10, background: msg.startsWith("✅") ? C.g50 : C.redBg, border: `1px solid ${msg.startsWith("✅") ? C.g200 : C.red}55`, borderRadius: 8, padding: "10px 12px", fontSize: 13, color: C.tx2 }}>{msg}</div>}
        </Card>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(260px,1fr))", gap: 12 }}>
          {dangerCard("Delete Customers Only", "Clears customer names, usernames, recipient names, and states from all records. Sales totals and inventory stay in place.", "Delete All Customers", "customers")}
          {dangerCard("Delete Sales, Keep Inventory", "Deletes imported historical sale rows and resets matched sold inventory back to In Stock. Inventory plants stay in the app.", "Delete All Sales", "sales")}
          {dangerCard("Delete Historical Imports Only", "Only removes old unmatched Palmstreet/Whatnot rows saved as HIST records. Matched inventory sales are not touched.", "Delete Historical Imports", "historical")}
          {dangerCard("Start Customers & Sales Over", "Best option before a clean re-import. Clears customers, deletes sales history, removes historical imports, and keeps inventory.", "Reset Customers + Sales", "all")}
          {dangerCard("Delete ALL Inventory", "Removes every plant/inventory row from the app, including any historical sales rows stored with inventory. Keeps nurseries, employees, timecards, expenses, bills, and settings.", "Delete All Inventory", "inventory")}
          {dangerCard("Full Plant Data Reset", "Most aggressive reset. Deletes inventory, sales, customers, and historical imports. Keeps nurseries, employees, timecards, expenses, bills, and app settings.", "Delete Inventory + Customers + Sales", "full")}
        </div>
      </div>;
    }


    /* ══════════════════════════════════════════════════════════
       PLANT SHIPMENT DOCUMENTS — California + Texas/Louisiana Archive
       FDACS shipment documents · Auto-generated on every Post-Show import
    ══════════════════════════════════════════════════════════ */
    function CasdCertificates({ casdCerts, setCasdCerts, plants, user, addAudit }) {
      const [tab, setTab]               = useState("archive");
      const [step, setStep]             = useState("form");
      const [dest, setDest]             = useState("CA");
      const [csvMode, setCsvMode]       = useState(false);
      const [csvText, setCsvText]       = useState("");
      const [csvOrders, setCsvOrders]   = useState([]);
      const [consignee, setConsignee]   = useState({ name:"", address1:"", address2:"", phone:"" });
      const [plantRows, setPlantRows]   = useState([{ id:uid(), qty:"1", name:"", size:"" }]);
      const [generating, setGenerating] = useState(false);
      const [genError, setGenError]     = useState("");
      const [search, setSearch]         = useState("");
      const fileRef = useRef();

      const nextNum = () => casdNextNum(casdCerts);

      const parseCsvForManual = () => {
        const lines = (csvText||"").trim().split("\n");
        if (lines.length < 2) { setGenError("No CA, TX, or LA orders found."); return; }
        const headers = lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
        const get = (row,name) => { const i=headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase())); return i>=0?(row[i]||"").replace(/"/g,"").trim():""; };
        const orders = lines.slice(1).map(line => {
          const row=(line.match(/(".*?"|[^,]+)(?=,|$)/g)||[]).map(v=>v.replace(/^"|"$/g,"").trim());
          const state=(get(row,"state")||"").toUpperCase();
          if(!["CA","TX","LA"].includes(state)) return null;
          return { customerName:get(row,"recipient")||get(row,"buyer")||get(row,"customer"), address1:get(row,"address")||get(row,"street"), address2:[get(row,"city"),state,get(row,"zip")].filter(Boolean).join(", "), phone:get(row,"phone")||"", state, itemTitle:get(row,"item")||get(row,"product")||get(row,"title"), qty:get(row,"quantity")||"1" };
        }).filter(Boolean);
        if (!orders.length) { setGenError("No CA, TX, or LA orders found in this CSV."); return; }
        setCsvOrders(orders); setGenError("");
      };

      const selectCsvOrder = order => {
        setConsignee({ name:order.customerName, address1:order.address1, address2:order.address2, phone:order.phone });
        setPlantRows([{ id:uid(), qty:order.qty||"1", name:order.itemTitle||"", size:"" }]);
        setStep("review");
      };

      const addRow    = () => setPlantRows(r => [...r, { id:uid(), qty:"1", name:"", size:"" }]);
      const delRow    = id => setPlantRows(r => r.filter(x=>x.id!==id));
      const updRow    = (id,f,v) => setPlantRows(r => r.map(x=>x.id===id?{...x,[f]:v}:x));

      const generateCert = async () => {
        if (!consignee.name||!consignee.address1) { setGenError("Consignee name and address required."); return; }
        const ps = plantRows.filter(r=>r.name.trim());
        if (!ps.length) { setGenError("Add at least one plant."); return; }
        setGenerating(true); setGenError("");
        try {
          const certNumber = nextNum();
          const dateStr = new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"});
          const pdfBytes = await fillCasdPdf({ certNumber, date:dateStr, consignee, plants:ps });
          const b64 = bytesToBase64(pdfBytes);
          const docLabel = CASD_DOC_LABELS[dest] || "Plant Shipment Document";
          const filename = `${dest}-Plant-Ship-Doc-No${certNumber}-${(consignee.name).replace(/\s+/g,"-")}-${today()}.pdf`;
          const newCert = { id:uid(), certNumber, date:dateStr, destination:dest, documentType:docLabel, printRequired:true, printed:false, printAlert:`Print ${docLabel} #${certNumber} and put it inside ${consignee.name} shipment.`, consigneeName:consignee.name, consigneeAddress:[consignee.address1,consignee.address2].filter(Boolean).join(", "), consigneePhone:consignee.phone||"", plants:ps, plantCount:ps.length, pdfBase64:b64, pdfFilename:filename, createdAt:new Date().toISOString(), createdBy:user.name, autoGenerated:false };
          setCasdCerts(p=>[newCert,...p]);
          addAudit({ action:`CASD Document #${certNumber} manually generated for ${consignee.name} (${dest})`, user:user.name, page:"Plant Shipment Documents" });
          const blob=new Blob([pdfBytes],{type:"application/pdf"});
          const url=URL.createObjectURL(blob);
          Object.assign(document.createElement("a"),{href:url,download:filename}).click();
          URL.revokeObjectURL(url);
          alert(`✅ Saved copy created. IMPORTANT: Print ${docLabel} #${certNumber} and put it with this shipment.`);
          setStep("done"); setGenerating(false);
        } catch(e) { setGenError("PDF generation failed: "+e.message); setGenerating(false); }
      };

      const downloadCert = cert => {
        const bytes=Uint8Array.from(atob(cert.pdfBase64),c=>c.charCodeAt(0));
        const url=URL.createObjectURL(new Blob([bytes],{type:"application/pdf"}));
        Object.assign(document.createElement("a"),{href:url,download:cert.pdfFilename}).click();
        URL.revokeObjectURL(url);
      };
      const printCert = cert => {
        const bytes=Uint8Array.from(atob(cert.pdfBase64),c=>c.charCodeAt(0));
        const url=URL.createObjectURL(new Blob([bytes],{type:"application/pdf"}));
        const w=window.open(url); if(w) w.onload=()=>w.print();
      };
      const resetForm = () => { setStep("form"); setCsvMode(false); setCsvText(""); setCsvOrders([]); setConsignee({name:"",address1:"",address2:"",phone:""}); setPlantRows([{id:uid(),qty:"1",name:"",size:""}]); setGenError(""); setDest("CA"); };

      const filtered = (casdCerts||[]).filter(c => !search||(c.consigneeName||"").toLowerCase().includes(search.toLowerCase())||String(c.certNumber).includes(search)||(c.destination||"").includes(search.toUpperCase()));

      const GR = ({c,label}) => (
        <div style={{background:C.card,border:`1px solid ${C.bd}`,borderRadius:12,padding:"14px",borderTop:`3px solid ${c}`}}>
          <div style={{fontSize:10,fontWeight:700,color:C.tx3,textTransform:"uppercase",letterSpacing:.5,marginBottom:5}}>{label[0]}</div>
          <div style={{fontSize:28,fontWeight:700,color:c,fontFamily:F.display}}>{label[1]}</div>
        </div>
      );

      return (
        <div style={{padding:"14px 14px 90px",background:C.bg,minHeight:"100vh"}}>
          <SHdr icon="📜" title="Plant Shipment Documents"
            sub="California certs + Texas/Louisiana consolidation declarations auto-generate from Palmstreet/Whatnot shows"
            right={
              <Row gap={8}>
                {["archive","new"].map(t=>(
                  <Btn key={t} v={tab===t?"fill":"ghost"} onClick={()=>{setTab(t);if(t==="new")resetForm();}}>
                    {t==="archive"?"📁 Archive":"+ New Certificate"}
                  </Btn>
                ))}
              </Row>
            }
          />

          {/* ── ARCHIVE ── */}
          {tab==="archive" && (
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
                <GR c={C.g600} label={["Total Saved",(casdCerts||[]).length]}/>
                <GR c={C.blue} label={["California",((casdCerts||[]).filter(c=>c.destination==="CA")).length]}/>
                <GR c={C.gold} label={["Texas",((casdCerts||[]).filter(c=>c.destination==="TX")).length]}/>
                <GR c={C.purple} label={["Louisiana",((casdCerts||[]).filter(c=>c.destination==="LA")).length]}/>
              </div>

              <div style={{background:C.goldBg,border:`1px solid ${C.gold}55`,borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,color:C.tx2,lineHeight:1.7}}>
                <b style={{color:C.gold}}>⚖️ FDACS Compliance:</b> Keep all certs on file permanently.
                Original with shipment · 1st copy here · 2nd copy to Plant Protection Specialist.
                <b style={{color:C.red}}> Fraudulent use is a criminal offence.</b>
              </div>

              <div style={{background:C.redBg,border:`2px solid ${C.red}`,borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:14,color:C.tx2,lineHeight:1.7}}>
                <b style={{color:C.red}}>🚨 Print Reminder:</b> These PDFs are saved in this archive, but you still must <b>print the correct document and put it with each shipment</b> for California, Texas, and Louisiana orders.
              </div>

              <div style={{background:C.g50,border:`1px solid ${C.g200}`,borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,color:C.tx2,lineHeight:1.7}}>
                <b style={{color:C.g700}}>🤖 Automatic:</b> Every time you upload a show in <b>Post-Show Import</b>, any California, Texas, or Louisiana customer automatically gets the needed document generated, downloaded, and saved here. <b style={{color:C.red}}>Print it and place one copy inside that customer shipment.</b>
              </div>

              <div style={{marginBottom:12}}>
                <input placeholder="Search by customer, document #, CA, TX, or LA…" value={search} onChange={e=>setSearch(e.target.value)}
                  style={{width:"100%",padding:"10px 14px",border:`1.5px solid ${C.bd}`,borderRadius:9,fontSize:13,fontFamily:F.body,outline:"none",boxSizing:"border-box"}}/>
              </div>

              {filtered.length===0 ? (
                <Card style={{textAlign:"center",padding:"50px"}}>
                  <div style={{fontSize:40,marginBottom:12}}>📜</div>
                  <h2 style={{fontFamily:F.display,color:C.g900,fontSize:18,marginBottom:8}}>No certificates yet</h2>
                  <p style={{color:C.tx3,marginBottom:16}}>Import a show with CA, TX, or LA customers — documents generate automatically. Or create one manually.</p>
                  <Btn onClick={()=>{setTab("new");resetForm();}}>+ New Certificate</Btn>
                </Card>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {filtered.map(cert=>(
                    <Card key={cert.id} style={{padding:"14px 16px"}}>
                      <Row between style={{flexWrap:"wrap",gap:10}}>
                        <div style={{flex:1}}>
                          <Row gap={10} center style={{marginBottom:6,flexWrap:"wrap"}}>
                            <span style={{fontFamily:F.display,fontSize:16,fontWeight:700,color:C.g900}}>Document #{cert.certNumber}</span>
                            <span style={{background:cert.destination==="CA"?C.blueBg:C.goldBg,color:cert.destination==="CA"?C.blue:C.gold,border:`1px solid ${cert.destination==="CA"?"rgba(26,95,154,.3)":"rgba(176,125,16,.3)"}`,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>{cert.destination}</span>
                            {cert.autoGenerated&&<span style={{background:C.g100,color:C.g700,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>🤖 Auto</span>}
                            <span style={{fontSize:12,color:C.tx3}}>{cert.date}</span>
                          </Row>
                          <div style={{fontWeight:600,fontSize:14,color:C.tx1,marginBottom:2}}>{cert.consigneeName}</div>
                          <div style={{fontSize:12,color:C.tx3}}>{cert.consigneeAddress}</div>
                          <div style={{fontSize:12,color:C.red,fontWeight:700,marginTop:4}}>🚨 Print and place with shipment · {cert.documentType || (cert.destination==="CA"?"California certificate":"TX/LA consolidation declaration")}</div>
                          <div style={{fontSize:11,color:C.tx3,marginTop:4}}>{cert.plantCount} plant{cert.plantCount!==1?"s":""} · {cert.createdBy}</div>
                          {cert.plants&&(
                            <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:5}}>
                              {cert.plants.slice(0,4).map((p,i)=>(
                                <span key={i} style={{background:C.g50,border:`1px solid ${C.bdS}`,borderRadius:20,padding:"2px 9px",fontSize:11,color:C.tx2}}>{p.qty}× {p.name}{p.size?" "+p.size:""}</span>
                              ))}
                              {cert.plants.length>4&&<span style={{fontSize:11,color:C.tx3,padding:"2px 6px"}}>+{cert.plants.length-4} more</span>}
                            </div>
                          )}
                        </div>
                        <Row gap={8} style={{flexShrink:0,flexWrap:"wrap",alignSelf:"flex-start"}}>
                          <Btn sz="sm" v="outline" onClick={()=>downloadCert(cert)}>📥 Download</Btn>
                          <Btn sz="sm" onClick={()=>printCert(cert)}>🖨️ Print</Btn>
                        </Row>
                      </Row>
                    </Card>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* ── NEW MANUAL CERT ── */}
          {tab==="new" && step==="form" && (
            <div style={{maxWidth:780}}>
              <div style={{background:C.blueBg,border:`1px solid rgba(26,95,154,.25)`,borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,color:C.tx2,lineHeight:1.7}}>
                <b style={{color:C.blue}}>📋 Manual certificate.</b> For CA & TX shipments only. Reg #48035818 · Nematode #04717449 · IFA #0206 are pre-filled automatically.
              </div>

              <Card style={{marginBottom:14}}>
                <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15,marginBottom:12}}>1. Destination State</div>
                <Row gap={10}>
                  {["CA","TX"].map(s=>(
                    <button key={s} onClick={()=>setDest(s)} style={{flex:1,padding:"14px",borderRadius:10,cursor:"pointer",border:`2px solid ${dest===s?C.g700:C.bd}`,background:dest===s?C.g700:C.card,color:dest===s?"#fff":C.tx2,fontWeight:700,fontSize:16,fontFamily:F.body,transition:"all .15s"}}>
                      {s==="CA"?"🌴 California":"⭐ Texas"}
                    </button>
                  ))}
                </Row>
              </Card>

              <Card style={{marginBottom:14}}>
                <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15,marginBottom:12}}>2. Customer Info</div>
                <Row gap={10} style={{marginBottom:14}}>
                  {[{v:false,l:"✏️ Enter Manually"},{v:true,l:"📄 From Palmstreet CSV"}].map(o=>(
                    <button key={String(o.v)} onClick={()=>setCsvMode(o.v)} style={{flex:1,padding:"10px",borderRadius:8,cursor:"pointer",border:`1.5px solid ${csvMode===o.v?C.g700:C.bd}`,background:csvMode===o.v?C.g50:C.card,color:csvMode===o.v?C.g700:C.tx3,fontWeight:600,fontSize:13,fontFamily:F.body}}>
                      {o.l}
                    </button>
                  ))}
                </Row>

                {csvMode ? (
                  <div>
                    <p style={{fontSize:13,color:C.tx3,marginBottom:10}}>Palmstreet → Orders → Export CSV. Paste below. Only CA/TX addresses shown.</p>
                    <textarea value={csvText} onChange={e=>setCsvText(e.target.value)} placeholder="Paste Palmstreet CSV export here…"
                      style={{width:"100%",minHeight:100,padding:"10px 12px",border:`1.5px solid ${C.bd}`,borderRadius:9,fontSize:12,fontFamily:F.mono,resize:"vertical",boxSizing:"border-box",outline:"none"}}/>
                    <Btn style={{marginTop:10}} onClick={parseCsvForManual}>Parse CSV →</Btn>
                    {csvOrders.length>0&&(
                      <div style={{marginTop:12}}>
                        <div style={{fontSize:12,fontWeight:700,color:C.g700,marginBottom:8}}>Found {csvOrders.length} CA/TX order{csvOrders.length!==1?"s":""}:</div>
                        {csvOrders.map((o,i)=>(
                          <div key={i} onClick={()=>selectCsvOrder(o)}
                            style={{background:C.g50,border:`1px solid ${C.bd}`,borderRadius:9,padding:"11px 14px",marginBottom:8,cursor:"pointer"}}
                            onMouseEnter={e=>e.currentTarget.style.borderColor=C.g500}
                            onMouseLeave={e=>e.currentTarget.style.borderColor=C.bd}>
                            <div style={{fontWeight:700,fontSize:13,color:C.tx1}}>{o.customerName}</div>
                            <div style={{fontSize:12,color:C.tx3}}>{o.address1}, {o.address2}</div>
                            <div style={{fontSize:11,color:C.tx3,marginTop:2}}>{o.itemTitle} · {o.state}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ) : (
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div style={{gridColumn:"1/-1"}}>
                      <Inp label="Customer Full Name *" value={consignee.name} onChange={v=>setConsignee(p=>({...p,name:v}))} placeholder="Jane Smith" required/>
                    </div>
                    <Inp label="Address Line 1 *" value={consignee.address1} onChange={v=>setConsignee(p=>({...p,address1:v}))} placeholder="1234 Oak Street" required/>
                    <Inp label="City, State, Zip" value={consignee.address2} onChange={v=>setConsignee(p=>({...p,address2:v}))} placeholder="Los Angeles, CA 90001"/>
                    <Inp label="Phone (optional)" value={consignee.phone} onChange={v=>setConsignee(p=>({...p,phone:v}))} placeholder=""/>
                    <div style={{gridColumn:"1/-1"}}>
                      <Btn full onClick={()=>setStep("review")} disabled={!consignee.name||!consignee.address1}>Next: Add Plants →</Btn>
                    </div>
                  </div>
                )}
              </Card>
            </div>
          )}

          {tab==="new" && step==="review" && (
            <div style={{maxWidth:780}}>
              <div style={{background:C.g800,borderRadius:12,padding:"16px 20px",marginBottom:14,color:"#fff"}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:.5,textTransform:"uppercase",opacity:.75,marginBottom:4}}>Certificate Preview</div>
                <div style={{fontFamily:F.display,fontSize:20,fontWeight:700}}>Document #{nextNum()} · {dest}</div>
                <div style={{fontSize:13,opacity:.8,marginTop:3}}>{consignee.name} · {consignee.address1}{consignee.address2?", "+consignee.address2:""}</div>
              </div>

              <Card style={{background:C.g50,border:`1px solid ${C.g200}`,marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:C.tx3,textTransform:"uppercase",letterSpacing:.5,marginBottom:6}}>Shipper (always fixed)</div>
                <div style={{fontSize:13,color:C.tx2}}>Leaf Diary · 957 N Suncoast Blvd, Crystal River, FL 34429<br/>Contact: Malasia W. · 727-377-6305 · Reg #48035818</div>
              </Card>

              <Card style={{marginBottom:14}}>
                <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15,marginBottom:4}}>Plants Being Shipped</div>
                <div style={{fontSize:12,color:C.tx3,marginBottom:14}}>Page 1 holds 11 plants · Page 2 addendum holds 22 more (33 total max per cert)</div>
                <div style={{display:"grid",gridTemplateColumns:"60px 1fr 80px 36px",gap:8,marginBottom:8,padding:"0 4px",fontSize:10,fontWeight:700,color:C.tx3,textTransform:"uppercase",letterSpacing:.5}}>
                  <div>Qty</div><div>Plant Name (as certified)</div><div>Pot Size</div><div></div>
                </div>
                {plantRows.map(row=>(
                  <div key={row.id} style={{display:"grid",gridTemplateColumns:"60px 1fr 80px 36px",gap:8,marginBottom:8,alignItems:"center"}}>
                    <input type="number" value={row.qty} onChange={e=>updRow(row.id,"qty",e.target.value)} min="1"
                      style={{padding:"8px",border:`1.5px solid ${C.bd}`,borderRadius:8,fontSize:13,textAlign:"center",fontFamily:F.body,outline:"none"}}/>
                    <input value={row.name} onChange={e=>updRow(row.id,"name",e.target.value)} placeholder="e.g. Monstera Deliciosa"
                      style={{padding:"8px 10px",border:`1.5px solid ${C.bd}`,borderRadius:8,fontSize:13,fontFamily:F.body,outline:"none",width:"100%",boxSizing:"border-box"}}/>
                    <input value={row.size} onChange={e=>updRow(row.id,"size",e.target.value)} placeholder='4"'
                      style={{padding:"8px",border:`1.5px solid ${C.bd}`,borderRadius:8,fontSize:13,fontFamily:F.body,outline:"none"}}/>
                    <button onClick={()=>delRow(row.id)} disabled={plantRows.length===1}
                      style={{background:"none",border:`1px solid ${C.bd}`,borderRadius:7,color:C.red,cursor:plantRows.length===1?"not-allowed":"pointer",width:32,height:32,fontSize:15,opacity:plantRows.length===1?.4:1}}>✕</button>
                  </div>
                ))}
                <Btn v="soft" sz="sm" onClick={addRow} style={{marginTop:6}}>+ Add Plant Row</Btn>
                <div style={{marginTop:12,padding:"10px 14px",background:C.g50,borderRadius:8,fontSize:12,color:C.tx3}}>
                  Nematode #: <b style={{color:C.tx1}}>04717449</b> · IFA#: <b style={{color:C.tx1}}>0206</b> (auto-filled on all rows)
                </div>
              </Card>

              {genError&&<div style={{background:C.redBg,border:`1px solid ${C.red}44`,borderRadius:9,padding:"12px 16px",marginBottom:14,color:C.red,fontSize:13}}>⚠️ {genError}</div>}

              <Row gap={10} style={{justifyContent:"flex-end"}}>
                <Btn v="ghost" onClick={()=>setStep("form")}>← Back</Btn>
                <Btn onClick={generateCert} disabled={generating}>
                  {generating?"⏳ Generating PDF…":"📜 Generate & Download"}
                </Btn>
              </Row>
            </div>
          )}

          {tab==="new" && step==="done" && (
            <div style={{textAlign:"center",padding:"60px 20px"}}>
              <div style={{fontSize:56,marginBottom:16}}>✅</div>
              <h2 style={{fontFamily:F.display,color:C.g900,marginBottom:8,fontSize:22}}>Certificate Generated!</h2>
              <p style={{color:C.tx3,marginBottom:6}}>Document #{(casdCerts||[])[0]?.certNumber} saved to your archive.</p>
              <div style={{background:C.goldBg,border:`1px solid ${C.gold}44`,borderRadius:10,padding:"12px 18px",margin:"16px auto",maxWidth:440,fontSize:13,color:C.tx2,lineHeight:1.8}}>
                <b style={{color:C.gold}}>📋 Distribution:</b><br/>
                ✅ Original → goes with shipment in the box<br/>
                ✅ 1st copy → saved in your archive here<br/>
                ✅ 2nd copy → send to Plant Protection Specialist
              </div>
              <Row gap={10} style={{justifyContent:"center",marginTop:20}}>
                <Btn v="ghost" onClick={()=>{setTab("archive");resetForm();}}>📁 View Archive</Btn>
                <Btn onClick={resetForm}>+ New Certificate</Btn>
              </Row>
            </div>
          )}
        </div>
      );
    }


    /* ══════════════════════════════════════════════════════════
       SHOW BUILDER / PALMSTREET PREP EXPORT
    ══════════════════════════════════════════════════════════ */
    function ShowBuilder({ plants, setPlants, user, addAudit }) {
      const [showName, setShowName] = useState(`Leaf Diary Show ${today()}`);
      const [ids, setIds] = useState(getSavedShowIds());
      const [entry, setEntry] = useState('');
      const [search, setSearch] = useState('');
      const [privateListing, setPrivateListing] = useState(false);
      const [msg, setMsg] = useState('');
      useEffect(() => saveShowIds(ids), [ids]);
      const byPlantId = id => plants.find(p => safePlantId(p).toLowerCase() === String(id).trim().toLowerCase());
      const showPlants = ids.map(id => byPlantId(id)).filter(Boolean);
      const missing = ids.filter(id => !byPlantId(id));
      const errors = validatePalmstreetPlants(showPlants);
      const addIds = raw => {
        const found = [], notFound = [];
        raw.split(/[,\n\r\t ]+/).map(x => x.trim()).filter(Boolean).forEach(id => {
          const p = byPlantId(id);
          if (p) found.push(safePlantId(p)); else notFound.push(id);
        });
        if (found.length) setIds(prev => [...new Set([...prev, ...found])]);
        setEntry('');
        setMsg(`${found.length} added${notFound.length ? ` · ${notFound.length} not found: ${notFound.slice(0, 6).join(', ')}` : ''}`);
      };
      const removeId = id => setIds(prev => prev.filter(x => x !== id));
      const move = (i, dir) => setIds(prev => { const a = [...prev], j = i + dir; if (j < 0 || j >= a.length) return a;[a[i], a[j]] = [a[j], a[i]]; return a; });
      const clear = () => { if (confirm('Clear this show list?')) { setIds([]); setMsg('Show list cleared.'); } };
      const exportPalmstreet = () => {
        if (!showPlants.length) { alert('Add plants to the show first.'); return; }
        if (errors.length) { alert('Fix these before exporting to Palmstreet:\n\n' + errors.slice(0, 25).join('\n') + (errors.length > 25 ? `\n...and ${errors.length - 25} more` : '')); return; }
        const fileSafe = showName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'leaf-diary-show';
        downloadCSVFile(`${fileSafe}-palmstreet-upload-${today()}.csv`, makePalmstreetCSV(showPlants, { showName, privateListing }));
        setPlants(prev => prev.map(p => ids.includes(safePlantId(p)) ? { ...p, palmstreetExportedAt: new Date().toISOString(), lastShowName: showName } : p));
        addAudit && addAudit({ action: `Exported Show Builder to Palmstreet CSV — ${showPlants.length} plants`, user: user.name, page: 'Show Builder' });
        setMsg(`Palmstreet CSV exported for ${showPlants.length} plants.`);
      };
      const exportShowList = () => {
        if (!showPlants.length) { alert('Add plants first.'); return; }
        const fileSafe = showName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'leaf-diary-show';
        downloadCSVFile(`${fileSafe}-internal-show-list-${today()}.csv`, makeShowListCSV(showPlants));
        setMsg('Internal show list exported.');
      };
      const quick = plants.filter(p => {
        const q = search.toLowerCase().trim();
        if (!q) return false;
        return safePlantId(p).toLowerCase().includes(q) || (p.name || '').toLowerCase().includes(q) || (p.nurseryCode || '').toLowerCase().includes(q);
      }).slice(0, 30);
      const inStockCount = showPlants.filter(p => p.status === 'In Stock').length;
      const value = showPlants.reduce((s, p) => s + (+p.suggestedPrice || +p.salePrice || 0), 0);
      return <div style={{ padding: '14px 14px 90px', background: C.bg, minHeight: '100vh' }}>
        <SHdr icon="🎪" title="Show Builder" sub="Build a Palmstreet upload file from inventory using Plant ID numbers"
          right={<Row gap={6} wrap><Btn onClick={exportPalmstreet}>🌴 Export Palmstreet CSV</Btn><Btn v="outline" onClick={exportShowList}>📋 Export Show List</Btn><Btn v="ghost" onClick={clear}>Clear</Btn></Row>} />
        {msg && <div style={{ background: C.g50, border: `1px solid ${C.g300}`, borderRadius: 10, padding: '10px 14px', marginBottom: 12, fontSize: 13, color: C.g800, fontWeight: 600 }}>{msg}</div>}
        <div style={{ display: 'grid', gridTemplateColumns: '1.2fr .8fr', gap: 14, marginBottom: 14 }}>
          <Card><div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 12 }}>1. Show Setup</div><Inp label="Show Name" value={showName} onChange={setShowName} placeholder="Leaf Diary Friday Rare Plant Show" /><div style={{ marginTop: 10 }}><label style={{ fontSize: 13, fontWeight: 600, color: C.tx2, display: 'flex', gap: 8, alignItems: 'center' }}><input type="checkbox" checked={privateListing} onChange={e => setPrivateListing(e.target.checked)} /> Export as private Palmstreet listings</label></div></Card>
          <Card style={{ background: C.g800, color: '#fff' }}><div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform: 'uppercase', opacity: .75, marginBottom: 8 }}>Current Show</div><div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8 }}><div><div style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700 }}>{showPlants.length}</div><div style={{ fontSize: 11, opacity: .75 }}>Plants</div></div><div><div style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700 }}>{inStockCount}</div><div style={{ fontSize: 11, opacity: .75 }}>In Stock</div></div><div><div style={{ fontFamily: F.display, fontSize: 28, fontWeight: 700 }}>{$(value)}</div><div style={{ fontSize: 11, opacity: .75 }}>Show Value</div></div></div></Card>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '380px 1fr', gap: 14 }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <Card><div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 10 }}>2. Add Plants by ID</div><p style={{ fontSize: 12, color: C.tx3, marginTop: 0 }}>Type or paste plant IDs. You can enter one ID or many IDs separated by spaces, commas, or new lines.</p><textarea value={entry} onChange={e => setEntry(e.target.value)} placeholder={'Example:\nPPC-0001\nPPC-0002'} style={{ width: '100%', minHeight: 92, padding: 12, border: `1.5px solid ${C.bd}`, borderRadius: 10, fontSize: 14, fontFamily: F.mono, resize: 'vertical' }} /><Btn full style={{ marginTop: 8 }} onClick={() => addIds(entry)} disabled={!entry.trim()}>Add Plant IDs to Show</Btn></Card>
            <Card><div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 15, marginBottom: 10 }}>Search Inventory</div><Inp value={search} onChange={setSearch} placeholder="Search plant name, ID, nursery code..." /><div style={{ marginTop: 10, maxHeight: 300, overflowY: 'auto' }}>{quick.length === 0 ? <div style={{ fontSize: 12, color: C.tx3, padding: '14px 0' }}>Search to add plants fast.</div> : quick.map(p => <div key={p.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: `1px solid ${C.bdS}` }}><div><div style={{ fontSize: 12, fontWeight: 700, color: C.g900 }}>{toTC(p.name)}</div><div style={{ fontFamily: F.mono, fontSize: 10, color: C.tx3 }}>{safePlantId(p)} · {$(p.suggestedPrice)}</div></div><Btn sz="sm" v={ids.includes(safePlantId(p)) ? 'ghost' : 'soft'} onClick={() => setIds(prev => [...new Set([...prev, safePlantId(p)])])}>{ids.includes(safePlantId(p)) ? 'Added' : 'Add'}</Btn></div>)}</div></Card>
            {(errors.length > 0 || missing.length > 0) && <Card style={{ background: C.redBg, border: `1px solid ${C.red}40` }}><div style={{ fontFamily: F.display, fontWeight: 700, color: C.red, fontSize: 15, marginBottom: 8 }}>Export Warnings</div>{missing.map(id => <div key={id} style={{ fontSize: 12, color: C.red, marginBottom: 4 }}>Missing inventory plant: {id}</div>)}{errors.slice(0, 12).map((e, i) => <div key={i} style={{ fontSize: 12, color: C.red, marginBottom: 4 }}>• {e}</div>)}{errors.length > 12 && <div style={{ fontSize: 12, color: C.red }}>...and {errors.length - 12} more</div>}</Card>}
          </div>
          <Card><Row between wrap style={{ marginBottom: 12 }}><div><div style={{ fontFamily: F.display, fontWeight: 700, color: C.g900, fontSize: 16 }}>Plants in This Show</div><div style={{ fontSize: 12, color: C.tx3 }}>Order here is the order exported to your internal show list.</div></div><Tag text={`${showPlants.length} plants`} color={C.g700} /></Row>{showPlants.length === 0 ? <div style={{ textAlign: 'center', padding: '60px 20px', color: C.tx3 }}><div style={{ fontSize: 42, marginBottom: 10 }}>🎪</div><div style={{ fontFamily: F.display, fontSize: 18, color: C.g900 }}>No plants added yet</div><p>Add plants by Plant ID from the left panel.</p></div> : <div style={{ overflowX: 'auto', border: `1px solid ${C.bd}`, borderRadius: 10 }}><table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}><thead style={{ background: C.cardAlt }}><tr>{['#', 'Plant', 'ID', 'Pot', 'Price', 'Status', 'Exported', 'Actions'].map(h => <th key={h} style={{ padding: '8px 10px', textAlign: 'left', color: C.tx3, fontWeight: 700, fontSize: 10, textTransform: 'uppercase', borderBottom: `1px solid ${C.bd}` }}>{h}</th>)}</tr></thead><tbody>{showPlants.map((p, i) => <tr key={safePlantId(p)} style={{ borderBottom: `1px solid ${C.bdS}` }}><td style={{ padding: '8px 10px', fontWeight: 700, color: C.tx3 }}>{i + 1}</td><td style={{ padding: '8px 10px' }}><b>{toTC(p.name)}</b><div style={{ fontSize: 10, color: C.tx3 }}>{p.nurseryCode || ''} {p.rack ? `· Rack ${p.rack}` : ''}</div></td><td style={{ padding: '8px 10px', fontFamily: F.mono, fontSize: 10, color: C.g600 }}>{safePlantId(p)}</td><td style={{ padding: '8px 10px' }}>{p.potSize || '—'}</td><td style={{ padding: '8px 10px', fontWeight: 700, color: C.g900 }}>{$(p.suggestedPrice || p.salePrice)}</td><td style={{ padding: '8px 10px' }}><SBadge s={p.status || 'In Stock'} /></td><td style={{ padding: '8px 10px' }}>{p.palmstreetExportedAt ? <Tag text="Yes" color={C.blue} sm /> : <span style={{ color: C.tx3 }}>No</span>}</td><td style={{ padding: '8px 10px' }}><Row gap={4}><Btn sz="sm" v="ghost" onClick={() => move(i, -1)}>↑</Btn><Btn sz="sm" v="ghost" onClick={() => move(i, 1)}>↓</Btn><Btn sz="sm" v="danger" onClick={() => removeId(safePlantId(p))}>Remove</Btn></Row></td></tr>)}</tbody></table></div>}</Card>
        </div>
      </div>;
    }

    /* ══════════════════════════════════════════════════════════
       POST-SHOW IMPORT — paste Palmstreet/Whatnot CSV
    ══════════════════════════════════════════════════════════ */
    function ShowImport({ plants, setPlants, addAudit, user }) {
      const [raw, setRaw] = useState("");
      const [parsed, setParsed] = useState([]);
      const [matched, setMatched] = useState([]);
      const [skipped, setSkipped] = useState([]);
      const [step, setStep] = useState("paste");
      const [platform, setPlatform] = useState("Palmstreet");
      const [importMode, setImportMode] = useState("historical");
      const [fileName, setFileName] = useState("");
      const [importMsg, setImportMsg] = useState("");
      const [duplicateInfo, setDuplicateInfo] = useState(null);
      const [lastImportResult, setLastImportResult] = useState(null);
      const fileRef = useRef();

      const money = v => {
        if (v === null || v === undefined || v === "") return 0;
        if (typeof v === "number") return v;
        const cleaned = String(v).replace(/[$,]/g, "").trim();
        const n = parseFloat(cleaned);
        return Number.isFinite(n) ? n : 0;
      };
      const cleanText = v => String(v ?? "").replace(/\s+/g, " ").trim();
      const normKey = k => String(k || "").toLowerCase().replace(/[^a-z0-9]/g, "");
      const rowVal = (row, names) => {
        const map = {};
        Object.keys(row || {}).forEach(k => map[normKey(k)] = row[k]);
        for (const n of names) {
          const v = map[normKey(n)];
          if (v !== undefined && v !== null && String(v).trim() !== "") return v;
        }
        return "";
      };
      const parseDateTimeValue = v => {
        if (!v) return "";
        if (v instanceof Date && !isNaN(v)) return v.toISOString();
        const s = String(v).trim();
        if (!s) return "";
        const d = new Date(s);
        if (!isNaN(d)) return d.toISOString();
        const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)?)?/i);
        if (m) {
          let [, mo, da, yr, hh = "12", mm = "00", ss = "00", ap] = m;
          let y = +yr < 100 ? 2000 + +yr : +yr;
          let h = +hh;
          if (ap && ap.toUpperCase() === "PM" && h < 12) h += 12;
          if (ap && ap.toUpperCase() === "AM" && h === 12) h = 0;
          const dt = new Date(y, +mo - 1, +da, h, +mm, +ss || 0);
          return isNaN(dt) ? s : dt.toISOString();
        }
        return s;
      };
      const parseDateValue = v => {
        const dt = parseDateTimeValue(v);
        if (!dt) return "";
        const d = new Date(dt);
        return isNaN(d) ? String(dt).slice(0, 10) : d.toISOString().slice(0, 10);
      };
      const isNonPlantVariant = text => {
        const t = String(text || "").toLowerCase();
        return !t ||
          t.includes("processing fee") ||
          t.includes("payment fee") ||
          t.includes("stripe") ||
          t.includes("bnpl") ||
          t.includes("1day") ||
          t.includes("2day") ||
          t.includes("heat pack") ||
          t.includes("insulation") ||
          t.includes("shipping") ||
          t.includes("ship") ||
          t.includes("label") ||
          t.includes("bundle protection");
      };
      const extractPlantCode = text => {
        if (!text) return null;
        const cleaned = String(text).toUpperCase().replace(/[_#]/g, " ");
        const match = cleaned.match(/\b([A-Z]{1,4})\s*-?\s*(\d{1,4})\b/);
        if (!match) return null;
        return `${match[1]}-${String(parseInt(match[2], 10)).padStart(3, "0")}`;
      };
      const compactKey = v => String(v ?? "").toLowerCase().replace(/\s+/g, " ").trim();
      const saleImportKey = sale => [
        platform,
        sale.orderNo || sale.orderNum || "NO_ORDER",
        sale.productVariant || sale.title || "NO_PRODUCT",
        sale.price || sale.productAmount || sale.orderAmount || sale.sellerIncome || 0,
        sale.saleDate || sale.orderDate || "NO_DATE"
      ].map(compactKey).join("|");
      const saleLegacyKey = sale => [
        sale.orderNo || sale.orderNum || "NO_ORDER",
        sale.productVariant || sale.title || "NO_PRODUCT",
        sale.price || sale.productAmount || sale.orderAmount || sale.sellerIncome || 0
      ].map(compactKey).join("|");
      const existingImportedSaleKeys = (inventory = plants) => {
        const keys = new Set();
        (inventory || []).forEach(p => {
          if (!p) return;
          if (p.saleImportKey) keys.add(compactKey(p.saleImportKey));
          if (p.saleLegacyKey) keys.add(compactKey(p.saleLegacyKey));
          if (p.orderNumber || p.rawProductVariant || p.salePrice) {
            keys.add([p.platform || platform, p.orderNumber || "NO_ORDER", p.rawProductVariant || p.name || "NO_PRODUCT", p.salePrice || 0, p.soldDate || "NO_DATE"].map(compactKey).join("|"));
            keys.add([p.orderNumber || "NO_ORDER", p.rawProductVariant || p.name || "NO_PRODUCT", p.salePrice || 0].map(compactKey).join("|"));
          }
        });
        return keys;
      };
      const isDuplicateSale = sale => {
        const keys = existingImportedSaleKeys(plants);
        return keys.has(saleImportKey(sale)) || keys.has(saleLegacyKey(sale));
      };
      const safeLower = v => String(v || "").toLowerCase();
      const findInventoryMatch = sale => {
        const code = sale.extractedPlantCode;
        if (code) {
          const byCode = plants.find(p =>
            safeLower(p.plantId) === safeLower(code) ||
            safeLower(p.plantCode) === safeLower(code) ||
            safeLower(p.barcodeValue) === safeLower(code)
          );
          if (byCode) return byCode;
        }
        const title = safeLower(sale.productVariant);
        if (!title || importMode === "historical") return null;
        return plants.find(p => p.status === "In Stock" && (
          title.includes(safeLower(p.plantId)) ||
          title.includes(safeLower(p.plantCode)) ||
          title.includes(safeLower(p.barcodeValue)) ||
          (p.name && (safeLower(p.name).includes(title.slice(0, 8)) || title.includes(safeLower(p.name).slice(0, 8))))
        )) || null;
      };
      const parseCSVRows = text => {
        const rows = [];
        let row = [], val = "", quoted = false;
        const pushVal = () => { row.push(val); val = ""; };
        const pushRow = () => { rows.push(row); row = []; };
        for (let i = 0; i < text.length; i++) {
          const ch = text[i], next = text[i + 1];
          if (ch === '"' && quoted && next === '"') { val += '"'; i++; }
          else if (ch === '"') quoted = !quoted;
          else if (ch === ',' && !quoted) pushVal();
          else if ((ch === '\n' || ch === '\r') && !quoted) {
            if (ch === '\r' && next === '\n') i++;
            pushVal(); pushRow();
          } else val += ch;
        }
        if (val || row.length) { pushVal(); pushRow(); }
        const nonEmpty = rows.filter(r => r.some(c => String(c || "").trim() !== ""));
        const headerIndex = nonEmpty.findIndex(r => r.some(c => /order|item|product|variant/i.test(String(c || ""))));
        const headers = (nonEmpty[headerIndex >= 0 ? headerIndex : 0] || []).map(h => cleanText(h));
        return nonEmpty.slice((headerIndex >= 0 ? headerIndex : 0) + 1).map(r => {
          const obj = {};
          headers.forEach((h, i) => { if (h) obj[h] = cleanText(r[i]); });
          return obj;
        });
      };
      const normalizeSalesRows = rows => {
        const good = [], bad = [];
        (rows || []).forEach((r, idx) => {
          const productVariant = cleanText(rowVal(r, ["Product Variants", "Product Variant", "Item Title", "Item", "Title", "Product", "Listing Title", "Name"]));
          if (isNonPlantVariant(productVariant)) { bad.push({ row: idx + 1, productVariant, reason: "non-plant row" }); return; }
          const orderNo = cleanText(rowVal(r, ["Order No", "Order number", "Order Number", "Order ID", "Order"]));
          const saleDateRaw = rowVal(r, ["Order Created Time(EST)", "Order Date(PDT)", "Order Date", "Date", "Created Time"]);
          const saleDateTime = parseDateTimeValue(saleDateRaw);
          const saleDate = parseDateValue(saleDateRaw);
          const productAmount = money(rowVal(r, ["Product Amount", "Product ", "Item Price", "Price", "Subtotal"]));
          const orderAmount = money(rowVal(r, ["Order Amount", "Order Total", "Total"]));
          const sellerIncome = money(rowVal(r, ["Seller Income", "Payout", "Net"]));
          const price = productAmount || orderAmount || sellerIncome;
          if (!productVariant || !price) { bad.push({ row: idx + 1, productVariant, reason: "missing product or price" }); return; }
          const extractedPlantCode = extractPlantCode(productVariant);
          const sale = {
            _id: uid(),
            orderNo,
            orderStatus: cleanText(rowVal(r, ["Order Status", "Status"])),
            saleDate,
            saleDateTime,
            orderCreatedAt: saleDateTime,
            buyerState: cleanText(rowVal(r, ["Buyer State", "State"])),
            orderAmount,
            productAmount,
            shippingFee: money(rowVal(r, ["Shipping Fee Amount", "Shipping Fee", "Shipping"])),
            paymentFee: money(rowVal(r, ["Payment Fee", "Stripe and BNPL Fee", "Stripe Fee"])),
            palmstreetFee: money(rowVal(r, ["Palmstreet Selling Fee", "PlantStory Selling Fee", "Selling Fee"])),
            sellingFeeDeductions: money(rowVal(r, ["Selling Fee Deductions"])),
            taxAmount: money(rowVal(r, ["Tax Amount", "Sales Tax Collected", "Tax"])),
            sellerIncome,
            refundAmount: money(rowVal(r, ["Refund Amount", "Refund"])),
            productVariant,
            extractedPlantCode,
            customer: cleanText(rowVal(r, ["Palmstreet UserName", "Palmstreet Username", "User Name", "Username", "Buyer", "Buyer Username", "Customer", "Customer Username"])),
            customerUsername: cleanText(rowVal(r, ["Palmstreet UserName", "Palmstreet Username", "User Name", "Username", "Buyer", "Buyer Username", "Customer", "Customer Username"])),
            recipientName: cleanText(rowVal(r, ["Recipient Name", "Recipient", "Ship To Name", "Customer Name", "Name"])),
            customerName: cleanText(rowVal(r, ["Recipient Name", "Recipient", "Ship To Name", "Customer Name", "Name"])),
            customerEmail: cleanText(rowVal(r, ["Email", "Customer Email", "Buyer Email"])),
            customerPhone: cleanText(rowVal(r, ["Phone", "Customer Phone", "Buyer Phone"])),
            customerAddress1: cleanText(rowVal(r, ["Street Line 1", "Address 1", "Address Line 1", "Ship Address 1", "Shipping Address 1"])),
            customerAddress2: cleanText(rowVal(r, ["Street Line 2", "Address 2", "Address Line 2", "Ship Address 2", "Shipping Address 2"])),
            customerCity: cleanText(rowVal(r, ["City", "Ship City", "Shipping City"])),
            customerState: cleanText(rowVal(r, ["State", "Buyer State", "Ship State", "Shipping State"])),
            customerCountry: cleanText(rowVal(r, ["Country", "Ship Country", "Shipping Country"])),
            customerZip: cleanText(rowVal(r, ["Zip/Postal Code", "Zip", "Postal Code", "Customer Zip", "Shipping Zip"])),
            raw: r,
          };
          const enrichedSale = { ...sale, title: productVariant, price, state: sale.buyerState, orderNum: orderNo, orderDate: saleDate, orderDateTime: saleDateTime, shipping: sale.shippingFee };
          const duplicate = isDuplicateSale(enrichedSale);
          const match = findInventoryMatch(enrichedSale);
          good.push({
            ...enrichedSale,
            matched: match,
            matchStatus: duplicate ? "duplicate" : match ? "matched" : "unmatched",
            duplicate,
            duplicateReason: duplicate ? "Already imported from a previous Palmstreet/Whatnot upload" : "",
            saleImportKey: saleImportKey(enrichedSale),
            saleLegacyKey: saleLegacyKey(enrichedSale),
            apply: !duplicate,
            historicalImport: !match
          });
        });
        return { good, bad };
      };

      const parseCSV = text => normalizeSalesRows(parseCSVRows(text));

      const loadFile = f => {
        if (!f) return;
        setFileName(f.name || ""); setImportMsg(""); setDuplicateInfo(null); setLastImportResult(null);
        const isXlsx = /\.xlsx?$/i.test(f.name || "");
        const r = new FileReader();
        r.onload = e => {
          try {
            if (isXlsx) {
              if (!window.XLSX) throw new Error("Excel parser did not load. Refresh the page and try again.");
              const wb = window.XLSX.read(new Uint8Array(e.target.result), { type: "array", cellDates: true });
              const sheetName = wb.SheetNames.includes("Order Details") ? "Order Details" : wb.SheetNames[0];
              const rows = window.XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: "", raw: false });
              const { good, bad } = normalizeSalesRows(rows);
              setParsed(rows); setMatched(good); setSkipped(bad); setStep("review");
            } else {
              const text = e.target.result;
              setRaw(text);
              const { good, bad } = parseCSV(text);
              setParsed(good); setMatched(good); setSkipped(bad); setStep("review");
            }
          } catch (err) {
            setImportMsg("Import failed: " + (err.message || String(err)));
          }
        };
        if (isXlsx) r.readAsArrayBuffer(f); else r.readAsText(f);
      };

      const runMatch = () => {
        if (!raw.trim()) return;
        setDuplicateInfo(null); setLastImportResult(null);
        const { good, bad } = parseCSV(raw);
        setMatched(good);
        setParsed(good);
        setSkipped(bad);
        setStep("review");
      };

      const toggleApply = id => setMatched(p => p.map(r => r._id === id ? { ...r, apply: !r.apply } : r));
      const setMatch = (id, plantId) => setMatched(p => p.map(r => {
        if (r._id !== id) return r;
        const plant = plants.find(p => p.id === plantId);
        return { ...r, matched: plant || null, apply: true, matchStatus: plant ? "matched" : "unmatched", historicalImport: !plant };
      }));
      const makeHistoricalSalePlant = (sale, idx) => {
        const fallbackId = `HIST-${String(idx + 1).padStart(4, "0")}`;
        const code = sale.extractedPlantCode || `${fallbackId}-${uid().toUpperCase()}`;
        return {
          id: uid(),
          plantId: code,
          plantCode: code,
          barcodeValue: code,
          barcodeType: "CODE128",
          nurseryCode: "HIST",
          name: toTC(sale.productVariant || sale.title || "Historical Palmstreet Sale"),
          botanicalName: "",
          potSize: "",
          cost: 0,
          costSource: "unknown historical import",
          verifiedCost: false,
          suggestedPrice: sale.price,
          salePrice: sale.price,
          shippingCost: sale.shippingFee || sale.shipping || 0,
          platform,
          status: "Sold",
          soldDate: sale.saleDate || sale.orderDate || today(),
          soldAt: sale.saleDateTime || sale.orderDateTime || sale.orderCreatedAt || "",
          saleDateTime: sale.saleDateTime || sale.orderDateTime || sale.orderCreatedAt || "",
          orderCreatedAt: sale.orderCreatedAt || sale.orderDateTime || sale.saleDateTime || "",
          dateAdded: sale.saleDate || sale.orderDate || today(),
          customerUsername: sale.customerUsername || sale.customer || "",
          customerName: sale.customerName || sale.recipientName || "",
          buyerName: sale.customerName || sale.recipientName || "",
