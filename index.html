/* ══════════════════════════════════════════════════════════
   ADMIN PANEL
══════════════════════════════════════════════════════════ */
function AdminPanel({users,setUsers,settings,setSettings}){
  const [tab,setTab]=useState("users");
  const [editId,setEditId]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const blank={id:"",name:"",role:"employee",pin:"",email:"",permissions:{...DEFAULT_PERMS}};
  const [form,setForm]=useState({...blank});
  const certRef=useRef();
  const startEdit=u=>{setEditId(u.id);setForm({...u,permissions:{...DEFAULT_PERMS,...(u.permissions||{})}});setShowAdd(false);};
  const saveEdit=()=>{setUsers(p=>p.map(u=>u.id===editId?{...form}:u));setEditId(null);};
  const saveNew=()=>{if(!form.name.trim()||!form.pin.trim())return;setUsers(p=>[...p,{...form,id:uid()}]);setForm({...blank});setShowAdd(false);};
  const updF=f=>v=>setForm(p=>({...p,[f]:v}));
  const updP=f=>v=>setForm(p=>({...p,permissions:{...p.permissions,[f]:v}}));
  const loadCert=file=>{if(!file)return;const r=new FileReader();r.onload=e=>setSettings(p=>({...p,resellerCertData:e.target.result,resellerCertName:file.name}));r.readAsDataURL(file);};
  const UForm=({isNew})=><Card style={{marginBottom:16,border:`1.5px solid ${C.g200}`}}>
    <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:14,marginBottom:14}}>{isNew?"Add New Employee":"Edit User"}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:14}}>
      <Inp label="Full Name *" value={form.name} onChange={updF("name")} required/>
      <Inp label="PIN (4–6 digits) *" value={form.pin} onChange={updF("pin")} placeholder="e.g. 4291" required/>
      <Inp label="Email" value={form.email} onChange={updF("email")} placeholder="emp@email.com"/>
      <Sel label="Role" value={form.role} onChange={updF("role")} options={["employee","manager","owner"]}/>
    </div>
    {form.role!=="owner"&&<div>
      <div style={{fontWeight:700,color:C.g900,fontSize:13,marginBottom:10}}>Permissions for {form.name||"this employee"}</div>
      {PERM_GROUPS.map(({group,keys})=><div key={group} style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:C.tx3,letterSpacing:.5,textTransform:"uppercase",marginBottom:6}}>{group}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
          {keys.map(k=><label key={k} style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:12,padding:"5px 9px",background:form.permissions?.[k]?C.g50:C.cardAlt,borderRadius:6,border:`1px solid ${form.permissions?.[k]?C.g200:C.bd}`}}>
            <input type="checkbox" checked={!!form.permissions?.[k]} onChange={e=>updP(k)(e.target.checked)} style={{width:14,height:14,accentColor:C.g700}}/>{PERM_LABELS[k]}
          </label>)}
        </div>
      </div>)}
    </div>}
    {form.role==="owner"&&<div style={{background:C.g50,borderRadius:8,padding:"10px 14px",fontSize:12,color:C.tx2,marginBottom:14}}>Owners have full access to everything — no restrictions.</div>}
    <Row gap={8}><Btn onClick={isNew?saveNew:saveEdit}>{isNew?"Add Employee":"Save Changes"}</Btn><Btn v="ghost" onClick={()=>{isNew?setShowAdd(false):setEditId(null);setForm({...blank});}}>Cancel</Btn></Row>
  </Card>;
  const TABS=[{id:"users",l:"👥 Users & Permissions"},{id:"settings",l:"⚙️ Pricing Settings"},{id:"cert",l:"📄 Reseller Certificate"}];
  return <div style={{padding:"14px 14px 90px",background:C.bg,minHeight:"100vh"}}>
    <SHdr icon="⚙️" title="Admin Panel" sub="Manage users, permissions, pricing rules, and business documents"/>
    <div style={{display:"flex",gap:0,marginBottom:22,borderBottom:`1px solid ${C.bd}`,flexWrap:"wrap"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"8px 16px",fontSize:12,fontWeight:tab===t.id?700:500,background:"transparent",border:"none",borderBottom:tab===t.id?`2.5px solid ${C.g700}`:"2.5px solid transparent",color:tab===t.id?C.g800:C.tx3,cursor:"pointer",fontFamily:F.body,whiteSpace:"nowrap"}}>{t.l}</button>)}
    </div>
    {tab==="users"&&<div style={{maxWidth:860}}>
      {(showAdd||editId)&&<UForm isNew={!editId}/>}
      {!showAdd&&!editId&&<Btn onClick={()=>{setShowAdd(true);setForm({...blank});}} style={{marginBottom:16}}>+ Add Employee</Btn>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {users.map(u=><Card key={u.id} style={{padding:"14px 18px"}}>
          <Row between center>
            <div style={{flex:1}}>
              <Row gap={10} center style={{marginBottom:4}}><div style={{fontWeight:700,color:C.tx1,fontSize:14}}>{u.name}</div><Tag text={u.role.toUpperCase()} color={u.role==="owner"?C.g800:u.role==="manager"?C.gold:C.g500} sm/></Row>
              {u.email&&<div style={{fontSize:12,color:C.tx3}}>✉️ {u.email}</div>}
              <div style={{fontSize:11,color:C.tx3,marginTop:2}}>PIN: {"•".repeat(u.pin?.length||4)}</div>
              {u.role!=="owner"&&u.permissions&&<div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:4}}>
                {Object.entries(u.permissions).filter(([,v])=>v).map(([k])=><span key={k} style={{fontSize:9,background:C.g50,color:C.g700,borderRadius:20,padding:"1px 7px",fontWeight:600,border:`1px solid ${C.g200}`}}>{PERM_LABELS[k]}</span>)}
              </div>}
            </div>
            <Row gap={6}><Btn sz="sm" v="outline" onClick={()=>startEdit(u)}>Edit</Btn>{u.role!=="owner"&&<Btn sz="sm" v="ghost" onClick={()=>setUsers(p=>p.filter(x=>x.id!==u.id))}>Remove</Btn>}</Row>
          </Row>
        </Card>)}
      </div>
    </div>}
    {tab==="settings"&&<Card style={{maxWidth:480}}>
      <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:14,marginBottom:14}}>Pricing Rules</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Inp label="Default Margin Target (%)" type="number" value={settings.marginTarget||62} onChange={v=>setSettings(p=>({...p,marginTarget:+v}))}/>
        <Inp label="Minimum Profit Per Plant ($)" type="number" value={settings.minProfit||10} onChange={v=>setSettings(p=>({...p,minProfit:+v}))}/>
        <div><label style={{fontSize:11,fontWeight:600,color:C.tx3,display:"block",marginBottom:6}}>Round Prices To</label>
          <select value={settings.roundTo||5} onChange={e=>setSettings(p=>({...p,roundTo:+e.target.value}))} style={{padding:"9px 11px",border:`1.5px solid ${C.bd}`,borderRadius:8,fontSize:13,fontFamily:F.body,background:C.card,outline:"none"}}>
            {[1,5,10].map(v=><option key={v} value={v}>Nearest ${v}</option>)}
          </select>
        </div>
        {[["Show cost on employee labels","showCostOnLabels"],["Employees can see suggested price","empCanSeeSuggestedPrice"]].map(([l,k])=>(
          <label key={k} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13}}><input type="checkbox" checked={!!settings[k]} onChange={e=>setSettings(p=>({...p,[k]:e.target.checked}))} style={{width:15,height:15,accentColor:C.g700}}/>{l}</label>
        ))}
      </div>
      <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:14,marginBottom:8,marginTop:20}}>🌴 Florida Info</div>
      <div style={{background:C.g50,borderRadius:8,padding:"10px 14px",fontSize:12,color:C.tx2,lineHeight:1.7}}>
        <b>State:</b> Florida · <b>Sales Tax:</b> 7% (6%+1% surtax) · <b>No state income tax</b><br/>
        <b>Quarterly:</b> Jan 20, Apr 20, Jul 20, Oct 20 · floridarevenue.com
      </div>
    </Card>}
    {tab==="cert"&&<div style={{maxWidth:640}}>
      <Card>
        <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15,marginBottom:6}}>📄 Reseller Tax Certificate (FL DR-13)</div>
        <p style={{fontSize:13,color:C.tx3,marginBottom:16}}>Upload your Florida resale certificate to email to nurseries when setting up tax-exempt accounts.</p>
        {settings.resellerCertData?<div>
          <div style={{background:C.g50,border:`1px solid ${C.g200}`,borderRadius:9,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:700,color:C.g900,fontSize:13}}>✅ {settings.resellerCertName||"Certificate uploaded"}</div><div style={{fontSize:11,color:C.tx3}}>Ready to download and email</div></div>
            <Row gap={8}><a href={settings.resellerCertData} download={settings.resellerCertName||"reseller-cert"} style={{textDecoration:"none"}}><Btn sz="sm" v="outline">📥 Download</Btn></a><Btn sz="sm" v="ghost" onClick={()=>setSettings(p=>({...p,resellerCertData:null,resellerCertName:""}))}>Remove</Btn></Row>
          </div>
          <div style={{background:C.cardAlt,borderRadius:8,padding:"12px 14px",fontSize:12,color:C.tx2,lineHeight:1.7}}>
            <b>To email to a nursery:</b><br/>1. Download the certificate above<br/>2. Email with subject: "Leaf Diary — Florida Resale Certificate DR-13"<br/>3. Body: "Please find our reseller tax certificate attached. We'd like to set up a wholesale/tax-exempt account."
          </div>
        </div>:<div>
          <div style={{border:`2px dashed ${C.g300}`,borderRadius:10,padding:"36px",textAlign:"center",cursor:"pointer",background:C.card}} onClick={()=>certRef.current.click()}>
            <div style={{fontSize:36,marginBottom:10}}>📄</div>
            <div style={{fontWeight:700,color:C.g900,fontFamily:F.display,marginBottom:6}}>Upload your Florida DR-13 resale certificate</div>
            <div style={{fontSize:12,color:C.tx3,marginBottom:16}}>PDF, JPG, or PNG</div>
            <Btn onClick={e=>{e.stopPropagation();certRef.current.click();}}>Browse Files</Btn>
          </div>
          <input ref={certRef} type="file" accept=".pdf,image/*" style={{display:"none"}} onChange={e=>loadCert(e.target.files[0])}/>
        </div>}
      </Card>
    </div>}
  </div>;
}


/* ══════════════════════════════════════════════════════════
   SHOW BUILDER / PALMSTREET PREP EXPORT
══════════════════════════════════════════════════════════ */
function ShowBuilder({plants,setPlants,user,addAudit}){
  const [showName,setShowName]=useState(`Leaf Diary Show ${today()}`);
  const [ids,setIds]=useState(getSavedShowIds());
  const [entry,setEntry]=useState('');
  const [search,setSearch]=useState('');
  const [privateListing,setPrivateListing]=useState(false);
  const [msg,setMsg]=useState('');
  useEffect(()=>saveShowIds(ids),[ids]);
  const byPlantId=id=>plants.find(p=>safePlantId(p).toLowerCase()===String(id).trim().toLowerCase());
  const showPlants=ids.map(id=>byPlantId(id)).filter(Boolean);
  const missing=ids.filter(id=>!byPlantId(id));
  const errors=validatePalmstreetPlants(showPlants);
  const addIds=raw=>{
    const found=[], notFound=[];
    raw.split(/[,\n\r\t ]+/).map(x=>x.trim()).filter(Boolean).forEach(id=>{
      const p=byPlantId(id);
      if(p) found.push(safePlantId(p)); else notFound.push(id);
    });
    if(found.length) setIds(prev=>[...new Set([...prev,...found])]);
    setEntry('');
    setMsg(`${found.length} added${notFound.length?` · ${notFound.length} not found: ${notFound.slice(0,6).join(', ')}`:''}`);
  };
  const removeId=id=>setIds(prev=>prev.filter(x=>x!==id));
  const move=(i,dir)=>setIds(prev=>{const a=[...prev],j=i+dir;if(j<0||j>=a.length)return a;[a[i],a[j]]=[a[j],a[i]];return a;});
  const clear=()=>{ if(confirm('Clear this show list?')){ setIds([]); setMsg('Show list cleared.'); } };
  const exportPalmstreet=()=>{
    if(!showPlants.length){ alert('Add plants to the show first.'); return; }
    if(errors.length){ alert('Fix these before exporting to Palmstreet:\n\n'+errors.slice(0,25).join('\n')+(errors.length>25?`\n...and ${errors.length-25} more`:'')); return; }
    const fileSafe=showName.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'leaf-diary-show';
    downloadCSVFile(`${fileSafe}-palmstreet-upload-${today()}.csv`, makePalmstreetCSV(showPlants,{showName,privateListing}));
    setPlants(prev=>prev.map(p=>ids.includes(safePlantId(p))?{...p,palmstreetExportedAt:new Date().toISOString(),lastShowName:showName}:p));
    addAudit&&addAudit({action:`Exported Show Builder to Palmstreet CSV — ${showPlants.length} plants`,user:user.name,page:'Show Builder'});
    setMsg(`Palmstreet CSV exported for ${showPlants.length} plants.`);
  };
  const exportShowList=()=>{
    if(!showPlants.length){ alert('Add plants first.'); return; }
    const fileSafe=showName.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || 'leaf-diary-show';
    downloadCSVFile(`${fileSafe}-internal-show-list-${today()}.csv`, makeShowListCSV(showPlants));
    setMsg('Internal show list exported.');
  };
  const quick = plants.filter(p=>{
    const q=search.toLowerCase().trim();
    if(!q) return false;
    return safePlantId(p).toLowerCase().includes(q) || (p.name||'').toLowerCase().includes(q) || (p.nurseryCode||'').toLowerCase().includes(q);
  }).slice(0,30);
  const inStockCount=showPlants.filter(p=>p.status==='In Stock').length;
  const value=showPlants.reduce((s,p)=>s+(+p.suggestedPrice||+p.salePrice||0),0);
  return <div style={{padding:'14px 14px 90px',background:C.bg,minHeight:'100vh'}}>
    <SHdr icon="🎪" title="Show Builder" sub="Build a Palmstreet upload file from inventory using Plant ID numbers"
      right={<Row gap={6} wrap><Btn onClick={exportPalmstreet}>🌴 Export Palmstreet CSV</Btn><Btn v="outline" onClick={exportShowList}>📋 Export Show List</Btn><Btn v="ghost" onClick={clear}>Clear</Btn></Row>}/>
    {msg&&<div style={{background:C.g50,border:`1px solid ${C.g300}`,borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:13,color:C.g800,fontWeight:600}}>{msg}</div>}
    <div style={{display:'grid',gridTemplateColumns:'1.2fr .8fr',gap:14,marginBottom:14}}>
      <Card><div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15,marginBottom:12}}>1. Show Setup</div><Inp label="Show Name" value={showName} onChange={setShowName} placeholder="Leaf Diary Friday Rare Plant Show"/><div style={{marginTop:10}}><label style={{fontSize:13,fontWeight:600,color:C.tx2,display:'flex',gap:8,alignItems:'center'}}><input type="checkbox" checked={privateListing} onChange={e=>setPrivateListing(e.target.checked)}/> Export as private Palmstreet listings</label></div></Card>
      <Card style={{background:C.g800,color:'#fff'}}><div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:'uppercase',opacity:.75,marginBottom:8}}>Current Show</div><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}><div><div style={{fontFamily:F.display,fontSize:28,fontWeight:700}}>{showPlants.length}</div><div style={{fontSize:11,opacity:.75}}>Plants</div></div><div><div style={{fontFamily:F.display,fontSize:28,fontWeight:700}}>{inStockCount}</div><div style={{fontSize:11,opacity:.75}}>In Stock</div></div><div><div style={{fontFamily:F.display,fontSize:28,fontWeight:700}}>{$(value)}</div><div style={{fontSize:11,opacity:.75}}>Show Value</div></div></div></Card>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'380px 1fr',gap:14}}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Card><div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15,marginBottom:10}}>2. Add Plants by ID</div><p style={{fontSize:12,color:C.tx3,marginTop:0}}>Type or paste plant IDs. You can enter one ID or many IDs separated by spaces, commas, or new lines.</p><textarea value={entry} onChange={e=>setEntry(e.target.value)} placeholder={'Example:\nLD-PPC-0001\nLD-PPC-0002'} style={{width:'100%',minHeight:92,padding:12,border:`1.5px solid ${C.bd}`,borderRadius:10,fontSize:14,fontFamily:F.mono,resize:'vertical'}}/><Btn full style={{marginTop:8}} onClick={()=>addIds(entry)} disabled={!entry.trim()}>Add Plant IDs to Show</Btn></Card>
        <Card><div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15,marginBottom:10}}>Search Inventory</div><Inp value={search} onChange={setSearch} placeholder="Search plant name, ID, nursery code..."/><div style={{marginTop:10,maxHeight:300,overflowY:'auto'}}>{quick.length===0?<div style={{fontSize:12,color:C.tx3,padding:'14px 0'}}>Search to add plants fast.</div>:quick.map(p=><div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${C.bdS}`}}><div><div style={{fontSize:12,fontWeight:700,color:C.g900}}>{toTC(p.name)}</div><div style={{fontFamily:F.mono,fontSize:10,color:C.tx3}}>{safePlantId(p)} · {$(p.suggestedPrice)}</div></div><Btn sz="sm" v={ids.includes(safePlantId(p))?'ghost':'soft'} onClick={()=>setIds(prev=>[...new Set([...prev,safePlantId(p)])])}>{ids.includes(safePlantId(p))?'Added':'Add'}</Btn></div>)}</div></Card>
        {(errors.length>0||missing.length>0)&&<Card style={{background:C.redBg,border:`1px solid ${C.red}40`}}><div style={{fontFamily:F.display,fontWeight:700,color:C.red,fontSize:15,marginBottom:8}}>Export Warnings</div>{missing.map(id=><div key={id} style={{fontSize:12,color:C.red,marginBottom:4}}>Missing inventory plant: {id}</div>)}{errors.slice(0,12).map((e,i)=><div key={i} style={{fontSize:12,color:C.red,marginBottom:4}}>• {e}</div>)}{errors.length>12&&<div style={{fontSize:12,color:C.red}}>...and {errors.length-12} more</div>}</Card>}
      </div>
      <Card><Row between wrap style={{marginBottom:12}}><div><div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:16}}>Plants in This Show</div><div style={{fontSize:12,color:C.tx3}}>Order here is the order exported to your internal show list.</div></div><Tag text={`${showPlants.length} plants`} color={C.g700}/></Row>{showPlants.length===0?<div style={{textAlign:'center',padding:'60px 20px',color:C.tx3}}><div style={{fontSize:42,marginBottom:10}}>🎪</div><div style={{fontFamily:F.display,fontSize:18,color:C.g900}}>No plants added yet</div><p>Add plants by Plant ID from the left panel.</p></div>:<div style={{overflowX:'auto',border:`1px solid ${C.bd}`,borderRadius:10}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}><thead style={{background:C.cardAlt}}><tr>{['#','Plant','ID','Pot','Price','Status','Exported','Actions'].map(h=><th key={h} style={{padding:'8px 10px',textAlign:'left',color:C.tx3,fontWeight:700,fontSize:10,textTransform:'uppercase',borderBottom:`1px solid ${C.bd}`}}>{h}</th>)}</tr></thead><tbody>{showPlants.map((p,i)=><tr key={safePlantId(p)} style={{borderBottom:`1px solid ${C.bdS}`}}><td style={{padding:'8px 10px',fontWeight:700,color:C.tx3}}>{i+1}</td><td style={{padding:'8px 10px'}}><b>{toTC(p.name)}</b><div style={{fontSize:10,color:C.tx3}}>{p.nurseryCode||''} {p.rack?`· Rack ${p.rack}`:''}</div></td><td style={{padding:'8px 10px',fontFamily:F.mono,fontSize:10,color:C.g600}}>{safePlantId(p)}</td><td style={{padding:'8px 10px'}}>{p.potSize||'—'}</td><td style={{padding:'8px 10px',fontWeight:700,color:C.g900}}>{$(p.suggestedPrice||p.salePrice)}</td><td style={{padding:'8px 10px'}}><SBadge s={p.status||'In Stock'}/></td><td style={{padding:'8px 10px'}}>{p.palmstreetExportedAt?<Tag text="Yes" color={C.blue} sm/>:<span style={{color:C.tx3}}>No</span>}</td><td style={{padding:'8px 10px'}}><Row gap={4}><Btn sz="sm" v="ghost" onClick={()=>move(i,-1)}>↑</Btn><Btn sz="sm" v="ghost" onClick={()=>move(i,1)}>↓</Btn><Btn sz="sm" v="danger" onClick={()=>removeId(safePlantId(p))}>Remove</Btn></Row></td></tr>)}</tbody></table></div>}</Card>

/* ══════════════════════════════════════════════════════════
   POST-SHOW IMPORT — paste Palmstreet/Whatnot CSV
══════════════════════════════════════════════════════════ */
function ShowImport({plants,setPlants,addAudit,user}){
  const [raw,setRaw]=useState("");
  const [parsed,setParsed]=useState([]);
  const [matched,setMatched]=useState([]);
  const [step,setStep]=useState("paste");
  const [platform,setPlatform]=useState("Palmstreet");
  const fileRef=useRef();

  const parseCSV=text=>{
    const lines=text.trim().split("\n");
    const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
    return lines.slice(1).map(line=>{
      const vals=line.match(/(".*?"|[^,]+)(?=,|$)/g)||[];
      const row={};
      headers.forEach((h,i)=>row[h]=(vals[i]||"").replace(/"/g,"").trim());
      return row;
    }).filter(r=>r["Item Title"]&&r["Item Price"]&&!r["Item Title"].match(/processing|fee|2DAY|Heat Pack|Insulation/i));
  };

  const loadFile=f=>{
    if(!f)return;
    const r=new FileReader();
    r.onload=e=>{setRaw(e.target.result);};
    r.readAsText(f);
  };

  const runMatch=()=>{
    if(!raw.trim())return;
    const rows=parseCSV(raw);
    const results=rows.map(r=>{
      const title=(r["Item Title"]||"").toLowerCase();
      const price=+r["Item Price"]||0;
      const customer=r["Palmstreet UserName"]||r["Username"]||r["Buyer"]||"";
      const recipientName=r["Recipient Name"]||"";
      const state=r["State"]||"";
      const orderNum=r["Order number"]||r["Order Number"]||"";
      const orderDate=r["Order Date(PDT)"]||r["Order Date"]||"";
      const shipping=+r["Shipping Fee"]||0;
      const status=r["Order Status"]||"";

      // Try to match to inventory
      const match=plants.find(p=>
        p.status==="In Stock"&&(
          p.name.toLowerCase().includes(title.slice(0,6))||
          title.includes(p.name.toLowerCase().slice(0,6))||
          (p.plantId&&title.includes(p.plantId.toLowerCase()))
        )
      );

      return{_id:Math.random().toString(36).slice(2),title:r["Item Title"],price,customer,recipientName,state,orderNum,orderDate,shipping,status,matched:match||null,apply:!!match};
    });
    setMatched(results);
    setParsed(rows);
    setStep("review");
  };

  const toggleApply=id=>setMatched(p=>p.map(r=>r._id===id?{...r,apply:!r.apply}:r));
  const setMatch=(id,plantId)=>setMatched(p=>p.map(r=>{
    if(r._id!==id)return r;
    const plant=plants.find(p=>p.id===plantId);
    return{...r,matched:plant||null,apply:!!plant};
  }));

  const applyImport=()=>{
    const toApply=matched.filter(r=>r.apply&&r.matched);
    setPlants(prev=>prev.map(p=>{
      const sale=toApply.find(r=>r.matched?.id===p.id);
      if(!sale)return p;
      return{...p,status:"Sold",salePrice:sale.price,platform,shippingCost:sale.shipping,
        customerUsername:sale.customer,customerName:sale.recipientName,
        customerState:sale.state,orderNumber:sale.orderNum,
        soldDate:sale.orderDate?.split(" ")[0]||today(),
        margin:marg(+p.cost,sale.price)};
    }));
    addAudit({action:`Show import: ${toApply.length} sales applied from ${platform}`,user:user.name,page:"Show Import"});
    setStep("done");
  };

  const totalRev=matched.filter(r=>r.apply).reduce((s,r)=>s+r.price,0);
  const matched_count=matched.filter(r=>r.apply&&r.matched).length;

  return <div style={{padding:"14px 14px 90px",background:C.bg,minHeight:"100vh"}}>
    <SHdr icon="📦" title="Post-Show Import" sub="Paste your Palmstreet or Whatnot sales — AI matches to your inventory"/>

    {step==="paste"&&<div>
      <Card style={{marginBottom:14}}>
        <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15,marginBottom:10}}>Platform</div>
        <Row gap={8} style={{marginBottom:16}}>
          {["Palmstreet","Whatnot"].map(p=><button key={p} onClick={()=>setPlatform(p)} style={{padding:"10px 20px",borderRadius:9,cursor:"pointer",fontFamily:F.body,fontSize:14,fontWeight:600,background:platform===p?C.g700:C.cardAlt,color:platform===p?"#fff":C.tx1,border:`1.5px solid ${platform===p?C.g700:C.bd}`}}>{p}</button>)}
        </Row>
        <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15,marginBottom:8}}>Upload your orders CSV</div>
        <div style={{fontSize:13,color:C.tx3,marginBottom:12}}>
          In Palmstreet → Orders → Export CSV. Then upload it here.
        </div>
        <div style={{border:`2px dashed ${C.g300}`,borderRadius:12,padding:"30px",textAlign:"center",background:C.card,marginBottom:12}} onClick={()=>fileRef.current.click()}>
          <div style={{fontSize:36,marginBottom:8}}>📄</div>
          <div style={{fontWeight:700,color:C.g900,marginBottom:6}}>Upload CSV file</div>
          <div style={{fontSize:12,color:C.tx3,marginBottom:12}}>From Palmstreet Orders export</div>
          <Btn onClick={e=>{e.stopPropagation();fileRef.current.click();}}>Choose File</Btn>
        </div>
        <input ref={fileRef} type="file" accept=".csv,.xlsx" style={{display:"none"}} onChange={e=>loadFile(e.target.files[0])}/>
        <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:14,marginBottom:6}}>Or paste CSV text directly</div>
        <textarea value={raw} onChange={e=>setRaw(e.target.value)}
          style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${C.bd}`,borderRadius:9,fontSize:12,fontFamily:F.mono,minHeight:100,boxSizing:"border-box",resize:"vertical"}}
          placeholder="Paste CSV data here…"/>
        <Btn full onClick={runMatch} style={{marginTop:12}} disabled={!raw.trim()}>Match to Inventory →</Btn>
      </Card>
    </div>}

    {step==="review"&&<div>
      <div style={{background:C.g800,borderRadius:14,padding:"16px",marginBottom:14,color:"#fff"}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",opacity:.7,marginBottom:4}}>Import Summary</div>
        <div style={{fontSize:28,fontWeight:700,fontFamily:F.display}}>{$(totalRev)}</div>
        <div style={{fontSize:13,opacity:.8,marginTop:4}}>{matched.length} orders · {matched_count} matched to inventory · {matched.filter(r=>!r.matched).length} unmatched</div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
        {matched.map(r=><Card key={r._id} style={{padding:"12px 14px",border:`1px solid ${r.matched?C.g200:C.bd}`,background:r.matched?C.g50:"#fff"}}>
          <Row between center style={{marginBottom:r.matched?6:0}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,color:C.g900}}>{r.title}</div>
              <div style={{fontSize:12,color:C.tx3}}>{r.customer} · {r.state} · {r.orderDate?.slice(0,10)}</div>
              {r.matched&&<div style={{fontSize:11,color:C.g600,marginTop:2}}>✅ Matched → {r.matched.name} ({r.matched.plantId})</div>}
              {!r.matched&&<div style={{fontSize:11,color:C.amber,marginTop:2}}>⚠️ No match found — select plant below</div>}
            </div>
            <Row gap={8} center>
              <span style={{fontWeight:700,color:C.g700,fontSize:16}}>{$(r.price)}</span>
              <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
                <input type="checkbox" checked={!!r.apply} onChange={()=>toggleApply(r._id)} style={{width:18,height:18,accentColor:C.g700}}/>
                <span style={{fontSize:11,color:C.tx3}}>Apply</span>
              </label>
            </Row>
          </Row>
          {!r.matched&&<select onChange={e=>setMatch(r._id,e.target.value)} style={{width:"100%",padding:"8px 10px",border:`1px solid ${C.bd}`,borderRadius:7,fontSize:13,fontFamily:F.body,marginTop:6}}>
            <option value="">— Select plant from inventory —</option>
            {plants.filter(p=>p.status==="In Stock").map(p=><option key={p.id} value={p.id}>{p.name} · {p.plantId} · {$(p.suggestedPrice)}</option>)}
          </select>}
        </Card>)}
      </div>

      <Row gap={8}>
        <Btn onClick={applyImport} disabled={matched_count===0}>✅ Apply {matched_count} Sales to Inventory</Btn>
        <Btn v="ghost" onClick={()=>setStep("paste")}>Back</Btn>
      </Row>
    </div>}

    {step==="done"&&<div style={{textAlign:"center",padding:"60px 20px"}}>
      <div style={{fontSize:56,marginBottom:16}}>🎉</div>
      <h2 style={{fontFamily:F.display,color:C.g900,marginBottom:8}}>Show Imported!</h2>
      <p style={{color:C.tx3,marginBottom:6}}>{matched_count} plants marked as sold</p>
      <p style={{color:C.gold,fontWeight:700,fontSize:18,marginBottom:22}}>{$(totalRev)} in sales recorded</p>
      <Row gap={10} style={{justifyContent:"center"}}>
        <Btn onClick={()=>setStep("paste")}>Import Another Show</Btn>
      </Row>
    </div>}
  </div>;
}

const SUPABASE_URL = "https://yyklidmefiguzrbvrnmp.supabase.co";
const SUPABASE_KEY = "sb_publishable_8vyVQt8Ay3S8kJ4cI9U5YA_eB6l2CUu7";
const CLOUD_TABLES = ["plants","bills","nurseries","expenses","timecards"];

const cloudHeaders = (extra={}) => {
  const headers = {
    apikey: SUPABASE_KEY,
    "Content-Type": "application/json",
    Accept: "application/json",
    ...extra
  };

  // IMPORTANT:
  // Supabase's new sb_publishable_ keys are NOT JWTs.
  // Do not send them as Authorization: Bearer tokens or Supabase can reject the request.
  // Only legacy anon keys that start with eyJ are JWTs and may be used as Bearer tokens.
  if (SUPABASE_KEY && SUPABASE_KEY.startsWith("eyJ")) {
    headers.Authorization = `Bearer ${SUPABASE_KEY}`;
  }
  return headers;
};

async function cloudRequest(path, options={}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: cloudHeaders(options.headers || {})
  });
  if(!res.ok){
    const txt = await res.text().catch(()=>"");
    throw new Error(`${res.status} ${res.statusText} ${txt}`);
  }
  if(res.status === 204) return null;
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function cloudFetchRows(table){
  const rows = await cloudRequest(`${table}?select=id,data,updated_at&order=updated_at.desc`, {method:"GET"});
  return (rows || []).map(r => ({...(r.data || {}), id: (r.data && r.data.id) ? r.data.id : r.id}));
}

async function cloudUpsertRows(table, rows){
  if(!Array.isArray(rows) || rows.length === 0) return;
  const payload = rows
    .filter(r => r && r.id)
    .map(r => ({id:String(r.id), data:r, updated_at:new Date().toISOString()}));
  if(!payload.length) return;
  return cloudRequest(`${table}?on_conflict=id`, {
    method:"POST",
    headers:{Prefer:"resolution=merge-duplicates"},
    body:JSON.stringify(payload)
  });
}

async function cloudDeleteRows(table, ids){
  const clean = [...new Set((ids||[]).filter(Boolean).map(String))];
  if(!clean.length) return;
  const quoted = clean.map(id => `"${id.replace(/"/g,'\\"')}"`).join(",");
  return cloudRequest(`${table}?id=in.(${quoted})`, {method:"DELETE"});
}

async function cloudFetchState(key){
  const rows = await cloudRequest(`app_state?select=key,data,updated_at&key=eq.${encodeURIComponent(key)}&limit=1`, {method:"GET"});
  return rows && rows[0] ? rows[0].data : null;
}

async function cloudUpsertState(key, data){
  return cloudRequest(`app_state?on_conflict=key`, {
    method:"POST",
    headers:{Prefer:"resolution=merge-duplicates"},
    body:JSON.stringify([{key, data, updated_at:new Date().toISOString()}])
  });
}

function applyUpdater(updater, prev){
  return typeof updater === "function" ? updater(prev) : updater;
}
function missingIds(prev=[], next=[]){
  const n = new Set((next||[]).map(x=>x && x.id).filter(Boolean).map(String));
  return (prev||[]).map(x=>x && x.id).filter(Boolean).map(String).filter(id=>!n.has(id));
}

/* ══════════════════════════════════════════════════════════
   ROOT APP — Supabase cloud sync + localStorage backup
══════════════════════════════════════════════════════════ */
function App(){
  const saved = loadLS();

  const [user,setUser]       = useState(null);
  const [page,setPage]       = useState("dash");
  const [plants,setPlantsRaw]   = useState(saved?.plants    || []);
  const [expenses,setExpensesRaw] = useState(saved?.expenses || []);
  const [timecards,setTimecardsRaw] = useState(saved?.timecards || []);
  const [auditLog,setAuditLogRaw]   = useState(saved?.auditLog  || []);
  const [bills,setBillsRaw]     = useState(saved?.bills     || DEFAULT_BILLS);
  const [nurseries,setNurseriesRaw] = useState(saved?.nurseries || DEFAULT_NURSERIES);
  const [users,setUsersRaw]     = useState(saved?.users     || DEFAULT_USERS);
  const [settings,setSettingsRaw]   = useState(saved?.settings  || DEFAULT_SETTINGS);
  const [saveMsg,setSaveMsg] = useState("");
  const [cloudStatus,setCloudStatus] = useState("loading");
  const [cloudMsg,setCloudMsg] = useState("Connecting to Supabase cloud...");

  const cloudReadyRef = useRef(false);
  const suppressCloudSaveRef = useRef(false);
  const backupRef = useRef();

  const cloudCollectionSetter = useCallback((table, rawSetter) => (updater) => {
    rawSetter(prev => {
      const next = applyUpdater(updater, prev) || [];
      if(cloudReadyRef.current && !suppressCloudSaveRef.current){
        const removed = missingIds(prev, next);
        setCloudStatus("syncing");
        setCloudMsg("Saving to Supabase cloud...");
        Promise.resolve()
          .then(async()=>{
            if(removed.length) await cloudDeleteRows(table, removed);
            await cloudUpsertRows(table, next);
          })
          .then(()=>{setCloudStatus("synced");setCloudMsg("Supabase cloud synced");})
          .catch(err=>{console.error(`Supabase save failed for ${table}`, err);setCloudStatus("offline");setCloudMsg("Cloud save failed — local backup still saved");});
      }
      return next;
    });
  },[]);

  const cloudStateSetter = useCallback((key, rawSetter) => (updater) => {
    rawSetter(prev => {
      const next = applyUpdater(updater, prev);
      if(cloudReadyRef.current && !suppressCloudSaveRef.current){
        setCloudStatus("syncing");
        setCloudMsg("Saving settings to Supabase...");
        cloudUpsertState(key, next)
          .then(()=>{setCloudStatus("synced");setCloudMsg("Supabase cloud synced");})
          .catch(err=>{console.error(`Supabase app_state save failed for ${key}`, err);setCloudStatus("offline");setCloudMsg("Cloud save failed — local backup still saved");});
      }
      return next;
    });
  },[]);

  const setPlants    = cloudCollectionSetter("plants", setPlantsRaw);
  const setExpenses  = cloudCollectionSetter("expenses", setExpensesRaw);
  const setTimecards = cloudCollectionSetter("timecards", setTimecardsRaw);
  const setBills     = cloudCollectionSetter("bills", setBillsRaw);
  const setNurseries = cloudCollectionSetter("nurseries", setNurseriesRaw);
  const setAuditLog  = cloudStateSetter("auditLog", setAuditLogRaw);
  const setUsers     = cloudStateSetter("users", setUsersRaw);
  const setSettings  = cloudStateSetter("settings", setSettingsRaw);

  /* Always keep a local backup on this device too */
  useEffect(()=>{
    saveLS({plants,expenses,timecards,auditLog,bills,nurseries,users,settings});
  },[plants,expenses,timecards,auditLog,bills,nurseries,users,settings]);

  /* Load fonts */
  useEffect(()=>{
    const l=document.createElement("link");
    l.rel="stylesheet";
    l.href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono&display=swap";
    document.head.appendChild(l);
  },[]);

  const loadFromCloud = useCallback(async({silent=false}={})=>{
    if(!silent){ setCloudStatus("loading"); setCloudMsg("Loading Supabase cloud data..."); }
    try{
      const [cloudPlants, cloudBills, cloudNurseries, cloudExpenses, cloudTimecards, cloudUsers, cloudSettings, cloudAudit] = await Promise.all([
        cloudFetchRows("plants"),
        cloudFetchRows("bills"),
        cloudFetchRows("nurseries"),
        cloudFetchRows("expenses"),
        cloudFetchRows("timecards"),
        cloudFetchState("users"),
        cloudFetchState("settings"),
        cloudFetchState("auditLog"),
      ]);

      suppressCloudSaveRef.current = true;
      if(cloudPlants.length) setPlantsRaw(cloudPlants);
      if(cloudBills.length) setBillsRaw(cloudBills); else if(!saved?.bills) setBillsRaw(DEFAULT_BILLS);
      if(cloudNurseries.length) setNurseriesRaw(cloudNurseries); else if(!saved?.nurseries) setNurseriesRaw(DEFAULT_NURSERIES);
      if(cloudExpenses.length) setExpensesRaw(cloudExpenses);
      if(cloudTimecards.length) setTimecardsRaw(cloudTimecards);
      if(cloudUsers) setUsersRaw(cloudUsers); else if(!saved?.users) setUsersRaw(DEFAULT_USERS);
      if(cloudSettings) setSettingsRaw(cloudSettings); else if(!saved?.settings) setSettingsRaw(DEFAULT_SETTINGS);
      if(cloudAudit) setAuditLogRaw(cloudAudit);
      setTimeout(()=>{suppressCloudSaveRef.current=false;},0);

      cloudReadyRef.current = true;
      setCloudStatus("synced");
      setCloudMsg("Supabase cloud synced");

      /* First-time migration: if Supabase is empty but this device has data, seed the cloud */
      if(!cloudPlants.length && saved?.plants?.length) await cloudUpsertRows("plants", saved.plants);
      if(!cloudBills.length && saved?.bills?.length) await cloudUpsertRows("bills", saved.bills);
      if(!cloudNurseries.length && saved?.nurseries?.length) await cloudUpsertRows("nurseries", saved.nurseries);
      if(!cloudExpenses.length && saved?.expenses?.length) await cloudUpsertRows("expenses", saved.expenses);
      if(!cloudTimecards.length && saved?.timecards?.length) await cloudUpsertRows("timecards", saved.timecards);
      if(!cloudUsers && saved?.users) await cloudUpsertState("users", saved.users);
      if(!cloudSettings && saved?.settings) await cloudUpsertState("settings", saved.settings);
      if(!cloudAudit && saved?.auditLog) await cloudUpsertState("auditLog", saved.auditLog);
    }catch(err){
      console.error("Supabase load failed", err);
      cloudReadyRef.current = false;
      const msg = err && err.message ? err.message : String(err);
      setCloudStatus("offline");
      setCloudMsg("Supabase error: " + msg);
    }
  },[]);

  useEffect(()=>{
    loadFromCloud();
    const timer = setInterval(()=>loadFromCloud({silent:true}), 20000);
    return ()=>clearInterval(timer);
  },[loadFromCloud]);

  /* Manual backup — exports all data as JSON file */
  const exportBackup = () => {
    const data = {plants,expenses,timecards,bills,nurseries,users,settings,auditLog,exportDate:new Date().toISOString()};
    const a = Object.assign(document.createElement("a"),{
      href: URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"})),
      download: `leafdiary-backup-${today()}.json`
    });
    a.click();
    setSaveMsg("✅ Backup downloaded!");
    setTimeout(()=>setSaveMsg(""),3000);
  };

  /* Restore from backup JSON file and push restored data to Supabase */
  const importBackup = (file) => {
    if(!file) return;
    const r = new FileReader();
    r.onload = async e => {
      try {
        const d = JSON.parse(e.target.result);
        suppressCloudSaveRef.current = true;
        if(d.plants)    setPlantsRaw(d.plants);
        if(d.expenses)  setExpensesRaw(d.expenses);
        if(d.timecards) setTimecardsRaw(d.timecards);
        if(d.bills)     setBillsRaw(d.bills);
        if(d.nurseries) setNurseriesRaw(d.nurseries);
        if(d.users)     setUsersRaw(d.users);
        if(d.settings)  setSettingsRaw(d.settings);
        if(d.auditLog)  setAuditLogRaw(d.auditLog);
        setTimeout(()=>{suppressCloudSaveRef.current=false;},0);
        setCloudStatus("syncing");
        setCloudMsg("Uploading restored backup to Supabase...");
        await Promise.all([
          d.plants ? cloudUpsertRows("plants", d.plants) : null,
          d.expenses ? cloudUpsertRows("expenses", d.expenses) : null,
          d.timecards ? cloudUpsertRows("timecards", d.timecards) : null,
          d.bills ? cloudUpsertRows("bills", d.bills) : null,
          d.nurseries ? cloudUpsertRows("nurseries", d.nurseries) : null,
          d.users ? cloudUpsertState("users", d.users) : null,
          d.settings ? cloudUpsertState("settings", d.settings) : null,
          d.auditLog ? cloudUpsertState("auditLog", d.auditLog) : null,
        ]);
        cloudReadyRef.current = true;
        setCloudStatus("synced");
        setCloudMsg("Backup restored and synced to Supabase");
        setSaveMsg("✅ Backup restored + cloud synced!");
        setTimeout(()=>setSaveMsg(""),3000);
      } catch(err) { console.error(err); setSaveMsg("❌ Invalid backup file or cloud upload failed"); setTimeout(()=>setSaveMsg(""),3000); }
    };
    r.readAsText(file);
  };

  const addAudit  = useCallback(entry=>{setAuditLog(p=>[...p,{...entry,timestamp:new Date().toLocaleString(),id:uid()}]);},[setAuditLog]);
  const handleLogin  = u=>{setUser(u);setPage(u.role==="employee"?"emp_dash":"dash");addAudit({action:"Logged in",user:u.name,page:"Login"});};
  const handleLogout = ()=>{addAudit({action:"Logged out",user:user.name,page:"System"});setUser(null);setPage("dash");};
  const billAlerts   = bills.filter(b=>{const d=Math.ceil((new Date(b.dueDate)-Date.now())/864e5);return d<=7&&d>=0&&b.status==="Unpaid";}).length;

  if(!user) return <LoginScreen onLogin={handleLogin} users={users}/>;

  const P={plants,setPlants,nurseries,setNurseries,expenses,setExpenses,timecards,setTimecards,bills,setBills,user,addAudit};
  const cloudDot = cloudStatus==="synced"?C.g400:cloudStatus==="syncing"||cloudStatus==="loading"?C.gold:C.amber;
  const cloudLabel = cloudStatus==="synced"?"☁️ Supabase cloud synced":cloudStatus==="syncing"?"🔄 Saving to Supabase...":cloudStatus==="loading"?"🔄 Loading cloud...":`⚠️ Cloud offline — ${cloudMsg || "local backup active"}`;

  return <div style={{fontFamily:F.body,background:C.bg,minHeight:"100vh",color:C.tx1,paddingBottom:80}}>
    <Nav page={page} setPage={setPage} user={user} onLogout={handleLogout} plantCount={plants.length} billAlerts={billAlerts}/>

    {/* Cloud sync indicator strip */}
    <div style={{background:C.g900,padding:"6px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
      <div title={cloudMsg} style={{display:"flex",alignItems:"center",gap:6}}>
        <div style={{width:7,height:7,borderRadius:"50%",background:cloudDot}}/>
        <span style={{fontSize:11,color:"rgba(255,255,255,.72)",fontWeight:600}}>{cloudLabel}</span>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        {saveMsg&&<span style={{fontSize:11,color:C.g400,fontWeight:700}}>{saveMsg}</span>}
        <button onClick={()=>loadFromCloud()} style={{background:"rgba(255,255,255,.12)",border:"none",borderRadius:6,padding:"4px 10px",color:"rgba(255,255,255,.8)",fontSize:11,cursor:"pointer",fontFamily:F.body,fontWeight:600}}>🔄 Sync Now</button>
        <button onClick={async()=>{try{setCloudStatus("loading");setCloudMsg("Testing Supabase connection...");await cloudRequest("plants?select=id&limit=1",{method:"GET"});setCloudStatus("synced");setCloudMsg("Supabase test passed");alert("Supabase test passed. Cloud connection is working.");}catch(err){const msg=err&&err.message?err.message:String(err);setCloudStatus("offline");setCloudMsg("Supabase test failed: "+msg);alert("Supabase test failed: "+msg);}}} style={{background:"rgba(255,255,255,.12)",border:"none",borderRadius:6,padding:"4px 10px",color:"rgba(255,255,255,.8)",fontSize:11,cursor:"pointer",fontFamily:F.body,fontWeight:600}}>🧪 Test Cloud</button>
        <button onClick={exportBackup} style={{background:"rgba(255,255,255,.12)",border:"none",borderRadius:6,padding:"4px 10px",color:"rgba(255,255,255,.8)",fontSize:11,cursor:"pointer",fontFamily:F.body,fontWeight:600}}>📥 Backup</button>
        <button onClick={()=>backupRef.current.click()} style={{background:"rgba(255,255,255,.12)",border:"none",borderRadius:6,padding:"4px 10px",color:"rgba(255,255,255,.8)",fontSize:11,cursor:"pointer",fontFamily:F.body,fontWeight:600}}>📤 Restore</button>
        <input ref={backupRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>importBackup(e.target.files[0])}/>
      </div>
    </div>

    <div>
      {page==="dash"    &&user.role!=="employee"&&<OwnerDash plants={plants} expenses={expenses} timecards={timecards} bills={bills} setPage={setPage}/>} 
      {page==="emp_dash"&&<EmpDash plants={plants} user={user} timecards={timecards}/>} 
      {page==="dash"    &&user.role==="employee"&&<EmpDash plants={plants} user={user} timecards={timecards}/>} 
      {page==="upload"  &&<InvoiceUpload {...P}/>} 
      {page==="manual"  &&<ManualEntry {...P}/>} 
      {page==="history" &&<PastInvoices {...P}/>} 
      {page==="inv"     &&<Inventory plants={plants} setPlants={setPlants} user={user} addAudit={addAudit}/>} 
      {page==="labels"  &&<Labels plants={plants} setPlants={setPlants} user={user} addAudit={addAudit} setPage={setPage}/>} 
      {page==="sellthru"&&CAN.seeReports(user.role)&&<SellThrough plants={plants} nurseries={nurseries} setPage={setPage}/>} 
      {page==="showbuilder"&&<ShowBuilder plants={plants} setPlants={setPlants} addAudit={addAudit} user={user}/>} 
      {page==="showimport"&&<ShowImport plants={plants} setPlants={setPlants} addAudit={addAudit} user={user}/>} 
      {page==="customers"&&CAN.seeReports(user.role)&&<Customers plants={plants}/>} 
      {page==="nursery" &&<Nurseries nurseries={nurseries} setNurseries={setNurseries} plants={plants} user={user}/>} 
      {page==="bills"   &&<Bills bills={bills} setBills={setBills}/>} 
      {page==="expense" &&CAN.seeExpenses(user.role)&&<Expenses expenses={expenses} setExpenses={setExpenses} addAudit={addAudit} user={user}/>} 
      {page==="timecard"&&<Timecard timecards={timecards} setTimecards={setTimecards} user={user} employees={users}/>} 
      {page==="payroll" &&CAN.seePayroll(user.role)&&<Payroll timecards={timecards} employees={users}/>} 
      {page==="intel"   &&CAN.seeReports(user.role)&&<BuyIntel plants={plants}/>} 
      {page==="reports" &&CAN.seeReports(user.role)&&<Reports plants={plants} expenses={expenses} timecards={timecards} nurseries={nurseries}/>} 
      {page==="tax"     &&CAN.seeTax(user.role)&&<TaxCenter plants={plants} expenses={expenses} timecards={timecards}/>} 
      {page==="audit"   &&CAN.seeAudit(user.role)&&<AuditLog auditLog={auditLog}/>} 
      {page==="admin"   &&CAN.editSettings(user.role)&&<AdminPanel users={users} setUsers={setUsers} settings={settings} setSettings={setSettings}/>} 
    </div>
  </div>;
}
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
