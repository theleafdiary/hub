function Tag({text,color=C.g600,sm,dot}){
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,background:color+"1A",color,border:`1px solid ${color}40`,borderRadius:20,padding:sm?"1px 8px":"2px 11px",fontSize:sm?10:11,fontWeight:700,fontFamily:F.mono,whiteSpace:"nowrap"}}>
    {dot&&<span style={{width:5,height:5,borderRadius:"50%",background:color,flexShrink:0}}/>}{text}
  </span>;
}
function Btn({children,onClick,v="fill",sz="md",full,disabled,style:s={}}){
  const pad=sz==="sm"?"8px 14px":sz==="lg"?"15px 32px":"12px 20px";
  const fs=sz==="sm"?12:sz==="lg"?16:14;
  const VS={fill:{background:C.g700,color:"#fff",border:`1px solid ${C.g700}`},soft:{background:C.g100,color:C.g800,border:`1px solid ${C.g300}`},outline:{background:"transparent",color:C.g700,border:`1.5px solid ${C.g700}`},ghost:{background:"transparent",color:C.tx3,border:`1px solid ${C.bd}`},danger:{background:C.red,color:"#fff",border:`1px solid ${C.red}`},gold:{background:C.gold,color:"#fff",border:`1px solid ${C.gold}`}};
  return <button onClick={onClick} disabled={disabled} style={{...VS[v],padding:pad,fontSize:fs,fontWeight:600,borderRadius:8,cursor:disabled?"not-allowed":"pointer",fontFamily:F.body,display:"inline-flex",alignItems:"center",gap:5,whiteSpace:"nowrap",opacity:disabled?.5:1,width:full?"100%":undefined,justifyContent:full?"center":undefined,transition:"opacity .12s",...s}}>{children}</button>;
}
const Card=({children,style:s={},onClick})=><div onClick={onClick} style={{background:C.card,border:`1px solid ${C.bd}`,borderRadius:14,padding:"16px 20px",cursor:onClick?"pointer":undefined,...s}}>{children}</div>;
const Row=({children,gap=10,wrap,center,between,end,style:s={}})=><div style={{display:"flex",gap,flexWrap:wrap?"wrap":undefined,alignItems:center?"center":end?"flex-end":undefined,justifyContent:between?"space-between":undefined,...s}}>{children}</div>;

function KPI({label,value,sub,color,onClick}){

    {sub&&<div style={{fontSize:12,color:C.tx3,marginTop:4}}>{sub}</div>}

}
function SHdr({icon,title,sub,right}){

function Inp({label,value,onChange,type="text",placeholder,required,disabled,style:s={}}){
  return <div style={{display:"flex",flexDirection:"column",gap:4,flex:1,...s}}>
    {label&&<label style={{fontSize:13,fontWeight:600,color:C.tx2,letterSpacing:.1}}>{label}{required&&<span style={{color:C.red}}> *</span>}</label>}
    <input type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} disabled={disabled}

function Sel({label,value,onChange,options,required}){

}
function Tbl({cols,rows,empty="No data yet."}){
  return <div style={{overflowX:"auto",border:`1px solid ${C.bd}`,borderRadius:10}}>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
      <thead style={{background:C.cardAlt}}>

      </thead>
      <tbody>
        {rows.length===0?<tr><td colSpan={cols.length} style={{padding:"40px",textAlign:"center",color:C.tx3}}>{empty}</td></tr>
          :rows.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.bdS}`,cursor:r._click?"pointer":undefined}}
              onMouseEnter={e=>{if(r._click)e.currentTarget.style.background=C.g50;}}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}

          </tr>)}
      </tbody>
    </table>
  </div>;
}
function Modal({title,children,onClose,wide}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.48)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",borderBottom:`1px solid ${C.bd}`}}>
        <h2 style={{fontFamily:F.display,fontSize:18,color:C.g900,margin:0}}>{title}</h2>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.tx3,lineHeight:1}}>×</button>
      </div>
      <div style={{padding:20}}>{children}</div>
    </div>
  </div>;
}
function MBadge({m}){const c=m>=65?C.g600:m>=45?C.gold:C.red;return <Tag text={`${m}%`} color={c} sm/>;}
function SBadge({s}){
  const MAP={"In Stock":C.g600,"Sold":C.gold,"Dead":C.red,"Damaged":C.red,"Returned":C.amber,"Giveaway":C.blue,"Personal":C.tx3,"Holding For Customer":C.purple,"Needs Label":C.amber,"Needs Photo":C.amber};
  return <Tag text={s} color={MAP[s]||C.tx3} dot sm/>;
}
function BarLine({data,lk,vk,fmtV,colorFn}){
  const max=Math.max(...data.map(d=>d[vk]||0),1);
  return <div style={{display:"flex",flexDirection:"column",gap:10}}>
    {data.map((d,i)=>{const val=d[vk]||0,p=Math.round(val/max*100),color=colorFn?colorFn(d,i):C.g500;return(
      <div key={i}><Row between style={{marginBottom:3}}><span style={{fontSize:12,fontWeight:600,color:C.tx1}}>{d[lk]}</span><span style={{fontSize:12,fontWeight:700,color}}>{fmtV?fmtV(val):val}</span></Row>
        <div style={{height:8,background:C.g100,borderRadius:4,overflow:"hidden"}}><div style={{width:`${p}%`,height:"100%",background:color,borderRadius:4,transition:"width .4s"}}/></div></div>
    );})}
  </div>;
}

/* ══════════════════════════════════════════════════════════
   OWNER DASHBOARD
══════════════════════════════════════════════════════════ */
function OwnerDash({plants,expenses,timecards,bills,setPage}){
  const sold=plants.filter(p=>p.status==="Sold");
  const inStock=plants.filter(p=>p.status==="In Stock");
  const dead=plants.filter(p=>["Dead","Damaged"].includes(p.status));
  const aging30=inStock.filter(p=>dHeld(p.dateAdded)>=30);
  const aging60=inStock.filter(p=>dHeld(p.dateAdded)>=60);
  const needsLabel=inStock.filter(p=>!p.labelPrinted);

  const soldRev=sold.reduce((s,p)=>s+(+p.salePrice||+p.suggestedPrice||0),0);
  const soldFees=sold.reduce((s,p)=>s+platFee(p.platform||"",+p.salePrice||+p.suggestedPrice||0),0);
  const soldCogs=sold.reduce((s,p)=>s+(+p.cost||0),0);
  const trueGross=soldRev-soldCogs-soldFees;
  const totalExp=expenses.reduce((s,e)=>s+(+e.amount||0),0);
  const netProfit=trueGross-totalExp;
  const stockVal=inStock.reduce((s,p)=>s+(+p.suggestedPrice||0),0);
  const lostVal=dead.reduce((s,p)=>s+(+p.cost||0),0);

  const upcoming=bills.filter(b=>{const d=Math.ceil((new Date(b.dueDate)-Date.now())/864e5);return d<=14&&d>=0&&b.status==="Unpaid";});
  const platData=PLATFORMS.map(pl=>{const pp=sold.filter(p=>p.platform===pl);return{pl,rev:pp.reduce((s,p)=>s+(+p.salePrice||+p.suggestedPrice||0),0),cnt:pp.length};}).filter(p=>p.cnt>0).sort((a,b)=>b.rev-a.rev);
  const gMap={};
  sold.forEach(p=>{const g=gOf(p.name);if(!gMap[g])gMap[g]={rev:0,cost:0,cnt:0};gMap[g].rev+=(+p.salePrice||+p.suggestedPrice||0);gMap[g].cost+=(+p.cost||0);gMap[g].cnt++;});
  const topGenus=Object.entries(gMap).map(([g,d])=>({g,profit:d.rev-d.cost,cnt:d.cnt})).sort((a,b)=>b.profit-a.profit).slice(0,4);

  return <div style={{padding:"14px 14px 90px",background:C.bg,minHeight:"100vh"}}>
    <SHdr icon="🏠" title="Business Dashboard" sub={new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
      right={<Row gap={8}><Btn sz="sm" onClick={()=>setPage("upload")}>📸 Upload Invoice</Btn><Btn sz="sm" v="soft" onClick={()=>setPage("manual")}>✏️ Add Plant</Btn></Row>}/>

    {/* Hero row */}
    <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:10,marginBottom:10}}>
      <div style={{background:C.g800,borderRadius:14,padding:"18px 22px",color:"#fff"}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",opacity:.7,marginBottom:6}}>True Net Profit (after all fees & expenses)</div>
        <div style={{fontSize:32,fontWeight:700,fontFamily:F.display,lineHeight:1,marginBottom:6}}>{$(netProfit)}</div>
        <div style={{fontSize:12,opacity:.7}}>{$(trueGross)} gross · {$(soldFees)} fees · {$(totalExp)} exp</div>
      </div>
      <KPI label="Total Revenue" value={$(soldRev)} sub={`${sold.length} plants sold`} color={C.gold}/>
      <KPI label="Stock Value" value={$(stockVal)} sub={`${inStock.length} in stock`} color={C.g600}/>
      <KPI label="Dead Loss" value={$(lostVal)} sub={`${dead.length} plants`} color={dead.length>0?C.red:C.tx3}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:22}}>
      <KPI label="Platform Fees" value={$(soldFees)} color={C.red}/>
      <KPI label="Expenses" value={$(totalExp)} color={C.red}/>
      <KPI label="Aging 30+ days" value={aging30.length} color={aging30.length>0?C.amber:C.tx3} onClick={()=>setPage("inv")}/>
      <KPI label="Needs Labels" value={needsLabel.length} color={needsLabel.length>0?C.blue:C.tx3} onClick={()=>setPage("labels")}/>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr",gap:14}}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <Card>
          <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:14,marginBottom:12}}>💰 Revenue by Platform</div>
          {platData.length===0?<p style={{color:C.tx3,fontSize:12}}>No sales yet — add plants and mark them sold.</p>
            :<BarLine data={platData} lk="pl" vk="rev" fmtV={$} colorFn={(_,i)=>[C.g600,C.gold,C.blue,C.amber][i%4]}/>}
        </Card>
        <Card>
          <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:14,marginBottom:12}}>🏆 Top Genus by Profit</div>
          {topGenus.length===0?<p style={{color:C.tx3,fontSize:12}}>No sold plants yet.</p>
            :topGenus.map(({g,profit,cnt})=><div key={g} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.bdS}`}}>
                <div><span style={{fontWeight:600,fontSize:13}}>{g}</span><span style={{fontSize:11,color:C.tx3,marginLeft:8}}>{cnt} sold</span></div>
                <span style={{fontWeight:700,color:C.gold,fontSize:13}}>{$(profit)}</span>
              </div>)}
        </Card>
        <Card style={{background:C.g50,border:`1px solid ${C.g200}`}}>
          <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:13,marginBottom:8}}>🌴 Florida Tax Snapshot</div>
          {[["Sales Tax Due (7%)",$(soldRev*FL_SALES_TAX)],["Est. SE Tax (15.3%)",$(Math.max(0,netProfit)*FL_SE_TAX)],["Est. Income Tax",$(estIncomeTax(Math.max(0,netProfit)))]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}>
              <span style={{fontSize:11,color:C.tx3}}>{l}</span>
              <span style={{fontWeight:700,color:C.g800,fontSize:11}}>{v}</span>
            </div>
          ))}
          <button onClick={()=>setPage("tax")} style={{marginTop:8,fontSize:11,color:C.blue,background:"none",border:"none",cursor:"pointer",fontFamily:F.body,padding:0}}>Full Tax Center →</button>
        </Card>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {upcoming.length>0&&<div style={{background:C.redBg,border:`1px solid ${C.red}44`,borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontWeight:700,color:C.red,marginBottom:8,fontSize:13,fontFamily:F.display}}>📅 Bills Due Soon</div>
          {upcoming.map(b=>{const d=Math.ceil((new Date(b.dueDate)-Date.now())/864e5);return(
            <div key={b.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${C.red}22`}}>
              <span style={{fontSize:12,fontWeight:600}}>{b.name}</span>
              <Row gap={8}><span style={{fontWeight:700,color:C.red,fontSize:12}}>{$(b.amount)}</span><span style={{fontSize:11,color:C.tx3}}>in {d}d</span></Row>
            </div>);})}
          <Btn v="ghost" sz="sm" onClick={()=>setPage("bills")} style={{marginTop:8}}>View all bills →</Btn>
        </div>}
        {aging30.length>0&&<div style={{background:C.amberBg,border:`1px solid ${C.amber}44`,borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontWeight:700,color:C.amber,marginBottom:6,fontSize:13}}>⏳ Aging Inventory</div>
          <div style={{fontSize:12,color:C.tx2}}>{aging30.length} plants 30+ days old</div>
          {aging60.length>0&&<div style={{fontSize:12,color:C.red,marginTop:3}}>{aging60.length} plants 60+ days — consider discounting</div>}
          <Btn v="ghost" sz="sm" onClick={()=>setPage("inv")} style={{marginTop:8}}>View inventory →</Btn>
        </div>}
        {needsLabel.length>0&&<div style={{background:C.blueBg,border:`1px solid ${C.blue}44`,borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontWeight:700,color:C.blue,marginBottom:6,fontSize:13}}>🏷️ {needsLabel.length} Plants Need Labels</div>
          <Btn v="ghost" sz="sm" onClick={()=>setPage("labels")}>Print labels →</Btn>
        </div>}
        <Card>
          <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:14,marginBottom:12}}>📋 True P&L</div>
          {[["Gross Revenue",soldRev,C.gold,false],["− Fees",-soldFees,C.red,false],["− COGS",-soldCogs,C.red,false],["= True Gross",trueGross,trueGross>=0?C.g600:C.red,true],["− Expenses",-totalExp,C.red,false],["= Net Profit",netProfit,netProfit>=0?C.g800:C.red,true]].map(([l,v,c,bold])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 8px",background:bold?C.g50:"transparent",borderRadius:5,marginBottom:2}}>
              <span style={{fontSize:12,color:C.tx2,fontWeight:bold?700:400}}>{l}</span>
              <span style={{fontSize:12,fontWeight:700,color:c}}>{v>=0?$(v):`(${$(-v)})`}</span>
            </div>
          ))}
        </Card>
      </div>
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════ */
function EmpDash({plants,user,timecards}){
  const myTC=timecards.filter(t=>t.userId===user.id);
  const inStock=plants.filter(p=>p.status==="In Stock");
  const todayTC=myTC.find(t=>t.date===today()&&!t.out);
  const weekPay=myTC.filter(t=>new Date(t.date)>=new Date(Date.now()-7*864e5)).reduce((s,t)=>s+(+t.totalPay||0),0);
  const weekHrs=myTC.filter(t=>new Date(t.date)>=new Date(Date.now()-7*864e5)).reduce((s,t)=>s+(+t.hours||0),0);
  return <div style={{padding:"14px 14px 90px",background:C.bg,minHeight:"100vh"}}>
    <SHdr icon="🌿" title={`Hey, ${user.name}! 👋`} sub={new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}/>
    {todayTC&&<div style={{background:C.g50,border:`1px solid ${C.g300}`,borderRadius:10,padding:"11px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
      <div style={{width:8,height:8,borderRadius:"50%",background:C.g500,boxShadow:`0 0 6px ${C.g400}`}}/><span style={{fontWeight:700,color:C.g800}}>Clocked in since {todayTC.in}</span>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
      <KPI label="In Stock" value={inStock.length} color={C.g600}/>
      <KPI label="Needs Labels" value={inStock.filter(p=>!p.labelPrinted).length} color={C.amber}/>
      <KPI label="This Week Hrs" value={`${weekHrs.toFixed(1)}h`} color={C.blue}/>
      <KPI label="This Week Pay" value={$(weekPay)} color={C.gold}/>
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════════
   INVOICE UPLOAD
══════════════════════════════════════════════════════════ */
function InvoiceUpload({plants,setPlants,nurseries,addAudit,user}){
  const [step,setStep]=useState("upload");
  const [img,setImg]=useState(null);
  const [parsed,setParsed]=useState(null);
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const [selN,setSelN]=useState(null);
  const fRef=useRef(),cRef=useRef();
  useEffect(()=>{if(nurseries.length&&!selN)setSelN(nurseries[0]);},[nurseries]);
  const load=f=>{if(!f)return;const r=new FileReader();r.onload=e=>{setImg(e.target.result);setStep("preview");};r.readAsDataURL(f);setErr(null);};
  const scan=async()=>{
    if(!selN){setErr("Select a nursery first.");return;}
    setLoading(true);setErr(null);setStep("scanning");
    try{
      const b64=img.split(",")[1],mime=img.split(";")[0].split(":")[1];
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:AI_HEADERS,body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2500,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mime,data:b64}},{type:"text",text:`Read this plant nursery invoice and return ONLY valid JSON:\n{"nurseryName":null,"invoiceNumber":null,"invoiceDate":null,"paymentMethod":null,"subtotal":0,"tax":0,"shipping":0,"total":0,"plants":[{"name":"","botanicalName":null,"potSize":null,"quantity":1,"costPerPlant":0}]}`}]}]})});
      const d=await res.json();
      const result=JSON.parse((d.content?.map(c=>c.text||"").join("")||"").replace(/```json|```/g,"").trim());
      setParsed(result);
      const existing=plants.filter(p=>p.nurseryCode===selN.code).length;
      let ctr=existing;
      const mapped=(result.plants||[]).flatMap((p,li)=>Array.from({length:Math.max(1,+p.quantity||1)},(_,qi)=>{
        ctr++;const cost=+p.costPerPlant||0,sp=sprice(cost);
        return{_k:`${li}-${qi}`,plantId:pid(selN.code,ctr),nurseryCode:selN.code,name:toTC(p.name||""),botanicalName:p.botanicalName||"",potSize:p.potSize||"",cost,suggestedPrice:sp,salePrice:"",shippingCost:"",margin:marg(cost,sp),status:"In Stock",invoiceNumber:result.invoiceNumber||"",invoiceDate:result.invoiceDate||"",dateAdded:today(),platform:"",rack:"",shelf:"",notes:"",labelPrinted:false,addedBy:user.name};
      }));
      setRows(mapped);setStep("review");
    }catch(e){setErr("Scan failed: "+e.message);setStep("preview");}
    finally{setLoading(false);}
  };
  const updR=(k,f,v)=>setRows(pr=>pr.map(r=>{if(r._k!==k)return r;const u={...r,[f]:v};if(f==="cost"||f==="suggestedPrice")u.margin=marg(f==="cost"?+v:+r.cost,f==="suggestedPrice"?+v:+r.suggestedPrice);return u;}));
  const save=()=>{setPlants(p=>[...p,...rows.map(({_k,...r})=>({...r,id:uid()}))]);addAudit({action:`Invoice uploaded — ${rows.length} plants from ${selN?.name}`,user:user.name,page:"Invoice Upload"});setStep("done");};
  const reset=()=>{setStep("upload");setImg(null);setParsed(null);setRows([]);setErr(null);};
  if(!nurseries.length)return <div style={{padding:"60px",textAlign:"center",background:C.bg,minHeight:"100vh"}}><div style={{fontSize:40,marginBottom:12}}>🏪</div><h2 style={{fontFamily:F.display,color:C.g900}}>Add a nursery first</h2></div>;
  return <div style={{padding:"14px 14px 90px",background:C.bg,minHeight:"100vh"}}>
    <SHdr icon="📸" title="Upload Invoice" sub="AI reads every plant, cost, and detail automatically"/>
    {step==="upload"&&<div style={{maxWidth:640}}>
      <Card style={{marginBottom:14}}>
        <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,marginBottom:10}}>Select Nursery</div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{nurseries.map(n=><button key={n.id} onClick={()=>setSelN(n)} style={{padding:"7px 13px",borderRadius:8,cursor:"pointer",fontFamily:F.body,fontSize:12,fontWeight:600,background:selN?.id===n.id?C.g700:C.cardAlt,color:selN?.id===n.id?"#fff":C.tx1,border:`1.5px solid ${selN?.id===n.id?C.g700:C.bd}`}}>{n.code} · {n.name}</button>)}</div>
      </Card>
      <div style={{border:`2px dashed ${C.g300}`,borderRadius:14,padding:"52px 32px",textAlign:"center",background:C.card,cursor:"pointer"}} onClick={()=>fRef.current.click()}>
        <div style={{fontSize:48,marginBottom:10}}>📄</div>
        <h2 style={{fontFamily:F.display,fontSize:18,color:C.g900,marginBottom:6}}>Drop invoice here or browse</h2>
        <p style={{color:C.tx3,fontSize:13,marginBottom:18}}>Phone photos, JPG, PNG — works great in the field</p>
        <Row gap={10} style={{justifyContent:"center"}}>
          <Btn onClick={e=>{e.stopPropagation();fRef.current.click();}}>Browse Files</Btn>
          <Btn v="outline" onClick={e=>{e.stopPropagation();cRef.current.click();}}>📷 Camera</Btn>
        </Row>
      </div>
      <input ref={fRef} type="file" accept="image/*,.pdf" style={{display:"none"}} onChange={e=>load(e.target.files[0])}/>
      <input ref={cRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>load(e.target.files[0])}/>
    </div>}
    {step==="preview"&&img&&<div style={{display:"flex",gap:20,maxWidth:860}}>
      <div style={{flex:1}}><img src={img} alt="Invoice" style={{width:"100%",maxHeight:480,objectFit:"contain",borderRadius:10,border:`1px solid ${C.bd}`}}/></div>
      <div style={{width:240}}>
        <Card style={{marginBottom:10}}><div style={{fontFamily:F.display,fontWeight:700,color:C.g900,marginBottom:5}}>Ready to scan</div><p style={{fontSize:12,color:C.tx3}}>Nursery: <b>{selN?.name}</b></p></Card>
        {err&&<div style={{background:C.redBg,borderRadius:7,padding:10,color:C.red,fontSize:12,marginBottom:10}}>{err}</div>}
        <Btn full onClick={scan} style={{marginBottom:8}}>🔍 Scan with AI</Btn>
        <Btn full v="ghost" onClick={reset}>Use Different File</Btn>
      </div>
    </div>}
    {step==="scanning"&&<div style={{textAlign:"center",padding:"80px",maxWidth:380,margin:"0 auto"}}>
      <div style={{fontSize:48,marginBottom:16}}>🔍</div>
      <h2 style={{fontFamily:F.display,color:C.g900,marginBottom:8}}>Reading invoice…</h2>
      <p style={{color:C.tx3}}>Extracting every plant and detail</p>
      <style>{`@keyframes ld{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1.2);opacity:1}}`}</style>
      <Row gap={6} style={{justifyContent:"center",marginTop:20}}>{[0,1,2].map(i=><div key={i} style={{width:9,height:9,borderRadius:"50%",background:C.g400,animation:`ld 1.2s ease-in-out ${i*.2}s infinite`}}/>)}</Row>
    </div>}
    {step==="review"&&parsed&&<div>
      <Card style={{marginBottom:14,background:C.g50,border:`1px solid ${C.g200}`}}>
        <Row between wrap gap={10}>
          <div><div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15}}>{parsed.nurseryName||selN?.name}</div><div style={{fontSize:12,color:C.tx3}}>Invoice #{parsed.invoiceNumber||"—"} · {parsed.invoiceDate||"—"}</div></div>
          <Row gap={12} center>{[["Subtotal",$(parsed.subtotal)],["Tax",$(parsed.tax)],["Ship",$(parsed.shipping)],["Total",$(parsed.total)]].map(([l,v])=><div key={l} style={{textAlign:"center"}}><div style={{fontSize:9,color:C.tx3,fontWeight:700,textTransform:"uppercase"}}>{l}</div><div style={{fontWeight:700,color:C.g800,fontSize:13}}>{v}</div></div>)}<Tag text={`${rows.length} plants`} color={C.g700}/></Row>
        </Row>
      </Card>
      <div style={{maxHeight:420,overflowY:"auto",border:`1px solid ${C.bd}`,borderRadius:9}}>

            <td style={{padding:"3px 9px"}}><input value={r.rack} onChange={e=>updR(r._k,"rack",e.target.value)} placeholder="R1" style={{width:40,padding:"3px 5px",border:`1px solid ${C.bd}`,borderRadius:5,fontSize:11}}/></td>
            <td style={{padding:"3px 9px"}}><input value={r.shelf} onChange={e=>updR(r._k,"shelf",e.target.value)} placeholder="S2" style={{width:40,padding:"3px 5px",border:`1px solid ${C.bd}`,borderRadius:5,fontSize:11}}/></td>

      <Row gap={8} style={{marginTop:14,justifyContent:"flex-end"}}><Btn v="ghost" onClick={reset}>Start Over</Btn><Btn onClick={save}>✅ Save {rows.length} Plants</Btn></Row>

      <div style={{fontSize:56,marginBottom:16}}>🌱</div>
      <h2 style={{fontFamily:F.display,color:C.g900,marginBottom:8}}>Plants Added!</h2>
      <p style={{color:C.tx3,marginBottom:22}}>{rows.length} plants saved with unique IDs.</p>
      <Btn onClick={reset}>Upload Another Invoice</Btn>

  </div>;
}

/* ══════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════ */
function ManualEntry({plants,setPlants,nurseries,addAudit,user}){
  const blank={name:"",botanicalName:"",potSize:"",cost:"",suggestedPrice:"",salePrice:"",shippingCost:"",status:"In Stock",nurseryCode:nurseries[0]?.code||"",platform:"",rack:"",shelf:"",dateAdded:today(),invoiceNumber:"",notes:""};
  const [form,setForm]=useState(blank);
  const [qty,setQty]=useState(1);
  const [saved,setSaved]=useState([]);
  const upd=f=>v=>{setForm(p=>{const u={...p,[f]:v};if(f==="cost"){const sp=sprice(+v);u.suggestedPrice=sp;u.margin=marg(+v,sp);}if(f==="suggestedPrice")u.margin=marg(+p.cost,+v);return u;});};
  const save=()=>{
    if(!form.name.trim()||!form.nurseryCode)return;
    const existing=plants.filter(p=>p.nurseryCode===form.nurseryCode).length;
    const newPlants=Array.from({length:Math.max(1,+qty||1)},(_,i)=>{
      const idx=existing+i+1,cost=+form.cost||0,sp=+form.suggestedPrice||sprice(cost);
      return{id:uid(),plantId:pid(form.nurseryCode,idx),...form,name:toTC(form.name),cost,suggestedPrice:sp,margin:marg(cost,sp),labelPrinted:false,addedBy:user.name};
    });
    setPlants(p=>[...p,...newPlants]);
    addAudit({action:`Manually added ${newPlants.length}× ${form.name}`,user:user.name,page:"Manual Entry"});
    setSaved(p=>[...p,...newPlants]);
    setForm({...blank,nurseryCode:form.nurseryCode});setQty(1);
  };
  const fee=platFee(form.platform||"",+form.suggestedPrice||0);
  const mc=form.margin>=65?C.g600:form.margin>=45?C.gold:C.red;
  const nursery=nurseries.find(n=>n.code===form.nurseryCode);
  return <div style={{padding:"14px 14px 90px",background:C.bg,minHeight:"100vh"}}>

          <label style={{fontSize:11,fontWeight:600,color:C.tx3,display:"block",marginBottom:7}}>Where You Bought It *</label>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>{nurseries.map(n=><button key={n.id} onClick={()=>upd("nurseryCode")(n.code)} style={{padding:"7px 13px",borderRadius:8,cursor:"pointer",fontFamily:F.body,fontSize:12,fontWeight:600,background:form.nurseryCode===n.code?C.g700:C.cardAlt,color:form.nurseryCode===n.code?"#fff":C.tx1,border:`1.5px solid ${form.nurseryCode===n.code?C.g700:C.bd}`}}>{n.code} · {n.name}</button>)}
            {!nurseries.length&&<span style={{fontSize:12,color:C.red}}>Add a nursery first</span>}
          </div>
          {nursery&&<div style={{marginTop:8,background:C.g50,borderRadius:7,padding:"6px 11px",fontSize:12,color:C.tx2}}>📍 {nursery.address||"No address saved"} {nursery.contact&&`· 👤 ${nursery.contact}`}</div>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <Inp label="Plant Name *" value={form.name} onChange={upd("name")} placeholder="e.g. Philodendron Pink Princess" required/>
          <Inp label="Botanical Name" value={form.botanicalName} onChange={upd("botanicalName")} placeholder="optional"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:10}}>
          <Sel label="Pot Size" value={form.potSize} onChange={upd("potSize")} options={["", ...POT_SIZES]}/>

        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:10}}>
          <Sel label="Status" value={form.status} onChange={upd("status")} options={STATUSES}/>
          <Sel label="Platform (if sold)" value={form.platform} onChange={upd("platform")} options={["", ...PLATFORMS]}/>
          <Inp label="Rack" value={form.rack} onChange={upd("rack")} placeholder="R1"/>
          <Inp label="Shelf" value={form.shelf} onChange={upd("shelf")} placeholder="S2"/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:600,color:C.tx3,display:"block",marginBottom:4}}>Notes / Care Info</label>
          <textarea value={form.notes} onChange={e=>upd("notes")(e.target.value)} style={{width:"100%",padding:"9px 11px",border:`1.5px solid ${C.bd}`,borderRadius:8,fontSize:12,fontFamily:F.body,minHeight:60,boxSizing:"border-box",resize:"vertical"}} placeholder="Care notes, source details…"/>

      </Card>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {form.name&&<Card style={{background:C.g50,border:`1px solid ${C.g200}`}}>

            <div style={{fontFamily:F.mono,fontSize:10,color:C.g500,borderTop:`1px solid ${C.g100}`,paddingTop:6,marginBottom:7}}>🌿 LD-{form.nurseryCode||"?????"}-####</div>
            <Row between><span style={{fontSize:10,color:C.tx3}}>Cost {form.cost?$(form.cost):"$—"}</span><span style={{fontWeight:700,color:C.g900,fontSize:15}}>{form.suggestedPrice?$(form.suggestedPrice):"$—"}</span></Row>

      </div>
    </div>
  </div>;
}

function PastInvoices({plants,setPlants,nurseries,addAudit,user}){
  const [show,setShow]=useState(false);

  const [saved,setSaved]=useState([]);
  useEffect(()=>{if(nurseries.length&&!selN)setSelN(nurseries[0]);},[nurseries]);
  const addRow=()=>setRows(p=>[...p,{id:uid(),name:"",pot:"",qty:1,cost:"",salePrice:"",status:"Sold",platform:"Palmstreet"}]);
  const updR=(id,f,v)=>setRows(p=>p.map(r=>r.id===id?{...r,[f]:v}:r));
  const save=()=>{
    if(!selN||!rows.some(r=>r.name.trim()))return;
    const existing=plants.filter(p=>p.nurseryCode===selN.code).length;let ctr=existing;
    const newP=rows.filter(r=>r.name.trim()).flatMap(r=>Array.from({length:Math.max(1,+r.qty||1)},()=>{ctr++;const cost=+r.cost||0,sp=+r.salePrice||sprice(cost);return{id:uid(),plantId:pid(selN.code,ctr),nurseryCode:selN.code,name:toTC(r.name),botanicalName:"",potSize:r.pot,cost,suggestedPrice:sp,salePrice:r.salePrice||"",shippingCost:"",margin:marg(cost,sp),status:r.status,invoiceNumber:inv.number,invoiceDate:inv.date,dateAdded:inv.date||today(),platform:r.platform,rack:"",shelf:"",notes:"",labelPrinted:false,historical:true,addedBy:user.name};}));
    setPlants(p=>[...p,...newP]);addAudit({action:`Logged ${newP.length} historical plants from ${selN.name}`,user:user.name,page:"Past Invoices"});
    setSaved(p=>[...p,{...inv,nursery:selN.name,count:newP.length,id:uid()}]);
    setShow(false);setInv({number:"",date:"",payMethod:"Cash",total:"",notes:""});setRows([{id:uid(),name:"",pot:"",qty:1,cost:"",salePrice:"",status:"Sold",platform:"Palmstreet"}]);

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:12}}>
        <Inp label="Invoice #" value={inv.number} onChange={v=>setInv(p=>({...p,number:v}))}/>
        <Inp label="Date" type="date" value={inv.date} onChange={v=>setInv(p=>({...p,date:v}))}/>
        <Sel label="Payment" value={inv.payMethod} onChange={v=>setInv(p=>({...p,payMethod:v}))} options={PAY_METHS}/>
        <Inp label="Total Paid" type="number" value={inv.total} onChange={v=>setInv(p=>({...p,total:v}))}/>
      </div>
      <div style={{overflowX:"auto",border:`1px solid ${C.bd}`,borderRadius:8,marginBottom:10}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead style={{background:C.cardAlt}}><tr>{["Plant Name","Pot","Qty","Cost/Plant","Sale Price","Status","Platform",""].map(h=><th key={h} style={{padding:"7px 8px",textAlign:"left",color:C.tx3,fontWeight:600,fontSize:10,textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
          <tbody>{rows.map(r=><tr key={r.id} style={{borderBottom:`1px solid ${C.bdS}`}}>
            <td style={{padding:"4px 5px"}}><input value={r.name} onChange={e=>updR(r.id,"name",e.target.value)} placeholder="Plant name" style={{width:170,padding:"4px 6px",border:`1px solid ${C.bd}`,borderRadius:5,fontSize:12,fontFamily:F.body}}/></td>
            <td style={{padding:"4px 5px"}}><select value={r.pot} onChange={e=>updR(r.id,"pot",e.target.value)} style={{padding:"4px",border:`1px solid ${C.bd}`,borderRadius:5,fontSize:11}}><option value="">—</option>{POT_SIZES.map(s=><option key={s}>{s}</option>)}</select></td>
            <td style={{padding:"4px 5px"}}><input type="number" value={r.qty} onChange={e=>updR(r.id,"qty",e.target.value)} style={{width:46,padding:"4px",border:`1px solid ${C.bd}`,borderRadius:5,fontSize:12}}/></td>
            <td style={{padding:"4px 5px"}}><input type="number" value={r.cost} onChange={e=>updR(r.id,"cost",e.target.value)} style={{width:65,padding:"4px",border:`1px solid ${C.bd}`,borderRadius:5,fontSize:12}}/></td>
            <td style={{padding:"4px 5px"}}><input type="number" value={r.salePrice} onChange={e=>updR(r.id,"salePrice",e.target.value)} style={{width:65,padding:"4px",border:`1px solid ${C.bd}`,borderRadius:5,fontSize:12,color:C.gold}}/></td>
            <td style={{padding:"4px 5px"}}><select value={r.status} onChange={e=>updR(r.id,"status",e.target.value)} style={{padding:"4px",border:`1px solid ${C.bd}`,borderRadius:5,fontSize:11}}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></td>
            <td style={{padding:"4px 5px"}}><select value={r.platform} onChange={e=>updR(r.id,"platform",e.target.value)} style={{padding:"4px",border:`1px solid ${C.bd}`,borderRadius:5,fontSize:11}}>{PLATFORMS.map(s=><option key={s}>{s}</option>)}</select></td>
            <td style={{padding:"4px"}}><button onClick={()=>setRows(p=>p.filter(x=>x.id!==r.id))} style={{background:"none",border:"none",cursor:"pointer",color:C.red}}>✕</button></td>
          </tr>)}</tbody>
        </table>
      </div>
      <Row gap={8}><Btn v="ghost" sz="sm" onClick={addRow}>+ Row</Btn><Btn onClick={save}>Save Invoice</Btn></Row>
    </Card>}
    {saved.map(s=><Card key={s.id} style={{marginBottom:10,padding:"12px 16px"}}>
      <Row between center><div><div style={{fontWeight:600,fontSize:13}}>{s.nursery}</div><div style={{fontSize:11,color:C.tx3}}>{s.date||"No date"} · #{s.number||"—"} · {s.payMethod}</div></div><Row gap={8} center><Tag text={`${s.count} plants`} color={C.g600}/>{s.total&&<span style={{fontWeight:700,color:C.gold,fontSize:13}}>{$(s.total)}</span>}</Row></Row>
    </Card>)}
    {!show&&saved.length===0&&<Card style={{textAlign:"center",padding:"50px"}}>
      <div style={{fontSize:36,marginBottom:10}}>📋</div><h2 style={{fontFamily:F.display,color:C.g900,marginBottom:6,fontSize:18}}>No past invoices</h2>
      <Btn onClick={()=>setShow(true)}>+ Log Past Invoice</Btn>
    </Card>}
  </div>;
}

/* ══════════════════════════════════════════════════════════
   INVENTORY
══════════════════════════════════════════════════════════ */
function Inventory({plants,setPlants,user,addAudit}){
  const [search,setSearch]=useState("");
  const [fs,setFs]=useState("All");
  const [fn,setFn]=useState("All");
  const [fg,setFg]=useState("All");
  const [fAge,setFAge]=useState("All");
  const [detail,setDetail]=useState(null);
  const [sortF,setSortF]=useState("dateAdded");
  const [sortD,setSortD]=useState("desc");
  const isOwner=CAN.seeCost(user.role);
  const nurseries=[...new Set(plants.map(p=>p.nurseryCode))];
  const genera=[...new Set(plants.map(p=>gOf(p.name)))].sort();
  const list=plants.filter(p=>{
    const q=search.toLowerCase(),days=dHeld(p.dateAdded);
    const ageOk=fAge==="All"||(fAge==="30+"&&days>=30)||(fAge==="60+"&&days>=60)||(fAge==="fresh"&&days<30);
    return(!q||p.name.toLowerCase().includes(q)||(p.plantId||"").toLowerCase().includes(q))&&(fs==="All"||p.status===fs)&&(fn==="All"||p.nurseryCode===fn)&&(fg==="All"||gOf(p.name)===fg)&&ageOk;
  }).sort((a,b)=>{let av=a[sortF]||0,bv=b[sortF]||0;if(typeof av==="string"){av=av.toLowerCase();bv=bv.toLowerCase();}return sortD==="asc"?av>bv?1:-1:av<bv?1:-1;});

══════════════════════════════════════════════════════════ */
const PALMSTREET_HEADERS = [
  'Title (product name, 80 character max)*','Item description*','Image URL','Price*','Quantity* ',
  'Variation 1 name','Variation 1 value ','Variation 2 name','Variation 2 value','Variation 3 name','Variation 3 value',
  'SKU','Mark "Yes" for Private listing','Shipping (Leave empty will follow store setting...)'
];
const SHOW_KEY = 'leafDiaryShowBuilderIds';
const safePlantId = p => (p?.plantId || p?.id || '').toString().trim();
const csvCell = v => {
  const x = (v ?? '').toString();
  return /[",\n\r]/.test(x) ? '"' + x.replace(/"/g,'""') + '"' : x;
};
const cleanPrice = p => {
  const v = +p.suggestedPrice || +p.salePrice || +p.marketRec || 0;
  return v > 0 ? v.toFixed(2) : '';
};
const palmTitle = p => {
  const id = safePlantId(p);
  const suffix = id ? ` - ${id}` : '';
  const maxName = Math.max(10, 80 - suffix.length);
  const name = toTC(p.name || 'Leaf Diary Plant').slice(0, maxName).trim();
  return `${name}${suffix}`.slice(0,80);
};
const smartPlantDescription = (p, showName='') => {
  const lines = [
    `Plant Name: ${toTC(p.name || 'Leaf Diary Plant')}`,
    safePlantId(p) ? `Plant ID: ${safePlantId(p)}` : '',
    p.potSize ? `Pot Size: ${p.potSize}` : '',
    showName ? `Show: ${showName}` : '',
    '',
    'Leaf Diary rare plant listing. Exact plant will be shown during the live show. Please review the plant on screen before purchasing.',
    'rare roots, real love'
  ];
  return lines.filter(x=>x!==null&&x!==undefined).join('\n').replace(/\n{3,}/g,'\n\n');
};
const validatePalmstreetPlants = list => {
  const seen = new Set();
  const errors = [];
  list.forEach((p,i)=>{
    const row = i+1, id = safePlantId(p);
    if(!id) errors.push(`Row ${row}: missing Plant ID / SKU`);
    if(id && seen.has(id)) errors.push(`Row ${row}: duplicate Plant ID ${id}`);
    if(id) seen.add(id);
    if(!p.name) errors.push(`${id||'Row '+row}: missing plant name`);
    if(!cleanPrice(p)) errors.push(`${id||'Row '+row}: missing suggested price / sale price`);
    if(p.status && p.status !== 'In Stock') errors.push(`${id||'Row '+row}: status is ${p.status}, not In Stock`);
  });
  return errors;
};
const makePalmstreetCSV = (list, opts={}) => {
  const rows = list.map(p => [
    palmTitle(p),
    smartPlantDescription(p, opts.showName || ''),
    p.imageUrl || p.photoUrl || p.image || '',
    cleanPrice(p),
    '1',
    '', '', '', '', '', '',
    safePlantId(p),
    opts.privateListing ? 'YES' : 'NO',
    ''
  ].map(csvCell).join(','));
  return PALMSTREET_HEADERS.map(csvCell).join(',') + '\n' + rows.join('\n');
};
const makeShowListCSV = list => {
  const headers = ['Order','Plant ID','Plant Name','Pot Size','Suggested Price','Status','Nursery','Rack','Shelf'];
  const rows = list.map((p,i)=>[i+1,safePlantId(p),toTC(p.name),p.potSize||'',cleanPrice(p),p.status||'',p.nurseryCode||'',p.rack||'',p.shelf||''].map(csvCell).join(','));
  return headers.map(csvCell).join(',') + '\n' + rows.join('\n');
};
const downloadCSVFile = (filename, csv) => {
  const blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8;'});
  const a = Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:filename});
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 500);
};
const getSavedShowIds = () => { try { return JSON.parse(localStorage.getItem(SHOW_KEY)||'[]'); } catch { return []; } };
const saveShowIds = ids => localStorage.setItem(SHOW_KEY, JSON.stringify([...new Set(ids)]));

async function runLabelResearch(plants,onProg,onDone){
  const results=[];
  for(let i=0;i<plants.length;i++){
    const p=plants[i];onProg({current:i+1,total:plants.length,name:p.name});
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:AI_HEADERS,body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:`For rare houseplant "${p.name}" (${p.potSize||'4"'} pot) typical USA resale on Palmstreet/Whatnot, reply ONLY JSON: {"low":number,"avg":number,"high":number,"rec":number}`}]})});
      const d=await res.json();
      const txt=d.content?.map(c=>c.text||"").join("")||"{}";
      results.push({...p,...JSON.parse(txt.replace(/```json|```/g,"").trim())});
    }catch{results.push({...p});}
    await new Promise(r=>setTimeout(r,200));
  }
  onDone(results);
}

        {avail.map(p=>{const on=sel.has(p.id);const days=dHeld(p.dateAdded);const aging=days!==null&&days>=30&&p.status==="In Stock";const priceLow=+p.cost>0&&+p.suggestedPrice<+p.cost*2;const m=+p.margin||0;const borderColor=m>=65?C.g500:m>=45?C.gold:C.red;
          return <div key={p.id} onClick={()=>tog(p.id)} style={{width:188,border:`2px solid ${on?C.g700:aging?C.amber:priceLow?C.red:C.bd}`,borderLeft:`4px solid ${borderColor}`,borderRadius:10,padding:"11px 12px",cursor:"pointer",background:on?C.g50:C.card,transition:"all .12s",position:"relative"}}>
            {aging&&<div style={{position:"absolute",top:-7,right:8,background:C.amber,color:"#fff",fontSize:9,fontWeight:700,borderRadius:20,padding:"1px 7px"}}>⏳ {days}d</div>}
            <Row between style={{marginBottom:3}}>
              <span style={{fontFamily:F.mono,fontSize:9,color:C.g500}}>{p.plantId}</span>
              <span>{on?"✅":"⬜"}</span>
            </Row>
            <div style={{fontWeight:700,color:C.g900,fontFamily:F.display,fontSize:12,lineHeight:1.3,marginBottom:2}}>{toTC(p.name)}</div>
            <div style={{fontSize:10,color:C.tx3,marginBottom:6}}>{p.potSize||"—"}</div>
            <Row between style={{borderTop:`1px solid ${C.bdS}`,paddingTop:6}}>
              {showCost&&<span style={{fontSize:10,color:C.tx3}}>Cost {$(p.cost)}</span>}
              <span style={{fontWeight:700,color:priceLow?C.red:C.g900,fontSize:13}}>{$(p.suggestedPrice)}</span>
            </Row>
            {priceLow&&showCost&&<div style={{fontSize:9,color:C.red,marginTop:2}}>Min: {$(+p.cost*2)}</div>}
            {p.marketAvg&&<div style={{fontSize:9,color:C.blue,marginTop:2}}>Mkt avg: {$(p.marketAvg)}</div>}
            <div style={{marginTop:5,display:"flex",gap:4,flexWrap:"wrap"}}><MBadge m={p.margin}/>{p.labelPrinted&&<span style={{fontSize:9,color:C.g500}}>✓ printed</span>}{p.palmstreetExportedAt&&<span style={{fontSize:9,color:C.blue}}>✓ Palmstreet</span>}</div>
          </div>;
        })}
      </div>
    )}
    {jobResults.length>0&&<div style={{marginTop:24}}>
      <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15,marginBottom:12}}>📊 Market Research Results</div>
      <Tbl cols={[{k:"n_",l:"Plant"},{k:"id_",l:"ID"},{k:"our_",l:"Our Price"},{k:"lo",l:"Mkt Low"},{k:"avg",l:"Mkt Avg"},{k:"hi",l:"Mkt High"},{k:"rec_",l:"Recommended"}]}
        rows={jobResults.map(p=>({n_:<b style={{fontSize:12}}>{toTC(p.name)}</b>,id_:<span style={{fontFamily:F.mono,fontSize:10,color:C.g500}}>{p.plantId}</span>,our_:$(p.suggestedPrice),lo:p.low?$(p.low):"—",avg:p.avg?<b>{$(p.avg)}</b>:"—",hi:p.high?<span style={{color:C.gold}}>{$(p.high)}</span>:"—",rec_:p.rec?<span style={{fontWeight:700,color:p.rec>+p.suggestedPrice?C.g600:C.amber}}>{$(p.rec)}</span>:"—"}))}/>
    </div>}
  </div>;
}

/* ══════════════════════════════════════════════════════════
   NURSERIES
══════════════════════════════════════════════════════════ */
function Nurseries({nurseries,setNurseries,plants,user}){
  const blank={id:"",code:"",name:"",phone:"",email:"",address:"",website:"",contact:"",paymentMethods:"",hasAccount:false,accountNotes:"",notes:""};
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState(blank);
  const [showNew,setShowNew]=useState(false);
  const [newForm,setNewForm]=useState({...blank});
  const [del_,setDel]=useState(null);
  const isOwner=true; // All logged-in users can add nurseries; owners can also edit/delete
  const upd=setter=>f=>v=>setter(p=>({...p,[f]:v}));
  const saveEdit=()=>{setNurseries(p=>p.map(n=>n.id===editId?{...form}:n));setEditId(null);};
  const addN=()=>{if(!newForm.name.trim()||!newForm.code.trim())return;setNurseries(p=>[...p,{...newForm,id:uid()}]);setNewForm({...blank});setShowNew(false);};
  const NForm=({f,setter,title,onSave,onCancel})=><Card style={{marginBottom:16,border:`1.5px solid ${C.g200}`}}>
    <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,marginBottom:14}}>{title}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:10,marginBottom:10}}>
      <Inp label="Nursery Name *" value={f.name} onChange={upd(setter)("name")} required/>
      <Inp label="Short Code *" value={f.code} onChange={upd(setter)("code")} placeholder="PC001" required/>
      <Inp label="Phone (tap to call)" value={f.phone} onChange={upd(setter)("phone")} placeholder="(305) 555-0100"/>
      <Inp label="Email" value={f.email} onChange={upd(setter)("email")} placeholder="orders@nursery.com"/>
      <Inp label="Website" value={f.website} onChange={upd(setter)("website")} placeholder="https://…"/>
      <Inp label="Contact Person" value={f.contact} onChange={upd(setter)("contact")} placeholder="Name"/>
      <Inp label="Payment Methods" value={f.paymentMethods} onChange={upd(setter)("paymentMethods")} placeholder="Cash, Card"/>
    </div>
    <Inp label="Full Address (tap → Google Maps)" value={f.address} onChange={upd(setter)("address")} placeholder="12345 SW 216th St, Miami, FL 33170" style={{marginBottom:10}}/>
    <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:12,alignItems:"start",marginBottom:10}}>
      <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,paddingTop:2}}>
        <input type="checkbox" checked={!!f.hasAccount} onChange={e=>setter(p=>({...p,hasAccount:e.target.checked}))} style={{width:16,height:16,accentColor:C.g700}}/>
        <span style={{fontWeight:600}}>I have an account here</span>
      </label>
      {f.hasAccount&&<Inp label="Account # / Terms" value={f.accountNotes} onChange={upd(setter)("accountNotes")} placeholder="Account #12345, net-30…"/>}
    </div>
    <div style={{marginBottom:12}}>
      <label style={{fontSize:11,fontWeight:600,color:C.tx3,display:"block",marginBottom:4}}>Notes / Tips</label>
      <textarea value={f.notes} onChange={e=>setter(p=>({...p,notes:e.target.value}))} style={{width:"100%",padding:"9px 11px",border:`1.5px solid ${C.bd}`,borderRadius:8,fontSize:12,fontFamily:F.body,minHeight:56,boxSizing:"border-box",resize:"vertical"}} placeholder="Best days, specialties, tips…"/>
    </div>
    <Row gap={8}><Btn onClick={onSave}>Save Nursery</Btn><Btn v="ghost" onClick={onCancel}>Cancel</Btn></Row>
  </Card>;
  return <div style={{padding:"14px 14px 90px",background:C.bg,minHeight:"100vh"}}>
    <SHdr icon="🏪" title="Nurseries" sub="📍 Tap address → Maps · 📞 Tap phone → Call"
      right={isOwner&&<Btn onClick={()=>setShowNew(p=>!p)}>{showNew?"Cancel":"+ Add Nursery"}</Btn>}/>
    {showNew&&<NForm f={newForm} setter={setNewForm} title="Add New Nursery" onSave={addN} onCancel={()=>setShowNew(false)}/>}
    {!nurseries.length&&!showNew&&<Card style={{textAlign:"center",padding:"50px"}}><div style={{fontSize:36,marginBottom:10}}>🏪</div><h2 style={{fontFamily:F.display,color:C.g900,fontSize:18}}>No nurseries yet</h2><Btn onClick={()=>setShowNew(true)} style={{marginTop:14}}>+ Add Nursery</Btn></Card>}
    {nurseries.map(n=>{
      const np=plants.filter(p=>p.nurseryCode===n.code);const ns=np.filter(p=>p.status==="Sold");
      const spent=np.reduce((s,p)=>s+(+p.cost||0),0);const rev=ns.reduce((s,p)=>s+(+p.salePrice||+p.suggestedPrice||0),0);
      const profit=rev-ns.reduce((s,p)=>s+(+p.cost||0),0);const avgM=np.length?Math.round(np.reduce((s,p)=>s+(+p.margin||0),0)/np.length):0;
      const grade=avgM>=65?"A":avgM>=50?"B":avgM>=35?"C":"D";const gc={A:C.g600,B:C.gold,C:C.amber,D:C.red}[grade];
      if(editId===n.id)return <NForm key={n.id} f={form} setter={setForm} title={`Edit: ${n.name}`} onSave={saveEdit} onCancel={()=>setEditId(null)}/>;
      return <Card key={n.id} style={{marginBottom:12}}>
        <Row between style={{marginBottom:10}}>
          <div style={{flex:1}}>
            <Row gap={10} center style={{marginBottom:5}}>
              <h2 style={{fontFamily:F.display,fontSize:17,color:C.g900,margin:0}}>{n.name}</h2>
              <Tag text={n.code} color={C.g700}/>
              {n.hasAccount&&<Tag text="✓ Account" color={C.blue}/>}
              {isOwner&&<div style={{width:30,height:30,borderRadius:7,background:gc+"18",border:`2px solid ${gc}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:gc}}>{grade}</div>}
            </Row>
            <Row gap={14} wrap style={{marginTop:4}}>
              {n.phone&&<a href={`tel:${n.phone}`} style={{color:C.blue,fontSize:12,textDecoration:"none"}}>📞 {n.phone}</a>}
              {n.email&&<a href={`mailto:${n.email}`} style={{color:C.blue,fontSize:12,textDecoration:"none"}}>✉️ {n.email}</a>}
              {n.website&&<a href={n.website} target="_blank" rel="noreferrer" style={{color:C.blue,fontSize:12,textDecoration:"none"}}>🌐 Website</a>}
              {n.contact&&<span style={{fontSize:12,color:C.tx3}}>👤 {n.contact}</span>}
            </Row>
            {n.address&&<a href={`https://maps.google.com/?q=${encodeURIComponent(n.address)}`} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,background:C.blueBg,border:`1px solid ${C.blue}22`,borderRadius:6,padding:"4px 10px",color:C.blue,fontSize:11,textDecoration:"none",fontWeight:600}}>📍 {n.address} →</a>}
            {n.paymentMethods&&<div style={{fontSize:11,color:C.tx3,marginTop:5}}>💳 {n.paymentMethods}</div>}
            {n.hasAccount&&n.accountNotes&&<div style={{fontSize:11,color:C.blue,marginTop:4}}>🔑 {n.accountNotes}</div>}
            {n.notes&&<div style={{fontSize:11,color:C.tx2,marginTop:4,fontStyle:"italic"}}>📝 {n.notes}</div>}
          </div>
          {isOwner&&<Row gap={6} style={{alignSelf:"flex-start"}}>
            <Btn sz="sm" v="outline" onClick={()=>{setEditId(n.id);setForm({...n});}}>Edit</Btn>
            <Btn sz="sm" v="ghost" onClick={()=>setDel(n.id)}>Delete</Btn>
          </Row>}
        </Row>
        {isOwner&&<div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
          {[["Plants",np.length,C.g600],["Spent",$(spent),C.red],["Revenue",$(rev),C.gold],["Profit",$(profit),profit>=0?C.g600:C.red],["Avg Margin",pct(avgM),avgM>=60?C.g600:avgM>=40?C.gold:C.red]].map(([l,v,c])=>(
            <div key={l} style={{background:C.cardAlt,borderRadius:8,padding:"9px 12px"}}>
              <div style={{fontSize:9,fontWeight:700,color:C.tx3,textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>{l}</div>
              <div style={{fontWeight:700,color:c,fontSize:14,fontFamily:F.display}}>{v}</div>
            </div>
          ))}
        </div>}
        {del_===n.id&&<div style={{background:C.redBg,border:`1px solid ${C.red}44`,borderRadius:8,padding:"10px 14px",marginTop:10}}>
          <span style={{fontSize:13,color:C.red}}>Delete {n.name}? </span>
          <Btn sz="sm" v="danger" onClick={()=>{setNurseries(p=>p.filter(x=>x.id!==n.id));setDel(null);}}>Yes, Delete</Btn>
          <Btn sz="sm" v="ghost" onClick={()=>setDel(null)} style={{marginLeft:6}}>Cancel</Btn>
        </div>}
      </Card>;
    })}
  </div>;
}

/* ══════════════════════════════════════════════════════════
   SELL-THROUGH DASHBOARD — What sells, what sits, buy more
══════════════════════════════════════════════════════════ */
function SellThrough({plants,nurseries,setPage}){
  const sold=plants.filter(p=>p.status==="Sold");
  const inStock=plants.filter(p=>p.status==="In Stock");
  const dead=plants.filter(p=>["Dead","Damaged"].includes(p.status));
  const total=plants.length;
  const stRate=total>0?Math.round(sold.length/total*100):0;
  const stColor=stRate>=75?C.g600:stRate>=40?C.gold:C.red;
  const avgDays=sold.length?Math.round(sold.reduce((s,p)=>s+(dHeld(p.dateAdded)||0),0)/sold.length):0;

  /* Aging buckets */
  const aging={fresh:0,normal:0,slow:0,risk:0,danger:0,dusty:0};
  inStock.forEach(p=>{const d=dHeld(p.dateAdded)||0;if(d<=14)aging.fresh++;else if(d<=30)aging.normal++;else if(d<=60)aging.slow++;else if(d<=90)aging.risk++;else if(d<=180)aging.danger++;else aging.dusty++;});

  /* Per-genus sell-through */
  const gMap={};
  plants.forEach(p=>{const g=gOf(p.name);if(!gMap[g])gMap[g]={name:g,total:0,sold:0,rev:0,cost:0,days:[]};gMap[g].total++;if(p.status==="Sold"){gMap[g].sold++;gMap[g].rev+=(+p.salePrice||+p.suggestedPrice||0);gMap[g].cost+=(+p.cost||0);const d=dHeld(p.dateAdded);if(d)gMap[g].days.push(d);}});
  const genusList=Object.values(gMap).map(g=>({...g,st:g.total>0?Math.round(g.sold/g.total*100):0,profit:g.rev-g.cost,avgDays:g.days.length?Math.round(g.days.reduce((a,b)=>a+b,0)/g.days.length):null})).sort((a,b)=>b.st-a.st);
  const bestGenus=genusList[0];
  const worstGenus=genusList[genusList.length-1];

  /* Per-nursery sell-through */
  const nurMap={};
  plants.forEach(p=>{if(!nurMap[p.nurseryCode])nurMap[p.nurseryCode]={code:p.nurseryCode,total:0,sold:0};nurMap[p.nurseryCode].total++;if(p.status==="Sold")nurMap[p.nurseryCode].sold++;});
  const nurList=Object.values(nurMap).map(n=>{const nur=nurseries.find(x=>x.code===n.code);return{...n,name:nur?.name||n.code,st:n.total>0?Math.round(n.sold/n.total*100):0};}).sort((a,b)=>b.st-a.st);

  /* Discount suggestions */
  const suggest30=inStock.filter(p=>{const d=dHeld(p.dateAdded)||0;return d>=30&&d<60;});
  const suggest60=inStock.filter(p=>{const d=dHeld(p.dateAdded)||0;return d>=60&&d<90;});
  const suggest90=inStock.filter(p=>(dHeld(p.dateAdded)||0)>=90);

  const StBar=({rate,label,color})=>(
    <div style={{marginBottom:10}}>
      <Row between style={{marginBottom:4}}><span style={{fontSize:13,fontWeight:600}}>{label}</span><span style={{fontWeight:700,fontSize:14,color}}>{rate}%</span></Row>
      <div style={{height:12,background:C.g100,borderRadius:6,overflow:"hidden"}}>
        <div style={{width:`${rate}%`,height:"100%",background:color,borderRadius:6,transition:"width .5s"}}/>
      </div>
    </div>
  );

  return <div style={{padding:"14px 14px 90px",background:C.bg,minHeight:"100vh"}}>
    <SHdr icon="📊" title="Sell-Through Insights" sub="What's selling · What to buy · What to discount"/>

    {/* Hero metric */}
    <div style={{background:C.g800,borderRadius:16,padding:"20px",marginBottom:14,color:"#fff",textAlign:"center"}}>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",opacity:.7,marginBottom:6}}>Overall Sell-Through Rate</div>
      <div style={{fontSize:52,fontWeight:700,fontFamily:F.display,lineHeight:1,color:stColor==="C.g600"?"#6EC98E":stRate>=75?"#6EC98E":stRate>=40?"#F5C842":"#F55"}}>
        {stRate}%
      </div>
      <div style={{fontSize:13,opacity:.8,marginTop:6}}>{sold.length} sold of {total} total plants</div>
      <div style={{marginTop:10,background:"rgba(255,255,255,.15)",borderRadius:8,padding:"6px 10px",display:"inline-block",fontSize:12}}>
        {stRate>=75?"🟢 Strong — keep buying what's working":stRate>=40?"🟡 Moderate — watch slow movers":"🔴 Low — reduce buying until stock clears"}
      </div>
    </div>

    {/* Quick KPIs */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
      <KPI label="In Stock" value={inStock.length} sub="plants unsold" color={C.g600}/>
      <KPI label="Avg Days to Sell" value={avgDays?`${avgDays}d`:"—"} sub="from add to sold" color={C.gold}/>
      <KPI label="Dead / Damaged" value={dead.length} sub={`$${dead.reduce((s,p)=>s+(+p.cost||0),0).toFixed(0)} lost`} color={dead.length>0?C.red:C.tx3}/>
      <KPI label="Best Genus" value={bestGenus?.name||"—"} sub={bestGenus?`${bestGenus.st}% sell-through`:""} color={C.g600}/>
    </div>

    {/* Aging inventory */}
    <Card style={{marginBottom:14}}>
      <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:16,marginBottom:12}}>⏳ Inventory Age Breakdown</div>
      {[
        ["🟢 0–14 days (New)",aging.fresh,C.g600],
        ["🔵 15–30 days (Normal)",aging.normal,C.blue],
        ["🟡 31–60 days (Slow Moving)",aging.slow,C.gold],
        ["🟠 61–90 days (At Risk)",aging.risk,C.amber],
        ["🔴 91–180 days (Danger)",aging.danger,C.red],
        ["💀 180+ days (Dusty)",aging.dusty,C.red],
      ].map(([l,v,c])=><div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.bdS}`}}>
        <span style={{fontSize:13}}>{l}</span>
        <span style={{fontWeight:700,color:v>0?c:C.tx4,fontSize:15}}>{v} plants</span>
      </div>)}
    </Card>

    {/* Discount suggestions */}
    {(suggest30.length>0||suggest60.length>0||suggest90.length>0)&&<Card style={{marginBottom:14,border:`1.5px solid ${C.amber}44`,background:C.amberBg}}>
      <div style={{fontFamily:F.display,fontWeight:700,color:C.amber,fontSize:15,marginBottom:10}}>💸 Discount Suggestions</div>
      {suggest90.length>0&&<div style={{background:C.redBg,border:`1px solid ${C.red}44`,borderRadius:9,padding:"10px 14px",marginBottom:8}}>
        <div style={{fontWeight:700,color:C.red,marginBottom:4}}>🔴 90+ days → Clearance price ({suggest90.length} plants)</div>
        {suggest90.slice(0,3).map(p=><div key={p.id} style={{fontSize:12,color:C.tx2,paddingLeft:8}}>{toTC(p.name)} · {fDays(dHeld(p.dateAdded))} · was {$(p.suggestedPrice)} → try {$(Math.max(+p.cost*1.1,+p.suggestedPrice*.7))}</div>)}
        {suggest90.length>3&&<div style={{fontSize:11,color:C.tx3,marginTop:3}}>+{suggest90.length-3} more</div>}
      </div>}
      {suggest60.length>0&&<div style={{background:C.amberBg,border:`1px solid ${C.amber}44`,borderRadius:9,padding:"10px 14px",marginBottom:8}}>
        <div style={{fontWeight:700,color:C.amber,marginBottom:4}}>🟠 60–89 days → 20% discount ({suggest60.length} plants)</div>
        {suggest60.slice(0,3).map(p=><div key={p.id} style={{fontSize:12,color:C.tx2,paddingLeft:8}}>{toTC(p.name)} · was {$(p.suggestedPrice)} → try {$(+p.suggestedPrice*.8)}</div>)}
      </div>}
      {suggest30.length>0&&<div style={{background:C.goldBg,border:`1px solid ${C.gold}44`,borderRadius:9,padding:"10px 14px"}}>
        <div style={{fontWeight:700,color:C.gold,marginBottom:4}}>🟡 30–59 days → 10% discount ({suggest30.length} plants)</div>
        {suggest30.slice(0,3).map(p=><div key={p.id} style={{fontSize:12,color:C.tx2,paddingLeft:8}}>{toTC(p.name)} · was {$(p.suggestedPrice)} → try {$(+p.suggestedPrice*.9)}</div>)}
      </div>}
    </Card>}

    {/* Per-genus sell-through */}
    <Card style={{marginBottom:14}}>
      <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:16,marginBottom:12}}>🌿 By Plant Type (Genus)</div>
      {genusList.length===0?<p style={{color:C.tx3}}>No plants added yet.</p>:genusList.map(g=>{
        const c=g.st>=75?C.g600:g.st>=40?C.gold:C.red;
        const rec=g.st>=75?"Buy More ✅":g.st>=40?"Cautious 🟡":"Reduce Buying 🔴";
        return <div key={g.name} style={{marginBottom:14}}>
          <Row between style={{marginBottom:4}}>
            <div>
              <span style={{fontWeight:700,fontSize:14}}>{g.name}</span>
              <span style={{fontSize:11,color:C.tx3,marginLeft:8}}>{g.total} plants · {g.sold} sold{g.avgDays?` · avg ${g.avgDays}d`:""}</span>
            </div>
            <Row gap={6} center><Tag text={rec} color={c} sm/><span style={{fontWeight:700,fontSize:15,color:c}}>{g.st}%</span></Row>
          </Row>
          <div style={{height:12,background:C.g100,borderRadius:6,overflow:"hidden"}}>
            <div style={{width:`${g.st}%`,height:"100%",background:c,borderRadius:6,transition:"width .5s"}}/>
          </div>
          {g.profit!==0&&<div style={{fontSize:11,color:C.tx3,marginTop:3}}>Profit: <span style={{color:g.profit>0?C.g600:C.red,fontWeight:600}}>{$(g.profit)}</span></div>}
        </div>;
      })}
    </Card>

    {/* Per-nursery */}
    {nurList.length>0&&<Card>
      <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:16,marginBottom:12}}>🏪 By Nursery</div>
      {nurList.map(n=>{const c=n.st>=75?C.g600:n.st>=40?C.gold:C.red;return(
        <div key={n.code} style={{marginBottom:12}}>
          <Row between style={{marginBottom:4}}>
            <div><span style={{fontWeight:700,fontSize:13}}>{n.name}</span><span style={{fontSize:11,color:C.tx3,marginLeft:8}}>{n.total} bought · {n.sold} sold</span></div>
            <span style={{fontWeight:700,fontSize:15,color:c}}>{n.st}%</span>
          </Row>

function Bills({bills,setBills}){

  const [show,setShow]=useState(false);
  const [editId,setEditId]=useState(null);
  const upd=f=>v=>setForm(p=>({...p,[f]:v}));
  const save=()=>{
    if(!form.name||!form.amount||!form.dueDate)return;
    if(editId){setBills(p=>p.map(b=>b.id===editId?{...form,id:editId}:b));setEditId(null);}
    else{setBills(p=>[...p,{...form,id:uid()}]);}

  };
  const markPaid=id=>setBills(p=>p.map(b=>b.id===id?{...b,status:"Paid",paidDate:today()}:b));
  const del=id=>setBills(p=>p.filter(b=>b.id!==id));
  const startEdit=b=>{setForm({...b});setEditId(b.id);setShow(true);};
  const getDays=due=>Math.ceil((new Date(due)-Date.now())/864e5);
  const unpaid=bills.filter(b=>b.status==="Unpaid").sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
  const paid_=bills.filter(b=>b.status==="Paid").sort((a,b)=>new Date(b.paidDate||b.dueDate)-new Date(a.paidDate||a.dueDate));
  const totalDue=unpaid.reduce((s,b)=>s+(+b.amount||0),0);
  const overdue=unpaid.filter(b=>getDays(b.dueDate)<0);
  const dueSoon7=unpaid.filter(b=>{const d=getDays(b.dueDate);return d>=0&&d<=7;});
  const Countdown=({dueDate})=>{
    const d=getDays(dueDate);

      <div style={{fontSize:9,color,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginTop:2}}>{d<0?"days over":"days left"}</div>

      <KPI label="Overdue" value={$(overdue.reduce((s,b)=>s+(+b.amount||0),0))} sub={`${overdue.length} bills`} color={overdue.length>0?C.red:C.tx3}/>
      <KPI label="Unpaid Bills" value={unpaid.length} color={C.g600}/>
    </div>
    {show&&<Card style={{marginBottom:20,border:`1.5px solid ${C.g200}`}}>
      <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,marginBottom:14}}>{editId?"Edit Bill":"Add New Bill"}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:10}}>
        <Inp label="Bill Name *" value={form.name} onChange={upd("name")} placeholder="e.g. Shopify Monthly" required/>
        <Inp label="Amount *" type="number" value={form.amount} onChange={upd("amount")} placeholder="0.00" required/>
        <Inp label="Due Date *" type="date" value={form.dueDate} onChange={upd("dueDate")} required/>
        <Inp label="Vendor / Payee" value={form.vendor} onChange={upd("vendor")} placeholder="Who you pay"/>
        <Sel label="Category" value={form.category} onChange={upd("category")} options={BILL_CATS}/>
        <Sel label="Frequency" value={form.frequency} onChange={upd("frequency")} options={BILL_FREQ}/>
        <Sel label="Payment Method" value={form.payMethod} onChange={upd("payMethod")} options={["", ...PAY_METHS]}/>
      </div>
      <Inp label="Notes / Account info" value={form.notes} onChange={upd("notes")} placeholder="Account #, login info, anything useful…" style={{marginBottom:10}}/>
      <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,marginBottom:12}}>
        <input type="checkbox" checked={!!form.autoRenew} onChange={e=>setForm(p=>({...p,autoRenew:e.target.checked}))} style={{width:15,height:15,accentColor:C.g700}}/> Auto-renews / recurring bill
      </label>
      <Row gap={8}><Btn onClick={save}>{editId?"Save Changes":"Add Bill"}</Btn><Btn v="ghost" onClick={()=>{setShow(false);setEditId(null);setForm(blank);}}>Cancel</Btn></Row>
    </Card>}
    {unpaid.length===0&&!show?<Card style={{textAlign:"center",padding:"50px"}}>
      <div style={{fontSize:36,marginBottom:10}}>📅</div>
      <h2 style={{fontFamily:F.display,color:C.g900,marginBottom:6,fontSize:18}}>No bills tracked yet</h2>
      <p style={{color:C.tx3,marginBottom:14}}>Add recurring bills to never miss a payment.</p>
      <Btn onClick={()=>setShow(true)}>+ Add Your First Bill</Btn>
    </Card>:(
      <>
        {unpaid.length>0&&<div style={{marginBottom:20}}>
          <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:15,marginBottom:12}}>Upcoming & Unpaid</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {unpaid.map(b=>{const days=getDays(b.dueDate);const overd=days<0;

                      <Btn sz="sm" v="ghost" onClick={()=>del(b.id)}>✕</Btn>
                    </Row>
                  </Row>
                </Row>
              </Card>;
            })}
          </div>
        </div>}
        {paid_.length>0&&<div>
          <div style={{fontFamily:F.display,fontWeight:700,color:C.tx3,fontSize:14,marginBottom:10}}>Recently Paid</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {paid_.slice(0,6).map(b=><div key={b.id} style={{background:C.card,border:`1px solid ${C.bdS}`,borderRadius:10,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",opacity:.75}}>
              <div><span style={{fontWeight:600,fontSize:13,color:C.tx2}}>{b.name}</span><span style={{fontSize:11,color:C.tx3,marginLeft:10}}>{b.vendor&&`${b.vendor} · `}Paid {b.paidDate||b.dueDate}</span></div>

        </div>}
      </>
    )}
  </div>;

/* ══════════════════════════════════════════════════════════
   TIMECARD
══════════════════════════════════════════════════════════ */
function Timecard({timecards,setTimecards,user,employees}){
  const isOwner=user.role!=="employee";
  const [selEmp,setSelEmp]=useState(isOwner?employees[0]?.id||user.id:user.id);
  const [rate,setRate]=useState("15");
  const [showAdd,setShowAdd]=useState(false);
  const [manual,setManual]=useState({date:today(),in:"09:00",out:"17:00",break_:"30",notes:""});
  const myTC=isOwner?timecards.filter(t=>t.userId===selEmp):timecards.filter(t=>t.userId===user.id);
  const todayTC=timecards.find(t=>t.userId===user.id&&t.date===today()&&!t.out);
  const clockIn=()=>{if(todayTC)return;const now=new Date().toTimeString().slice(0,5);setTimecards(p=>[...p,{id:uid(),userId:user.id,userName:user.name,date:today(),in:now,out:"",break_:0,hours:"",totalPay:"",notes:"",rate:+rate}]);};
  const clockOut=()=>{const now=new Date().toTimeString().slice(0,5);setTimecards(p=>p.map(t=>{if(t.id!==todayTC.id)return t;const[ih,im]=t.in.split(":").map(Number),[oh,om]=now.split(":").map(Number);const hours=Math.max(0,((oh*60+om)-(ih*60+im)-(+t.break_||0))/60);return{...t,out:now,hours:+hours.toFixed(2),totalPay:+(hours*(+t.rate||+rate)).toFixed(2)};}));};
  const addManual=()=>{const[ih,im]=manual.in.split(":").map(Number),[oh,om]=manual.out.split(":").map(Number);const hours=Math.max(0,((oh*60+om)-(ih*60+im)-(+manual.break_||0))/60);const target=isOwner?selEmp:user.id;const tUser=employees.find(e=>e.id===target)||user;setTimecards(p=>[...p,{id:uid(),userId:target,userName:tUser.name,...manual,break_:+manual.break_,hours:+hours.toFixed(2),totalPay:+(hours*(+rate)).toFixed(2),rate:+rate}]);setShowAdd(false);};
  const wkHrs=myTC.filter(t=>new Date(t.date)>=new Date(Date.now()-7*864e5)).reduce((s,t)=>s+(+t.hours||0),0);
  const wkPay=myTC.filter(t=>new Date(t.date)>=new Date(Date.now()-7*864e5)).reduce((s,t)=>s+(+t.totalPay||0),0);
  const moPay=myTC.filter(t=>t.date?.startsWith(today().slice(0,7))).reduce((s,t)=>s+(+t.totalPay||0),0);
  return <div style={{padding:"14px 14px 90px",background:C.bg,minHeight:"100vh"}}>
    <SHdr icon="⏱️" title={isOwner?"Timecard Manager":"My Timecard"} sub="Clock in/out · Manual entries · Feeds into payroll"
      right={<Row gap={6}><Btn sz="sm" v="ghost" onClick={()=>setShowAdd(p=>!p)}>+ Manual Entry</Btn>{!isOwner&&!todayTC&&<Btn sz="sm" onClick={clockIn}>🟢 Clock In</Btn>}{!isOwner&&todayTC&&<Btn sz="sm" v="outline" onClick={clockOut}>🔴 Clock Out</Btn>}</Row>}/>
    {isOwner&&<div style={{marginBottom:14,maxWidth:280}}><Sel label="View Employee" value={selEmp} onChange={setSelEmp} options={employees.map(e=>({v:e.id,l:`${e.name} (${e.role})`}))}/></div>}
    {todayTC&&!isOwner&&<div style={{background:C.g50,border:`1px solid ${C.g300}`,borderRadius:9,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:C.g500}}/><span style={{fontWeight:700,color:C.g800}}>Clocked in since {todayTC.in}</span></div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <KPI label="This Week Hours" value={`${wkHrs.toFixed(1)}h`} color={C.blue}/>
      <KPI label="This Week Pay" value={$(wkPay)} color={C.gold}/>
      <KPI label="This Month Pay" value={$(moPay)} color={C.g600}/>
      <div style={{background:C.card,border:`1px solid ${C.bd}`,borderRadius:14,padding:"14px 14px",borderTop:`3px solid ${C.tx3}`}}>
        <div style={{fontSize:11,fontWeight:700,color:C.tx3,letterSpacing:.5,textTransform:"uppercase",marginBottom:6}}>Hourly Rate</div>
        <input type="number" value={rate} onChange={e=>setRate(e.target.value)} style={{fontSize:24,fontWeight:700,color:C.g800,fontFamily:F.display,border:"none",background:"transparent",width:"100%",outline:"none"}} placeholder="15.00"/>
      </div>
    </div>
    {showAdd&&<Card style={{marginBottom:14}}>
      <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,marginBottom:10}}>Manual Shift Entry</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10}}>
        <Inp label="Date" type="date" value={manual.date} onChange={v=>setManual(p=>({...p,date:v}))}/>
        <Inp label="Time In" type="time" value={manual.in} onChange={v=>setManual(p=>({...p,in:v}))}/>
        <Inp label="Time Out" type="time" value={manual.out} onChange={v=>setManual(p=>({...p,out:v}))}/>
        <Inp label="Break (min)" type="number" value={manual.break_} onChange={v=>setManual(p=>({...p,break_:v}))}/>
        <Inp label="Notes" value={manual.notes} onChange={v=>setManual(p=>({...p,notes:v}))}/>
      </div>
      <Row gap={8} style={{marginTop:10}}><Btn onClick={addManual}>Add Shift</Btn><Btn v="ghost" onClick={()=>setShowAdd(false)}>Cancel</Btn></Row>
    </Card>}
    <Tbl cols={[{k:"date",l:"Date"},{k:"in_",l:"In"},{k:"out_",l:"Out"},{k:"brk",l:"Break"},{k:"hrs",l:"Hours"},{k:"rate_",l:"Rate"},{k:"pay_",l:"Pay"}]}
      rows={myTC.slice().reverse().map(t=>({date:t.date,in_:t.in,out_:t.out||<Tag text="Active" color={C.g500} sm/>,brk:t.break_?`${t.break_}m`:"—",hrs:t.hours?`${t.hours}h`:"—",rate_:`$${t.rate||rate}/hr`,pay_:t.totalPay?<span style={{fontWeight:700,color:C.gold}}>{$(t.totalPay)}</span>:"—"}))}
      empty="No shifts yet"/>
  </div>;
}

/* ══════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════ */
function BuyIntel({plants}){
  const [ai,setAi]=useState("");
  const [loading,setLoading]=useState(false);
  const gMap={};
  plants.forEach(p=>{const g=gOf(p.name);if(!gMap[g])gMap[g]={name:g,total:0,sold:0,dead:0,inStock:0,cost:0,rev:0,margins:[],days:[]};const gs=gMap[g];gs.total++;gs.cost+=(+p.cost||0);if(p.status==="Sold"){gs.sold++;gs.rev+=(+p.salePrice||+p.suggestedPrice||0);const d=dHeld(p.dateAdded);if(d!==null)gs.days.push(d);}if(["Dead","Damaged"].includes(p.status))gs.dead++;if(p.status==="In Stock")gs.inStock++;gs.margins.push(+p.margin||0);});
  const genera=Object.values(gMap).map(g=>({...g,avgM:g.margins.length?Math.round(g.margins.reduce((a,b)=>a+b,0)/g.margins.length):0,sellThru:g.total>0?Math.round(g.sold/g.total*100):0,deathRate:g.total>0?Math.round(g.dead/g.total*100):0,profit:g.rev-g.cost,roi:g.cost>0?Math.round((g.rev-g.cost)/g.cost*100):0,avgDays:g.days.length?Math.round(g.days.reduce((a,b)=>a+b,0)/g.days.length):null})).sort((a,b)=>b.profit-a.profit);
  const score=g=>Math.min(100,Math.round(g.avgM*.4+g.sellThru*.4+Math.max(0,100-g.deathRate)*.2));
  const sc=s=>s>=75?C.g600:s>=50?C.gold:s>=25?C.amber:C.red;
  const getAI=async()=>{
    if(!plants.length){setAi("Add plants first.");return;}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Card>
        <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:14,marginBottom:12}}>📋 P&L Summary</div>
        {[["Gross Revenue",soldRev,C.gold,false],["Platform Fees",-soldFees,C.red,false],["Cost of Goods",-soldCogs,C.red,false],["= True Gross",gross,gross>=0?C.g600:C.red,true],["Operating Expenses",-taxDedExp,C.red,false],["= Net Profit",net,net>=0?C.g800:C.red,true]].map(([l,v,c,bold])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:bold?C.g50:"transparent",borderRadius:5,marginBottom:2}}>
            <span style={{fontSize:13,color:C.tx2,fontWeight:bold?700:400}}>{l}</span>
            <span style={{fontSize:13,fontWeight:700,color:c}}>{v>=0?$(v):`(${$(-v)})`}</span>
          </div>
        ))}
      </Card>
      <Card>
        <div style={{fontFamily:F.display,fontWeight:700,color:C.g900,fontSize:14,marginBottom:12}}>🧮 Tax Estimates</div>
        {[["FL Sales Tax (7%)",$(flSalesTax)],["Federal SE Tax (15.3%)",$(seTax)],["SE Deduction (50% of SE)",$(seTaxDed)],["Federal Income Tax (est.)",$(incomeTax)],["Total Est. Liability",$(flSalesTax+seTax+incomeTax-seTaxDed)]].map(([l,v],i)=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"6px 8px",background:i===4?C.redBg:"transparent",borderRadius:5,marginBottom:2}}>
            <span style={{fontSize:12,color:C.tx2,fontWeight:i===4?700:400}}>{l}</span>
            <span style={{fontSize:12,fontWeight:700,color:i===4?C.red:i===2?C.g600:C.tx1}}>{v}</span>
          </div>
        ))}
        <div style={{marginTop:12,padding:"8px 10px",background:C.goldBg,borderRadius:7,fontSize:11,color:C.tx2}}>⚠️ Estimates only — consult your CPA. FL due quarterly.</div>
      </Card>
    </div>
  </div>;
}
